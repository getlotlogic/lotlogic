                      </span>
                    )}
                  </div>
                </div>
                {timer && (
                  <div className="job-timer">
                    <div className={`job-timer-val ${timer.long ? 'long' : ''}`}>{timer.val}</div>
                    <div className="job-timer-label">{timer.unit}</div>
                  </div>
                )}
              </div>
              {/* Primary actions — hidden for departed violations (dismiss from banner instead) */}
              {!(v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id)) && (<>
              {v._isALPR ? (
              <>
              <div className="job-actions-row" role="group" aria-label="Enforcement actions" style={{gap:8, padding:'10px 12px'}}>
                <button className="action-btn tow" disabled={anyActing} onClick={async () => { setActing(v.id); try { await db.dispatchALPRViolation(v.id); addToast('Tow dispatched', 'success'); if (onAction) onAction(); } catch(e) { addToast('Failed: '+(e.message||''), 'error'); } setActing(null); }} aria-label="Dispatch tow" style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : 'Dispatch Tow'}
                </button>
                <button className="action-btn dismiss" disabled={anyActing} onClick={async () => { setActing(v.id); try { await db.dismissALPRViolation(v.id); addToast('Violation dismissed', 'success'); if (onAction) onAction(); } catch(e) { addToast('Failed: '+(e.message||''), 'error'); } setActing(null); }} aria-label="Dismiss violation" style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : 'Dismiss'}
                </button>
              </div>
              </>
              ) : (
              <>
              <div className="job-actions-row" role="group" aria-label="Enforcement actions" style={{gap:8, padding:'10px 12px'}}>
                <button className="action-btn boot" disabled={anyActing} onClick={() => requestAction(v.id, 'boot')} aria-label={`Boot vehicle for $${user?.boot_fee || 75}`} style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : `Boot · $${user?.boot_fee || 75}`}
                </button>
                <button className="action-btn tow" disabled={anyActing} onClick={() => requestAction(v.id, 'tow')} aria-label={`Tow vehicle for $${user?.tow_fee || 250}`} style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : `Tow · $${user?.tow_fee || 250}`}
                </button>
              </div>
              <div className="job-secondary-actions" style={{display:'flex', alignItems:'center', padding:'0 12px 10px', gap:8, flexWrap:'wrap'}}>
                  {v.status === 'alerted' && (
                    <button className="action-btn" disabled={anyActing || acking === v.id}
                      onClick={(e) => { e.stopPropagation(); handleAcknowledge(v.id); }}
                      aria-label="Acknowledge violation"
                      style={{background:'rgba(245,158,11,.12)', border:'1px solid rgba(245,158,11,.3)', color:'#f59e0b'}}>
                      {acking === v.id ? '…' : 'Acknowledge'}
                    </button>
                  )}
                  <button className="action-btn dismiss" disabled={anyActing} onClick={() => requestAction(v.id, 'dismissed')} aria-label="Dismiss violation">
                    Dismiss
                  </button>
                  <button className="action-btn gone" disabled={anyActing} onClick={() => requestAction(v.id, 'already_gone')} aria-label="Mark vehicle as already gone">
                    Gone
                  </button>
                  <div style={{flex:'1 1 auto'}} />
                {lot?.address && (
                  <a href={mapsLink(lot.address)} target="_blank" rel="noopener"
                    className="action-btn navigate" style={{textDecoration:'none', display:'flex', alignItems:'center', justifyContent:'center', gap:4}}
                    onClick={e => { e.stopPropagation(); haptic('medium'); }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Navigate
                  </a>
                )}
              </div>
              </>
              )}
              </>)}
            </div>
          );
        })
      )}

      {/* Recent completed — hidden when the 'handled' filter pill is active to avoid duplication */}
      {recent.length > 0 && filter !== 'handled' && (
        <>
          <div className="section-header" style={{marginTop: 24}}>
            <div className="section-title">Handled Today</div>
            <div className="section-count">{recent.length} jobs</div>
          </div>
          {recent.map(v => {
            const lot = lotMap[v.lot_id];
            const actionColor = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            const col = actionColor[v.action_taken?.toLowerCase()] || '#9ca3af';
            return (
              <div key={v.id} className="job-card" style={{position:'relative'}}>
                {/* Owner delete X */}
                {isOwner && (
                  <button
                    onClick={async (e) => {
                      e.stopPropagation();
                      try {
                        await db.deleteViolation(v.id, !!v._isALPR);
                        addToast('Job deleted', 'success');
                        if (onAction) onAction();
                      } catch (err) {
                        addToast('Failed to delete: ' + (err.message || 'Unknown error'), 'error');
                      }
                    }}
                    style={{
                      position:'absolute', top:8, right:8, zIndex:5, width:28, height:28, borderRadius:'50%',
                      background:'rgba(0,0,0,.5)', backdropFilter:'blur(4px)', border:'none', cursor:'pointer',
                      display:'flex', alignItems:'center', justifyContent:'center', padding:0,
                    }}
                    aria-label="Delete job"
                    title="Delete job"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                )}
                <div className="job-body">
                  <div className="job-top">
                    <div>
                      <div className="job-lot-name" style={{fontSize:14, display:'flex', alignItems:'center', gap:6}}>
                        {v._isALPR ? v._lot_name : (lot?.name || 'Unknown Lot')}
                        {v._isALPR && <span style={{fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4, background:'rgba(167,139,250,.15)', color:'#a78bfa'}}>PARKING PASS</span>}
                      </div>
                      <div className="job-lot-addr">{smartDate(v.detected_at)} · {fmtTime(v.detected_at)}</div>
                    </div>
                    {v.our_revenue > 0 && (
                      <div className="job-timer" style={{background:'var(--revenue-bg)'}}>
                        <div style={{fontSize:15, fontWeight:800, color:'var(--green)'}}>{fmtMoney(v.our_revenue)}</div>
                        <div className="job-timer-label">earned</div>
                      </div>
                    )}
                  </div>
                  <div className="job-details">
                    {displayColor(v.vehicle_color) ? (
                      <span style={{display:'flex', alignItems:'center', gap:4, fontSize:11, color:'var(--text-secondary)'}}>
                        <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(0,0,0,.2)', flexShrink:0}} />
                        <span style={{textTransform:'capitalize'}}>{[v.vehicle_color, v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : null].filter(Boolean).join(' ')}</span>
                      </span>
                    ) : v.vehicle_type && v.vehicle_type !== 'car' ? (
                      <span style={{fontSize:11, color:'var(--text-muted)', textTransform:'capitalize'}}>{v.vehicle_type}</span>
                    ) : null}
                    {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                    {v.status === 'cleared' ? (
                      <span className="job-tag" style={{color:'#4ade80'}}>✅ <strong style={{color:'#4ade80'}}>Cleared</strong>{v.duration_seconds ? ` · ${Math.round(v.duration_seconds / 60)}m` : ''}</span>
                    ) : (v.status === 'departed' || v.action_taken === 'already_gone') ? (
                      <span className="job-tag" style={{color:'#6b7280'}}>🚫 <strong style={{color:'#6b7280'}}>Vehicle Left</strong></span>
                    ) : (
                      <span className="job-tag" style={{color: col}}>✓ <strong style={{color: col}}>{(v.action_taken || 'handled').replace(/_/g, ' ')}</strong></span>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* Violation detail modal */}
      {selectedViol && (() => {
        const cam = allCams.find(c => c.camera_id === selectedViol.camera_id);
        const latestUrl = cam?.latest_snapshot?.url || cam?.latest_snapshot?.storage_url || null;
        const latestDets = cam?.latest_snapshot?.detections || [];
        const zones = camZonesMap[selectedViol.camera_id] || [];
        const matched = matchViolationDetection(selectedViol._detections, selectedViol.zone_id, zones);
        return <ViolationProofModal
          violation={selectedViol}
          latestSnapshotUrl={latestUrl}
          latestDetections={latestDets}
          cameraZones={zones}
          matchedDetection={matched}
          tunnelSnapshotUrl={cam?.tunnel_snapshot_url}
          onClose={() => setSelectedViol(null)}
          onAutoGone={(violId) => { setSelectedViol(null); handleAction(violId, 'already_gone'); }}
        />;
      })()}

    </div>
  );
}

function EarningsPage({ violations, lots, isOwner, user, onNavigate }) {
  const [period, setPeriod] = useState('month');
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Invoicable-this-week summary (owner only): resolved tows in the last 7 days
  // that have not yet been stamped with invoiced_at and produced gross revenue.
  // This is the hand-off to the Billing tab.
  const weekCutoff = Date.now() - 7 * 86400000;
  const invoicableTows = isOwner ? violations.filter(v =>
    v.action_taken === 'tow'
    && v.status !== 'pending'
    && (v.gross_revenue || 0) > 0
    && !v.invoiced_at
    && new Date(v.resolved_at || v.detected_at).getTime() >= weekCutoff
  ) : [];
  const invoicableGross = invoicableTows.reduce((s, v) => s + (v.gross_revenue || 0), 0);

  const periodLabels = { week: 'This Week', month: 'This Month', all: 'All Time' };

  // Compute stats from the already-filtered violations prop (scoped to this user's lots)
  const now = Date.now();
  const cutoffs = { week: now - 7 * 86400000, month: now - 30 * 86400000, all: 0 };
  const periodViols = violations.filter(v => {
    const ts = new Date(v.resolved_at || v.detected_at).getTime();
    return ts >= cutoffs[period];
  });
  const resolved = periodViols.filter(v => v.action_taken && v.status !== 'pending')
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  const totalOurs = resolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
  const totalGross = resolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalViolations = periodViols.length;
  const actionsExecuted = resolved.filter(v => !['pending', 'plate_correction'].includes(v.action_taken)).length;
  const actionRate = totalViolations > 0 ? actionsExecuted / totalViolations : 0;

  // Action breakdown from local data
  const byAction = {};
  resolved.forEach(v => { if (v.action_taken && !['pending', 'plate_correction'].includes(v.action_taken)) byAction[v.action_taken] = (byAction[v.action_taken] || 0) + 1; });
  const actionEntries = Object.entries(byAction).filter(([k, v]) => v > 0 && k !== 'pending');

  // Per-lot breakdown for owners
  const byLot = {};
  resolved.forEach(v => {
    if (!byLot[v.lot_id]) byLot[v.lot_id] = { lot_id: v.lot_id, our_revenue_cents: 0, actions: 0 };
    byLot[v.lot_id].our_revenue_cents += (v.our_revenue || 0);
    byLot[v.lot_id].actions += 1;
  });
  const byLotEntries = Object.values(byLot).filter(e => e.actions > 0);

  // Daily earnings for bar chart (last 7 days)
  const dailyEarnings = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = new Date(); dayStart.setHours(0,0,0,0); dayStart.setDate(dayStart.getDate() - i);
    const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
    const dayViols = resolved.filter(v => {
      const ts = new Date(v.resolved_at || v.detected_at);
      return ts >= dayStart && ts < dayEnd;
    });
    const dayRev = dayViols.reduce((s, v) => s + (v.our_revenue || 0), 0);
    dailyEarnings.push({
      label: dayStart.toLocaleDateString('en-US', { weekday: 'short' }),
      value: dayRev,
      count: dayViols.length,
    });
  }
  const maxDailyRev = Math.max(...dailyEarnings.map(d => d.value), 1);

  return (
    <div className="page-enter">
      {/* Period picker */}
      <div className="earnings-period-row">
        {['week','month','all'].map(p => (
          <button key={p} className={`period-btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {periodLabels[p]}
          </button>
        ))}
      </div>

      {/* Hero total */}
      <div className="earnings-hero">
        <div className="earnings-label">{periodLabels[period]} {isOwner ? 'Earnings' : 'Your Earnings'}</div>
        <div className="earnings-amount">
          <span>$</span>{(totalOurs / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
        </div>
        <div className="earnings-sub">
          {actionsExecuted} job{actionsExecuted !== 1 ? 's' : ''} completed
          {isOwner ? ` · ${fmtMoney(totalGross)} gross` : ''}
        </div>
        {!isOwner && totalGross > 0 && (
          <div style={{marginTop:12, display:'flex', gap:8, justifyContent:'center'}}>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Gross </span>
              <strong style={{color:'var(--text-primary)'}}>{fmtMoney(totalGross)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Partner </span>
              <strong style={{color:'var(--green)'}}>{fmtMoney(totalGross - totalOurs)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>LotLogic </span>
              <strong style={{color:'var(--accent)'}}>{fmtMoney(totalOurs)}</strong>
            </div>
          </div>
        )}
      </div>

      {/* Invoicable tows (owner only) — handoff to Billing */}
      {isOwner && invoicableTows.length > 0 && (
        <div
          onClick={() => onNavigate && onNavigate('invoices')}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onNavigate && onNavigate('invoices'); } }}
          style={{
            background: 'linear-gradient(90deg, rgba(59,130,246,.12), rgba(59,130,246,.04))',
            border: '1px solid rgba(59,130,246,.35)',
            borderRadius: 12,
            padding: 14,
            marginBottom: 16,
            cursor: onNavigate ? 'pointer' : 'default',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            gap: 12,
          }}
        >
          <div>
            <div style={{fontSize: 13, color: 'var(--text-muted)', marginBottom: 2}}>Invoicable this week</div>
            <div style={{fontSize: 18, fontWeight: 800, color: 'var(--text-primary)'}}>
              {invoicableTows.length} tow{invoicableTows.length !== 1 ? 's' : ''} · {fmtMoney(invoicableGross)}
            </div>
          </div>
          <div style={{fontSize: 13, color: 'var(--accent)', fontWeight: 700, whiteSpace: 'nowrap'}}>
            Review &amp; invoice →
          </div>
        </div>
      )}

      {/* KPI cards */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{totalViolations}</div>
          <div className="kpi-label">Violations</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{actionsExecuted}</div>
          <div className="kpi-label">Actioned</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${actionRate >= 0.5 ? 'green' : actionRate >= 0.2 ? 'yellow' : 'red'}`}>
            {Math.round(actionRate * 100)}%
          </div>
          <div className="kpi-label">Action Rate</div>
        </div>
      </div>

      {/* Weekly earnings bar chart */}
      {period !== 'all' && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">Daily Earnings (Last 7 Days)</div>
          <div style={{padding:'12px 16px'}}>
            {dailyEarnings.map((d, i) => (
              <div key={i} className="bar-chart-row">
                <div className="bar-chart-label">{d.label}</div>
                <div className="bar-chart-track">
                  <div className="bar-chart-fill" style={{
                    width: `${Math.max((d.value / maxDailyRev) * 100, d.value > 0 ? 8 : 0)}%`,
                    background: d.value > 0 ? 'linear-gradient(90deg, #FBBF24, #C4940F)' : 'transparent',
                  }}>
                    {d.value > 0 && fmtMoney(d.value)}
                  </div>
                </div>
                <div className="bar-chart-value">{d.count} job{d.count !== 1 ? 's' : ''}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Action breakdown */}
      {actionEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Action</div>
          {actionEntries.map(([action, count]) => {
            const colors = { boots: '#fbbf24', tows: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            return (
              <div key={action} className="breakdown-row">
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{width:8, height:8, borderRadius:'50%', background: colors[action] || '#6b7280', flexShrink:0}} />
                  <span style={{fontSize:15, fontWeight:700, color:'var(--text-primary)', textTransform:'capitalize'}}>{action.replace(/_/g, ' ')}</span>
                </div>
                <div style={{fontSize:15, fontWeight:700, color:'var(--text-muted)'}}>{count}×</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Per-lot breakdown (owner only) */}
      {isOwner && byLotEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Lot</div>
          {byLotEntries.map(item => {
            const lot = lotMap[item.lot_id];
            return (
              <div key={item.lot_id} className="breakdown-row">
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>{lot?.name || item.lot_id?.slice(0,8)}</div>
                  <div style={{fontSize:12, color:'var(--text-faint)'}}>{item.actions} action{item.actions !== 1 ? 's' : ''}</div>
                </div>
                <div className="breakdown-amt">{fmtMoney(item.our_revenue_cents)}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Line items */}
      {resolved.length === 0 ? (
        <div className="empty-state">
          <div className="empty-title">No earnings yet {period !== 'all' ? 'this period' : ''}</div>
          <div className="empty-body">Completed jobs will show up here</div>
        </div>
      ) : (
        <div className="earnings-breakdown">
          <div className="breakdown-header">Recent Jobs</div>
          {resolved.slice(0, 30).map(v => {
            const lot = lotMap[v.lot_id];
            return (
              <div key={v.id} className="breakdown-row">
                <div className="breakdown-left">
                  <div className="breakdown-date">{smartDate(v.resolved_at || v.detected_at)} · {fmtTime(v.resolved_at || v.detected_at)}</div>
                  <div className="breakdown-lot">{lot?.name || '—'}</div>
                  {v.plate_text && (
                    <div className="breakdown-plate" style={{display:'flex', alignItems:'center', gap:4}}>
                      {displayColor(v.vehicle_color) && <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(255,255,255,.1)', flexShrink:0}} />}
                      {v.plate_text}
                    </div>
                  )}
                </div>
                <div className="breakdown-right">
                  <div className="breakdown-amt">{v.our_revenue ? fmtMoney(v.our_revenue) : '—'}</div>
                  <div className="breakdown-action">{(v.action_taken || v.status).replace(/_/g, ' ')}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Confirmation review — billing_status queues per alpr_violations row ────
// Classifies each row by the same CASE logic as the DB view
// v_violation_billing_status (raw strings), then maps to 7 display buckets:
//   fraud / verify / unreported_confirmed / confirmed / pending / no_tow /
//   held_or_forced. Polls every 15s.
function normalizeTruckPlate(s) {
  return (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
}

// Mirrors v_violation_billing_status (migration 20260418011558_tow_confirmation.sql:55-66)
// for all DB-backed buckets — returns the RAW status string so any code that
// compares against the DB view's output stays in lockstep. One INTENTIONAL
// divergence: the leading `cooldown` branch below is a client-only bucket the
// live view does NOT emit (cooldown rows are segregated in the UI; the backend
// billing query excludes them separately). Do NOT collapse buckets here; that's
// render-time formatting, see displayBucketFor below.
function computeBillingStatus(v) {
  const a = v.action_taken;
  const conf = !!v.tow_confirmed_at;
  const dispatched = v.dispatched_at ? new Date(v.dispatched_at) : null;
  // Cooldown-breach rows are never tow-eligible and never enter the QuickBooks
  // pipeline. Visually segregated into their own queue so operators don't
  // confuse them with billable tow events. Backend billing query is patched
  // separately to exclude these rows.
  if (v.violation_type === 'cooldown')          return 'cooldown_breach';
  if (v.left_before_tow_at)                     return 'left_before_tow';
  if (a === 'plate_correction')                 return 'no_tow';
  if (a === 'tow'     && conf)                  return 'confirmed';
  if (a == null       && conf)                  return 'unreported_confirmed';
  if (a === 'tow'     && !conf)                 return 'reported_unconfirmed';
  if (a === 'no_tow'  && conf)                  return 'disputed';
  if (a === 'no_tow'  && !conf)                 return 'no_tow';
  if (a == null && dispatched && (Date.now() - dispatched.getTime()) > 24 * 3600 * 1000) return 'no_tow_timeout';
  return 'pending';
}

// Pure raw-status → display-bucket mapper. Keeps classification (which matches
// the DB view verbatim) separate from the 7-queue UI grouping. Operator-override
// rows (billing_held_at / force_bill_at) are handled at call-site, not here.
function displayBucketFor(rawStatus) {
  switch (rawStatus) {
    case 'left_before_tow':       return 'left_before_tow';
    case 'disputed':              return 'fraud';
    case 'reported_unconfirmed':  return 'verify';
    case 'unreported_confirmed':  return 'unreported_confirmed';
    case 'confirmed':             return 'confirmed';
    case 'pending':               return 'pending';
    case 'no_tow':                return 'no_tow';
    case 'no_tow_timeout':        return 'no_tow';
    case 'manually_held':         return 'held_or_forced';
    case 'force_billed':          return 'held_or_forced';
    case 'cooldown_breach':       return 'cooldown_breach';
    default:                      return 'pending';
  }
}

// Visible queue ordering for the UI (urgency-first). Keyed by display bucket.
// Glyphs make the tone distinguishable without relying on color alone
// (WCAG 1.4.1 — Use of Color). Mirror glyphs are used by status chips below.

// Evidence thumbnail. 80x60 on desktop, 56x42 on mobile. When `src` is present
// the element is a button that opens the shared lightbox; when missing it
// falls back to a neutral placeholder with the plate text centered.
// Props:
//   src       - image URL (nullable)
//   plate     - plate text for the placeholder + fallback alt text
//   label     - short descriptor rendered under the thumb ("Plate", "Tow")
//   onOpen    - (src, caption, downloadHref) => void, called when clicked
//   timestamp - ISO timestamp used in the lightbox caption
function EvidenceThumb({ src, plate, label, onOpen, timestamp, mobile }) {
  const dim = mobile ? { w: 56, h: 42, fs: 10 } : { w: 80, h: 60, fs: 11 };
  const caption = (plate || '—') + ' · ' + (label || 'snapshot') +
    (timestamp ? ' · ' + fmtDate(timestamp) + ' ' + fmtTime(timestamp) : '');
  const commonBoxStyle = {
    width: dim.w, height: dim.h, borderRadius: 6, border: '1px solid var(--border)',
    overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center',
    background: 'var(--bg-inset)', flexShrink: 0,
  };
  if (!src) {
    // Placeholder: monospace plate text centered on inset bg. Stays a div so
    // it isn't mistaken for an interactive element.
    return React.createElement('div', {
      role: 'img',
      'aria-label': (label || 'snapshot') + ' unavailable for ' + (plate || 'unknown plate'),
      title: 'No snapshot available',
      style: Object.assign({}, commonBoxStyle, {
        fontFamily: 'ui-monospace, Menlo, monospace', fontSize: dim.fs,
        fontWeight: 700, color: 'var(--text-faint)', letterSpacing: '.02em',
      }),
    }, plate || '—');
  }
  return React.createElement('button', {
    type: 'button',
    onClick: (e) => { e.stopPropagation(); onOpen && onOpen(src, caption, src); },

    title: caption,

      cursor: 'zoom-in', padding: 0, position: 'relative',

    React.createElement('img', {
      src,
      alt: (label || 'snapshot') + ' for ' + (plate || 'unknown plate'),
      loading: 'lazy',
      style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' },
    }),
  );
}

// Swipeable fullscreen carousel for the matched-vehicle snapshots on
// No Registration Evidence Package cards. On phones the inline 2-up grid
// is fine for triage, but verifying a plate read needs the full frame.
// Props:
//   snaps: [{ url, taken_at, confidence }, …]  in display order
//   startIndex: which thumbnail was tapped
//   plate: header text
//   onClose: () => void
function SnapsLightbox({ snaps, startIndex, plate, onClose }) {
  const [index, setIndex] = useState(startIndex || 0);
  const touchRef = useRef({ x: 0, y: 0, t: 0 });
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowLeft') setIndex(i => Math.max(0, i - 1));
      else if (e.key === 'ArrowRight') setIndex(i => Math.min(snaps.length - 1, i + 1));
    };
    window.addEventListener('keydown', onKey);
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = prev;
    };
  }, [snaps.length, onClose]);
  function onTouchStart(e) {
    const t = e.touches[0];
    touchRef.current = { x: t.clientX, y: t.clientY, t: Date.now() };
  }
  function onTouchEnd(e) {
    const t = e.changedTouches[0];
    const dx = t.clientX - touchRef.current.x;
    const dy = t.clientY - touchRef.current.y;
    const dt = Date.now() - touchRef.current.t;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) && dt < 600) {
      if (dx < 0) setIndex(i => Math.min(snaps.length - 1, i + 1));
      else setIndex(i => Math.max(0, i - 1));
    }
  }
  const snap = snaps[index];
  const taken = snap?.taken_at ? new Date(snap.taken_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', second: '2-digit' }) : '';
  const conf = snap?.confidence != null ? Math.round(snap.confidence * (snap.confidence <= 1 ? 100 : 1)) + '%' : null;
  return (
    <div
      onClick={onClose}
      onTouchStart={onTouchStart}
      onTouchEnd={onTouchEnd}
      role="dialog"
      aria-modal="true"
      aria-label="Vehicle snapshots"
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:1200,display:'flex',flexDirection:'column',padding:'env(safe-area-inset-top, 12px) 12px env(safe-area-inset-bottom, 12px)',gap:8}}
    >
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',color:'#fff',padding:'4px 4px',gap:8}}>
        <div style={{display:'flex',flexDirection:'column',minWidth:0}}>
          <div style={{fontFamily:"'Courier New',monospace",fontWeight:800,fontSize:18,letterSpacing:'.04em'}}>{plate || 'Snapshot'}</div>
          <div style={{fontSize:11,color:'#cbd5e1'}}>{index + 1} of {snaps.length}{taken ? ` · ${taken}` : ''}{conf ? ` · ${conf} conf` : ''}</div>
        </div>
        <button
          onClick={(e) => { e.stopPropagation(); onClose(); }}
          aria-label="Close"
          style={{background:'rgba(255,255,255,.12)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',borderRadius:999,width:36,height:36,fontSize:18,fontWeight:700,cursor:'pointer',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}
        >×</button>
      </div>
      {/* Image */}
      <div
        onClick={(e) => e.stopPropagation()}
        style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',minHeight:0,position:'relative'}}
      >
        {snap?.url && (
          <img
            key={snap.url}
            src={snap.url}
            alt={`${plate || 'vehicle'} snapshot ${index + 1}`}
            style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:6,background:'#000',animation:'snap-fade-in 200ms ease-out'}}
          />
        )}
        {snaps.length > 1 && (
          <>
            <button
              onClick={(e) => { e.stopPropagation(); setIndex(i => Math.max(0, i - 1)); }}
              disabled={index === 0}
              aria-label="Previous"
              style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',width:44,height:44,borderRadius:'50%',background:'rgba(0,0,0,.5)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',fontSize:22,fontWeight:700,cursor:index===0?'default':'pointer',opacity:index===0?.3:1,display:'flex',alignItems:'center',justifyContent:'center'}}
            >‹</button>
            <button
              onClick={(e) => { e.stopPropagation(); setIndex(i => Math.min(snaps.length - 1, i + 1)); }}
              disabled={index === snaps.length - 1}
              aria-label="Next"
              style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',width:44,height:44,borderRadius:'50%',background:'rgba(0,0,0,.5)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',fontSize:22,fontWeight:700,cursor:index===snaps.length-1?'default':'pointer',opacity:index===snaps.length-1?.3:1,display:'flex',alignItems:'center',justifyContent:'center'}}
            >›</button>
          </>
        )}
      </div>
      {/* Dot indicators */}
      {snaps.length > 1 && (
        <div onClick={(e) => e.stopPropagation()} style={{display:'flex',justifyContent:'center',gap:6,padding:'4px 0'}}>
          {snaps.map((_, i) => (
            <button key={i} onClick={(e) => { e.stopPropagation(); setIndex(i); }} aria-label={`Snapshot ${i+1}`}
              style={{width:8,height:8,borderRadius:'50%',border:'none',background:i===index?'#fff':'rgba(255,255,255,.4)',cursor:'pointer',padding:0,transition:'background 160ms'}} />
          ))}
        </div>
      )}
    </div>
  );
}

// "Seen on camera before registering" evidence block. Shows the snapshot
// inline (objectFit:contain so nothing is cropped) and opens a fullscreen
// overlay on click for the full uncropped frame. Esc / outside-click closes.
function FirstSeenEvidence({ plate, imageUrl, firstSeenAt, registeredAt, compact }) {
  const [open, setOpen] = useState(false);
  const leadMs = firstSeenAt && registeredAt
    ? new Date(registeredAt).getTime() - new Date(firstSeenAt).getTime()
    : 0;
  const leadMin = Math.max(0, Math.round(leadMs / 60000));
  const leadLabel = leadMin >= 60 ? `${Math.floor(leadMin/60)}h ${leadMin%60}m` : `${leadMin} min`;
  const whenLabel = firstSeenAt
    ? new Date(firstSeenAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' })
    : '';
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open]);
  return (
    <div style={{
      border: '1px solid rgba(245,158,11,.45)',
      background: 'rgba(245,158,11,.08)',
      borderRadius: 10, padding: compact ? 8 : 10,
      display: 'flex', flexDirection: 'column', gap: compact ? 6 : 8,
    }}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <span style={{fontSize: compact ? 10 : 11,fontWeight:800,padding:'3px 8px',borderRadius:12,background:'#f59e0b',color:'#fff',textTransform:'uppercase',letterSpacing:'.06em'}}>
          Seen on camera before registering
        </span>
        <span style={{fontSize:11,color:'var(--text-secondary)',fontWeight:600}}>
          {leadMin > 0 ? `${leadLabel} earlier · ` : ''}{whenLabel}
        </span>
      </div>
      <button
        type="button"
        onClick={(e) => { e.stopPropagation(); setOpen(true); }}
        aria-label={`Enlarge pre-registration snapshot for ${plate || 'unknown plate'}`}
        title="Click to see full image"
        style={{display:'block',width:'100%',padding:0,border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',background:'#000',cursor:'zoom-in'}}
      >
        <img
          src={imageUrl}
          alt={`${plate || ''} pre-registration snapshot`}
          loading="lazy"
          style={{display:'block',width:'100%',height: compact ? 140 : 180,objectFit:'contain',background:'#000'}}
        />
      </button>
      {open && (
        <div
          onClick={() => setOpen(false)}
          role="dialog"
          aria-modal="true"
          aria-label="Pre-registration snapshot"
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',zIndex:1200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
        >
          <div onClick={(e) => e.stopPropagation()} style={{maxWidth:'min(1200px, 98vw)',maxHeight:'94vh',display:'flex',flexDirection:'column',gap:8,alignItems:'center'}}>
            <img src={imageUrl} alt={plate || 'snapshot'} style={{maxWidth:'100%',maxHeight:'82vh',objectFit:'contain',borderRadius:6,border:'1px solid rgba(255,255,255,.12)',background:'#000'}} />
            <div style={{display:'flex',justifyContent:'space-between',gap:12,width:'100%',color:'#e5e7eb',fontSize:13,fontWeight:600}}>
              <span>{plate || 'snapshot'} · {whenLabel}</span>
              <div style={{display:'flex',gap:8}}>
                <a href={imageUrl} download target="_blank" rel="noopener noreferrer"
                   style={{color:'#fbbf24',textDecoration:'none',fontWeight:700,padding:'4px 10px',borderRadius:6,border:'1px solid rgba(251,191,36,.5)'}}>Open in new tab</a>
                <button onClick={() => setOpen(false)} style={{background:'rgba(255,255,255,.12)',color:'#fff',border:'1px solid rgba(255,255,255,.25)',borderRadius:6,padding:'4px 12px',fontWeight:700,cursor:'pointer'}}>Close</button>

// Vertical 5-step review timeline: Detected, Dispatched, Acted, Confirmed,
// Invoiced. Each step has a filled dot if the event occurred, hollow
// otherwise. Timestamps render local time, channel icon decorates the
// "Acted" step so operators can tell how the partner responded at a glance.
function TimelineStrip({ row }) {
  const detectedAt = (row._plate_event && row._plate_event.created_at) || row.created_at;
  const dispatchedAt = row.dispatched_at || row.sms_sent_at;
  const actedAt = row.action_at;
  const confirmedAt = row.tow_confirmed_at;
  const invoicedAt = row.invoiced_at;
  const channel = channelIcon(row.action_channel);
  const evidence = row.tow_confirmation || null;

  const steps = [
    { key: 'detected',   label: 'Detected',   at: detectedAt,  icon: null },
    { key: 'dispatched', label: 'Dispatched', at: dispatchedAt, icon: channel && (row.sms_sent_at && !row.dispatched_at) ? { icon: '\uD83D\uDCAC', label: 'SMS' } : null, note: row.dispatched_at ? null : (row.sms_sent_at ? 'SMS only' : null) },
    { key: 'acted',      label: 'Acted',      at: actedAt,      icon: channel, note: row.action_taken || null },
    { key: 'confirmed',  label: 'Confirmed',  at: confirmedAt,  icon: confirmedAt ? { icon: '\uD83D\uDCF7', label: 'camera_sighting' } : null, note: evidence && typeof evidence.delta_seconds === 'number' ? `plate Δ +${Math.round(evidence.delta_seconds)}s` : null },
    { key: 'invoiced',   label: 'Invoiced',   at: invoicedAt,   icon: null,  note: row.quickbooks_invoice_id ? ('QB ' + String(row.quickbooks_invoice_id).slice(0, 8)) : null },
  ];

  return React.createElement('div', {
    style: { display: 'flex', flexDirection: 'column', gap: 3, margin: '6px 0 4px', paddingLeft: 2 },
  },
    steps.map((s, idx) => {
      const happened = !!s.at;
      return React.createElement('div', {
        key: s.key,
        style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: happened ? 'var(--text-muted)' : 'var(--text-faint)' },
      },
        React.createElement('span', {
          'aria-hidden': true,
          style: {
            display: 'inline-block', width: 9, height: 9, borderRadius: 999,
            background: happened ? TONE_COLORS.green.fg : 'transparent',
            border: '1.5px solid ' + (happened ? TONE_COLORS.green.fg : 'var(--border)'),
            flexShrink: 0,
          },
        }),
        React.createElement('span', { style: { width: 78, flexShrink: 0, color: happened ? 'var(--text-secondary)' : 'var(--text-faint)', fontWeight: 600 } }, s.label),
        React.createElement('span', { style: { flex: 1 } },
          happened
            ? (fmtDate(s.at) + '  ' + fmtTime(s.at))
            : '\u2014',
        ),
        s.icon && React.createElement('span', {
          title: 'Via ' + s.icon.label,
          style: { display: 'inline-flex', alignItems: 'center', gap: 3, padding: '0 5px', borderRadius: 4, background: 'var(--bg-inset)', border: '1px solid var(--border)', color: 'var(--text-muted)' },
        }, s.icon.icon),
        s.note && React.createElement('span', {
          style: { fontSize: 10, color: 'var(--text-faint)', fontStyle: 'italic' },
        }, s.note),
      );
    }),
  );
}

// Pass-on-this-plate panel. Surfaces a visitor_pass row that matches the
// violation's plate — diagnostic for disputes because if a legit pass
// exists, the tow likely shouldn't have happened.
function PassContextPanel({ pass }) {
  if (!pass) return null;
  const validFrom = pass.valid_from ? (fmtDate(pass.valid_from) + ' ' + fmtTime(pass.valid_from)) : '—';
  const validUntil = pass.valid_until ? (fmtDate(pass.valid_until) + ' ' + fmtTime(pass.valid_until)) : '—';
  const activeNow = pass.status === 'active' && pass.valid_until
    ? new Date(pass.valid_until).getTime() > Date.now() : false;
  const tone = activeNow ? TONE_COLORS.amber : TONE_COLORS.gray;
  const bits = [];
  if (pass.visitor_name) bits.push({ label: 'Pass holder', value: pass.visitor_name });
  if (pass.company_name) bits.push({ label: '', value: pass.company_name });
  if (pass.parking_spot) bits.push({ label: 'spot', value: pass.parking_spot });
  if (pass.placard_color) bits.push({ label: 'placard', value: pass.placard_color });
  return React.createElement('div', {
    style: {
      margin: '6px 0 2px', padding: '6px 8px', borderRadius: 6,
      background: tone.bg, border: `1px solid ${tone.border}`,
      fontSize: 11, color: 'var(--text-secondary)', display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center',
    },
  },
    React.createElement('span', {
      style: { fontWeight: 700, color: tone.fg, textTransform: 'uppercase', letterSpacing: '.04em', fontSize: 10 },
    }, activeNow ? 'Active pass on this plate' : 'Past pass on this plate'),
    bits.map((b, i) => React.createElement('span', { key: i },
      b.label ? (b.label + ' ') : '',
      React.createElement('strong', { style: { color: 'var(--text-primary)' } }, b.value),
    )),
    pass.policy_acknowledged_at && React.createElement('span', { title: 'Policy acknowledged at ' + new Date(pass.policy_acknowledged_at).toLocaleString() },
      'policy ', React.createElement('span', { style: { color: TONE_COLORS.green.fg } }, '\u2713'), ' ', fmtTime(pass.policy_acknowledged_at),
    ),
    React.createElement('span', null, 'valid ', validFrom, ' \u2192 ', validUntil),
  );
}

function ConfirmationReviewView({ user, lots, partnersProp }) {
  const [rows, setRows] = React.useState(null);
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);

// ── Tow-truck plates editor (enforcement partner self-settings) ────
// Writes directly to enforcement_partners.tow_truck_plates via Supabase REST.
// Normalization matches the tow-confirm edge function so stored plates
// compare cleanly against camera sightings.
function TowTruckPlatesEditor({ user }) {
  const [plates, setPlates] = React.useState(() => (user?.tow_truck_plates || []).slice());
  const [draft, setDraft] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [saved, setSaved] = React.useState(false);

  // Stringified signature of the incoming plates array. Using just `user?.id`
  // missed updates where the parent refetched and only the plates array
  // mutated (same user id, different list). Re-sync whenever the list
  // content changes.
  const userPlatesKey = JSON.stringify(user?.tow_truck_plates ?? []);
  React.useEffect(() => {
    // Re-sync on user id change or plates array content change.
    setPlates((user?.tow_truck_plates || []).slice());
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [user?.id, userPlatesKey]);

  // Track last persist intent so we can show an "added" vs. generic save message.
  // Stateful instead of a function arg so the flag survives the async setTimeout.
  const [lastAction, setLastAction] = React.useState(null); // 'added' | 'removed' | null

  async function persist(next, action) {
    setSaving(true); setErr(''); setSaved(false);
    try {
      if (!supabase || !user?.id) throw new Error('Not authenticated');
      const { error } = await supabase
        .from('enforcement_partners')
        .update({ tow_truck_plates: next })
        .eq('id', user.id);
      if (error) throw new Error(error.message);
      setPlates(next);
      setLastAction(action || null);
      setSaved(true);
      // Longer linger on the "Plate added" banner — it carries instructional
      // copy the partner needs time to read.
      setTimeout(() => setSaved(false), action === 'added' ? 4000 : 1500);
    } catch (e) {
      setErr(e.message || String(e));
    } finally {
      setSaving(false);
    }
  }

  function addPlate() {
    const norm = normalizeTruckPlate(draft);
    if (!norm) { setDraft(''); return; }
    if (plates.includes(norm)) { setDraft(''); return; }
    const next = [...plates, norm];
    setDraft('');
    persist(next, 'added');
  }

  function removePlate(p) {
    const next = plates.filter(x => x !== p);
    persist(next, 'removed');
  }

  return React.createElement('div', { className: 'settings-section', id: 'tow-truck-plates' },
    React.createElement('div', {
      className: 'settings-section-title',
      style: { display: 'flex', alignItems: 'center', gap: 6 },
    },
      'Tow-truck plates',
      // Info glyph with native tooltip — clarifies when auto-confirmation runs.
      React.createElement('span', {
        'aria-label': 'Auto-confirmation runs when one of these plates is seen by the property\'s cameras after you report a tow.',
        title: 'Auto-confirmation runs when one of these plates is seen by the property\'s cameras after you report a tow.',
        role: 'img',
        tabIndex: 0,
        style: {
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: 16, height: 16, borderRadius: '50%', fontSize: 11, fontWeight: 700,
          background: 'var(--bg-inset)', color: 'var(--text-muted)',
          border: '1px solid var(--border)', cursor: 'help',
        }
      }, 'i'),
    ),
    React.createElement('div', {
      style: { fontSize: 12, color: 'var(--text-muted)', padding: '0 0 10px' }
    }, 'Plates of tow trucks operated by this partner. Camera sightings of these plates confirm that a tow actually happened.'),

    React.createElement('div', {
      style: { display: 'flex', flexWrap: 'wrap', gap: 6, padding: '4px 0 10px' }
    },
      plates.length === 0
        ? React.createElement('div', { style: { fontSize: 12, color: 'var(--text-faint)', lineHeight: 1.45 } },
            React.createElement('div', { style: { color: 'var(--text-muted)', marginBottom: 4 } },
              'No plates registered yet. ',
              React.createElement('strong', { style: { color: 'var(--text-primary)', fontWeight: 700 } },
                'Add your tow-truck plates so camera sightings automatically confirm your tows.'),
            ),
            React.createElement('div', null,
              'Without plates, every tow has to be confirmed manually by the property owner before we can release billing.',
            ),
          )
        : plates.map(p => React.createElement('span', {
            key: p,
            style: {
              display: 'inline-flex', alignItems: 'center', gap: 6,
              fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 12, fontWeight: 700,
              padding: '4px 4px 4px 10px', borderRadius: 8,
              background: 'var(--bg-inset)', border: '1px solid var(--border)', color: 'var(--text-primary)',
            }
          },
            p,
            React.createElement('button', {
              onClick: () => removePlate(p), disabled: saving,
              title: 'Remove plate',
              'aria-label': 'Remove tow-truck plate ' + p,
              style: {
                background: 'transparent', border: 'none', color: 'var(--text-faint)',
                cursor: saving ? 'wait' : 'pointer', padding: '0 6px', fontSize: 14, lineHeight: 1,
              },
            }, '\u2715'),
          )),
    ),

    React.createElement('div', {
      style: { display: 'flex', gap: 8, alignItems: 'center', padding: '4px 0' }
    },
      React.createElement('input', {
        type: 'text',
        value: draft,
        onChange: e => setDraft(e.target.value),
        onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); addPlate(); } },
        placeholder: 'Add plate (e.g. T-123-AB)',
        disabled: saving,
        style: {
          flex: 1, fontSize: 13, padding: '6px 10px', borderRadius: 6,
          border: '1px solid var(--border)', background: 'var(--bg-inset)',
          color: 'var(--text-primary)', fontFamily: 'ui-monospace, Menlo, monospace', textTransform: 'uppercase',
        },
      }),
      React.createElement('button', {
        onClick: addPlate,
        disabled: saving || !normalizeTruckPlate(draft),
        style: {
          fontSize: 13, padding: '6px 14px', borderRadius: 6, cursor: 'pointer', fontWeight: 700,
          border: '1px solid var(--accent)', background: 'var(--accent)', color: '#fff',
          opacity: (saving || !normalizeTruckPlate(draft)) ? 0.6 : 1,
        }
      }, saving ? 'Saving…' : 'Add plate'),
    ),

    err && React.createElement('div', {
      style: { fontSize: 12, color: '#ef4444', padding: '6px 0 0' }
    }, err),
    saved && !err && React.createElement('div', {
      style: { fontSize: 12, color: 'var(--green)', padding: '6px 0 0', lineHeight: 1.45 }
    }, lastAction === 'added'
         ? 'Plate added! Camera sightings will now auto-confirm your tows within a few minutes.'
         : 'Saved'),
  );
}

// ── Operator Activity page (no revenue, just job history) ────
function OperatorActivityPage({ violations, lots }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Show completed actions in last 7 days
  const cutoff = Date.now() - 7 * 86400000;
  const completed = violations
    .filter(v => v.status !== 'pending' && v.action_taken && new Date(v.resolved_at || v.detected_at) > cutoff)
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCount = completed.filter(v => new Date(v.resolved_at || v.detected_at).getTime() >= todayStart.getTime()).length;
  const weekCount = completed.length;

  // ── Analytics: distributions over the last 30 days of completed jobs ─────
  // Helps the operator know WHEN activity clusters so they can plan crew
  // shifts (per Gabe's Frank text: "what times of the day, just stuff you
  // can feed your guys").
  const analyticsCutoff = Date.now() - 30 * 86400000;
  const analyticsRows = violations.filter(
    v => v.status !== 'pending'
      && v.action_taken
      && new Date(v.resolved_at || v.detected_at).getTime() > analyticsCutoff
  );

  // 24-bucket hour-of-day histogram
  const hourCounts = new Array(24).fill(0);
  // 7-bucket day-of-week histogram (0 = Sun)
  const dayCounts = new Array(7).fill(0);
  // 30-bucket daily trend, oldest → newest
  const dailyTrend = new Array(30).fill(0);
  const trendStart = new Date();
  trendStart.setHours(0, 0, 0, 0);
  trendStart.setDate(trendStart.getDate() - 29);
  for (const v of analyticsRows) {
    const t = new Date(v.resolved_at || v.detected_at);
    hourCounts[t.getHours()]++;
    dayCounts[t.getDay()]++;
    const dayIdx = Math.floor((t.getTime() - trendStart.getTime()) / 86400000);
    if (dayIdx >= 0 && dayIdx < 30) dailyTrend[dayIdx]++;
  }

  const hourMax = Math.max(1, ...hourCounts);
  const dayMax = Math.max(1, ...dayCounts);
  const trendMax = Math.max(1, ...dailyTrend);
  const peakHour = hourCounts.indexOf(hourMax);
  const peakDay = dayCounts.indexOf(dayMax);
  const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const hourLabel = (h) => h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h - 12}p`;

  const actionColors = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };

  // Group by date (using smart labels)
  const grouped = {};
  completed.forEach(v => {
    const dateKey = smartDate(v.resolved_at || v.detected_at);
    if (!grouped[dateKey]) grouped[dateKey] = [];
    grouped[dateKey].push(v);
  });
  const dateGroups = Object.entries(grouped);

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Your Activity</div>
        <div className="section-count">{weekCount} this week</div>
      </div>

      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{todayCount}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{weekCount}</div>
          <div className="kpi-label">This Week</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val">{analyticsRows.length}</div>
          <div className="kpi-label">30 Days</div>
        </div>
      </div>

      {/* ── Analytics: when activity happens. Helps plan crew shifts. ───── */}
      {analyticsRows.length > 0 && (
        <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:18}}>
          {/* 30-day trend */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:800,color:'var(--text-primary)'}}>Last 30 days</div>
              <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600}}>{analyticsRows.length} jobs</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(30, 1fr)',gap:2,alignItems:'end',height:60}}>
              {dailyTrend.map((c, i) => (
                <div
                  key={i}
                  title={c === 1 ? '1 job' : `${c} jobs`}
                  style={{
                    height: c === 0 ? 4 : `${Math.max(8, (c / trendMax) * 100)}%`,
                    background: c === 0 ? 'var(--border-subtle)' : '#3b82f6',
                    borderRadius:2,
                    opacity: c === 0 ? .35 : 0.85,
                  }}
                />
              ))}
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:'var(--text-faint)',fontWeight:600}}>
              <span>30 days ago</span>
              <span>Today</span>
            </div>
          </div>

          {/* Time-of-day histogram */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:800,color:'var(--text-primary)'}}>Time of day</div>
              <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600}}>
                {hourMax > 0 ? <>Peak: <span style={{color:'#fbbf24',fontWeight:800}}>{hourLabel(peakHour)}</span></> : '—'}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(24, 1fr)',gap:2,alignItems:'end',height:64}}>
              {hourCounts.map((c, h) => (
                <div
                  key={h}
                  title={`${hourLabel(h)} — ${c === 1 ? '1 job' : `${c} jobs`}`}
                  style={{
                    height: c === 0 ? 4 : `${Math.max(10, (c / hourMax) * 100)}%`,
                    background: c === 0 ? 'var(--border-subtle)' : (h === peakHour ? '#fbbf24' : '#fbbf2466'),
                    borderRadius:2,
                    opacity: c === 0 ? .35 : 1,
                  }}
                />
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(8, 1fr)',marginTop:6,fontSize:10,color:'var(--text-faint)',fontWeight:600}}>
              {[0,3,6,9,12,15,18,21].map(h => <span key={h} style={{textAlign:'left'}}>{hourLabel(h)}</span>)}
            </div>
          </div>

          {/* Day-of-week histogram */}
          <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:800,color:'var(--text-primary)'}}>Day of week</div>
              <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600}}>
                {dayMax > 0 ? <>Peak: <span style={{color:'#4ade80',fontWeight:800}}>{dayLabels[peakDay]}</span></> : '—'}
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7, 1fr)',gap:6,alignItems:'end',height:80}}>
              {dayCounts.map((c, d) => (
                <div key={d} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,height:'100%',justifyContent:'flex-end'}}>
                  <div
                    style={{
                      width:'100%',
                      height: c === 0 ? 4 : `${Math.max(12, (c / dayMax) * 100)}%`,
                      background: c === 0 ? 'var(--border-subtle)' : (d === peakDay ? '#4ade80' : '#4ade8066'),
                      borderRadius:4,
                      opacity: c === 0 ? .35 : 1,
                    }}
                  />
                  <div style={{fontSize:10,fontWeight:700,color: d === peakDay ? '#4ade80' : 'var(--text-faint)',letterSpacing:'.04em'}}>{dayLabels[d]}</div>
                  <div style={{fontSize:11,fontWeight:800,color:'var(--text-primary)'}}>{c}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {dateGroups.length === 0 ? (
        <div className="empty-state">
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>⚡</div>
          <div className="empty-title">No activity yet</div>
          <div className="empty-body">Completed jobs will appear here as you work</div>
        </div>
      ) : (
        dateGroups.map(([dateLabel, items]) => (
          <div key={dateLabel}>
            <div style={{fontSize:12, fontWeight:700, color:'var(--text-faint)', marginBottom:8, marginTop:16, textTransform:'uppercase', letterSpacing:'.06em'}}>
              {dateLabel}
            </div>
            {items.map(v => {
              const lot = lotMap[v.lot_id];
              const col = actionColors[v.action_taken?.toLowerCase()] || '#9ca3af';
              return (
                <div key={v.id} className="job-card card-animated" style={{marginBottom:8}}>
                  <div className="job-body" style={{padding:'12px 16px'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                      <div>
                        <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>{lot?.name || 'Unknown Lot'}</div>
                        <div style={{fontSize:12, color:'var(--text-faint)'}}>{fmtTime(v.resolved_at || v.detected_at)}</div>
                      </div>
                      <span style={{padding:'4px 10px', borderRadius:20, fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.04em', color:col, background:col + '15', border:`1px solid ${col}33`}}>
                        {(v.action_taken || 'handled').replace(/_/g, ' ')}
                      </span>
                    </div>
                    <div className="job-details">
                      {v.plate_text && (
                        <span className="plate-tag" style={{fontSize:11, padding:'3px 8px', display:'flex', alignItems:'center', gap:4}}>
                          {displayColor(v.vehicle_color) && <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(0,0,0,.2)', flexShrink:0}} />}
                          {v.plate_text}
                        </span>
                      )}
                      {!v.plate_text && (
                        <span className="job-tag" style={{display:'flex', alignItems:'center', gap:4, color: displayColor(v.vehicle_color) ? 'inherit' : 'var(--text-faint)'}}>
                          {displayColor(v.vehicle_color) ? (
                            <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(255,255,255,.15)', flexShrink:0}} />
                          ) : (
                            <span style={{width:8, height:8, borderRadius:3, background:'var(--unknown-pattern)', border:'1px solid var(--unknown-border)', flexShrink:0}} />
                          )}
                          <strong style={{textTransform:'capitalize'}}>{displayColor(v.vehicle_color) || 'Unknown'} {v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : ''}</strong>
                        </span>
                      )}
                      {v.vehicle_make && <span className="job-tag" style={{color:'var(--purple)'}}><strong style={{textTransform:'capitalize'}}>{[v.vehicle_make, v.vehicle_model].filter(Boolean).join(' ')}</strong></span>}
                      {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                      <span className="time-ago">{timeAgo(v.resolved_at || v.detected_at)}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

// ── Owner Overview page — per-operator stats + "View as" ──────
function OverviewPage({ violations, lots, partners, lotStates, onViewAs }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Map partner_id → lots assigned
  const partnerLots = {};
  lots.forEach(l => {
    if (l.partner_id) {
      if (!partnerLots[l.partner_id]) partnerLots[l.partner_id] = [];
      partnerLots[l.partner_id].push(l);
    }
  });

  // Global KPIs
  const _activeStatuses = ['pending', 'alerted', 'acknowledged'];
  const _closedStatuses = ['resolved', 'cleared', 'departed'];
  const pending = violations.filter(v => _activeStatuses.includes(v.status)).length;
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayResolved = violations.filter(v => _closedStatuses.includes(v.status) && new Date(v.resolved_at || v.cleared_at || v.detected_at) >= todayStart).length;
  const totalGross = violations.filter(v => _closedStatuses.includes(v.status)).reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalOurs = violations.filter(v => _closedStatuses.includes(v.status)).reduce((s, v) => s + (v.our_revenue || 0), 0);

  // Camera stats
  const allCams = Object.values(lotStates).flatMap(s => s?.cameras || []);
  const camsOnline = allCams.filter(c => c.online).length;
  const camsTotal = allCams.length;

  // Per-operator stats
  const operatorStats = partners.map(p => {
    const pLots = partnerLots[p.id] || [];
    const pLotIds = pLots.map(l => l.id);
    const pViols = violations.filter(v => pLotIds.includes(v.lot_id));
    const pPending = pViols.filter(v => _activeStatuses.includes(v.status)).length;
    const pResolved = pViols.filter(v => _closedStatuses.includes(v.status));
    const pTodayResolved = pResolved.filter(v => new Date(v.resolved_at || v.detected_at) >= todayStart).length;
    const pGross = pResolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
    const pOurs = pResolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
    const pPartnerPay = pGross - pOurs;
    const booted = pResolved.filter(v => v.action_taken === 'boot').length;
    const towed = pResolved.filter(v => v.action_taken === 'tow').length;
    const dismissed = pResolved.filter(v => v.action_taken === 'dismissed' || v.action_taken === 'already_gone' || v.action_taken === 'no_action').length;
    // Avg response time (detected → resolved) in minutes
    const responseTimes = pResolved.filter(v => v.detected_at && v.resolved_at).map(v => (new Date(v.resolved_at) - new Date(v.detected_at)) / 60000);
    const avgResponse = responseTimes.length > 0 ? Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length) : null;

    return { partner: p, lots: pLots, pending: pPending, todayResolved: pTodayResolved, totalResolved: pResolved.length, gross: pGross, ours: pOurs, partnerPay: pPartnerPay, booted, towed, dismissed, avgResponse };
  });

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Overview</div>
        <div className="section-count">{lots.length} lot{lots.length !== 1 ? 's' : ''} · {partners.length} operator{partners.length !== 1 ? 's' : ''}</div>
      </div>

      {/* Global KPIs */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val red">{pending}</div>
          <div className="kpi-label">Active</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{todayResolved}</div>
          <div className="kpi-label">Resolved Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val blue">{camsOnline}/{camsTotal}</div>
          <div className="kpi-label">Cameras</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{fmtMoney(totalOurs)}</div>
          <div className="kpi-label">Revenue</div>
        </div>
      </div>

      {/* Per-operator cards */}
      <div className="section-header" style={{marginTop:20}}>
        <div className="section-title">Operators</div>
      </div>

      {operatorStats.length === 0 ? (
        <div className="empty-state">
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>👥</div>
          <div className="empty-title">No operators assigned</div>
          <div className="empty-body">Enforcement partners linked to your lots will appear here</div>
        </div>
      ) : operatorStats.map(os => (
        <div key={os.partner.id} className="card-animated" style={{
          background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:14,
          marginBottom:12, overflow:'hidden',
        }}>
          {/* Operator header */}
          <div style={{padding:'14px 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:16, fontWeight:800, color:'var(--text-primary)'}}>{os.partner.company_name || os.partner.contact_name}</div>
              <div style={{fontSize:12, color:'var(--text-faint)', marginTop:2}}>{os.partner.email} · {os.lots.length} lot{os.lots.length !== 1 ? 's' : ''}</div>
            </div>
            <button onClick={() => onViewAs(os.partner)} style={{
              background:'rgba(59,130,246,.1)', color:'#3b82f6', border:'1px solid rgba(59,130,246,.25)',
              borderRadius:8, padding:'6px 12px', fontSize:12, fontWeight:700, cursor:'pointer',
              whiteSpace:'nowrap',

          </div>

          {/* Operator KPIs */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:1, background:'var(--border)'}}>

              <div style={{fontSize:18, fontWeight:800, color:'var(--red)'}}>{os.pending}</div>
              <div style={{fontSize:10, fontWeight:600, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'.04em'}}>Pending</div>
            </div>
            <div style={{background:'var(--bg-card)', padding:'10px 8px', textAlign:'center'}}>
              <div style={{fontSize:18, fontWeight:800, color:'var(--green)'}}>{os.todayResolved}</div>
              <div style={{fontSize:10, fontWeight:600, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'.04em'}}>Today</div>
            </div>
            <div style={{background:'var(--bg-card)', padding:'10px 8px', textAlign:'center'}}>
              <div style={{fontSize:18, fontWeight:800, color:'var(--text-primary)'}}>{os.totalResolved}</div>
              <div style={{fontSize:10, fontWeight:600, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'.04em'}}>All Time</div>

            <div style={{background:'var(--bg-card)', padding:'10px 8px', textAlign:'center'}}>
              <div style={{fontSize:18, fontWeight:800, color:'var(--green)'}}>{fmtMoney(os.partnerPay)}</div>
              <div style={{fontSize:10, fontWeight:600, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'.04em'}}>Paid Out</div>
            </div>
          </div>

          {/* Action breakdown + fees */}
          <div style={{padding:'10px 16px 14px', display:'flex', flexWrap:'wrap', gap:8, alignItems:'center'}}>
            {os.booted > 0 && <span style={{padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:700, color:'#fbbf24', background:'rgba(251,191,36,.1)', border:'1px solid rgba(251,191,36,.2)'}}>Boot ×{os.booted}</span>}
            {os.towed > 0 && <span style={{padding:'3px 10px', borderRadius:20, fontSize:11, fontWeight:700, color:'#f87171', background:'rgba(248,113,113,.1)', border:'1px solid rgba(248,113,113,.2)'}}>Tow ×{os.towed}</span>}

function PartnerFeeEditor({ user }) {
  // Partner-side edit of their own tow_fee + boot_fee. Mirrors the
  // TowTruckPlatesEditor pattern — direct Supabase update on the partner's
  // own row. RLS allows self-row writes; the backend's PATCH /partners/{id}
  // would also work but the dashboard already does direct-Supabase elsewhere.
  const [towFee, setTowFee] = React.useState(user?.tow_fee ?? 100);
  const [bootFee, setBootFee] = React.useState(user?.boot_fee ?? 0);
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [saved, setSaved] = React.useState(false);

  // Re-sync when the user prop changes (parent refetched).
  React.useEffect(() => {
    setTowFee(user?.tow_fee ?? 100);
    setBootFee(user?.boot_fee ?? 0);
  }, [user?.id, user?.tow_fee, user?.boot_fee]);

  const dirty = towFee !== (user?.tow_fee ?? 100) || bootFee !== (user?.boot_fee ?? 0);

  async function save() {
    setSaving(true); setErr(''); setSaved(false);
    try {
      if (!supabase || !user?.id) throw new Error('Not authenticated');
      const tow = Number(towFee);
      const boot = Number(bootFee);
      if (!Number.isFinite(tow) || tow < 0) throw new Error('Tow fee must be a non-negative number');
      if (!Number.isFinite(boot) || boot < 0) throw new Error('Boot fee must be a non-negative number');
      const { error } = await supabase
        .from('enforcement_partners')
        .update({ tow_fee: Math.round(tow), boot_fee: Math.round(boot) })
        .eq('id', user.id);
      if (error) throw new Error(error.message);
      setSaved(true);
      setTimeout(() => setSaved(false), 1800);
    } catch (e) {
      setErr(e.message || String(e));
    } finally {
      setSaving(false);
    }
  }

  const inputStyle = {
    padding: '10px 12px', background: 'var(--bg-inset)', border: '1px solid var(--border)',
    borderRadius: 8, color: 'var(--text-primary)', fontSize: 16, fontWeight: 700,
    width: 110, fontFamily: 'inherit', textAlign: 'right',
  };

  return (
    <div className="settings-section">
      <div className="settings-section-title">Your fees</div>
      <div className="settings-row">
        <div className="settings-row-info">
          <div className="settings-row-label">Tow Fee</div>
          <div className="settings-row-desc">What you bill per tow</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,color:'var(--text-faint)',fontSize:15}}>
          $
          <input
            type="number"
            inputMode="decimal"
            min="0"
            step="1"
            value={towFee}
            onChange={(e) => setTowFee(e.target.value)}
            disabled={saving}
            aria-label="Tow fee in dollars"
            style={inputStyle}
          />
        </div>
      </div>
      <div className="settings-row">
        <div className="settings-row-info">
          <div className="settings-row-label">Boot Fee</div>
          <div className="settings-row-desc">What you bill per boot. Set to 0 if you don't boot.</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,color:'var(--text-faint)',fontSize:15}}>
          $
          <input
            type="number"
            inputMode="decimal"
            min="0"
            step="1"
            value={bootFee}
            onChange={(e) => setBootFee(e.target.value)}
            disabled={saving}
            aria-label="Boot fee in dollars"
            style={inputStyle}
          />
        </div>
      </div>
      {(dirty || err || saved) && (
        <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:10,marginTop:10}}>
          {err && <span style={{color:'#ef4444',fontSize:12,fontWeight:600}}>{err}</span>}
          {saved && <span style={{color:'#4ade80',fontSize:12,fontWeight:700}}>✓ Saved</span>}
          {dirty && (
            <button
              onClick={save}
              disabled={saving}
              style={{
                background: saving ? 'rgba(251,191,36,.25)' : '#FBBF24',
                color: saving ? '#FBBF24' : '#1A1206',
                border: 'none', borderRadius: 8, padding: '9px 16px',
                fontSize: 13, fontWeight: 700, cursor: saving ? 'progress' : 'pointer',
                fontFamily: 'inherit', letterSpacing: '.04em',
              }}
            >{saving ? 'Saving…' : 'Save'}</button>
          )}
        </div>
      )}
    </div>
  );
}
