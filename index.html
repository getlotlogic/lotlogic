      )}

      {/* Violation detail modal */}
      {selectedViol && (
        <ViolationModal
          violation={selectedViol}
          lot={lotMap[selectedViol.lot_id]}
          onClose={() => setSelectedViol(null)}
          onAction={(violId, action) => requestAction(violId, action)}
          isOwner={isOwner}
        />
      )}

      {/* Confirm dialog */}
      {confirm && (
        <ConfirmDialog
          title={confirm.title}
          body={confirm.body}
          confirmLabel={actionLabels[confirm.action]}
          confirmColor={confirm.color}
          onConfirm={() => handleAction(confirm.violId, confirm.action)}
          onCancel={() => setConfirm(null)}
        />
      )}

      {successAction && (
        <div className="success-overlay" onClick={() => setSuccessAction(null)}>
          <div className="success-box" onClick={e => e.stopPropagation()}>
            <div className={`success-icon ${successAction.action}`}>
              {successAction.action === 'boot' ? '\uD83D\uDD12' : '\uD83D\uDE9A'}
            </div>
            <div className="success-title">
              {successAction.action === 'boot' ? 'Vehicle Booted' : 'Vehicle Towed'}
            </div>
            <div className="success-sub">
              {successAction.lotName && <>{successAction.lotName}<br/></>}
              {successAction.zone && <>Zone/Space: {successAction.zone}<br/></>}
              {successAction.plate && <>Plate: {successAction.plate}<br/></>}
              Action recorded successfully.
            </div>
            <button className="success-done" onClick={() => setSuccessAction(null)}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Zone overlay (read-only, shown on camera snapshots) ──────
function ZoneOverlay({ zones }) {
  if (!zones || zones.length === 0) return null;
  return (
    <svg className="zone-overlay-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      {zones.map(z => {
        const pts = (z.polygon || []).map(p => `${p.x},${p.y}`).join(' ');
        const cx = (z.polygon || []).reduce((s, p) => s + p.x, 0) / (z.polygon?.length || 1);
        const cy = (z.polygon || []).reduce((s, p) => s + p.y, 0) / (z.polygon?.length || 1);
        return (
          <g key={z.zone_id}>
            <polygon className={`zone-poly ${z.zone_type || 'no_parking'}`} points={pts} />
            {z.label && <text className="zone-label-text" x={cx} y={cy} textAnchor="middle" dominantBaseline="central">{z.label}</text>}
          </g>
        );
      })}
    </svg>
  );
}

// ── Color name → CSS hex (for car color swatches) ────────────
const COLOR_MAP = {
  white:'#f5f5f5', black:'#1a1a1a', silver:'#c0c0c0', gray:'#808080', grey:'#808080',
  red:'#dc2626', blue:'#2563eb', green:'#16a34a', yellow:'#eab308', orange:'#ea580c',
  brown:'#92400e', gold:'#ca8a04', beige:'#d4c5a9', tan:'#d2b48c', maroon:'#7f1d1d',
  purple:'#7c3aed', pink:'#ec4899', teal:'#0d9488', navy:'#1e3a5f',
};
function colorHex(name) {
  if (!name) return '#6b7280';
  return COLOR_MAP[name.toLowerCase()] || '#6b7280';
}
// Is the color "low confidence" (gray is the YOLO default when detection fails)
function isLowConfColor(name) {
  if (!name) return true;
  const lc = name.toLowerCase();
  return lc === 'gray' || lc === 'grey';
}
// Display-friendly color name
function displayColor(name) {
  if (!name || isLowConfColor(name)) return null;
  return name;
}

// ── Zone editor (full-screen draw/edit/delete/save + live feed + detections) ──
function ZoneEditor({ cameraId, cameraName, existingZones, onClose, onSave }) {
  const [frameUrl, setFrameUrl] = useState(null);
  const [zones, setZones] = useState(() => (existingZones || []).map(z => ({...z})));
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [drawing, setDrawing] = useState(false);
  const [newPoints, setNewPoints] = useState([]);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [dragIdx, setDragIdx] = useState(null);
  const svgRef = useRef(null);
  const imgRef = useRef(null);

  // Live feed state
  const [feedLive, setFeedLive] = useState(false);
  const [feedInterval, setFeedInterval] = useState(5000); // ms
  const [feedStatus, setFeedStatus] = useState('loading'); // loading | live | paused | offline
  const [lastFrameTime, setLastFrameTime] = useState(null);
  const feedTimerRef = useRef(null);

  // Detection state
  const [detections, setDetections] = useState([]); // array of { type, bbox, plate_text, color, confidence, label, id }
  const [showDetections, setShowDetections] = useState(true);
  const [detectionTab, setDetectionTab] = useState('all'); // all | vehicles | people | plates
  const [snapshotMeta, setSnapshotMeta] = useState(null); // latest snapshot metadata

  const ZONE_COLORS = { no_parking: '#ef4444', time_limited: '#8b5cf6', handicap_only: '#eab308' };

  // Load a single frame + detections
  const loadFrame = useCallback(async (showError = true) => {
    try {
      const r = await fetch(API + `/cameras/${cameraId}/frame`, { headers: { 'X-API-Key': API_KEY } });
      if (!r.ok) throw new Error(r.status);
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      setFrameUrl(prev => { if (prev) URL.revokeObjectURL(prev); return url; });
      setLastFrameTime(new Date());
      setFeedStatus('live');
    } catch {
      if (showError) setError('Could not load camera frame');
      setFeedStatus('offline');
    }

    // Also fetch latest snapshot metadata for detection data
    try {
      let snap;
      if (supabase) {
        const { data } = await supabase.from('snapshots').select('*').eq('camera_id', cameraId).order('captured_at', { ascending: false }).limit(1).single();
        snap = data;
      } else {
        snap = await apiFetch(`/cameras/${cameraId}/latest-snapshot`);
      }
      setSnapshotMeta(snap);
      // Build detections from snapshot detections array
      const dets = [];
      if (snap?.detections) {
        snap.detections.forEach((d, i) => {
          dets.push({
            id: d.id || `det_${i}`,
            type: d.type || d.object_type || 'vehicle',
            bbox: d.bbox || d.bounding_box || null,
            plate_text: d.plate_text || d.license_plate || null,
            color: d.color || d.vehicle_color || null,
            vehicle_type: d.vehicle_type || null,
            confidence: d.confidence != null ? parseFloat(d.confidence) : null,
            label: d.label || d.class_name || null,
            zone_id: d.zone_id || null,
            track_id: d.track_id || null,
          });
        });
      }
      // Also incorporate vehicles_detected / people_detected counts if detections array absent
      if (dets.length === 0 && snap) {
        const vc = snap.vehicles_detected || snap.vehicle_count || 0;
        const pc = snap.people_detected || snap.person_count || snap.humans_detected || 0;
        for (let i = 0; i < vc; i++) dets.push({ id: `v_${i}`, type: 'vehicle', bbox: null, plate_text: null, color: null, confidence: null, label: 'Vehicle' });
        for (let i = 0; i < pc; i++) dets.push({ id: `p_${i}`, type: 'person', bbox: null, plate_text: null, color: null, confidence: null, label: 'Person' });
        // Plate readings
        if (snap.plate_readings) {
          snap.plate_readings.forEach((pr, i) => {
            dets.push({ id: `pl_${i}`, type: 'vehicle', bbox: pr.bbox || null, plate_text: pr.plate_text || pr.text, color: pr.vehicle_color || null, confidence: pr.confidence, label: 'Vehicle', vehicle_type: pr.vehicle_type || null });
          });
        }
      }
      setDetections(dets);
    } catch {
      // Snapshot endpoint may not exist yet — silent fail, keep any existing detections
    }
  }, [cameraId]);

  // Initial frame load
  useEffect(() => {
    loadFrame(true);
  }, [loadFrame]);

  // Live feed polling
  useEffect(() => {
    if (feedLive) {
      feedTimerRef.current = setInterval(() => loadFrame(false), feedInterval);
      return () => clearInterval(feedTimerRef.current);
    } else {
      clearInterval(feedTimerRef.current);
    }
  }, [feedLive, feedInterval, loadFrame]);

  // Filter detections by tab
  const filteredDetections = detections.filter(d => {
    if (detectionTab === 'all') return true;
    if (detectionTab === 'vehicles') return d.type === 'vehicle';
    if (detectionTab === 'people') return d.type === 'person' || d.type === 'pedestrian' || d.type === 'human';
    if (detectionTab === 'plates') return !!d.plate_text;
    return true;
  });

  const vehicleCount = detections.filter(d => d.type === 'vehicle').length;
  const personCount = detections.filter(d => d.type === 'person' || d.type === 'pedestrian' || d.type === 'human').length;
  const plateCount = detections.filter(d => !!d.plate_text).length;

  function svgPoint(e) {
    const svg = svgRef.current;
    if (!svg) return null;
    const rect = svg.getBoundingClientRect();
    return {
      x: Math.round(((e.clientX - rect.left) / rect.width) * 10000) / 100,
      y: Math.round(((e.clientY - rect.top) / rect.height) * 10000) / 100,
    };
  }

  function handleCanvasClick(e) {
    if (dragIdx !== null) return;
    const pt = svgPoint(e);
    if (!pt) return;

    if (drawing) {
      if (newPoints.length >= 3) {
        const first = newPoints[0];
        const dist = Math.sqrt((pt.x - first.x) ** 2 + (pt.y - first.y) ** 2);
        if (dist < 3) { finishDrawing(); return; }
      }
      setNewPoints(prev => [...prev, pt]);
    } else {
      setSelectedIdx(null);
    }
  }

  function handleDoubleClick(e) {
    e.preventDefault();
    if (drawing && newPoints.length >= 3) {
      finishDrawing();
    }
  }

  function finishDrawing() {
    const id = 'zone_' + (zones.length + 1) + '_' + Date.now().toString(36);
    const newZone = {
      zone_id: id,
      label: 'Z' + (zones.length + 1),
      zone_type: 'no_parking',
      time_limit_minutes: null,
      polygon: [...newPoints],
    };
    setZones(prev => [...prev, newZone]);
    setSelectedIdx(zones.length);
    setDrawing(false);
    setNewPoints([]);
  }

  function handleVertexDrag(e, zoneIdx, pointIdx) {
    e.stopPropagation();
    e.preventDefault();
    setDragIdx({ zoneIdx, pointIdx });

    function onMove(ev) {
      const pt = svgPoint(ev);
      if (!pt) return;
      setZones(prev => {
        const updated = [...prev];
        const z = { ...updated[zoneIdx], polygon: [...updated[zoneIdx].polygon] };
        z.polygon[pointIdx] = pt;
        updated[zoneIdx] = z;
        return updated;
      });
    }

    function onUp() {
      setDragIdx(null);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onUp);
    }

    function onTouchMove(ev) {
      if (ev.touches.length === 1) {
        onMove(ev.touches[0]);
      }
    }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onUp);
  }

  function deleteZone(idx) {
    setZones(prev => prev.filter((_, i) => i !== idx));
    setSelectedIdx(null);
  }

  function updateZoneProp(idx, key, val) {
    setZones(prev => {
      const updated = [...prev];
      updated[idx] = { ...updated[idx], [key]: val };
      return updated;
    });
  }

  async function save() {
    setSaving(true);
    setError('');
    try {
      await db.updateZones(cameraId, zones);
      if (onSave) onSave(zones);
      onClose();
    } catch (e) {
      setError('Failed to save zones: ' + e.message);
    } finally { setSaving(false); }
  }

  const selected = selectedIdx !== null ? zones[selectedIdx] : null;

  return (
    <div className="zone-editor-overlay">
      <div className="ze-header">
        <div className="ze-title">{cameraName} — Zone Editor</div>
        <div style={{display:'flex', gap:8}}>
          <button className="ze-btn ze-btn-ghost" onClick={onClose}>Cancel</button>
          <button className="ze-btn ze-btn-primary" onClick={save} disabled={saving}>
            {saving ? 'Saving…' : 'Save Zones'}
          </button>
        </div>
      </div>

      {/* Live feed controls bar */}
      <div className="ze-feed-controls">
        <div className="ze-feed-status">
          <span className={`ze-feed-dot ${feedStatus === 'live' ? (feedLive ? 'live' : 'paused') : feedStatus}`} />
          <span style={{color: feedStatus === 'live' ? '#4ade80' : feedStatus === 'offline' ? '#ef4444' : '#fbbf24'}}>
            {feedLive ? 'LIVE' : feedStatus === 'offline' ? 'OFFLINE' : 'PAUSED'}
          </span>
          {lastFrameTime && (
            <span style={{color:'var(--text-ghost)', fontSize:10, marginLeft:4}}>
              {lastFrameTime.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', second:'2-digit'})}
            </span>
          )}
        </div>
        <button className="ze-refresh-btn" onClick={() => loadFrame(true)} disabled={feedStatus === 'loading'}>
          Refresh
        </button>
        <div className="ze-toggle-wrap">
          <button className={`ze-toggle ${feedLive ? 'on' : 'off'}`} onClick={() => { setFeedLive(!feedLive); if (!feedLive) setFeedStatus('live'); }} />
          <span className="ze-toggle-label">Auto-refresh</span>
        </div>
        {feedLive && (
          <select className="ze-interval-select" value={feedInterval} onChange={e => setFeedInterval(Number(e.target.value))}>
            <option value={2000}>2s</option>
            <option value={5000}>5s</option>
            <option value={10000}>10s</option>
            <option value={30000}>30s</option>
          </select>
        )}
        <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:8}}>
          <div className="ze-toggle-wrap">
            <button className={`ze-toggle ${showDetections ? 'on' : 'off'}`} onClick={() => setShowDetections(!showDetections)} />
            <span className="ze-toggle-label">Detections</span>
          </div>
          {detections.length > 0 && (
            <span style={{fontSize:11, color:'var(--text-muted)', fontWeight:600}}>
              {vehicleCount}V · {personCount}P · {plateCount}LP
            </span>
          )}
        </div>
      </div>

      <div className="ze-body">
        {error && <div style={{padding:'8px 16px', background:'rgba(220,38,38,.1)', color:'#fca5a5', fontSize:13}}>{error}</div>}

        <div className="ze-canvas-wrap" onClick={handleCanvasClick} onDoubleClick={handleDoubleClick}>
          {frameUrl ? (
            <img ref={imgRef} src={frameUrl} alt="Camera frame" draggable="false" />
          ) : (
            <div style={{color:'var(--text-ghost)', fontSize:14}}>
              {feedStatus === 'loading' ? 'Loading frame…' : 'No frame available'}
            </div>
          )}

          <svg ref={svgRef} className="ze-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            {/* Existing zones */}
            {zones.map((z, i) => {
              const pts = z.polygon.map(p => `${p.x},${p.y}`).join(' ');
              const color = ZONE_COLORS[z.zone_type] || '#ef4444';
              const isSelected = i === selectedIdx;
              const cx = z.polygon.reduce((s, p) => s + p.x, 0) / z.polygon.length;
              const cy = z.polygon.reduce((s, p) => s + p.y, 0) / z.polygon.length;
              return (
                <g key={z.zone_id}>
                  <polygon
                    className={`ze-poly ${isSelected ? 'selected' : ''}`}
                    points={pts}
                    fill={color}
                    stroke={color}
                    onClick={e => { e.stopPropagation(); setSelectedIdx(i); setDrawing(false); setNewPoints([]); }}
                  />
                  <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                    style={{fontSize:'3px', fill:'#fff', fontWeight:700, pointerEvents:'none'}}>
                    {z.label}
                  </text>
                  {isSelected && z.polygon.map((p, pi) => (
                    <circle key={pi} className="ze-vertex" cx={p.x} cy={p.y} r={1.2}
                      style={{fill:'#fff', stroke:color, strokeWidth:0.5, cursor:'grab'}}
                      onMouseDown={e => handleVertexDrag(e, i, pi)}
                      onTouchStart={e => { e.preventDefault(); handleVertexDrag(e.touches[0], i, pi); }}
                      onClick={e => e.stopPropagation()}
                    />
                  ))}
                </g>
              );
            })}

            {/* Detection bounding boxes */}
            {showDetections && detections.map(d => {
              if (!d.bbox) return null;
              const isPerson = d.type === 'person' || d.type === 'pedestrian' || d.type === 'human';
              const bx = d.bbox.x ?? d.bbox.left ?? 0;
              const by = d.bbox.y ?? d.bbox.top ?? 0;
              const bw = d.bbox.w ?? d.bbox.width ?? 10;
              const bh = d.bbox.h ?? d.bbox.height ?? 10;
              const strokeColor = isPerson ? '#f59e0b' : '#3b82f6';
              const labelText = d.plate_text
                ? d.plate_text
                : (d.color ? d.color + ' ' : '') + (d.label || d.type || '');
              const confText = d.confidence != null ? ` ${Math.round(d.confidence * 100)}%` : '';
              return (
                <g key={d.id}>
                  <rect className={`ze-detection-bbox ${isPerson ? 'person' : 'vehicle'}`}
                    x={bx} y={by} width={bw} height={bh} />
                  {/* Label background */}
                  <rect className="ze-detection-label-bg"
                    x={bx} y={by - 2.8} width={Math.max(labelText.length * 1.1 + confText.length * 1.1, 6)} height={2.6}
                    fill={strokeColor} opacity={0.85} />
                  <text className="ze-detection-label"
                    x={bx + 0.4} y={by - 0.8}
                    fill="#fff" dominantBaseline="central">
                    {labelText}{confText}
                  </text>
                  {/* Plate badge overlay */}
                  {d.plate_text && (
                    <>
                      <rect x={bx} y={by + bh + 0.3} width={d.plate_text.length * 1.3 + 1} height={2.4}
                        fill="#fef3c7" stroke="#fbbf24" strokeWidth={0.2} rx={0.3} />
                      <text x={bx + 0.5} y={by + bh + 1.8} fill="#1c1009"
                        style={{fontSize:'1.8px', fontWeight:800, fontFamily:'Courier New, monospace', letterSpacing:'0.1em'}}>
                        {d.plate_text}
                      </text>
                    </>
                  )}
                  {/* Color swatch dot */}
                  {d.color && (
                    <circle cx={bx + bw - 1.2} cy={by + 1.2} r={1}
                      fill={colorHex(d.color)} stroke="rgba(255,255,255,.5)" strokeWidth={0.3} />
                  )}
                </g>
              );
            })}

            {/* Drawing in progress */}
            {drawing && newPoints.length > 0 && (
              <g>
                <polygon className="ze-drawing-poly"
                  points={newPoints.map(p => `${p.x},${p.y}`).join(' ')} />
                {newPoints.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r={1}
                    style={{fill: i === 0 ? '#3b82f6' : '#fff', stroke:'#3b82f6', strokeWidth:0.4}} />
                ))}
              </g>
            )}
          </svg>
        </div>

        {/* Drawing hint */}
        {drawing && (
          <div className="ze-hint">
            Click to place points. {newPoints.length >= 3 ? 'Double-click or click first point to close the polygon.' : `Need ${3 - newPoints.length} more point${3 - newPoints.length > 1 ? 's' : ''}.`}
          </div>
        )}

        {/* Toolbar: zone chips + new zone button */}
        <div className="ze-toolbar">
          <div className="ze-zone-list">
            {zones.map((z, i) => (
              <span key={z.zone_id}
                className={`ze-zone-chip ${i === selectedIdx ? 'active' : ''}`}
                style={{background: (ZONE_COLORS[z.zone_type] || '#ef4444') + '22', color: ZONE_COLORS[z.zone_type] || '#ef4444'}}
                onClick={() => { setSelectedIdx(i); setDrawing(false); setNewPoints([]); }}>
                {z.label || z.zone_id}
              </span>
            ))}
          </div>
          <button className="ze-btn ze-btn-primary" style={{padding:'6px 14px', fontSize:12}}
            onClick={() => { setDrawing(true); setSelectedIdx(null); setNewPoints([]); }}
            disabled={drawing}>
            + New Zone
          </button>
        </div>

        {/* Properties panel for selected zone */}
        {selected && !drawing && (
          <div className="ze-panel">
            <div className="ze-panel-row">
              <span className="ze-panel-label">Label</span>
              <input className="ze-panel-input" value={selected.label || ''} onChange={e => updateZoneProp(selectedIdx, 'label', e.target.value)} />
            </div>
            <div className="ze-panel-row">
              <span className="ze-panel-label">Type</span>
              <select className="ze-panel-select" value={selected.zone_type || 'no_parking'}
                onChange={e => updateZoneProp(selectedIdx, 'zone_type', e.target.value)}>
                <option value="no_parking">No Parking</option>
                <option value="time_limited">Time Limited</option>
                <option value="handicap_only">Handicap Only</option>
              </select>
            </div>
            {selected.zone_type === 'time_limited' && (
              <div className="ze-panel-row">
                <span className="ze-panel-label">Limit</span>
                <input className="ze-panel-input" type="number" min="1" placeholder="Minutes"
                  value={selected.time_limit_minutes || ''} onChange={e => updateZoneProp(selectedIdx, 'time_limit_minutes', parseInt(e.target.value) || null)} />
                <span style={{fontSize:12, color:'var(--text-muted)'}}>min</span>
              </div>
            )}
            <div className="ze-panel-row" style={{marginTop:4}}>
              <span className="ze-panel-label">{selected.polygon.length} pts</span>
              <button className="ze-btn ze-btn-danger" style={{padding:'5px 12px', fontSize:12}} onClick={() => deleteZone(selectedIdx)}>
                Delete Zone
              </button>
            </div>
          </div>
        )}

        {/* Detections panel */}
        {showDetections && detections.length > 0 && !drawing && (
          <div className="ze-detections-panel">
            <div className="ze-det-header">
              <span>Detections ({detections.length})</span>
              <div className="ze-det-tabs">
                {[
                  { key: 'all', label: 'All' },
                  { key: 'vehicles', label: `Vehicles (${vehicleCount})` },
                  { key: 'people', label: `People (${personCount})` },
                  { key: 'plates', label: `Plates (${plateCount})` },
                ].map(t => (
                  <button key={t.key} className={`ze-det-tab ${detectionTab === t.key ? 'active' : ''}`}
                    onClick={() => setDetectionTab(t.key)}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
            {filteredDetections.length === 0 ? (
              <div style={{padding:'12px 16px', fontSize:12, color:'var(--text-ghost)'}}>No {detectionTab} detected</div>
            ) : (
              filteredDetections.map(d => {
                const isPerson = d.type === 'person' || d.type === 'pedestrian' || d.type === 'human';
                return (
                  <div key={d.id} className="ze-det-item">
                    <div className={`ze-det-icon ${isPerson ? 'person' : 'vehicle'}`}>
                      {isPerson ? '🚶' : '🚗'}
                    </div>
                    <div className="ze-det-info">
                      <div className="ze-det-title">
                        {isPerson ? (d.label || 'Person') : (
                          [d.color, d.vehicle_type, d.label].filter(Boolean).join(' ') || 'Vehicle'
                        )}
                        {d.track_id && <span style={{fontSize:10, color:'var(--text-faint)', marginLeft:4}}>#{d.track_id}</span>}
                      </div>
                      <div className="ze-det-sub">
                        {d.zone_id ? `Zone ${d.zone_id}` : 'No zone'}
                        {d.confidence != null && ` · ${Math.round(d.confidence * 100)}% conf`}
                      </div>
                    </div>
                    {d.color && (
                      <span className="ze-det-badge color-swatch" style={{background: colorHex(d.color)}} title={d.color} />
                    )}
                    {d.plate_text && (
                      <span className="ze-det-badge plate">{d.plate_text}</span>
                    )}
                    {!d.plate_text && d.confidence != null && (
                      <span className="ze-det-badge conf">{Math.round(d.confidence * 100)}%</span>
                    )}
                  </div>
                );
              })
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Add Camera modal ─────────────────────────────────────────
function AddCameraModal({ lotId, onClose, onAdded }) {
  const [name, setName] = useState('');
  const [rtspUrl, setRtspUrl] = useState('');
  const [channel, setChannel] = useState('');
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const { addToast } = useToast();

  async function submit(e) {
    e.preventDefault();
    if (!name.trim()) { setError('Camera name is required'); return; }
    setSaving(true); setError('');
    try {
      const body = { name: name.trim(), lot_id: lotId };
      if (rtspUrl.trim()) body.rtsp_url = rtspUrl.trim();
      if (channel.trim()) body.channel = parseInt(channel) || 0;
      await db.addCamera(body);
      addToast(`Camera "${name.trim()}" added`, 'success');
      if (onAdded) onAdded();
      onClose();
    } catch (err) {
      setError('Failed to add camera: ' + err.message);
    } finally { setSaving(false); }
  }

  return (
    <div className="viol-modal-overlay" onClick={onClose}>
      <div className="viol-modal" style={{maxWidth:440, borderRadius:'20px 20px 0 0'}} onClick={e => e.stopPropagation()}>
        <div className="viol-modal-handle" />
        <div style={{padding:'20px 16px'}}>
          <div style={{fontSize:18, fontWeight:800, color:'var(--text-primary)', marginBottom:4}}>Add Camera</div>
          <div style={{fontSize:13, color:'var(--text-faint)', marginBottom:16}}>Connect a new camera to this lot</div>
          <form onSubmit={submit}>
            <label className="field-label">Camera Name *</label>
            <input className="field-input" value={name} onChange={e => setName(e.target.value)}
              placeholder="e.g. Entrance Cam, Lot A North" autoFocus style={{marginBottom:12}} />
            <label className="field-label">RTSP URL (optional)</label>
            <input className="field-input" value={rtspUrl} onChange={e => setRtspUrl(e.target.value)}
              placeholder="rtsp://192.168.1.100:554/stream" style={{marginBottom:12}} />
            <label className="field-label">Channel (optional)</label>
            <input className="field-input" type="number" min="0" value={channel} onChange={e => setChannel(e.target.value)}
              placeholder="0" style={{marginBottom:16}} />
            {error && <div className="login-error" style={{marginBottom:12}}>{error}</div>}
            <button className="login-btn" type="submit" disabled={saving}>
              {saving ? 'Adding…' : 'Add Camera'}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

// ── Lots tab ──────────────────────────────────────────────────
function LotsPage({ lots, lotStates, loading, ownerRole, onZonesSaved }) {
  const [expandedCams, setExpandedCams] = useState({});
  const [editingZones, setEditingZones] = useState(null);
  const [addingCamera, setAddingCamera] = useState(null); // lot id
  const { addToast } = useToast();

  if (loading && lots.length === 0) {
    return <div className="page-enter"><SkeletonKPIs /><SkeletonCards count={3} /></div>;
  }
  if (lots.length === 0) {
    return (
      <div className="empty-state">
        <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>P</div>
        <div className="empty-title">No lots yet</div>
        <div className="empty-body">Your lots will appear here once they're set up</div>
      </div>
    );
  }

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Your Lots</div>
        <div className="section-count">{lots.length} lot{lots.length !== 1 ? 's' : ''}</div>
      </div>
      {lots.map(lot => {
        const state = lotStates[lot.id];
        const viols = state?.total_active_violations || 0;
        const camsOn = state?.cameras_online || 0;
        const camsTotal = state?.cameras_total || 0;
        const dotClass = viols > 0 ? 'warn' : (camsOn < camsTotal ? 'warn' : 'on');
        const camsExpanded = expandedCams[lot.id];

        // Aggregate detection counts across all cameras
        const totalVehicles = (state?.cameras || []).reduce((s, c) => s + (c.latest_snapshot?.vehicles_detected || c.latest_snapshot?.vehicle_count || 0), 0);
        const totalPeople = (state?.cameras || []).reduce((s, c) => s + (c.latest_snapshot?.people_detected || c.latest_snapshot?.person_count || c.latest_snapshot?.humans_detected || 0), 0);
        const totalPlates = (state?.cameras || []).reduce((s, c) => {
          const snap = c.latest_snapshot;
          if (!snap) return s;
          const pc = snap.plates_read || snap.plate_count || (snap.plate_readings ? snap.plate_readings.length : 0);
          return s + pc;
        }, 0);

        return (
          <div key={lot.id} className="lot-card">
            <div className="lot-card-top">
              <div className={`lot-status-dot ${dotClass}`} />
              <div className="lot-info">
                <div className="lot-name">{lot.name}</div>
                <div className="lot-addr">{lot.address}</div>
                <div className="lot-numbers">
                  <div className="lot-num">
                    <div className={`lot-num-val ${viols > 0 ? 'red' : 'green'}`}>{viols}</div>
                    <div className="lot-num-label">Open jobs</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val" style={{color: camsOn < camsTotal ? '#3b82f6' : '#4ade80'}}>
                      {camsOn}<span style={{fontSize:14, color:'var(--text-faint)'}}>/{camsTotal}</span>
                    </div>
                    <div className="lot-num-label">Cams online</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val">{lot.total_spaces}</div>
                    <div className="lot-num-label">Spaces</div>
                  </div>
                </div>
                {/* Detection summary chips */}
                {(totalVehicles > 0 || totalPeople > 0 || totalPlates > 0) && (
                  <div className="cam-det-summary" style={{marginTop:8}}>
                    {totalVehicles > 0 && (
                      <span className="cam-det-chip"><span className="det-dot vehicles" /> {totalVehicles} vehicle{totalVehicles !== 1 ? 's' : ''}</span>
                    )}
                    {totalPeople > 0 && (
                      <span className="cam-det-chip"><span className="det-dot people" /> {totalPeople} {totalPeople === 1 ? 'person' : 'people'}</span>
                    )}
                    {totalPlates > 0 && (
                      <span className="cam-det-chip"><span className="det-dot plates" /> {totalPlates} plate{totalPlates !== 1 ? 's' : ''}</span>
                    )}
                  </div>
                )}
              </div>
            </div>

            <div className="lot-actions">
              <button className="lot-action-btn primary" onClick={() => setExpandedCams(p => ({...p, [lot.id]: !camsExpanded}))}>
                {camsExpanded ? 'Hide Cameras' : `Cameras (${camsTotal})`}
              </button>
              {ownerRole === 'owner' && (
                <button className="lot-action-btn primary" onClick={() => setAddingCamera(lot.id)}>
                  + Add Camera
                </button>
              )}
              <button className="lot-action-btn">
                <a href={mapsLink(lot.address)} target="_blank" rel="noopener">Directions</a>
              </button>
            </div>

            {/* Camera sheets */}
            {camsExpanded && state?.cameras && state.cameras.length > 0 && (
              <div className="cam-sheet">
                {state.cameras.map(cam => {
                  const snap = cam.latest_snapshot;
                  const snapVehicles = snap?.vehicles_detected || snap?.vehicle_count || 0;
                  const snapPeople = snap?.people_detected || snap?.person_count || snap?.humans_detected || 0;
                  const snapPlates = snap?.plates_read || snap?.plate_count || (snap?.plate_readings ? snap.plate_readings.length : 0);
                  const plateReadings = snap?.plate_readings || snap?.detections?.filter(d => d.plate_text || d.license_plate) || [];

                  return (
                    <div key={cam.camera_id} className="cam-row">
                      <div className="cam-row-header">
                        <div className="cam-name">
                          <span style={{color: cam.online ? '#4ade80' : '#ef4444', fontSize:8}}>●</span>
                          {cam.camera_name}
                          {cam.active_violations > 0 && (
                            <span style={{background:'#dc2626', color:'#fff', borderRadius:4, padding:'1px 6px', fontSize:10, fontWeight:700}}>
                              {cam.active_violations} violation{cam.active_violations>1?'s':''}
                            </span>
                          )}
                        </div>
                        <div style={{display:'flex', alignItems:'center', gap:8}}>
                          {ownerRole === 'owner' && (
                            <button className="ze-btn ze-btn-ghost" style={{padding:'3px 10px', fontSize:11}}
                              onClick={() => setEditingZones({ cameraId: cam.camera_id, cameraName: cam.camera_name, lotId: lot.id, zones: cam.zones || [] })}>
                              Edit Zones
                            </button>
                          )}
                          {snap && (
                            <div className="cam-time">{fmtTime(snap.captured_at)}</div>
                          )}
                        </div>
                      </div>
                      <div className="cam-img-wrap">
                        {snap?.url ? (
                          <>
                            <img
                              className="cam-img"
                              src={snap.url}
                              alt={cam.camera_name}
                              loading="lazy"
                              onError={e => { e.target.style.display = 'none'; e.target.parentNode.querySelector('.cam-offline') || (e.target.parentNode.innerHTML = '<div class="cam-offline">Snapshot unavailable</div>'); }}
                            />
                            <ZoneOverlay zones={cam.zones} />
                            {cam.active_violations > 0 && (
                              <div className="cam-viol-overlay">{cam.active_violations} open</div>
                            )}
                          </>
                        ) : (
                          <div className="cam-offline">{cam.online ? 'No snapshot yet' : 'Camera offline'}</div>
                        )}
                      </div>

                      {/* Detection summary for this camera */}
                      {snap && (
                        <div className="cam-det-summary">
                          {snapVehicles > 0 && (
                            <span className="cam-det-chip"><span className="det-dot vehicles" /> {snapVehicles} vehicle{snapVehicles !== 1 ? 's' : ''}</span>
                          )}
                          {snapPeople > 0 && (
                            <span className="cam-det-chip"><span className="det-dot people" /> {snapPeople} {snapPeople === 1 ? 'person' : 'people'}</span>
                          )}
                          {snapPlates > 0 && (
                            <span className="cam-det-chip"><span className="det-dot plates" /> {snapPlates} plate{snapPlates !== 1 ? 's' : ''}</span>
                          )}
                          {snapVehicles > 0 && (() => {
                            const rate = Math.round((snapPlates / snapVehicles) * 100);
                            const rateColor = rate >= 60 ? '#4ade80' : rate >= 30 ? '#fbbf24' : '#ef4444';
                            return (
                              <span className="cam-det-chip" style={{background:`${rateColor}08`, border:`1px solid ${rateColor}33`}}>
                                <span style={{width:6, height:6, borderRadius:'50%', background:rateColor, flexShrink:0}} /> {rate}% plate read
                              </span>
                            );
                          })()}
                          {snapVehicles === 0 && snapPeople === 0 && snapPlates === 0 && (
                            <span className="cam-det-chip" style={{color:'var(--text-ghost)'}}>No detections</span>
                          )}
                          {cam.zones && cam.zones.length > 0 && (
                            <span className="cam-det-chip">{cam.zones.length} zone{cam.zones.length > 1 ? 's' : ''}</span>
                          )}
                        </div>
                      )}

                      {/* Camera config info */}
                      <div style={{display:'flex', gap:6, flexWrap:'wrap', marginTop:4}}>
                        <span className="cam-det-chip" style={{
                          color: cam.deployment_profile === 'lte_solar' ? '#f59e0b' : '#3b82f6',
                          fontSize:10,
                          background: cam.deployment_profile === 'lte_solar' ? 'rgba(245,158,11,.08)' : 'rgba(59,130,246,.08)',
                          border: cam.deployment_profile === 'lte_solar' ? '1px solid rgba(245,158,11,.2)' : '1px solid rgba(59,130,246,.2)',
                          fontWeight:600,
                        }}>
                          {cam.deployment_profile === 'lte_solar' ? 'LTE + Solar' : 'Wired'}
                        </span>
                        <span className="cam-det-chip" style={{color:'var(--text-faint)', fontSize:10}}>
                          {cam.snapshot_width || 640}x{cam.snapshot_height || 360}px
                        </span>
                        <span className="cam-det-chip" style={{color:'var(--text-faint)', fontSize:10}}>
                          Poll: {cam.poll_interval_sec || 30}s
                        </span>
                        {cam.deployment_profile === 'lte_solar' && cam.bandwidth_budget_mb && (
                          <span className="cam-det-chip" style={{
                            color: (cam.bandwidth_used_mb || 0) >= cam.bandwidth_budget_mb * 0.9 ? '#ef4444' : '#6b7280',
                            fontSize:10
                          }}>
                            BW: {cam.bandwidth_used_mb || 0}/{cam.bandwidth_budget_mb} MB
                          </span>
                        )}
                        {(cam.snapshot_width || 640) <= 640 && (
                          <span className="cam-det-chip" style={{color:'#f59e0b', fontSize:10, background:'rgba(245,158,11,.08)', border:'1px solid rgba(245,158,11,.2)'}}>
                            Low resolution
                          </span>
                        )}
                      </div>

                      {/* Plate readings list */}
                      {plateReadings.length > 0 && (
                        <div style={{display:'flex', gap:6, flexWrap:'wrap', marginTop:6}}>
                          {plateReadings.map((pr, i) => {
                            const plateText = pr.plate_text || pr.license_plate || pr.text;
                            const vColor = pr.vehicle_color || pr.color;
                            return (
                              <div key={i} style={{display:'flex', alignItems:'center', gap:4}}>
                                {vColor && (
                                  <span style={{width:10, height:10, borderRadius:3, background:colorHex(vColor), border:'1px solid rgba(255,255,255,.15)', flexShrink:0}} title={vColor} />
                                )}
                                <span className="plate-tag" style={{fontSize:11, padding:'3px 8px'}}>
                                  {plateText}
                                </span>
                                {pr.confidence != null && (() => {
                                  const conf = Math.round(parseFloat(pr.confidence) * 100);
                                  const confColor = conf >= 80 ? '#4ade80' : conf >= 50 ? '#fbbf24' : '#ef4444';
                                  return <span style={{fontSize:10, fontWeight:600, color:confColor}}>{conf}%</span>;
                                })()}
                              </div>
                            );
                          })}
                        </div>
                      )}

                      {cam.last_heartbeat && (
                        <div style={{fontSize:10, color:'var(--text-ghost)', marginTop:4}}>
                          Last heartbeat: {fmtTime(cam.last_heartbeat)}
                          {cam.channel !== undefined && ` · Ch ${cam.channel}`}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {camsExpanded && (!state?.cameras || state.cameras.length === 0) && (
              <div style={{padding:'14px 14px', borderTop:'1px solid var(--border)', fontSize:13, color:'var(--text-faint)'}}>
                No cameras set up for this lot yet.
                {ownerRole === 'owner' && (
                  <button style={{background:'none', border:'none', color:'#3b82f6', fontWeight:600, fontSize:13, cursor:'pointer', fontFamily:'inherit', marginLeft:6}}
                    onClick={() => setAddingCamera(lot.id)}>
                    Add one now
                  </button>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Zone editor overlay */}
      {editingZones && (
        <ZoneEditor
          cameraId={editingZones.cameraId}
          cameraName={editingZones.cameraName}
          existingZones={editingZones.zones}
          onClose={() => setEditingZones(null)}
          onSave={(savedZones) => { if (onZonesSaved) onZonesSaved(); }}
        />
      )}

      {/* Add camera modal */}
      {addingCamera && (
        <AddCameraModal
          lotId={addingCamera}
          onClose={() => setAddingCamera(null)}
          onAdded={() => { if (onZonesSaved) onZonesSaved(); }}
        />
      )}
    </div>
  );
}

// ── Earnings tab ──────────────────────────────────────────────
function EarningsPage({ violations, lots, isOwner, user }) {
  const [period, setPeriod] = useState('month');
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  const periodLabels = { week: 'This Week', month: 'This Month', all: 'All Time' };

  // Compute stats from the already-filtered violations prop (scoped to this user's lots)
  const now = Date.now();
  const cutoffs = { week: now - 7 * 86400000, month: now - 30 * 86400000, all: 0 };
  const periodViols = violations.filter(v => {
    const ts = new Date(v.resolved_at || v.detected_at).getTime();
    return ts >= cutoffs[period];
  });
  const resolved = periodViols.filter(v => v.action_taken && v.status !== 'pending')
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  const totalOurs = resolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
  const totalGross = resolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalViolations = periodViols.length;
  const actionsExecuted = resolved.filter(v => !['pending', 'plate_correction'].includes(v.action_taken)).length;
  const actionRate = totalViolations > 0 ? actionsExecuted / totalViolations : 0;

  // Action breakdown from local data
  const byAction = {};
  resolved.forEach(v => { if (v.action_taken && !['pending', 'plate_correction'].includes(v.action_taken)) byAction[v.action_taken] = (byAction[v.action_taken] || 0) + 1; });
  const actionEntries = Object.entries(byAction).filter(([k, v]) => v > 0 && k !== 'pending');

  // Per-lot breakdown for owners
  const byLot = {};
  resolved.forEach(v => {
    if (!byLot[v.lot_id]) byLot[v.lot_id] = { lot_id: v.lot_id, our_revenue_cents: 0, actions: 0 };
    byLot[v.lot_id].our_revenue_cents += (v.our_revenue || 0);
    byLot[v.lot_id].actions += 1;
  });
  const byLotEntries = Object.values(byLot).filter(e => e.actions > 0);

  // Daily earnings for bar chart (last 7 days)
  const dailyEarnings = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = new Date(); dayStart.setHours(0,0,0,0); dayStart.setDate(dayStart.getDate() - i);
    const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
    const dayViols = resolved.filter(v => {
      const ts = new Date(v.resolved_at || v.detected_at);
      return ts >= dayStart && ts < dayEnd;
    });
    const dayRev = dayViols.reduce((s, v) => s + (v.our_revenue || 0), 0);
    dailyEarnings.push({
      label: dayStart.toLocaleDateString('en-US', { weekday: 'short' }),
      value: dayRev,
      count: dayViols.length,
    });
  }
  const maxDailyRev = Math.max(...dailyEarnings.map(d => d.value), 1);

  return (
    <div className="page-enter">
      {/* Period picker */}
      <div className="earnings-period-row">
        {['week','month','all'].map(p => (
          <button key={p} className={`period-btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {periodLabels[p]}
          </button>
        ))}
      </div>

      {/* Hero total */}
      <div className="earnings-hero">
        <div className="earnings-label">{periodLabels[period]} {isOwner ? 'Earnings' : 'Your Earnings'}</div>
        <div className="earnings-amount">
          <span>$</span>{(totalOurs / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
        </div>
        <div className="earnings-sub">
          {actionsExecuted} job{actionsExecuted !== 1 ? 's' : ''} completed
          {isOwner ? ` · ${fmtMoney(totalGross)} gross` : ''}
        </div>
        {!isOwner && totalGross > 0 && (
          <div style={{marginTop:12, display:'flex', gap:8, justifyContent:'center'}}>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Gross </span>
              <strong style={{color:'var(--text-primary)'}}>{fmtMoney(totalGross)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Partner </span>
              <strong style={{color:'var(--green)'}}>{fmtMoney(totalGross - totalOurs)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>LotLogic </span>
              <strong style={{color:'var(--accent)'}}>{fmtMoney(totalOurs)}</strong>
            </div>
          </div>
        )}
      </div>

      {/* KPI cards */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{totalViolations}</div>
          <div className="kpi-label">Violations</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{actionsExecuted}</div>
          <div className="kpi-label">Actioned</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${actionRate >= 0.5 ? 'green' : actionRate >= 0.2 ? 'yellow' : 'red'}`}>
            {Math.round(actionRate * 100)}%
          </div>
          <div className="kpi-label">Action Rate</div>
        </div>
      </div>

      {/* Weekly earnings bar chart */}
      {period !== 'all' && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">Daily Earnings (Last 7 Days)</div>
          <div style={{padding:'12px 16px'}}>
            {dailyEarnings.map((d, i) => (
              <div key={i} className="bar-chart-row">
                <div className="bar-chart-label">{d.label}</div>
                <div className="bar-chart-track">
                  <div className="bar-chart-fill" style={{
                    width: `${Math.max((d.value / maxDailyRev) * 100, d.value > 0 ? 8 : 0)}%`,
                    background: d.value > 0 ? 'linear-gradient(90deg, #3b82f6, #2563eb)' : 'transparent',
                  }}>
                    {d.value > 0 && fmtMoney(d.value)}
                  </div>
                </div>
                <div className="bar-chart-value">{d.count} job{d.count !== 1 ? 's' : ''}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Action breakdown */}
      {actionEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Action</div>
          {actionEntries.map(([action, count]) => {
            const colors = { boots: '#fbbf24', tows: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            return (
              <div key={action} className="breakdown-row">
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{width:8, height:8, borderRadius:'50%', background: colors[action] || '#6b7280', flexShrink:0}} />
                  <span style={{fontSize:15, fontWeight:700, color:'var(--text-primary)', textTransform:'capitalize'}}>{action.replace(/_/g, ' ')}</span>
                </div>
                <div style={{fontSize:15, fontWeight:700, color:'var(--text-muted)'}}>{count}×</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Per-lot breakdown (owner only) */}
      {isOwner && byLotEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Lot</div>
          {byLotEntries.map(item => {
            const lot = lotMap[item.lot_id];
            return (
              <div key={item.lot_id} className="breakdown-row">
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>{lot?.name || item.lot_id?.slice(0,8)}</div>
                  <div style={{fontSize:12, color:'var(--text-faint)'}}>{item.actions} action{item.actions !== 1 ? 's' : ''}</div>
                </div>
                <div className="breakdown-amt">{fmtMoney(item.our_revenue_cents)}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Line items */}
      {resolved.length === 0 ? (
        <div className="empty-state">
          <div className="empty-title">No earnings yet {period !== 'all' ? 'this period' : ''}</div>
          <div className="empty-body">Completed jobs will show up here</div>
        </div>
      ) : (
        <div className="earnings-breakdown">
          <div className="breakdown-header">Recent Jobs</div>
          {resolved.slice(0, 30).map(v => {
            const lot = lotMap[v.lot_id];
            return (
              <div key={v.id} className="breakdown-row">
                <div className="breakdown-left">
                  <div className="breakdown-date">{smartDate(v.resolved_at || v.detected_at)} · {fmtTime(v.resolved_at || v.detected_at)}</div>
                  <div className="breakdown-lot">{lot?.name || '—'}</div>
                  {v.plate_text && (
                    <div className="breakdown-plate" style={{display:'flex', alignItems:'center', gap:4}}>
                      {displayColor(v.vehicle_color) && <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(255,255,255,.1)', flexShrink:0}} />}
                      {v.plate_text}
                    </div>
                  )}
                </div>
                <div className="breakdown-right">
                  <div className="breakdown-amt">{v.our_revenue ? fmtMoney(v.our_revenue) : '—'}</div>
                  <div className="breakdown-action">{(v.action_taken || v.status).replace(/_/g, ' ')}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Operator Activity page (no revenue, just job history) ────
function OperatorActivityPage({ violations, lots }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Show completed actions in last 7 days
  const cutoff = Date.now() - 7 * 86400000;
  const completed = violations
    .filter(v => v.status !== 'pending' && v.action_taken && new Date(v.resolved_at || v.detected_at) > cutoff)
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCount = completed.filter(v => new Date(v.resolved_at || v.detected_at).getTime() >= todayStart.getTime()).length;
  const weekCount = completed.length;

  const actionColors = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };

  // Group by date (using smart labels)
  const grouped = {};
  completed.forEach(v => {
    const dateKey = smartDate(v.resolved_at || v.detected_at);
    if (!grouped[dateKey]) grouped[dateKey] = [];
    grouped[dateKey].push(v);
  });
  const dateGroups = Object.entries(grouped);

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Your Activity</div>
        <div className="section-count">{weekCount} this week</div>
      </div>

      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{todayCount}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{weekCount}</div>
          <div className="kpi-label">This Week</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${todayCount > 0 ? 'green' : 'red'}`}>
            {todayCount > 0 ? 'Active' : 'None'}
          </div>
          <div className="kpi-label">Status</div>
        </div>
      </div>

      {dateGroups.length === 0 ? (
        <div className="empty-state">
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>⚡</div>
          <div className="empty-title">No activity yet</div>
          <div className="empty-body">Completed jobs will appear here as you work</div>
        </div>
      ) : (
        dateGroups.map(([dateLabel, items]) => (
          <div key={dateLabel}>
            <div style={{fontSize:12, fontWeight:700, color:'var(--text-faint)', marginBottom:8, marginTop:16, textTransform:'uppercase', letterSpacing:'.06em'}}>
              {dateLabel}
            </div>
            {items.map(v => {
              const lot = lotMap[v.lot_id];
              const col = actionColors[v.action_taken?.toLowerCase()] || '#9ca3af';
              return (
                <div key={v.id} className="job-card card-animated" style={{marginBottom:8}}>
                  <div className="job-body" style={{padding:'12px 16px'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                      <div>
                        <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>{lot?.name || 'Unknown Lot'}</div>
                        <div style={{fontSize:12, color:'var(--text-faint)'}}>{fmtTime(v.resolved_at || v.detected_at)}</div>
                      </div>
                      <span style={{padding:'4px 10px', borderRadius:20, fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.04em', color:col, background:col + '15', border:`1px solid ${col}33`}}>
                        {(v.action_taken || 'handled').replace(/_/g, ' ')}
                      </span>
                    </div>
                    <div className="job-details">
                      {v.plate_text && (
                        <span className="plate-tag" style={{fontSize:11, padding:'3px 8px', display:'flex', alignItems:'center', gap:4}}>
                          {displayColor(v.vehicle_color) && <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(0,0,0,.2)', flexShrink:0}} />}
                          {v.plate_text}
                        </span>
                      )}
                      {!v.plate_text && (
                        <span className="job-tag" style={{display:'flex', alignItems:'center', gap:4, color: displayColor(v.vehicle_color) ? 'inherit' : 'var(--text-faint)'}}>
                          {displayColor(v.vehicle_color) ? (
                            <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(255,255,255,.15)', flexShrink:0}} />
                          ) : (
                            <span style={{width:8, height:8, borderRadius:3, background:'var(--unknown-pattern)', border:'1px solid var(--unknown-border)', flexShrink:0}} />
                          )}
                          <strong style={{textTransform:'capitalize'}}>{displayColor(v.vehicle_color) || 'Unknown'} {v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : ''}</strong>
                        </span>
                      )}
                      {v.vehicle_make && <span className="job-tag" style={{color:'var(--purple)'}}><strong style={{textTransform:'capitalize'}}>{[v.vehicle_make, v.vehicle_model].filter(Boolean).join(' ')}</strong></span>}
                      {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                      <span className="time-ago">{timeAgo(v.resolved_at || v.detected_at)}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

        <div className="settings-row">
          <div className="settings-row-info">
            <div className="settings-row-label">SMS Notifications</div>
            <div className="settings-row-desc">Violation alerts sent via SMS</div>
          </div>
          <div className="settings-row-value" style={{color:'var(--green)'}}>Enabled</div>
        </div>
        <div className="settings-row">
          <div className="settings-row-info">
            <div className="settings-row-label">Database</div>
            <div className="settings-row-desc">Supabase realtime connection</div>
          </div>
          <div className="settings-row-value" style={{color: supabase ? '#4ade80' : '#fbbf24'}}>{supabase ? 'Connected' : 'Rails API'}</div>
        </div>
        <div className="settings-row">
          <div className="settings-row-info">
            <div className="settings-row-label">Version</div>
          </div>
          <div className="settings-row-value">4.0.0</div>
        </div>
      </div>

      <button className="login-btn" style={{background:'rgba(239,68,68,.15)', color:'#f87171', boxShadow:'none', border:'1px solid rgba(239,68,68,.3)'}} onClick={onLogout}>
        Sign Out
      </button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const { addToast } = useToast();
  const { theme, toggle: toggleTheme } = useTheme();
  const { online, reconnected } = useOnlineStatus();
  const [owner, setOwner] = useState(() => {
    try {
      const s = localStorage.getItem('lotlogic_session');
      if (!s) return null;
      const parsed = JSON.parse(s);
      // Session expires after 7 days
      if (parsed._ts && Date.now() - parsed._ts > 7 * 86400000) {
        localStorage.removeItem('lotlogic_session');
        return null;
      }
      return parsed;
    } catch { return null; }
  });
  // Parse deep link from SMS: /violations/{id} → open jobs tab and highlight
  const [deepLinkViolationId] = useState(() => {
    const path = window.location.pathname || '';
    const match = path.match(/\/violations\/([0-9a-f-]{36})/i);
    return match ? match[1] : null;
  });
  const [tab, setTab] = useState('jobs');
  const [lots, setLots] = useState([]);
  const [lotStates, setLotStates] = useState({});
  const [violations, setViolations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const timerRef = useRef(null);

  const isOwner = owner?._role === 'owner';
  const isOperator = owner?._role === 'partner';

  const realtimeRef = useRef(null);
  const loadIdRef = useRef(0); // Guard against race conditions in concurrent loadData calls

  const loadData = useCallback(async (o, silent = false) => {
    if (!o) return;
    const myId = ++loadIdRef.current; // Each call gets a unique ID
    if (!silent) setLoading(true);
    try {
      const filter = o._role === 'partner'
        ? { partner_id: o.id }
        : { owner_id: o.id };
      const lotsData = await db.getLots(filter);
      if (loadIdRef.current !== myId) return; // Stale call, discard
      setLots(lotsData);

      const [states, violsArrays] = await Promise.all([
        Promise.all(lotsData.map(l => db.getLotState(l.id).then(s => [l.id, s]).catch(() => [l.id, null]))),
        Promise.all(lotsData.map(l => db.getViolations(l.id).catch(() => []))),
      ]);
      if (loadIdRef.current !== myId) return; // Stale call, discard

      setLotStates(Object.fromEntries(states));

      const flat = [];
      lotsData.forEach((lot, i) => {
        const data = violsArrays[i];
        const items = Array.isArray(data) ? data : (data?.items || []);
        items.forEach(v => flat.push({ ...v, lot_id: v.lot_id || lot.id }));
      });
      setViolations(flat);
      setLastRefresh(new Date());
    } catch (e) {
      console.error(e);
      if (!silent) addToast('Failed to load data. Check your connection.', 'error');
    }
    finally { if (!silent) setLoading(false); }
  }, [addToast]);

  function login(o) {
    const session = { ...o, _ts: Date.now() };
    setOwner(session);
    try { localStorage.setItem('lotlogic_session', JSON.stringify(session)); } catch {}
    loadData(session);
  }

  function logout() {
    loadIdRef.current++; // Invalidate any in-flight loadData calls
    clearInterval(timerRef.current);
    if (realtimeRef.current) { supabase?.removeChannel(realtimeRef.current); realtimeRef.current = null; }
    setOwner(null); setLots([]); setLotStates({}); setViolations([]);
    setTab('jobs');
    try { localStorage.removeItem('lotlogic_session'); localStorage.removeItem('lotlogic_email'); } catch {}
  }

  // Pull-to-refresh handler
  async function handlePullRefresh() {
    if (refreshing || !owner) return;
    setRefreshing(true);
    haptic('medium');
    await loadData(owner, true);
    setRefreshing(false);
    haptic('light');
  }

  // Pull-to-refresh gesture
  const touchStartY = useRef(0);
  const pullDistance = useRef(0);
  const [showPTR, setShowPTR] = useState(false);
  useEffect(() => {
    if (!owner) return;
    const el = document.querySelector('.page-content');
    if (!el) return;
    function onTouchStart(e) { if (el.scrollTop <= 0) touchStartY.current = e.touches[0].clientY; else touchStartY.current = 0; }
    function onTouchMove(e) {
      if (!touchStartY.current) return;
      pullDistance.current = e.touches[0].clientY - touchStartY.current;
      if (pullDistance.current > 60 && el.scrollTop <= 0) setShowPTR(true);
    }
    function onTouchEnd() {
      if (showPTR || pullDistance.current > 80) handlePullRefresh();
      touchStartY.current = 0; pullDistance.current = 0; setShowPTR(false);
    }
    el.addEventListener('touchstart', onTouchStart, { passive: true });
    el.addEventListener('touchmove', onTouchMove, { passive: true });
    el.addEventListener('touchend', onTouchEnd, { passive: true });
    return () => {
      el.removeEventListener('touchstart', onTouchStart);
      el.removeEventListener('touchmove', onTouchMove);
      el.removeEventListener('touchend', onTouchEnd);
    };
  });

  // Load data on mount if session was restored
  useEffect(() => { if (owner) loadData(owner); }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Retry on reconnect
  useEffect(() => { if (reconnected && owner) loadData(owner, true); }, [reconnected]);

  // Auto-refresh + session expiration check
  useEffect(() => {
    if (!owner) return;
    timerRef.current = setInterval(() => {
      // Check session expiration (7 days)
      if (owner._ts && Date.now() - owner._ts > 7 * 86400000) {
        addToast('Session expired. Please log in again.', 'error');
        logout();
        return;
      }
      if (navigator.onLine) loadData(owner, true);
    }, 30000);
    return () => clearInterval(timerRef.current);
  }, [owner, loadData]);

  // Subscribe to realtime violation changes
  useEffect(() => {
    if (!owner || lots.length === 0) return;
    const lotIds = lots.map(l => l.id);
    const channel = db.subscribeViolations(lotIds, (payload) => {
      // On any violation change, do a silent refresh
      loadData(owner, true);
    }, (errStatus) => {
      addToast('Live updates disconnected. Data refreshes every 30s.', 'error');
    });
    realtimeRef.current = channel;
    return () => { if (channel) supabase?.removeChannel(channel); };
  }, [owner, lots.length, loadData, addToast]);

  if (!owner) return <LoginPage onLogin={login} />;

  const pending = violations.filter(v => v.status === 'pending').length;

  // Role-based navigation:
  // Operators: Jobs + Lots (assigned) + Activity + Earnings + Account
  // Owners: Jobs + Lots + Earnings + Account
  const navIcons = { jobs: NavIconJobs, lots: NavIconLots, earnings: NavIconEarnings, activity: NavIconActivity, account: NavIconAccount };
  const navTabs = isOwner ? [
    { id: 'jobs',     label: 'Jobs',     badge: pending },
    { id: 'lots',     label: 'Lots',     badge: 0 },
    { id: 'earnings', label: 'Earnings', badge: 0 },
    { id: 'account',  label: 'Account',  badge: 0 },
  ] : [
    { id: 'jobs',     label: 'Jobs',     badge: pending },
    { id: 'lots',     label: 'Lots',     badge: 0 },
    { id: 'activity', label: 'Activity', badge: 0 },
    { id: 'earnings', label: 'Earnings', badge: 0 },
    { id: 'account',  label: 'Account',  badge: 0 },
  ];

  const lastRefreshLabel = lastRefresh ? (
    Math.floor((Date.now() - lastRefresh) / 1000) < 10 ? 'Just now' :
    Math.floor((Date.now() - lastRefresh) / 1000) < 60 ? `${Math.floor((Date.now() - lastRefresh) / 1000)}s ago` :
    `${Math.floor((Date.now() - lastRefresh) / 60000)}m ago`
  ) : null;

  return (
    <div className={`app ${theme === 'dark' ? '' : 'theme-light'}`}>
      {/* Offline / reconnected banners */}
      {!online && <div className="offline-banner" role="alert">You're offline — data may be stale</div>}
      {reconnected && online && <div className="reconnected-banner" role="status">Back online — refreshing data</div>}

      <header className="header" role="banner">
        <div className="header-left">
          <div className="header-shield" aria-hidden="true">LL</div>
          <div className="header-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="header-right">
          <button
            className={`theme-toggle-btn ${theme === 'light' ? 'light' : ''}`}
            onClick={() => { toggleTheme(); haptic('light'); }}
            aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
            title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
          />
          {lastRefresh && (
            <div className={`conn-indicator ${online ? 'online' : 'offline'}`} title={lastRefreshLabel ? `Updated ${lastRefreshLabel}` : ''}>
              <span className={`conn-dot ${online ? 'on' : 'off'}`} />
              <span>{online ? (supabase ? 'Live' : 'Online') : 'Offline'}</span>
            </div>
          )}
          <div className="header-name" title={owner.business_name || owner.contact_name}>{owner.business_name || owner.contact_name}</div>
        </div>
      </header>

      <main id="main-content" className="page-content" role="main">
        {/* Pull to refresh indicator */}
        {(showPTR || refreshing) && (
          <div className="ptr-spinner" role="status" aria-label="Refreshing">
            <span className="spin" />{refreshing ? 'Refreshing…' : 'Release to refresh'}
          </div>
        )}
        {/* Last updated */}
        {lastRefresh && !loading && (
          <div className="last-updated" aria-live="polite">Updated {lastRefreshLabel}</div>
        )}

        <div key={tab} className="page-slide">
          {tab === 'jobs' && <JobsPage lots={lots} violations={violations} loading={loading} lotStates={lotStates} onAction={() => loadData(owner, true)} isOwner={isOwner} deepLinkViolationId={deepLinkViolationId} user={owner} />}
          {tab === 'lots' && <LotsPage lots={lots} lotStates={lotStates} loading={loading} ownerRole={owner._role} onZonesSaved={() => loadData(owner, true)} />}
          {tab === 'earnings' && <EarningsPage violations={violations} lots={lots} isOwner={isOwner} user={owner} />}
          {tab === 'activity' && isOperator && <OperatorActivityPage violations={violations} lots={lots} />}
          {tab === 'account' && <AccountPage user={owner} onLogout={logout} />}
        </div>
      </main>

      <nav className="bottom-nav" role="navigation" aria-label="Main navigation">
        {navTabs.map(t => {
          const Icon = navIcons[t.id];
          return (
            <button key={t.id}
              className={`nav-item ${tab === t.id ? 'active' : ''}`}
              onClick={() => { setTab(t.id); haptic('light'); }}
              aria-label={`${t.label}${t.badge > 0 ? `, ${t.badge} pending` : ''}`}
              aria-current={tab === t.id ? 'page' : undefined}
              role="tab"
              aria-selected={tab === t.id}
            >
              {t.badge > 0 && <span className="nav-badge" aria-hidden="true">{t.badge}</span>}
              {Icon && <Icon />}
              <span className="nav-label">{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
</body>
</html>
