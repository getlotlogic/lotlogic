<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Parking QR — LotLogic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 24px 20px;
    }
    .screen-wrap { max-width: 760px; margin: 0 auto; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .toolbar a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .toolbar a:hover { text-decoration: underline; }
    .print-btn {
      padding: 10px 18px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .print-btn:hover { opacity: 0.9; }

    .picker h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
      margin-bottom: 6px;
    }
    .picker p {
      color: #9ca3af;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .picker-item {
      display: block;
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px 16px;
      border-radius: 10px;
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: border-color 0.15s, background 0.15s;
    }
    .picker-item:hover {
      border-color: #3b82f6;
      background: rgba(59,130,246,0.08);
    }
    .picker-item small {
      display: block;
      color: #6b7280;
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
    }

    .poster {
      background: #fff;
      color: #0f172a;
      border-radius: 14px;
      padding: 48px 32px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .poster-brand {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #3b82f6;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .poster-heading {
      font-size: 40px;
      font-weight: 900;
      color: #0f172a;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .poster-lot {
      font-size: 20px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 28px;
    }
    .qr-canvas-wrap {
      display: inline-block;
      padding: 14px;
      background: #fff;
      border: 3px solid #0f172a;
      border-radius: 12px;
      margin: 4px 0 24px;
    }
    #qrCanvas { display: block; width: 320px; height: 320px; }
    .poster-steps {
      text-align: left;
      display: inline-block;
      margin: 0 auto 18px;
      color: #1e293b;
      padding-left: 22px;
    }
    .poster-steps li { margin: 6px 0; font-size: 16px; }
    .poster-url {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #475569;
      margin-top: 18px;
      word-break: break-all;
    }
    .poster-footnote {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 10px;
    }

    .loading-state { text-align: center; padding: 60px 0; color: #9ca3af; }
    .error-state {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }

    @media print {
      body {
        background: #fff;
        color: #000;
        padding: 0;
        min-height: 0;
      }
      .screen-wrap { max-width: 100%; }
      .toolbar { display: none; }
      .poster {
        box-shadow: none;
        border-radius: 0;
        padding: 32px 24px;
      }
      .poster-heading { font-size: 36px; }
      #qrCanvas { width: 360px; height: 360px; }
    }
  </style>
</head>
<body>
  <div class="screen-wrap">
    <div class="toolbar">
      <a href="/app">&larr; Back to dashboard</a>
      <div id="toolbarActions"></div>
    </div>
    <div id="content">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    const content = document.getElementById('content');
    const toolbarActions = document.getElementById('toolbarActions');

    const qs = new URLSearchParams(window.location.search);
    const lotId = qs.get('lot');

    async function init() {
      if (lotId && UUID_RE.test(lotId)) {
        await renderPoster(lotId);
      } else {
        await renderPicker();
      }
    }

    async function renderPicker() {
      try {
        const { data, error } = await supabase
          .from('lots')
          .select('id, name')
          .eq('active', true)
          .order('name', { ascending: true });
        if (error) throw error;
        if (!data || data.length === 0) {
          content.innerHTML = '<div class="error-state">No active lots found.</div>';
          return;
        }
        content.innerHTML =
          '<div class="picker">' +
            '<h1>Print a parking QR</h1>' +
            '<p>Pick a lot to generate a printable QR poster. Drivers scan it to self-register their vehicle.</p>' +
            '<div class="picker-grid">' +
              data.map(l =>
                '<a class="picker-item" href="/park/qr?lot=' + encodeURIComponent(l.id) + '">' +
                  escapeHtml(l.name) +
                  '<small>' + escapeHtml(l.id) + '</small>' +
                '</a>'
              ).join('') +
            '</div>' +
          '</div>';
      } catch (err) {
        console.error(err);
        content.innerHTML = '<div class="error-state">Failed to load lots. ' + escapeHtml(err.message || '') + '</div>';
      }
    }

    async function renderPoster(id) {
      try {
        const { data, error } = await supabase
          .from('lots')
          .select('id, name, active')
          .eq('id', id)
          .single();
        if (error || !data) {
          content.innerHTML = '<div class="error-state">Lot not found.</div>';
          return;
        }
        const target = window.location.origin + '/park?lot=' + encodeURIComponent(data.id);
        content.innerHTML =
          '<div class="poster" id="poster">' +
            '<div class="poster-brand">LotLogic \u00b7 Guest Parking</div>' +
            '<h1 class="poster-heading">Scan to Register Your Vehicle</h1>' +
            '<div class="poster-lot">' + escapeHtml(data.name) + '</div>' +
            '<div class="qr-canvas-wrap"><canvas id="qrCanvas"></canvas></div>' +
            '<ol class="poster-steps">' +
              '<li>Open your phone camera and point at the QR code.</li>' +
              '<li>Tap the link that appears.</li>' +
              '<li>Enter your plate and how long you\u2019ll be parked.</li>' +
            '</ol>' +
            '<div class="poster-url">' + escapeHtml(target) + '</div>' +
            '<div class="poster-footnote">Max stay 48h \u00b7 24h cooldown before re-registration</div>' +
          '</div>';

        toolbarActions.innerHTML = '<button class="print-btn" type="button" id="printBtn">Print</button>';
        document.getElementById('printBtn').addEventListener('click', () => window.print());

        const canvas = document.getElementById('qrCanvas');
        QRCode.toCanvas(canvas, target, {
          width: 640,
          margin: 1,
          errorCorrectionLevel: 'M',
          color: { dark: '#0f172a', light: '#ffffff' },
        }, err => {
          if (err) console.error('qr render:', err);
        });
      } catch (err) {
        console.error(err);
        content.innerHTML = '<div class="error-state">Failed to load lot. ' + escapeHtml(err.message || '') + '</div>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
