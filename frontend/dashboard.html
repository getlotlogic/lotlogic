      <button className="login-btn" style={{background:'rgba(239,68,68,.15)', color:'#f87171', boxShadow:'none', border:'1px solid rgba(239,68,68,.3)'}} onClick={onLogout}>
        Sign Out
      </button>
    </div>
  );
}

// ── Analytics tab ──────────────────────────────────────────────
function AnalyticsPage({ lots, violations, partners = [], isOwner, onNavigate }) {
  const [hourlyData, setHourlyData] = useState(null);
  const [utilData, setUtilData] = useState(null);
  const [projData, setProjData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selectedLot, setSelectedLot] = useState('all');

  const lotIds = lots.map(l => l.id);
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  useEffect(() => {
    if (lotIds.length === 0) { setLoading(false); return; }
    setLoading(true);
    const ids = selectedLot === 'all' ? lotIds : [selectedLot];
    Promise.all([
      db.getHourlyStats(ids),
      db.getUtilization(ids),
      db.getRevenueProjection(ids),
    ]).then(([h, u, p]) => {
      setHourlyData(h);
      setUtilData(u);
      setProjData(p);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [lots.length, selectedLot]);

  if (loading) return <div className="page-enter"><SkeletonKPIs /><SkeletonCards count={3} /></div>;

  if (lots.length === 0) {
    return (
      <div className="page-enter" style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>No analytics yet</div>
        <div style={{fontSize:12}}>Add a lot on the Lots tab to start seeing utilization, revenue projections, and hourly stats.</div>
      </div>
    );
  }

  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const maxHeat = hourlyData ? Math.max(...Object.values(hourlyData.heatmap), 1) : 1;

  // Get total spaces for utilization percentage
  const filteredLots = selectedLot === 'all' ? lots : lots.filter(l => l.id === selectedLot);
  const totalSpaces = filteredLots.reduce((s, l) => s + (l.total_spaces || 0), 0);

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Analytics</div>
        {lots.length > 1 && (
          <select value={selectedLot} onChange={e => setSelectedLot(e.target.value)}
            style={{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:8, padding:'5px 10px', fontSize:12, fontWeight:600, color:'var(--text-secondary)', fontFamily:'inherit'}}>
            <option value="all">All Lots</option>
            {lots.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        )}
      </div>

      {/* Revenue Projections */}
      {projData && (
        <div className="analytics-card">
          <div className="analytics-card-title">Revenue Projections</div>
          <div className="projection-row">
            <div className="projection-label">Monthly projection</div>
            <div>
              <span className="projection-val green">${projData.monthlyProjection.toLocaleString()}</span>
              {projData.trendPct !== 0 && (
                <span className={`projection-trend ${projData.trend}`}>
                  {projData.trend === 'up' ? '+' : ''}{projData.trendPct}%
                </span>
              )}
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Daily average</div>
            <div>
              <span className="projection-val blue">${projData.dailyAvg.toLocaleString()}</span>
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Last 7 days total</div>
            <div>
              <span className="projection-val">${projData.weeklyAvg.toLocaleString()}</span>
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Violations per day</div>
            <div>
              <span className="projection-val">{projData.violationsPerDay}</span>
              {projData.violTrendPct !== 0 && (
                <span className={`projection-trend ${projData.violTrend}`}>
                  {projData.violTrend === 'up' ? '+' : ''}{projData.violTrendPct}%
                </span>
              )}
            </div>
          </div>
        </div>
      )}

      {/* By Partner — tow count + revenue per partner (owner only) */}
      {isOwner && (() => {
        const now = Date.now();
        const since30 = now - 30 * 86400000;
        const lotPartner = Object.fromEntries(lots.map(l => [l.id, l.partner_id]));
        const partnerName = Object.fromEntries(partners.map(p => [p.id, p.company_name]));
        const agg = {};
        violations.forEach(v => {
          if (v.action_taken !== 'tow' || v.status === 'pending') return;
          const ts = new Date(v.resolved_at || v.detected_at).getTime();
          if (ts < since30) return;
          const pid = lotPartner[v.lot_id];
          if (!pid) return;
          if (!agg[pid]) agg[pid] = { partner_id: pid, tows: 0, gross: 0, invoicable_tows: 0, invoicable_gross: 0 };
          agg[pid].tows += 1;
          agg[pid].gross += (v.gross_revenue || 0);
          if (!v.invoiced_at && (v.gross_revenue || 0) > 0) {
            agg[pid].invoicable_tows += 1;
            agg[pid].invoicable_gross += (v.gross_revenue || 0);
          }
        });
        const rows = Object.values(agg).sort((a, b) => b.gross - a.gross);
        if (rows.length === 0) return null;
        return (
          <div className="analytics-card">
            <div className="analytics-card-title">By Partner (Last 30 Days)</div>
            {rows.map(r => (
              <div key={r.partner_id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>
                    {partnerName[r.partner_id] || r.partner_id.slice(0, 8)}
                  </div>
                  <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>
                    {r.tows} tow{r.tows !== 1 ? 's' : ''} · {fmtMoney(r.gross)} gross
                  </div>
                </div>
                {r.invoicable_tows > 0 && (
                  <button
                    onClick={() => onNavigate && onNavigate('invoices')}
                    style={{fontSize:12, padding:'6px 10px', borderRadius:6, border:'1px solid rgba(59,130,246,.4)', background:'rgba(59,130,246,.1)', color:'var(--accent)', cursor:'pointer', fontWeight:600, whiteSpace:'nowrap'}}
                  >
                    Invoice {r.invoicable_tows} · {fmtMoney(r.invoicable_gross)}
                  </button>
                )}
              </div>
            ))}
          </div>
        );
      })()}

      {/* Peak Violation Hours Heatmap */}
      {hourlyData && (
        <div className="analytics-card">
          <div className="analytics-card-title">Peak Violation Hours (Last 90 Days)</div>
          <div style={{overflowX:'auto', paddingBottom:4}}>
            <div className="heatmap-grid" style={{minWidth:360}}>
              {/* Hour labels */}
              <div />
              {Array.from({length: 24}, (_, h) => (
                <div key={`h${h}`} className="heatmap-hour">{h % 3 === 0 ? `${h}` : ''}</div>
              ))}
              {/* Days */}
              {dayNames.map((day, dow) => (
                <React.Fragment key={day}>
                  <div className="heatmap-label">{day}</div>
                  {Array.from({length: 24}, (_, hour) => {
                    const count = hourlyData.heatmap[`${dow}-${hour}`] || 0;
                    const intensity = count / maxHeat;
                    const bg = count === 0
                      ? 'var(--bg-inset)'
                      : `rgba(239, 68, 68, ${0.15 + intensity * 0.85})`;
                    return (
                      <div key={`${dow}-${hour}`} className="heatmap-cell"
                        style={{background: bg}}
                        title={`${day} ${hour}:00 — ${count} violation${count !== 1 ? 's' : ''}`}
                      />
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:6, marginTop:8, justifyContent:'flex-end'}}>
            <span style={{fontSize:10, color:'var(--text-faint)'}}>Low</span>
            {[0.15, 0.35, 0.55, 0.75, 1].map((v, i) => (
              <div key={i} style={{width:12, height:12, borderRadius:2, background:`rgba(239,68,68,${v})`}} />
            ))}
            <span style={{fontSize:10, color:'var(--text-faint)'}}>High</span>
          </div>
        </div>
      )}

      {/* Lot Utilization */}
      {utilData && totalSpaces > 0 && (
        <div className="analytics-card">
          <div className="analytics-card-title">Avg. Vehicles by Hour (Last 7 Days)</div>
          {Array.from({length: 24}, (_, hour) => {
            const avg = utilData.hourly[hour] || 0;
            const pct = Math.min((avg / totalSpaces) * 100, 100);
            const color = pct > 80 ? '#ef4444' : pct > 50 ? '#fbbf24' : '#4ade80';
            return (
              <div key={hour} className="utilization-bar-row">
                <div className="utilization-bar-label">{hour.toString().padStart(2, '0')}:00</div>
                <div className="utilization-bar-track">
                  <div className="utilization-bar-fill" style={{width: `${pct}%`, background: color}} />
                </div>
                <div className="utilization-bar-val">{avg.toFixed(1)}</div>
              </div>
            );
          }).filter((_, hour) => {
            // Only show hours 6am-11pm to reduce clutter
            return hour >= 6 && hour <= 23;
          })}
          <div style={{fontSize:11, color:'var(--text-faint)', marginTop:8, textAlign:'center'}}>
            {totalSpaces} total spaces across {filteredLots.length} lot{filteredLots.length !== 1 ? 's' : ''}
          </div>
        </div>

      {utilData && totalSpaces === 0 && (
        <div className="analytics-card">
          <div className="analytics-card-title">Lot Utilization</div>
          <div style={{padding:'16px 0', textAlign:'center', color:'var(--text-faint)', fontSize:13}}>
            Set total spaces on your lots to see utilization percentages

        </div>

      {/* Quick stats */}
      <div className="analytics-card">
        <div className="analytics-card-title">Quick Stats</div>
        <div className="kpi-bar">
          <div className="kpi-card">
            <div className="kpi-val blue">{hourlyData?.total || 0}</div>
            <div className="kpi-label">Violations (90d)</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-val green">{lots.length}</div>
            <div className="kpi-label">Active Lots</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-val">{utilData?.totalSnapshots || 0}</div>
            <div className="kpi-label">Snapshots (7d)</div>
          </div>
        </div>
      </div>

      {/* Link to operator overview */}
      {isOwner && onNavigate && (
        <button onClick={() => onNavigate('overview')} style={{
          width:'100%', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:12,
          padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
          cursor:'pointer', fontFamily:'inherit', marginTop:4,
        }}>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>Operator Overview</div>
            <div style={{fontSize:12, color:'var(--text-faint)', marginTop:2}}>View per-operator stats and impersonate partners</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      )}
    </div>
  );
}

// ── ALPR Page Components ─────────────────────────────────────

// Shown under every plate / visitor-pass row: a compact strip of the most
// recent plate_events linked to that registration. Each thumbnail surfaces
// the match_status and rolling OCR confidence so an operator can glance
// at a pass and see whether anything looks wrong before it ever becomes a
// tow candidate.
function SightingStrip({ sightings, cameras, nowTick }) {
  if (!sightings || sightings.length === 0) {
    return (
      <div style={{fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>No ALPR sightings yet.</div>
    );
  }
  const cameraById = Object.fromEntries((cameras || []).map(c => [c.id, c]));
  const sorted = [...sightings].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const lastSeenMs = nowTick - new Date(sorted[0].created_at).getTime();
  const lastSeenStr = lastSeenMs < 60000 ? 'just now'
    : lastSeenMs < 3600000 ? Math.floor(lastSeenMs / 60000) + 'm ago'
    : lastSeenMs < 86400000 ? Math.floor(lastSeenMs / 3600000) + 'h ago'
    : Math.floor(lastSeenMs / 86400000) + 'd ago';
  const lowConfCount = sorted.filter(s => s.match_status === 'low_confidence').length;
  return (
    <div style={{borderTop:'1px dashed var(--border-subtle)',paddingTop:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10,fontSize:11,color:'var(--text-muted)',marginBottom:6}}>
        <span style={{fontWeight:700,color:'var(--text-secondary)',letterSpacing:'.04em',textTransform:'uppercase'}}>{sorted.length} sighting{sorted.length === 1 ? '' : 's'}</span>
        <span>· last seen {lastSeenStr}</span>
        {lowConfCount > 0 && (
          <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:4,background:'rgba(251,191,36,.12)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.25)'}}>{lowConfCount} LOW CONFIDENCE</span>
        )}
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
        {sorted.slice(0, 10).map(ev => {
          const cam = cameraById[ev.camera_id];
          const conf = typeof ev.confidence === 'number' ? Math.round(ev.confidence * (ev.confidence <= 1 ? 100 : 1)) : null;
          const statusColor = ev.match_status === 'matched' ? '#4ade80'
            : ev.match_status === 'visitor_pass_fuzzy' ? '#4ade80'
            : ev.match_status === 'partner_truck' ? '#4ade80'
            : ev.match_status === 'low_confidence' ? '#fbbf24'
            : ev.match_status === 'camera_suspended' ? '#f87171'
            : 'var(--text-faint)';
          const title = `${cam?.name || 'camera'} · ${new Date(ev.created_at).toLocaleString()} · ${ev.match_status}${conf != null ? ` · ${conf}%` : ''}`;
          return (
            <div key={ev.id} title={title} style={{flexShrink:0,width:72,display:'flex',flexDirection:'column',gap:2}}>
              <div style={{position:'relative',width:72,height:54,borderRadius:6,overflow:'hidden',border:'1px solid var(--border-subtle)',background:'var(--bg-inset)'}}>
                {ev.image_url
                  ? <img src={ev.image_url} alt="plate sighting" loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover'}} />
                  : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--text-faint)'}}>No image</div>
                }
                <div style={{position:'absolute',top:3,right:3,width:8,height:8,borderRadius:'50%',background:statusColor,boxShadow:'0 0 0 2px rgba(0,0,0,.35)'}} />
              </div>
              <div style={{fontSize:10,color:'var(--text-faint)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {new Date(ev.created_at).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}{conf != null ? ` · ${conf}%` : ''}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Truck Parking Log ────────────────────────────────────────
// Paginated, filterable temporary-pass log for truck_plaza properties.
// Data comes from the backend /visitor_passes/parking-log endpoint — the same
// shape as the CSV export so the two never drift.
}

function TruckParkingLog({ propertyId, isOwner = false }) {
  const { addToast } = useToast();
  const [rows, setRows] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  // PARITY FIX (2026-06-03): the backend /visitor_passes/parking-log
  // endpoint silently filters out passes that the ActivePassTracker's
  // direct Supabase query returns — operator searched a real active pass
  // here, got 0 hits, towed it. To guarantee parity with what the Active
  // list shows, we ALSO fetch directly from Supabase (same query the
  // ActivePassTracker uses) and merge the union into the search pool.
  // This means: if a pass appears in Active + Violations, it's
  // guaranteed to appear in Parking Log search.
  const [directPasses, setDirectPasses] = useState([]);
  // Backend-side filters: date range + status. Changes require an Apply because
  // they refetch from the server. Search text is separate state below and is
  // pure client-side (live filter on already-fetched rows).
  const [filters, setFilters] = useState(() => {
    // Default to last 4 days. Passes older than that are dropped from the
    // operator's working view — they're historical and clutter the queue.
    // Filter is adjustable via the date_from input if an operator needs
    // to look further back.
    const today = new Date();
    const fourDaysAgo = new Date(today.getTime() - 4 * 24 * 60 * 60 * 1000);
    return {
      date_from: fourDaysAgo.toISOString().slice(0, 10),
      date_to: today.toISOString().slice(0, 10),
      status: '',
    };
  });
  // Live search text. Drives client-side substring matching across every
  // field a driver enters on the QR form (plate, name, company, phone,
  // placard, parking spot, reference ID). Updates as the operator types —
  // no Apply, no debounce. The filter runs against rows already in memory.
  const [searchText, setSearchText] = useState('');
  const [cancelModal, setCancelModal] = useState(null); // { id, plate_text } | null
  const [cancelling, setCancelling] = useState(false);
  const [exporting, setExporting] = useState(false);
  // Camera-snapshot cache for inline violation/auto-cleared image previews.
  // Keyed by row id. The image fetch is lazy (IntersectionObserver) so a
  // 500-row log doesn't hammer the API on load. Replaces what ActivePassTracker
  // used to surface as a click-to-expand thumbnail; now inline so operators
  // can visually match the truck to the row without an extra tap.
  const [vehicleImageCache, setVehicleImageCache] = useState({});
  // Open alpr_violations for this property keyed by normalized plate, so
  // each visitor-pass row can show "✅ Towed / ✖ No Tow" buttons when the
  // pass became an overstay-violation. Operators used to have to leave the
  // Parking Log and go to Billing → Confirmation Review to mark these,
  // which broke the natural workflow of "I'm looking at the pass, here's
  // what happened to the truck."
  const [violationByPlate, setViolationByPlate] = useState(new Map());
  // Per-row submitting state — instead of a global flag that disables EVERY
  // tow/no-tow button while any one is in flight. Operators on a busy lot
  // tap row after row; they can't wait 2 seconds between each. Tracks the
  // pass_id whose action is currently in flight (null otherwise). Buttons
  // disable only when their own row matches.
  const [submittingRowId, setSubmittingRowId] = useState(null);

  // Property switch: clear caches keyed by row id so a new property never
  // inherits a stale image, violation lookup, or submitting flag from the
  // previous property. Realtime + load() handle the refresh below.
  useEffect(() => {
    setVehicleImageCache({});
    setViolationByPlate(new Map());
    setSubmittingRowId(null);
  }, [propertyId]);
  // Auto-widening: if a search returns 0 matches in the current date window
  // but might match outside it, offer one-click to extend the window back 90d.
  const [widening, setWidening] = useState(false);
  // Click-to-filter on the status pills. null = no pill filter (show all).
  // Toggles between null and the status name on click. Client-side overlay
  // on top of search + date filters — doesn't refetch.
  const [pillStatusFilter, setPillStatusFilter] = useState(null);

  // ── search normalization helpers ─────────────────────────────────────
  // Plate field is stored normalized (uppercase, alphanumeric only) by both
  // QR forms. Phone is stored E.164 ("+15551234567"). Operator input needs
  // the same treatment so "abc 1234" matches "ABC1234" and "(555) 123-4"
  // matches "+15551234567".
  function normalizePlateForSearch(s) {
    return (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  }
  function normalizePhoneForSearch(s) {
    return (s || '').replace(/\D/g, '');
  }

  // Inline vehicle image preview for violation / auto-cleared rows.
  // Lazy-loads on intersection (200px rootMargin pre-warm). Caches in
  // vehicleImageCache so re-rendering doesn't re-fetch. If a plate has
  // no camera capture (property without ALPR cams, or read pending),
  // renders quietly nothing — no "missing image" stub so empty rows
  // stay clean. Replaces what ActivePassTracker used to expose behind a
  // click-to-expand affordance.
  function VehicleImage({ rowId, plateText }) {
    const containerRef = useRef(null);
    const entry = vehicleImageCache[rowId];
    useEffect(() => {
      if (entry) return; // already loaded, loading, or known-empty
      const el = containerRef.current;
      if (!el || !propertyId || !plateText) return;
      const obs = new IntersectionObserver((entries) => {
        if (!entries[0].isIntersecting) return;
        obs.disconnect();
        setVehicleImageCache(c => ({ ...c, [rowId]: { loading: true } }));
        db.getLatestPlateEventForPlate(propertyId, plateText).then(ev => {
          if (ev?.image_url) {
            setVehicleImageCache(c => ({
              ...c,
              [rowId]: {
                url: ev.image_url,
                capturedAt: ev.created_at,
                cameraName: ev.alpr_cameras?.name || null,
              },
            }));
          } else {
            setVehicleImageCache(c => ({ ...c, [rowId]: { empty: true } }));
          }
        }).catch(() => {
          setVehicleImageCache(c => ({ ...c, [rowId]: { empty: true } }));
        });
      }, { rootMargin: '200px' });
      obs.observe(el);
      return () => obs.disconnect();
    }, [rowId, plateText, entry]);

    // Skip rendering entirely when known-empty so violation cards stay
    // tight on properties without ALPR cameras.
    if (entry?.empty) return null;

    return (
      <div ref={containerRef} style={{
        position:'relative',
        background:'var(--bg-inset)',
        borderRadius:8,
        overflow:'hidden',
        minHeight: entry?.loading ? 80 : (entry?.url ? 0 : 80),
        display: entry?.url || entry?.loading ? 'block' : 'none',
      }}>
        {entry?.loading && (
          <div style={{
            position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:11,color:'var(--text-faint)',letterSpacing:'.04em',textTransform:'uppercase',
          }}>Loading camera frame…</div>
        )}
        {entry?.url && (
          <>
            <img
              src={entry.url}
              alt={`Vehicle ${plateText}`}
              loading="lazy"
              style={{display:'block',width:'100%',maxHeight:200,objectFit:'cover'}}
            />
            <div style={{
              position:'absolute',bottom:0,left:0,right:0,
              padding:'4px 8px',
              background:'linear-gradient(to top, rgba(0,0,0,.7), rgba(0,0,0,0))',
              fontSize:10,color:'#fff',
              display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8,
            }}>
              <span style={{fontWeight:700,letterSpacing:'.03em'}}>📷 {entry.cameraName || 'camera'}</span>
              <span style={{opacity:.85}}>{entry.capturedAt ? new Date(entry.capturedAt).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : ''}</span>
            </div>
          </>
        )}
      </div>
    );
  }
  // Returns the list of field names this row matched on, or [] if no match.
  // An empty/whitespace-only query is treated as "no filter" by the caller,
  // so we don't bother here.
  function searchMatches(row, query) {
    const matched = [];
    const qLower = query.trim().toLowerCase();
    if (!qLower) return matched;
    const qPlate = normalizePlateForSearch(query);
    const qPhone = normalizePhoneForSearch(query);

    // Plate: ≥2 alphanumeric chars to avoid noise (typing "ab" shouldn't
    // match every plate containing AB; typing "abc" should).
    if (qPlate.length >= 2 && normalizePlateForSearch(row.plate_text).includes(qPlate)) {
      matched.push('plate');
    }
    // Driver name on the visitor pass.
    if ((row.visitor_name || '').toLowerCase().includes(qLower)) matched.push('name');
    // Carrier / company.
    if ((row.company_name || '').toLowerCase().includes(qLower)) matched.push('company');
    // Phone: digits-only match against E.164 stored value. ≥4 digit
    // threshold prevents random short numerics from matching every phone.
    if (qPhone.length >= 4 && normalizePhoneForSearch(row.phone).includes(qPhone)) {
      matched.push('phone');
    }
    // Placard color: exact-word feel is fine — colors are short.
    if ((row.placard_color || '').toLowerCase().includes(qLower)) matched.push('placard');
    // Parking spot: stored as text or number; coerce to string.
    if (row.parking_spot != null && String(row.parking_spot).toLowerCase().includes(qLower)) {
      matched.push('spot');
    }
    // Reference ID: short generated identifier printed on the driver's
    // success card; they may quote it on the phone.
    if ((row.reference_id || '').toLowerCase().includes(qLower)) matched.push('ref');

    return matched;
  }

  const trimmedSearch = searchText.trim();
  const hasSearch = trimmedSearch.length > 0;

  const load = useCallback(async () => {
    if (!propertyId) return;
    setLoading(true);
    setErr(null);
    try {
      // Fetch backend log + open alpr violations in parallel. allSettled so
      // a violations-fetch failure doesn't blow away the log AND a log-fetch
      // failure doesn't blow away the violation map. Each side is preserved
      // independently — a network blip on one shouldn't strip tow buttons
      // from the screen.
      // page_size=500 keeps the full date window in memory for live search.
      const [resOutcome, violOutcome] = await Promise.allSettled([
        db.getParkingLog(propertyId, {
          date_from: filters.date_from,
          date_to: filters.date_to,
          status: filters.status,
          page: 1,
          page_size: 500,
        }),
        db.getOpenAlprViolations(propertyId),
      ]);
      if (resOutcome.status === 'fulfilled') {
        const res = resOutcome.value;
        // Backend returns `{ items, total, page, page_size }` per the docstring
        // on db.getParkingLog. A prior refactor switched this to res.rows which
        // is undefined, so `rows` was always [] and the search matched nothing
        // even when `total` showed hundreds of passes. Accept both keys so the
        // page stays correct if the backend response shape ever changes again.
        const items = res.items || res.rows || [];
        setRows(items);
        setTotal(res.total ?? items.length);
      } else {
        // Log fetch failed — keep the previous rows on screen rather than
        // emptying the list. Operator should see the error banner instead.
        throw resOutcome.reason;
      }
      if (violOutcome.status === 'fulfilled') {
        // Build plate→violation map. The alpr_violations table doesn't store
        // visitor_pass_id on every row, so we match by normalized plate +
        // property_id (already filtered server-side). Only OPEN violations
        // (action_taken IS NULL) come back from getOpenAlprViolations.
        const viols = violOutcome.value;
        const m = new Map();
        for (const v of (viols || [])) {
          const k = normalizePlateForSearch(v.plate_text);
          if (k && !m.has(k)) m.set(k, v);
        }
        setViolationByPlate(m);
      }
      // else: keep previous violationByPlate so the tow/no-tow buttons
      // don't silently disappear from a network blip.
    } catch (e) {
      setErr(e.message || 'Failed to load log');
    }
    setLoading(false);
  }, [propertyId, filters]);

  // Handler for the tow / no-tow confirmation modal. Calls the existing
  // backend endpoints (force-bill for tow-confirmation, mark-no-tow for
  // dismissal). Both are owner-scoped on the backend; partners still see
  // the buttons here for visual consistency but the API call will 403
  // for them (caught and surfaced via toast).
  // Action handler. Branches on whether the row has a matched open
  // alpr_violation (the typical case) or not (camera-less property,
  // already-actioned violation, or cron hasn't created one yet).
  //   - WITH violation_id  → goes through the violation state machine
  //                          (force-bill = towed, mark-no-tow = no tow).
  //                          Billing handling is partner-side.
  //   - WITHOUT violation  → falls back to cancel-pass with a note. The
  //                          row clears from the working view; no billing
  //                          happens (there's no violation to bill).
  async function handleViolationAction(kind, payload, reason) {
    // Defensive guards — if pass_id is missing (corrupted row data), refuse
    // to fire the action rather than POSTing to /visitor_passes/undefined/cancel
    // (which the backend silently 404s, leaving the operator thinking the
    // tap succeeded). Surface a clear error instead.
    if (!payload.pass_id && !payload.violation_id) {
      addToast('Cannot action this row — missing ids. Refresh and retry.', 'error');
      return;
    }
    setSubmittingRowId(payload.pass_id || payload.violation_id);
    const label = kind === 'tow' ? 'Marked towed' : 'Marked no-tow';
    try {
      const note = reason || `${label} from Parking Log`;
      if (payload.violation_id) {
        if (kind === 'tow') {
          await db.forceBillViolation(payload.violation_id, note);
          addToast('Marked towed — billing released', 'success');
        } else {
          await db.markViolationNoTow(payload.violation_id, note);
          addToast('Marked no-tow', 'success');
        }
      } else {
        // No linked violation — close the pass with a clear audit note.
        // Reason prefix lets future review queries filter these out as
        // operator-actioned rather than driver-cancelled.
        await db.cancelVisitorPass(
          payload.pass_id,
          `${label} (no linked violation): ${note}`
        );
        addToast(`${label} (pass cancelled)`, 'success');
      }
      load();
    } catch (e) {
      addToast(`${label} failed: ${e.message || 'unknown error'}`, 'error');
    } finally {
      setSubmittingRowId(null);
    }
  }


  // Initial load + on filter / page changes via `load` identity.
  useIntervalFetch(load, 0, [load]);

  // PARITY FETCH — direct Supabase, no date filter, same query the
  // ActivePassTracker uses. The backend's parking-log endpoint has
  // historically had silent filters that excluded active passes;
  // pulling from Supabase too guarantees the search has at least
  // everything the Active list does. Realtime keeps it fresh.
  useEffect(() => {
    if (!propertyId) return;
    let cancelled = false;
    const refresh = () => {
      db.getVisitorPasses(propertyId, { limit: 500 })
        .then(r => { if (!cancelled) setDirectPasses(r || []); })
        .catch(() => { /* non-fatal — backend rows still drive the log */ });
    };
    refresh();
    if (supabase) {
      const ch = supabase.channel('parking-log-direct-' + propertyId + '-' + Math.random().toString(36).slice(2, 8))
        .on('postgres_changes', { event: '*', schema: 'public', table: 'visitor_passes', filter: 'property_id=eq.' + propertyId }, refresh)
        .subscribe();
      return () => { cancelled = true; try { supabase.removeChannel(ch); } catch {} };
    }
    return () => { cancelled = true; };
  }, [propertyId]);

  // Realtime subscription. New passes inserted (and exit/overstay updates)
  // refresh the log silently — filter + pagination state are preserved
  // because `load` reads from current state, not from the realtime payload.
  //
  // Channel name includes a per-mount nonce because supabase-js v2's
  // removeChannel is asynchronous; when the effect re-runs (e.g. operator
  // applies filters → `load` identity changes), recreating a channel with
  // the same name before the prior one's unsubscribe ACK arrives silently
  // fails and realtime stops. The nonce keeps each subscription's name
  // unique so the new one establishes cleanly while the old one tears down.
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const nonce = Math.random().toString(36).slice(2, 10);
    const ch = supabase.channel('parking-log-realtime-' + propertyId + '-' + nonce)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'visitor_passes', filter: 'property_id=eq.' + propertyId }, () => load())
      .subscribe();
    return () => { try { supabase.removeChannel(ch); } catch {} };
  }, [propertyId, load]);

  async function handleCancel(reason) {
    if (!cancelModal) return;
    setCancelling(true);
    try {
      await db.cancelVisitorPass(cancelModal.id, reason || undefined);
      addToast('Pass cancelled', 'success');
      setCancelModal(null);
      load();
    } catch (e) {
      addToast('Cancel failed: ' + (e.message || ''), 'error');
    } finally {
      setCancelling(false);
    }
  }

  async function handleExport() {
    setExporting(true);
    try {
      // Export honours the date/status range only. The smart search box is
      // pure UI and isn't sent to the backend — exporting "all matches" of
      // a free-text query reliably needs a backend column-aware filter we
      // don't have yet, so the CSV reflects the date window unfiltered.
      const blob = await db.getParkingLog(propertyId, { ...filters, format: 'csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const today = new Date().toISOString().slice(0, 10);
      a.download = `truck-parking-log-${today}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      addToast('Export failed: ' + (e.message || ''), 'error');
    }
    setExporting(false);
  }

  function widenDateRange() {
    // 90-day lookback covers nearly every realistic "I swear they were here
    // a while ago" case without dumping a year of rows on the operator.
    const today = new Date();
    const ninetyDaysAgo = new Date(today.getTime() - 90 * 24 * 60 * 60 * 1000);
    const next = {
      ...filters,
      date_from: ninetyDaysAgo.toISOString().slice(0, 10),
      date_to: today.toISOString().slice(0, 10),
    };
    setWidening(true);
    setFilters(next);
    setTimeout(() => setWidening(false), 800);
  }
  const inputStyle = {padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:13,fontFamily:'inherit'};
  const labelStyle = {display:'flex',flexDirection:'column',gap:5,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'};
  // Traffic-light coloring for on-site plate scanning:
  //   RED     = expired / violation (window closed, may still be in lot, actionable)
  //   YELLOW  = expiring soon (active but < 3h to valid_until)
  //   GREEN   = active and >3h remaining
  //   GREY    = auto-cleared (expired > 24h ago; no camera exit detected
  //             and no operator action — archived for record, not actionable)
  //
  // `expiring` and `auto_cleared` are DERIVED at render time. The DB only
  // knows active|expired|... — the time-windowed buckets are purely visual.
  // Adding a new status = one row in each of the three maps below, and one
  // entry in deriveStatus(). Everything downstream consumes from these maps.
  const EXPIRING_WINDOW_MS = 3 * 60 * 60 * 1000;
  const AUTO_CLEAR_WINDOW_MS = 24 * 60 * 60 * 1000;
  const statusColor = {
    active: '#4ade80',
    expiring: '#facc15',
    expired: '#ef4444',
    auto_cleared: '#6b7280',
    cancelled: 'var(--text-muted)',
    revoked: 'var(--text-muted)',
    towed: '#f59e0b',
  };
  const statusDisplay = {
    active: 'Active',
    expiring: 'Expiring soon',
    expired: 'Violation',
    auto_cleared: 'Auto-cleared',
    cancelled: 'Cancelled',
    revoked: 'Revoked',
    towed: 'Towed',
  };
  const statusOrder = { expired: 0, expiring: 1, active: 2, towed: 3, auto_cleared: 4, cancelled: 5, revoked: 6 };
  // Explainer copy shown under the plate on each card. Operator's contract:
  // what happened, why, and what to do about it. Only statuses where the
  // "why" is non-obvious need an explainer — the rest leave this null.
  const statusExplainer = {
    auto_cleared: "Auto-cleared after 24h. Camera didn't catch the truck leaving and no one marked it. If this truck is still on the lot, tap Mark towed below.",
  };

  function deriveStatus(r) {
    const raw = r.status || 'active';
    if (raw !== 'active') {
      // Expired rows split by age: <24h is still actionable, ≥24h is
      // archived. Same row, different visual + different operator urgency.
      if (raw === 'expired' && r.valid_until) {
        const expiredAgo = Date.now() - new Date(r.valid_until).getTime();
        if (expiredAgo >= AUTO_CLEAR_WINDOW_MS) return 'auto_cleared';
      }
      return raw;
    }
    if (!r.valid_until) return 'active';
    const remaining = new Date(r.valid_until).getTime() - Date.now();
    if (remaining <= 0) {
      // Crossed the expiry boundary just now — still bucket by age so
      // the 24h cut catches the case where status hasn't been flipped
      // to 'expired' by the backend yet.
      if (-remaining >= AUTO_CLEAR_WINDOW_MS) return 'auto_cleared';
      return 'expired';
    }
    if (remaining < EXPIRING_WINDOW_MS) return 'expiring';
    return 'active';
  }
  const fmtDateTime = (s) => s ? new Date(s).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
  // Human-relative day label for the operator's "how long ago" scan.
  // "Today", "Yesterday", or "N days ago".
  const fmtDaysAgo = (s) => {
    if (!s) return '';
    const ms = Date.now() - new Date(s).getTime();
    const days = Math.floor(ms / (24 * 60 * 60 * 1000));
    if (days <= 0) return 'Today';
    if (days === 1) return 'Yesterday';
    return `${days} days ago`;
  };
  const placardSwatch = (color) => {
    if (!color) return null;
    const hex = ({ red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e', blue: '#3b82f6', purple: '#a855f7', pink: '#ec4899', white: '#f8fafc', black: '#0f172a' })[String(color).toLowerCase()] || null;
    return hex ? <span aria-hidden="true" style={{display:'inline-block',width:10,height:10,borderRadius:3,background:hex,border:'1px solid rgba(0,0,0,.25)',verticalAlign:'middle',marginRight:5}} /> : null;
  };

  // Union the backend log (rows) with the direct Supabase pull
  // (directPasses) so the search has everything the Active list does,
  // even if the backend silently filters something out. Dedupe by id;
  // backend wins on conflict because it carries the joined fields the
  // direct query doesn't.
  const allRowsMap = new Map();
  for (const r of directPasses) allRowsMap.set(r.id, r);
  for (const r of rows) allRowsMap.set(r.id, r);
  const unionRows = Array.from(allRowsMap.values());

  // Live filter: when there's a search query, narrow to matches across
  // the union. Each entry carries the `matched` field list so we can
  // show "matched: name" chips beside the result. When there's no
  // search, show the backend-fetched rows only (respects the date
  // range filter — adding the direct pull would dilute the view).
  const visitorMatches = hasSearch
    ? unionRows.map(r => ({ row: r, matched: searchMatches(r, trimmedSearch) }))
               .filter(x => x.matched.length > 0)
    : rows.map(r => ({ row: r, matched: [] }));

  // Counts by derived status — drives the per-status pills above the grid.
  // Always derived from the currently-displayed visitor passes so it stays
  // honest as the operator types.
  const visitorRows = visitorMatches.map(x => x.row);
  const statusCounts = visitorRows.reduce((acc, r) => {
    const s = deriveStatus(r);
    acc[s] = (acc[s] || 0) + 1;
    return acc;
  }, {});

  // Apply the pill-tap status filter on top of search results. The status
  // pills above the grid show counts derived from `visitorMatches` (i.e.
  // they reflect the search), so clicking one acts as a drill-down on
  // those counts. Set to null to clear and see everything again.
  const pillFilteredMatches = pillStatusFilter
    ? visitorMatches.filter(x => deriveStatus(x.row) === pillStatusFilter)
    : visitorMatches;

  // Sort: violations → expiring → active → towed → cancelled → revoked.
  // Within a status group, newest first so the latest activity floats up.
  // Sort preserves the matched-fields metadata so chips render alongside.
  const sortedMatches = [...pillFilteredMatches].sort((a, b) => {
    const sa = deriveStatus(a.row);
    const sb = deriveStatus(b.row);
    const oa = statusOrder[sa] ?? 99;
    const ob = statusOrder[sb] ?? 99;
    if (oa !== ob) return oa - ob;
    const ta = new Date(a.row.created_at || 0).getTime();
    const tb = new Date(b.row.created_at || 0).getTime();
    return tb - ta;
  });

  // Total displayed reflects whatever's actually on screen right now —
  // accounts for both search filter AND the pill drill-down.
  const displayedTotal = pillStatusFilter
    ? pillFilteredMatches.length
    : (hasSearch ? visitorMatches.length : (total || rows.length));

  // Pretty labels for the "matched: X" chip on each result.
  const matchedFieldLabel = {
    plate: 'plate',
    name: 'driver name',
    company: 'company',
    phone: 'phone',
    placard: 'placard',
    spot: 'parking spot',
    ref: 'reference ID',
  };

  // Common chip style for the small "matched: X" pill beside each result.
  const matchedChip = (field) => (
    <span key={field} style={{fontSize:9,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',padding:'2px 7px',borderRadius:12,background:'rgba(168,85,247,.14)',color:'#c084fc',border:'1px solid rgba(168,85,247,.35)'}}>
      matched: {matchedFieldLabel[field] || field}
    </span>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* ── Search bar (always-visible, live) ──────────────────────────── */}
      {/* Operator-anchor. Filters everything below as the user types.
          Matches across: plate, driver name, company, phone, placard,
          parking spot, reference ID. Spans both visitor passes (this tab)
          and the permanent allowlist so a Swift driver registered as an
          employee surfaces in the same search. */}
      <div style={{position:'relative'}}>
        <input
          type="text"
          autoFocus
          value={searchText}
          onChange={e => setSearchText(e.target.value)}
          placeholder="Search plate, driver, company, phone, placard, spot, or ref ID…"
          style={{
            width:'100%', padding:'14px 44px 14px 44px',
            background:'var(--bg-card)', border:'1.5px solid var(--border)',
            borderRadius:12, color:'var(--text-primary)', fontSize:15,
            fontFamily:'inherit', boxSizing:'border-box',
          }}
        />
        <span aria-hidden="true" style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontSize:18,opacity:.55}}>🔍</span>
        {hasSearch && (
          <button
            type="button"
            onClick={() => setSearchText('')}
            aria-label="Clear search"
            title="Clear search"
            style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'transparent',border:'none',cursor:'pointer',padding:6,color:'var(--text-muted)',fontSize:16,lineHeight:1}}
          >✕</button>
        )}
      </div>

      {/* The date/status filter form used to live here. Removed in the
          parking-pass simplification — the smart search box + tap-pills
          (below) do the same job with less chrome. Default date window is
          7 days; the "🔭 Search the last 90 days" button in the empty
          state widens it on demand. CSV export moved behind the ⋯ overflow
          next to the total count (owner desktop only — operators on phones
          don't export from the field). */}

      {err && <div style={{padding:12,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,color:'#ef4444',fontSize:13}}>{err}</div>}

      {/* ── Header summary row ────────────────────────────────────────── */}
      {!err && (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:14,alignItems:'baseline',flexWrap:'wrap'}}>
            <div style={{fontSize:22,fontWeight:800,color:'var(--text-primary)',letterSpacing:'-.01em',display:'flex',alignItems:'baseline',gap:6}}>
              {displayedTotal.toLocaleString()}<span style={{fontSize:13,fontWeight:600,color:'var(--text-muted)'}}>{displayedTotal === 1 ? 'match' : (hasSearch ? 'matches' : 'passes')}</span>
              {/* CSV export — owner only, lives next to the total count
                  instead of in a chrome-heavy form. Hidden for partners and
                  on phones (operators don't export CSVs in the field). */}
              {isOwner && (
                <button
                  type="button"
                  onClick={handleExport}
                  disabled={exporting}
                  title="Download these results as CSV (date / status filters apply; smart search filter does not)."
                  className="pd-csv-export-owner"
                  style={{
                    marginLeft:8,
                    fontSize:11, fontWeight:700,
                    padding:'4px 8px', borderRadius:6,
                    border:'1px solid var(--border)',
                    background:'transparent',
                    color:'var(--text-muted)',
                    cursor: exporting ? 'wait' : 'pointer',
                    fontFamily:'inherit',
                  }}
                >{exporting ? 'Exporting…' : '↓ CSV'}</button>
              )}
            </div>
            {Object.keys(statusCounts).length > 0 && (
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                {['expired','expiring','active','towed','auto_cleared','cancelled','revoked'].filter(s => statusCounts[s]).map(s => {
                  const color = statusColor[s] || 'var(--text-muted)';
                  const isLoud = s === 'expired' || s === 'expiring';
                  const isActive = pillStatusFilter === s;
                  const otherActive = pillStatusFilter && !isActive;
                  return (
                    <button
                      key={s}
                      type="button"
                      onClick={() => setPillStatusFilter(isActive ? null : s)}
                      aria-pressed={isActive}
                      title={isActive ? `Showing only ${statusDisplay[s] || s} — click to clear` : `Filter to ${statusDisplay[s] || s} only`}
                      style={{
                        fontSize: isLoud ? 13 : 11,
                        fontWeight: 800,
                        padding: isLoud ? '6px 14px' : '5px 12px',
                        minHeight: 32,
                        borderRadius: 20,
                        background: isActive ? color : `${color}${isLoud ? '26' : '1a'}`,
                        color: isActive ? '#fff' : color,
                        border: `1px solid ${isActive ? color : `${color}${isLoud ? '66' : '40'}`}`,
                        boxShadow: isActive ? `0 0 0 3px ${color}33` : 'none',
                        opacity: otherActive ? 0.5 : 1,
                        textTransform: 'uppercase',
                        letterSpacing: '.04em',
                        cursor: 'pointer',
                        fontFamily: 'inherit',
                        transition: 'background .12s, opacity .12s, box-shadow .12s',
                      }}
                    >
                      {statusCounts[s]} {statusDisplay[s] || s}{statusCounts[s] !== 1 && s === 'expired' ? 's' : ''}
                    </button>
                  );
                })}
                {pillStatusFilter && (
                  <button
                    type="button"
                    onClick={() => setPillStatusFilter(null)}
                    aria-label="Clear status filter"
                    title="Clear status filter"
                    style={{
                      fontSize: 11, fontWeight: 800,
                      padding: '5px 10px', minHeight: 32,
                      borderRadius: 20,
                      background: 'transparent',
                      color: 'var(--text-muted)',
                      border: '1px solid var(--border)',
                      cursor: 'pointer',
                      fontFamily: 'inherit',
                      letterSpacing: '.04em',
                      textTransform: 'uppercase',
                    }}
                  >✕ All</button>
                )}
              </div>
            )}
          </div>
          <div style={{fontSize:11,color:'var(--text-muted)'}}>
            {filters.date_from} → {filters.date_to}
          </div>
        </div>
      )}

      {/* ── Visitor-pass results ──────────────────────────────────────── */}
      {loading && rows.length === 0 ? (
        <div style={{padding:40,textAlign:'center',color:'var(--text-muted)',fontSize:13,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12}}>Loading…</div>
      ) : sortedMatches.length === 0 ? (
        <div style={{padding:40,textAlign:'center',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12}}>
          <div style={{width:48,height:48,borderRadius:12,background:'rgba(96,165,250,.1)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 10px',fontSize:22}}>📋</div>
          <div style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>
            {hasSearch ? `No matches for "${trimmedSearch}"` : 'No passes for these filters'}
          </div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4,maxWidth:480,margin:'4px auto 0'}}>
            {hasSearch
              ? <>Try a shorter chunk of the plate, just the driver's first name, or the company. Phone numbers and placard color also work.</>
              : <>Try widening the date range or clearing the status filter.</>}
          </div>
          {hasSearch && (
            <button
              type="button"
              onClick={widenDateRange}
              disabled={widening}
              style={{marginTop:14,background:'rgba(74,222,128,.12)',color:'#4ade80',border:'1px solid rgba(74,222,128,.3)',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:widening?'wait':'pointer',fontFamily:'inherit'}}
            >{widening ? 'Loading…' : '🔭 Search the last 90 days'}</button>
          )}
        </div>
      ) : (
        <div style={{display:'grid',gap:10,gridTemplateColumns:'repeat(auto-fill, minmax(380px, 1fr))'}}>
          {sortedMatches.map(({ row: r, matched }) => {
            const s = deriveStatus(r);
            const color = statusColor[s] || 'var(--text-muted)';
            const isActive = (r.status || 'active') === 'active';
            const isViolation = s === 'expired';
            const isExpiring = s === 'expiring';
            const isAutoCleared = s === 'auto_cleared';
            const driverLine = [r.visitor_name, r.company_name].filter(Boolean).join(' · ') || '—';
            const detailChips = [];
            if (r.parking_spot) detailChips.push({ label: 'Spot', value: r.parking_spot });
            // Derive stay from real timestamps; fall back to stay_days*24 if missing.
            // 12/24/36/48 hour passes ALL got stored as stay_days=1 or 2 due to ceil math,
            // so showing "Xd" misleads — render hours unless it's an exact multiple of 24.
            {
              const hrs = r.valid_from && r.valid_until
                ? Math.round((new Date(r.valid_until) - new Date(r.valid_from)) / 3600000)
                : (r.stay_days ? r.stay_days * 24 : null);
              if (hrs && hrs > 0) detailChips.push({ label: 'Stay', value: hrs % 24 === 0 ? `${hrs/24}d` : `${hrs}h` });
            }
            if (r.placard_color) detailChips.push({ label: 'Placard', value: r.placard_color, swatch: true });
            return (
              <div key={r.id} style={{
                background: isViolation ? 'rgba(239,68,68,.06)' : isExpiring ? 'rgba(250,204,21,.06)' : isAutoCleared ? 'rgba(107,114,128,.04)' : 'var(--bg-card)',
                border:`1px solid ${isViolation ? 'rgba(239,68,68,.4)' : isExpiring ? 'rgba(250,204,21,.4)' : isAutoCleared ? 'rgba(107,114,128,.3)' : 'var(--border)'}`,
                borderLeft:`${(isViolation || isExpiring) ? 6 : 3}px solid ${color}`,
                borderRadius:12,
                padding: (isViolation || isExpiring) ? 18 : 14,
                display:'flex',
                flexDirection:'column',
                gap: (isViolation || isExpiring) ? 14 : 10,
                position:'relative',
                opacity: isAutoCleared ? 0.85 : 1,
                boxShadow: isViolation ? '0 2px 18px rgba(239,68,68,.08)' : isExpiring ? '0 2px 18px rgba(250,204,21,.08)' : 'none',
              }}>
                {/* Top row: plate + status pill */}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
                  <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:0}}>
                    <div style={{display:'flex',flexWrap:'wrap',alignItems:'center',gap:8,minWidth:0}}>
                      <div style={{
                        fontSize: (isViolation || isExpiring) ? 32 : 18,
                        fontWeight: 900,
                        fontFamily:"'Courier New',monospace",
                        letterSpacing: (isViolation || isExpiring) ? '.08em' : '.06em',
                        color: isViolation ? '#ef4444' : isExpiring ? '#ca8a04' : 'var(--text-primary)',
                        lineHeight: 1.05,
                      }}>
                        {r.plate_text}
                      </div>
                    </div>
                    {r.back_plate && (
                      <div style={{
                        fontSize: 11,
                        fontWeight: 700,
                        fontFamily:"'Courier New',monospace",
                        letterSpacing: '.05em',
                        color: 'var(--text-muted)',
                      }}>Trailer · {r.back_plate}</div>
                    )}
                  </div>
                  <span aria-label={`Pass status: ${statusDisplay[s] || s}`} style={{
                    fontSize: (isViolation || isExpiring) ? 13 : 10,
                    fontWeight: 800,
                    padding: (isViolation || isExpiring) ? '5px 12px' : '4px 10px',
                    borderRadius:20,
                    background:`${color}${(isViolation || isExpiring) ? '26' : '1a'}`,
                    color,
                    border:`1px solid ${color}${(isViolation || isExpiring) ? '66' : '40'}`,
                    textTransform:'uppercase',
                    letterSpacing:'.06em',
                    whiteSpace:'nowrap',
                    flexShrink:0,
                  }}>{statusDisplay[s] || s}</span>
                </div>

                {/* Pass holder / company / phone line */}
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  <div style={{fontSize:13,color:'var(--text-primary)',fontWeight:600}}>{driverLine}</div>
                  {r.phone && <div style={{fontSize:12,color:'var(--text-muted)'}}>📞 {r.phone}</div>}
                </div>

                {/* Status explainer — only renders when the status carries
                    one in `statusExplainer`. Today: just `auto_cleared`.
                    Telling the operator what happened, why, and what to do. */}
                {statusExplainer[s] && (
                  <div style={{
                    fontSize: 12, lineHeight: 1.45,
                    padding: '8px 10px',
                    background: 'rgba(107,114,128,.08)',
                    borderLeft: '3px solid rgba(107,114,128,.5)',
                    borderRadius: 6,
                    color: 'var(--text-muted)',
                    fontStyle: 'italic',
                  }}>
                    {statusExplainer[s]}
                  </div>
                )}

                {/* Detail chips */}
                {(detailChips.length > 0 || matched.length > 0 || r.policy_acknowledged_at) && (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {detailChips.map((c, i) => (
                      <span key={i} style={{fontSize:11,padding:'3px 9px',borderRadius:14,background:'var(--bg-inset)',color:'var(--text-secondary)',border:'1px solid var(--border-subtle)',display:'inline-flex',alignItems:'center'}}>
                        {c.swatch ? placardSwatch(c.value) : null}
                        <span style={{fontWeight:600,color:'var(--text-faint)',marginRight:5,textTransform:'uppercase',fontSize:9,letterSpacing:'.06em'}}>{c.label}</span>
                        <span style={{textTransform:'capitalize',fontWeight:700,color:'var(--text-primary)'}}>{c.value}</span>
                      </span>
                    ))}
                    {r.policy_acknowledged_at && (
                      <span title={`Acknowledged ${fmtDateTime(r.policy_acknowledged_at)}`} style={{fontSize:11,padding:'3px 9px',borderRadius:14,background:'rgba(74,222,128,.1)',color:'#4ade80',border:'1px solid rgba(74,222,128,.3)',display:'inline-flex',alignItems:'center',gap:4,fontWeight:700}}>
                        ✓ Policy
                      </span>
                    )}
                    {matched.map(matchedChip)}
                  </div>
                )}

                {/* First seen on lot — pre-registration camera snapshot.
                    Backfilled by the backend when a camera read the plate
                    in the 2h before the driver registered. This proves the
                    vehicle was already on the lot when they registered.
                    Click the image to see the full uncropped frame. */}
                {r.first_seen_image_url && (
                  <FirstSeenEvidence
                    plate={r.plate_text}
                    imageUrl={r.first_seen_image_url}
                    firstSeenAt={r.first_seen_at}
                    registeredAt={r.created_at}
                  />
                )}

                {/* Vehicle photo (camera snapshot) for violation / auto-cleared
                    rows. Lazy-loaded on intersection — operators see what the
                    truck looks like without expanding anything. Replaces the
                    ActivePassTracker click-to-expand affordance. */}
                {(isViolation || isAutoCleared) && (
                  <VehicleImage rowId={r.id} plateText={r.plate_text} />
                )}

                {/* Time range */}
                <div style={{display:'grid',gridTemplateColumns: r.exited_at ? '1fr auto 1fr auto 1fr' : '1fr auto 1fr',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg-inset)',borderRadius:8,fontSize:11}}>
                  <div>
                    <div style={{color:'var(--text-faint)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',fontSize:9,marginBottom:2}}>Registered</div>
                    <div style={{color:'var(--text-primary)',fontWeight:600}}>{fmtDateTime(r.created_at)}</div>
                    <div style={{color:'var(--text-muted)',fontSize:10,marginTop:1,fontWeight:600}}>{fmtDaysAgo(r.created_at)}</div>
                  </div>
                  {r.exited_at && <div style={{color:'var(--text-faint)',fontSize:14}}>→</div>}
                  {r.exited_at && (
                    <div style={{textAlign:'center'}}>
                      <div style={{color:'var(--text-faint)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',fontSize:9,marginBottom:2}}>Exited</div>
                      <div style={{color:'var(--text-primary)',fontWeight:600}}>{fmtDateTime(r.exited_at)}</div>
                    </div>
                  )}
                  <div style={{color:'var(--text-faint)',fontSize:14}}>→</div>
                  <div style={{textAlign:'right'}}>
                    <div style={{color:'var(--text-faint)',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',fontSize:9,marginBottom:2}}>{r.cancelled_at ? 'Cancelled' : 'Expires'}</div>
                    <div style={{color:'var(--text-primary)',fontWeight:600}}>{fmtDateTime(r.cancelled_at || r.valid_until)}</div>
                    {r.cancelled_by && <div style={{color:'var(--text-faint)',fontSize:10,marginTop:1}}>by {r.cancelled_by}</div>}
                  </div>
                </div>

                {/* Actions row. Cancel-pass for active passes; tow-decision
                    for expired passes that have a matching open ALPR
                    violation (the overstay case). 44px-tall tap targets
                    for mobile thumb use; color-coded so destructive vs
                    benign is visually unambiguous in sun. */}
                {(() => {
                  const violKey = normalizePlateForSearch(r.plate_text);
                  const openViolation = violationByPlate.get(violKey);
                  // Tow / No-tow buttons show on EVERY expired or
                  // auto-cleared row, regardless of whether we have a
                  // matched open alpr_violation. Why: many rows don't
                  // have one (cron didn't create it, or the property
                  // has no ALPR cameras, or the violation was already
                  // actioned). Without these buttons, operators can't
                  // act on those rows from the Parking Log at all.
                  // If a violation is matched, the action goes through
                  // the violation state machine (force-bill / mark-no-tow).
                  // If not, it falls back to cancel-pass with a note so
                  // the row clears from the working view.
                  const showTowActions = s === 'expired' || s === 'auto_cleared';
                  if (!isActive && !showTowActions) return null;
                  return (
                    <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:-2,flexWrap:'wrap'}}>
                      {isActive && (
                        <button
                          onClick={() => setCancelModal({ id: r.id, plate_text: r.plate_text })}
                          style={{minHeight:44,background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}
                        >Cancel pass</button>
                      )}
                      {showTowActions && (() => {
                        // Per-row in-flight check — only the row whose
                        // action is currently being processed disables.
                        // Other rows stay tappable.
                        const rowBusy = submittingRowId === r.id;
                        return (
                          <>
                            <button
                              onClick={() => handleViolationAction('no-tow', { violation_id: openViolation?.id || null, pass_id: r.id, plate_text: r.plate_text }, '')}
                              disabled={rowBusy}
                              title="Truck left or you chose not to tow — closes without billing"
                              style={{minHeight:44,background:'var(--bg-inset)',color:'var(--text-primary)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:700,cursor:rowBusy?'wait':'pointer',opacity:rowBusy?.55:1,fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:6}}
                            >
                              <span aria-hidden="true">✖</span> No tow
                            </button>
                            <button
                              onClick={() => handleViolationAction('tow', { violation_id: openViolation?.id || null, pass_id: r.id, plate_text: r.plate_text }, '')}
                              disabled={rowBusy}
                              title="Confirm tow happened — releases billing for the partner"
                              style={{minHeight:44,background:'#ef4444',color:'#fff',border:'1px solid #ef4444',borderRadius:8,padding:'10px 14px',fontSize:13,fontWeight:800,cursor:rowBusy?'wait':'pointer',opacity:rowBusy?.55:1,fontFamily:'inherit',display:'inline-flex',alignItems:'center',gap:6}}
                            >
                              <span aria-hidden="true">🚛</span> Mark towed
                            </button>
                          </>
                        );
                      })()}
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>
      )}

      {/* Pagination removed: we fetch up to 500 rows for the date window
          and filter client-side as the operator types, so server-side
          pages no longer apply. If a property genuinely sees >500 passes
          in a 7-day window we'll surface a warning and re-introduce paging. */}
      {!loading && rows.length >= 500 && (
        <div style={{fontSize:11,color:'#facc15',padding:'8px 12px',background:'rgba(250,204,21,.08)',border:'1px solid rgba(250,204,21,.3)',borderRadius:8}}>
          Showing the most recent 500 passes for this date window. If you can't find a specific driver, narrow the date range and try again.
        </div>
      )}

      {cancelModal && (
        <ConfirmActionModal
          plate={cancelModal.plate_text}
          actionLabel="Cancel pass"
          description={<>Soft-cancels the active pass for <strong style={{color:'var(--text-primary)'}}>{cancelModal.plate_text}</strong>. The row stays in the log.</>}
          confirmLabel="Cancel pass"
          confirmColor="#ef4444"
          reasonPlaceholder="Reason (optional)"
          submitting={cancelling}
          onConfirm={(reason) => handleCancel(reason)}
          onCancel={() => { if (!cancelling) setCancelModal(null); }}
        />
      )}

      {/* Confirmation modal removed for tow/no-tow — these are one-tap
          actions. The Cancel pass modal above is kept because it's a
          different kind of action (operator-initiated on an active pass,
          not a response to an existing violation). */}
      )}
    </div>
  );
}

function ALPRPropertyDetailPage({ propertyId, onBack, user }) {
  // QR codes + camera registration are owner-only surfaces. Partners see
  // the property + plates + parking log but not the operational chrome.
  const isOwner = user?._role === 'owner';
  const { addToast } = useToast();
  const [property, setProperty] = useState(null);
  const [plates, setPlates] = useState([]);
  const [cameras, setCameras] = useState([]);
  const [events, setEvents] = useState([]);
  // Group-by-session toggle for the Plate Detections list. Default ON to match
  // the user's expectation: "1-2 shots per vehicle, not 100." Off shows the raw
  // per-frame timeline. Persisted to localStorage so it survives reloads.
  const [groupBySession, setGroupBySession] = useState(() => {
    try { return localStorage.getItem('lotlogic_pd_group') !== '0'; } catch { return true; }
  });
  useEffect(() => {
    try { localStorage.setItem('lotlogic_pd_group', groupBySession ? '1' : '0'); } catch {}
  }, [groupBySession]);
  const [loading, setLoading] = useState(true);
  const [showAddPlate, setShowAddPlate] = useState(false);
  const [showAddCam, setShowAddCam] = useState(false);
  const [newPlate, setNewPlate] = useState({ plate_text: '', unit_number: '', holder_name: '', vehicle_description: '', phone: '' });
  const [newCam, setNewCam] = useState({ name: '', location_description: '' });
  const [newApiKey, setNewApiKey] = useState(null);
  const [saving, setSaving] = useState(false);
  const [visitorPasses, setVisitorPasses] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState(null);
  const [passTotalCount, setPassTotalCount] = useState(0);
  const [openSessions, setOpenSessions] = useState([]);
  const [activeHolds, setActiveHolds] = useState([]);
  // Stuck tows — overstay violations whose partner dispatch exhausted its
  // retries (status='dispatch_failed'). These are invisible everywhere else
  // and never auto-retry, so the operator needs an explicit queue.
  const [stuckDispatch, setStuckDispatch] = useState([]);
  // SC211: Possible no parking pass violations
  const [noRegViolations, setNoRegViolations] = useState([]);
  const [noRegActing, setNoRegActing] = useState(null); // id of row being acted on
  // Bulk-select state for the No Registration Evidence Package surface.
  const [noRegSelectMode, setNoRegSelectMode] = useState(false);
  const [noRegSelected, setNoRegSelected] = useState(() => new Set());
  const [noRegBatching, setNoRegBatching] = useState(false);
  // Per-row expand toggle. Cross-camera sightings only load when expanded.
  const [noRegExpanded, setNoRegExpanded] = useState(() => new Set());
  // Snap-thumbnail lightbox state for the matched-vehicle frames.
  const [noRegSnapLightbox, setNoRegSnapLightbox] = useState(null);
  const nowTick = useNowTick();
  const tempQrRef = useRef(null);
  const permQrRef = useRef(null);

  const isTruckPlaza = property?.property_type === 'truck_plaza';

  // Top-of-page section filter. Lets the operator focus on one surface
  // (tracker, log, plates, cameras) instead of scrolling past everything.
  // Persists across reloads.
  const [sectionFilter, setSectionFilter] = useState(() => {
    try {
      // Default to 'log' so opening any property page lands directly on
      // the Parking Log — the surface everyone actually uses. Previously
      // defaulted to 'all' which dumped every section.
      const saved = localStorage.getItem('lotlogic_pd_section') || 'log';
      // Migration: 'tracker' no longer exists. Anyone with it cached
      // gets bumped to 'log' (the same content area, just renamed).
      if (saved === 'tracker') return 'log';
      return saved;
    } catch { return 'log'; }
  });
  useEffect(() => {
    try { localStorage.setItem('lotlogic_pd_section', sectionFilter); } catch {}
  }, [sectionFilter]);
  const showSection = (key) => sectionFilter === 'all' || sectionFilter === key;

  const loadAll = useCallback(async () => {
    if (!propertyId) return;
    setLoading(true);
    const [prop, pl, cam, ev, vp, pCount, os, ah] = await Promise.all([
      db.getProperty(propertyId),
      db.getResidentPlates(propertyId),
      db.getALPRCameras(propertyId),
      db.getRecentPlateEvents(propertyId, 50),
      db.getVisitorPasses(propertyId, { limit: 50 }),
      db.countVisitorPasses(propertyId),
      db.getOpenSessions(propertyId),
      db.getActiveHolds(propertyId),
    ]);
    setProperty(prop);
    setPlates(pl);
    setCameras(cam);
    setEvents(ev);
    setVisitorPasses(vp);
    setPassTotalCount(pCount);
    setOpenSessions(os);
    setActiveHolds(ah);
    setLoading(false);
  }, [propertyId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Possible No Registration Evidence Packages — bundled client-side from
  // plate_events (replacing the legacy no_registration_violations table flow
  // which was tied to the apartment SC211 pipeline). See bundleVehicleEvents
  // and filterEvidencePackages at module scope. Rule: lingering (≥3 reads
  // spanning ≥60s) AND no pass match AND no tow match, last 24h.
  const loadNoReg = useCallback(async () => {
    if (!propertyId || !supabase) return;
    try {
      const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
      const [eventsRes, pairsRes] = await Promise.all([
        supabase
          .from('plate_events')
          .select('id, camera_id, normalized_plate, plate_text, confidence, image_url, match_status, created_at, raw_data')
          .eq('property_id', propertyId)
          .gte('created_at', since)
          .order('created_at', { ascending: true })
          .limit(2000),
        // Operator-VERIFIED pairs only — heuristic-confidence pairs
        // would carry FP risk in this wider time window.
        supabase
          .from('inferred_plate_pairs')
          .select('plate_a, plate_b')
          .eq('property_id', propertyId)
          .not('verified_at', 'is', null)
          .is('dismissed_at', null),
      ]);
      if (eventsRes.error) throw eventsRes.error;
      const bundles = bundleVehicleEvents(eventsRes.data || [], pairsRes.data || []);
      const evidence = filterEvidencePackages(bundles)
        .sort((a, b) => new Date(b.first_seen_at) - new Date(a.first_seen_at));
      setNoRegViolations(evidence);
    } catch (err) {
      console.warn('vehicle-event bundling failed:', err.message);
    }
  }, [propertyId]);

  useEffect(() => { loadNoReg(); }, [loadNoReg]);

  // Stuck tows: overstay violations the dispatch pipeline gave up on
  // (status='dispatch_failed'). The partner was never paged and nothing
  // retries, so without this surface they sit invisible forever. Read-only
  // queue — the operator escalates manually; we don't auto-act from the UI.
  const loadStuckDispatch = useCallback(async () => {
    if (!propertyId) return;
    try {
      const rows = await db.getALPRViolations(propertyId, 'dispatch_failed');
      setStuckDispatch(rows || []);
    } catch (err) {
      console.warn('stuck-dispatch load failed:', err.message);
    }
  }, [propertyId]);

  useEffect(() => { loadStuckDispatch(); }, [loadStuckDispatch]);

  // Evidence packages are FYI — dismiss is purely local (hide from operator
  // view). No backend mutation, no notifications. Bundles also auto-clear
  // after 24h as plate_events age out of the bundling window.
  function handleNoRegDismiss(id) {
    setNoRegViolations(prev => prev.filter(r => r.id !== id));
    addToast('Hidden', 'success');
  }

  // Mark Towed was a legacy enforcement action that doesn't apply — these
  // are informational evidence packages, not tow-actionable violations.
  // Stub kept so the existing render block compiles; the button itself is
  // removed below.
  function handleNoRegTow() {}

  function dismissSelectedNoReg() {
    if (!noRegSelected.size) return;
    setNoRegBatching(true);
    const ids = new Set(noRegSelected);
    setNoRegViolations(prev => prev.filter(r => !ids.has(r.id)));
    addToast(`${ids.size} hidden`, 'success');
    setNoRegSelected(new Set());
    setNoRegSelectMode(false);
    setNoRegBatching(false);
  }
  function toggleNoRegSelect(id) {
    setNoRegSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function toggleNoRegExpand(id) {
    setNoRegExpanded(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }

  // Render the Temporary + Permanent QR codes once we know the property
  useEffect(() => {
    if (!property?.qr_code_id || typeof QRCode === 'undefined') return;
    const opts = { width: 320, margin: 1, errorCorrectionLevel: 'M', color: { dark: '#0f172a', light: '#ffffff' } };
    if (tempQrRef.current) QRCode.toCanvas(tempQrRef.current, `${window.location.origin}/temp/${property.qr_code_id}`, opts, err => { if (err) console.error('temp qr:', err); });
    if (permQrRef.current) QRCode.toCanvas(permQrRef.current, `${window.location.origin}/perm/${property.qr_code_id}`, opts, err => { if (err) console.error('perm qr:', err); });
  }, [property?.qr_code_id]);

  // ── Permanent plates (new /perm submissions land here) ──
  // Same live pattern as parking regs and plate events so the admin doesn't
  // have to reload after a resident submits the form.
  const refreshPlates = useCallback(async () => {
    if (!propertyId) return;
    const pl = await db.getResidentPlates(propertyId);
    setPlates(pl);
  }, [propertyId]);
  useIntervalFetch(refreshPlates, 20000, [refreshPlates]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshPlates, 200);
    const channel = supabase.channel('resident-plates-' + propertyId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'resident_plates',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshPlates]);
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible') refreshPlates(); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [refreshPlates]);

  // ── Visitor passes (new /visit submissions land here) ──
  const refreshVisitorPasses = useCallback(async () => {
    if (!propertyId) return;
    const [vp, count] = await Promise.all([
      db.getVisitorPasses(propertyId, { limit: 50 }),
      db.countVisitorPasses(propertyId),
    ]);
    setVisitorPasses(vp);
    setPassTotalCount(count);
  }, [propertyId]);
  useIntervalFetch(refreshVisitorPasses, 20000, [refreshVisitorPasses]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshVisitorPasses, 200);
    const channel = supabase.channel('visitor-passes-' + propertyId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'visitor_passes',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshVisitorPasses]);
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible') refreshVisitorPasses(); };
