<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Permanent Pass Request</title>
  <!-- reCAPTCHA v3. The site key is a PUBLIC value by design; security
       relies only on the server-side RECAPTCHA_SECRET_KEY. The placeholder
       below must be replaced with the real site key from the Google
       reCAPTCHA admin console. Keep Vercel env RECAPTCHA_SITE_KEY in sync.
       TODO: update this constant if you rotate the reCAPTCHA site. -->
  <meta name="recaptcha-site-key" content="6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE">
  <script src="https://www.google.com/recaptcha/api.js?render=6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500,50;9..144,700,50;9..144,800,80;9..144,900,80&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F2EAD8;
      --paper-2: #EADFC7;
      --paper-3: #DFD2B5;
      --ink: #1F1B14;
      --ink-2: #3D3528;
      --ink-3: #6F6450;
      --amber: #D97706;
      --amber-soft: #FBBF24;
      --terra: #C97A4A;
      --terra-deep: #9A5530;
      --status-ok: #4A7A48;
      --status-no: #B14535;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -.005em;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(31,27,20,0.025) 0 1.2px, transparent 1.5px),
        radial-gradient(circle at 78% 62%, rgba(31,27,20,0.02) 0 1px, transparent 1.5px),
        radial-gradient(circle at 42% 88%, rgba(31,27,20,0.018) 0 0.8px, transparent 1.2px);
      background-size: 240px 240px, 320px 320px, 200px 200px;
    }
    .card {
      background: var(--paper);
      border: 1.5px solid var(--ink);
      padding: 32px 28px;
      max-width: 440px;
      width: 100%;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo .shield { display: inline-flex; align-items: center; justify-content: center; transform: rotate(-6deg); margin-bottom: 12px; }
    .logo .shield svg { display: block; }
    .logo h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 36px;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
      text-transform: none;
    }
    .logo h1 span { color: var(--amber); font-style: italic; }
    .logo h1 .o-spot {
      display: inline-block;
      width: 0.5em; height: 0.5em;
      border: 3px solid currentColor;
      border-radius: 999px;
      margin: 0 0.04em;
      position: relative;
      top: -0.06em;
    }
    .property-name {
      text-align: center;
      font-size: 14px;
      color: var(--ink-3);
      margin-bottom: 28px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .property-name strong {
      display: block;
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 700, "SOFT" 80;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      margin-top: 6px;
      letter-spacing: -.01em;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      margin-bottom: 6px;
      margin-top: 16px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    label .required { color: var(--status-no); margin-left: 2px; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: var(--paper-2);
      border: 1.5px solid var(--ink);
      border-radius: 0;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: background 0.15s;
    }
    input:focus { background: var(--paper-3); }
    input::placeholder { color: var(--ink-3); }
    .plate-input {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 22px;
      text-align: center;
      font-family: 'DM Mono', ui-monospace, monospace;
      background: var(--amber-soft);
    }
    .plate-input:focus { background: var(--amber-soft); }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: var(--paper);
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { background: var(--terra-deep); border-color: var(--terra-deep); }
    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 14px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .error {
      background: rgba(177,69,53,0.12);
      border: 1.5px solid var(--status-no);
      color: var(--status-no);
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      border: 2px solid var(--status-ok);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: var(--status-ok); fill: none; stroke-width: 2.5; }
    .success-card h2 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 28px;
      letter-spacing: -.015em;
      color: var(--ink);
      margin-bottom: 10px;
      line-height: 1.05;
    }
    .success-card h2 em { font-style: italic; color: var(--amber); }
    .success-card p { font-size: 15px; color: var(--ink-2); line-height: 1.55; }
    .success-card p em {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-variation-settings: "opsz" 14, "wght" 600, "SOFT" 50;
    }
    .success-plate {
      display: inline-block;
      background: var(--amber-soft);
      border: 1.5px solid var(--ink);
      color: var(--ink);
      padding: 10px 22px;
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin: 18px 0;
    }
    .success-detail {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 8px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .pending-badge {
      display: inline-block;
      background: var(--paper-2);
      border: 1.5px solid var(--amber);
      color: var(--amber);
      padding: 8px 16px;
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 14px;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: var(--ink-3);
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-variation-settings: "opsz" 14, "wght" 500, "SOFT" 50;
      font-size: 16px;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 22px;
      color: var(--status-no);
      margin-bottom: 10px;
      letter-spacing: -.01em;
    }
    .not-found p { font-size: 14px; color: var(--ink-2); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading the form…</div>
  </div>

  <script>
    // Raw fetch against Supabase PostgREST — matches /park and /visit. The
    // supabase-js SDK opens a realtime WebSocket on createClient() that can
    // hang on strict networks and leave the page stuck on "Loading...".
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    // Backend base. reCAPTCHA-gated POST /resident_plates/register lives here —
    // the anon role can still read `properties` directly via PostgREST, but
    // writes to `resident_plates` now route through the backend so the token
    // can be verified server-side before any row is inserted.
    const BACKEND_URL = 'https://lotlogic-backend-production.up.railway.app';

    // reCAPTCHA v3 site key. Public by Google's design; see visit.html for
    // the rotation / env-sync note. Mirrored in the <meta> tag in <head>.
    const RECAPTCHA_SITE_KEY =
      (document.querySelector('meta[name=recaptcha-site-key]')?.content)
      || '6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE';

    async function getRecaptchaToken(action) {
      if (!window.grecaptcha || typeof grecaptcha.ready !== 'function') {
        return null;
      }
      return new Promise((resolve, reject) => {
        try {
          grecaptcha.ready(() => {
            grecaptcha.execute(RECAPTCHA_SITE_KEY, { action }).then(resolve, reject);
          });
        } catch (err) {
          reject(err);
        }
      });
    }

    async function backendRegister(path, payload, timeoutMs = 12000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(BACKEND_URL + path, {
          method: 'POST',
          signal: ctrl.signal,
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const detail = body && (body.detail || body.message);
          const err = new Error(typeof detail === 'string' ? detail : ('HTTP ' + res.status));
          err.status = res.status;
          err.detail = detail;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    function friendlyErrorMessage(err) {
      const msg = (err && err.message) || '';
      if (msg.startsWith('recaptcha:') || /automated-access check failed/i.test(msg)) {
        return 'Please retry — automated-access check failed.';
      }
      if (err && err.name === 'AbortError') {
        return 'Request timed out. Please try again.';
      }
      return msg || 'Something went wrong. Please try again.';
    }

    async function pgRest(path, init = {}, timeoutMs = 10000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
          ...init,
          signal: ctrl.signal,
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            ...(init.headers || {}),
          },
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const err = new Error((body && body.message) || ('HTTP ' + res.status));
          err.code = body && body.code;
          err.details = body && body.details;
          err.status = res.status;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    const app = document.getElementById('app');

    // QR code id comes from /resident.html/<qr> in the URL, but we also accept
    // ?qr=<id> so a shared / emailed link like /resident.html?qr=... still works.
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = (pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null)
      || new URLSearchParams(window.location.search).get('qr');

    let property = null;

    async function init() {
      if (!qrCodeId) {
        showNotFound('Invalid Link', 'This permanent pass link is not valid.');
        return;
      }
      try {
        const rows = await pgRest(`/properties?select=id,name,address,property_type&qr_code_id=eq.${encodeURIComponent(qrCodeId)}&limit=1`);
        const data = Array.isArray(rows) ? rows[0] : null;
        if (!data) {
          showNotFound('Property Not Found', 'This registration link is not valid or has expired.');
          return;
        }
        property = data;
        showForm();
      } catch (err) {
        console.error('init error:', err);
        showConnectionError(err);
      }
    }

    function showConnectionError(err) {
      const detail = err && (err.name === 'AbortError' ? 'Request timed out.' : (err.message || 'Network error.'));
      app.innerHTML = `
        <div class="logo"><div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div><h1>LotL<span>o</span>gic</h1></div>
        <div class="not-found">
          <h2>Can't reach our server.</h2>
          <p>${escapeHtml(detail)}</p>
          <p>Check your connection — then give it another go.</p>
          <button id="retryBtn" class="submit-btn" style="margin-top:18px">Try again →</button>
        </div>
      `;
      const btn = document.getElementById('retryBtn');
      if (btn) btn.addEventListener('click', () => {
        app.innerHTML = '<div class="loading-state">Loading the form…</div>';
        init();
      });
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div>
          <h1>LotL<span>o</span>gic</h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function showForm() {
      const isPlaza = property.property_type === 'truck_plaza';
      const headline = isPlaza ? 'Employee Plate Registration' : 'Permanent Pass Request';
      const submitLabel = isPlaza ? 'Register Employee Plate' : 'Request Permanent Pass';

      const extraFields = isPlaza ? `
          <label for="usdot" style="margin-top:14px;">USDOT Number <span style="color:#6b7280;font-size:12px;">(optional, 5-8 digits)</span></label>
          <input type="text" id="usdot" inputmode="numeric" pattern="\\d{5,8}" placeholder="1234567" maxlength="8" autocomplete="off">

          <label for="mc" style="margin-top:8px;">MC Number <span style="color:#6b7280;font-size:12px;">(optional, 5-8 digits)</span></label>
          <input type="text" id="mc" inputmode="numeric" pattern="\\d{5,8}" placeholder="567890" maxlength="8" autocomplete="off">

          <div style="font-size:12px;color:#9ca3af;margin-top:6px;margin-bottom:6px;">If your tractor has no license plate visible, enter your USDOT or MC number so our cameras can identify it.</div>
      ` : '';

      const plateLabel = isPlaza
        ? `License Plate <span style="color:#6b7280;font-size:12px;">(required unless you enter USDOT or MC)</span>`
        : `License Plate <span class="required">*</span>`;
      const plateAttr = isPlaza ? '' : 'required';

      app.innerHTML = `
        <div class="logo">
          <div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div>
          <h1>LotL<span>o</span>gic</h1>
        </div>
        <div class="property-name">
          ${escapeHtml(headline.toLowerCase())} at
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="regForm">
          <label for="holderName">Full Name <span class="required">*</span></label>
          <input type="text" id="holderName" placeholder="John Doe" required>

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="plate">${plateLabel}</label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" ${plateAttr} maxlength="10" autocomplete="off">

          <label for="backPlate">${isPlaza ? 'Trailer / Rear Plate' : 'Back Plate'} <span style="color:#6b7280;font-size:12px;">(if different)</span></label>
          <input type="text" id="backPlate" class="plate-input" placeholder="leave blank if same" maxlength="10" autocomplete="off">

          ${extraFields}

          <label for="vehicleType">Vehicle Type <span class="required">*</span></label>
          <select id="vehicleType" required>
            <option value="" disabled selected>Select vehicle type</option>
            <option value="car">Car</option>
            <option value="pickup">Pickup</option>
            <option value="semi">Semi / Truck</option>
            <option value="other">Other</option>
          </select>

          <button type="submit" class="submit-btn" id="submitBtn">${escapeHtml(submitLabel)}</button>
          <div class="hint">PENDING OWNER APPROVAL</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('regForm').addEventListener('submit', handleSubmit);
    }

    let submitting = false;
    async function handleSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering…';

      try {
        const holderName = document.getElementById('holderName').value.trim();
        const plateRaw = document.getElementById('plate').value.trim();
        const plateText = plateRaw.toUpperCase().replace(/[^A-Z0-9]/g, '');
        const backPlateRaw = (document.getElementById('backPlate')?.value || '').trim();
        const backPlateText = backPlateRaw ? backPlateRaw.toUpperCase().replace(/[^A-Z0-9]/g, '') : '';
        if (backPlateText && backPlateText.length < 2) throw new Error('Back plate must be at least 2 characters, or leave it blank.');
        const vehicleType = document.getElementById('vehicleType').value;
        const phone = document.getElementById('phone').value.trim();
        const isPlaza = property.property_type === 'truck_plaza';
        const usdotRaw = isPlaza ? ((document.getElementById('usdot') || {}).value || '').trim() : '';
        const mcRaw    = isPlaza ? ((document.getElementById('mc')    || {}).value || '').trim() : '';
        const usdot = /^\d{5,8}$/.test(usdotRaw) ? usdotRaw : null;
        const mc    = /^\d{5,8}$/.test(mcRaw)    ? mcRaw    : null;
        if (usdotRaw && !usdot) throw new Error('USDOT must be 5-8 digits.');
        if (mcRaw    && !mc)    throw new Error('MC number must be 5-8 digits.');

        let effectivePlate = plateText;
        if (!effectivePlate) {
          if (isPlaza && usdot)    effectivePlate = `DOT-${usdot}`;
          else if (isPlaza && mc)  effectivePlate = `MC-${mc}`;
          else                     throw new Error(isPlaza
            ? 'Enter a license plate or a USDOT / MC number.'
            : 'Please enter a valid license plate number.');
        } else if (effectivePlate.length < 2) {
          throw new Error('Please enter a valid license plate number.');
        }

        const recaptchaToken = await getRecaptchaToken('plate_register').catch(() => null);
        if (!recaptchaToken) {
          throw new Error('Please retry — automated-access check failed.');
        }

        try {
          await backendRegister('/resident_plates/register', {
            property_id: property.id,
            plate_text: effectivePlate,
            back_plate: backPlateText || null,
            holder_name: holderName,
            holder_role: property.property_type === 'truck_plaza' ? 'employee' : 'resident',
            vehicle_type: vehicleType || 'car',
            phone: phone,
            recaptcha_token: recaptchaToken,
            usdot_number: usdot,
            mc_number: mc,
          });
        } catch (error) {
          if (error.status === 409) {
            // Backend returns the friendly "already registered" message for
            // the (property, plate) uniqueness violation.
            throw new Error(error.detail || 'This license plate is already registered at this lot.');
          }
          throw error;
        }

        showSuccess(effectivePlate);
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(friendlyErrorMessage(err)) + '</div>';
        btn.disabled = false;
        btn.textContent = property.property_type === 'truck_plaza'
          ? 'Register Employee Plate'
          : 'Request Permanent Pass';
        submitting = false;
      }
    }

    function showSuccess(plate) {
      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>Request <em>submitted.</em></h2>
          <p>Your permanent pass for <em>${escapeHtml(property.name)}</em> is queued. The owner gets a ping next.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="pending-badge">Pending owner approval</div>
          <div class="success-detail">YOU'LL HEAR BACK ONCE IT'S APPROVED.</div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
