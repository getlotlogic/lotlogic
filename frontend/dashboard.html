// ── Violation Proof Modal — iMessage-style full-screen photo viewer ──
// Uses React Portal to render directly on document.body, bypassing all
// ancestor transforms that would trap position:fixed.
function ViolationProofModal({ violation, latestSnapshotUrl, latestDetections, cameraZones, matchedDetection, tunnelSnapshotUrl, onClose, onAutoGone }) {
  if (!violation) return null;
  const DET_COLORS = { car: '#3b82f6', truck: '#8b5cf6', bus: '#0d9488', motorcycle: '#ea580c', person: '#f59e0b' };
  const det = matchedDetection;

  // Live-poll the latest snapshot from this camera every 10s while modal is open
  const [liveUrl, setLiveUrl] = useState(null);
  const [liveDets, setLiveDets] = useState(latestDetections);
  const [liveTime, setLiveTime] = useState(null);

  useEffect(() => {
    if (!supabase || !violation.camera_id) return;
    let cancelled = false;
    const poll = async () => {
      try {
        // Try DB snapshot first, then tunnel fallback via shared utility
        const result = await resolveCameraSnapshot(violation.camera_id, tunnelSnapshotUrl);
        if (cancelled) return;
        if (result?.url) {
          setLiveUrl(result.url);
          if (result.capturedAt) {
            const ago = Math.round((Date.now() - new Date(result.capturedAt).getTime()) / 1000);
            setLiveTime(ago < 60 ? `${ago}s ago` : `${Math.round(ago / 60)}m ago`);
          }
        }
        // Update detections from DB snapshot if available
        if (result?.snap?.raw_detections) {
          const dets = (result.snap.raw_detections.detections || []).map((d, i) => ({
            id: `det_${i}`,
            type: d.class === 'person' ? 'person' : 'vehicle',
            bbox: d.bbox ? { x: d.bbox[0] * 100, y: d.bbox[1] * 100, w: (d.bbox[2] - d.bbox[0]) * 100, h: (d.bbox[3] - d.bbox[1]) * 100 } : null,
            confidence: d.conf,
            label: d.class,
          }));
          setLiveDets(dets);
        }
      } catch (e) { console.warn('Live snapshot poll error:', e); }
    };
    poll(); // fetch immediately on open
    const iv = setInterval(poll, 10000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [violation.camera_id]);

  // Check if vehicle is still in zone using live snapshot detections
  const vehicleStillInZone = useMemo(() =>
    isVehicleInZone(liveDets, violation.zone_id, cameraZones),
    [liveDets, violation.zone_id, cameraZones]
  );

  const isPending = violation.status === 'pending' || violation.status === 'alerted' || violation.status === 'acknowledged';
  const vehicleDeparted = vehicleStillInZone === false && isPending;

  // Close on Escape key
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', handler); document.body.style.overflow = ''; };
  }, [onClose]);

  function ProofImage({ src, label, detection, timestamp }) {
    const imgRef = useRef(null);
    const wrapRef = useRef(null);
    const [loaded, setLoaded] = useState(false);
    const [coverPos, setCoverPos] = useState(null);

    const calcCover = useCallback(() => {
      const img = imgRef.current;
      const wrap = wrapRef.current;
      if (!img || !wrap || !img.naturalWidth) return;
      const cW = wrap.clientWidth, cH = wrap.clientHeight;
      const nW = img.naturalWidth, nH = img.naturalHeight;
      const scale = Math.max(cW / nW, cH / nH);
      const rW = nW * scale, rH = nH * scale;
      setCoverPos({ offX: (cW - rW) / 2, offY: (cH - rH) / 2, rW, rH });
    }, []);

    const det = detection;
    const cls = det ? (det.class || 'vehicle').toLowerCase() : 'car';
    const color = DET_COLORS[cls] || '#3b82f6';

    return (
      <div style={{flex:'1 1 0', minWidth:0}}>
        <div style={{fontSize:10, fontWeight:600, color:'rgba(255,255,255,.5)', marginBottom:6, textTransform:'uppercase', letterSpacing:'.06em', display:'flex', alignItems:'center', gap:6}}>
          {label}
          {timestamp && <span style={{fontWeight:500, color:'rgba(255,255,255,.3)', textTransform:'none', letterSpacing:0, fontSize:10}}>{timestamp}</span>}
        </div>
        <div ref={wrapRef} style={{position:'relative', borderRadius:10, overflow:'hidden', background:'#111', aspectRatio:'16/9', maxHeight:'calc(100vh - 120px)'}}>
          {src ? (
            <>
              <img ref={imgRef} src={src} alt={label}
                onLoad={() => { setLoaded(true); setTimeout(calcCover, 0); }}
                style={{width:'100%', height:'100%', objectFit:'cover', display: loaded ? 'block' : 'none'}}
              />
              {!loaded && (
                <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
                  <div className="spin" style={{marginRight:8}} />
                  <span style={{color:'rgba(255,255,255,.3)', fontSize:12}}>Loading…</span>
                </div>
              )}
              {loaded && det && coverPos && (() => {
                const [x1, y1, x2, y2] = det.bbox;
                const px = coverPos.offX + x1 * coverPos.rW;
                const py = coverPos.offY + y1 * coverPos.rH;
                const pw = (x2 - x1) * coverPos.rW;
                const ph = (y2 - y1) * coverPos.rH;
                return (
                  <div style={{
                    position:'absolute', left:px, top:py, width:pw, height:ph,
                    border:`2px solid ${color}`, borderRadius:3,
                    pointerEvents:'none', boxSizing:'border-box',
                  }} />
                );
              })()}
            </>
          ) : (
            <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:8}}>
              {label === 'Current' && <div className="spin" />}
              <span style={{color:'rgba(255,255,255,.3)', fontSize:12}}>{label === 'Current' ? 'Loading live view\u2026' : 'No snapshot'}</span>
            </div>
          )}
        </div>
      </div>
    );
  }

  const initialTime = violation.detected_at ? new Date(violation.detected_at).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '';

  // Portal: render directly into document.body to escape all ancestor transforms
  return ReactDOM.createPortal(
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:9999,
      background:'rgba(0,0,0,.85)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
      display:'flex', alignItems:'flex-start', justifyContent:'center',
      paddingTop:24, overflow:'hidden',
      animation:'fadeIn .15s ease',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        width:'calc(100% - 48px)', maxWidth:960,
        cursor:'default',
      }}>
        {/* Close button — top right, iMessage style */}
        <button onClick={onClose} style={{
          position:'fixed', top:16, right:16, width:32, height:32, borderRadius:'50%',
          background:'rgba(255,255,255,.12)', border:'none', color:'#fff', fontSize:16,
          cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
          zIndex:10000,
        }}>✕</button>

        {/* Photos — front and center */}
        <div style={{display:'flex', gap:16, marginBottom:16}}>
          <ProofImage
            src={violation._detection_snapshot_url || violation._snapshot_url}
            label="Detection"
            detection={det}
            timestamp={initialTime}
          />
          <ProofImage
            src={liveUrl || latestSnapshotUrl || null}
            label="Current"
            detection={null}
            timestamp={liveTime || 'Live'}
          />
        </div>

        {/* Vehicle departed banner */}
        {(vehicleDeparted || violation.status === 'departed' || violation.departed_at) && (
          <div style={{
            background:'rgba(34,197,94,.15)', border:'1px solid rgba(34,197,94,.3)',
            borderRadius:10, padding:'12px 16px', marginBottom:12,
            display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
          }}>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:18}}>&#x2714;</span>
              <div>
                <div style={{color:'#4ade80', fontSize:14, fontWeight:700}}>Vehicle has left the zone</div>
                <div style={{color:'rgba(255,255,255,.5)', fontSize:12}}>
                  {violation.departed_at
                    ? `Confirmed gone at ${new Date(violation.departed_at).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}`
                    : 'Current camera image shows no vehicle in this zone'}
                </div>
              </div>
            </div>
            {onAutoGone && (
              <button onClick={() => onAutoGone(violation.id)} style={{
                background:'#22c55e', color:'#fff', border:'none', borderRadius:8,
                padding:'8px 16px', fontSize:13, fontWeight:700, cursor:'pointer',
                whiteSpace:'nowrap', flexShrink:0,
              }}>Dismiss</button>
            )}
          </div>
        )}

        {/* Info bar — subtle, below photos */}
        <div style={{display:'flex', gap:10, flexWrap:'wrap', alignItems:'center'}}>
          {violation.plate_text && (
            <span style={{background:'rgba(255,255,255,.1)', color:'#fff', borderRadius:6, padding:'5px 12px', fontSize:13, fontWeight:700, fontFamily:'Courier New, monospace', letterSpacing:'.04em'}}>
              {violation.plate_text}
            </span>
          )}
          {violation.vehicle_color && (
            <span style={{color:'rgba(255,255,255,.5)', fontSize:12, display:'flex', alignItems:'center', gap:5}}>
              <span style={{width:8, height:8, borderRadius:'50%', background:colorHex(violation.vehicle_color)}} />
              {violation.vehicle_color} {violation.vehicle_type || 'car'}
            </span>
          )}
          <span style={{color:'rgba(255,255,255,.35)', fontSize:12}}>
            {(violation.violation_type || 'unauthorized').replace(/_/g, ' ')}
          </span>
          {violation.zone_id && (
            <span style={{color:'rgba(255,255,255,.25)', fontSize:11}}>Zone {violation.zone_id}</span>
          )}
        </div>
      </div>
    </div>,
    document.body
  );
}

// ── Helper: point-in-polygon test (ray casting) ─────────────
function pointInPolygon(px, py, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ── Bounding box to zone polygon overlap (IoU-style) ──
// Calculates what percentage of bbox area overlaps with zone polygon bounding rect.
// This is the primary zone matching method — replaces centroid point-in-polygon.
function bboxZoneOverlap(bxMin, byMin, bxMax, byMax, zonePolygon) {
  // All coords in 0-100 scale
  const zxs = zonePolygon.map(p => p.x);
  const zys = zonePolygon.map(p => p.y);
  const zxMin = Math.min(...zxs), zxMax = Math.max(...zxs);
  const zyMin = Math.min(...zys), zyMax = Math.max(...zys);
  const overlapX = Math.max(0, Math.min(bxMax, zxMax) - Math.max(bxMin, zxMin));
  const overlapY = Math.max(0, Math.min(byMax, zyMax) - Math.max(byMin, zyMin));
  const bboxArea = (bxMax - bxMin) * (byMax - byMin);
  if (bboxArea <= 0) return 0;
  return (overlapX * overlapY) / bboxArea;
}

// ── Check if a vehicle is still present in a zone from latest detections ──
// Returns true if a vehicle bbox overlaps the zone by >= 30%, false if none, null if unknown.
function isVehicleInZone(latestDetections, zoneId, cameraZones) {
  // null/undefined detections = data not available (inconclusive)
  // empty array = camera working, no vehicles detected (departed)
  if (latestDetections == null || !zoneId || !cameraZones?.length) return null;
  const zone = cameraZones.find(z => z.zone_id === zoneId);
  if (!zone?.polygon?.length) return null;
  for (const d of latestDetections) {
    if (!d.bbox) continue;
    // bbox is {x, y, w, h} in 0-100 scale
    const overlap = bboxZoneOverlap(d.bbox.x, d.bbox.y, d.bbox.x + d.bbox.w, d.bbox.y + d.bbox.h, zone.polygon);
    if (overlap >= 0.30) return true;
  }
  return false;
}

// ── Match a violation to its specific detection ──────────────
// Uses IoU-style overlap to find which detection best matches the zone.
// Returns the detection with the highest overlap >= 30%, or null.
function matchViolationDetection(detections, zoneId, cameraZones) {
  if (!detections?.length || !zoneId || !cameraZones?.length) return null;
  const zone = cameraZones.find(z => z.zone_id === zoneId);
  if (!zone?.polygon?.length) return null;
  const dets = detections.filter(d => d.bbox && d.bbox.length === 4);
  let bestDet = null, bestOverlap = 0;
  for (const d of dets) {
    const [x1, y1, x2, y2] = d.bbox;
    // Convert from 0-1 normalized to 0-100 scale to match zone polygon
    const overlap = bboxZoneOverlap(x1 * 100, y1 * 100, x2 * 100, y2 * 100, zone.polygon);
    if (overlap > bestOverlap) {
      bestOverlap = overlap;
      bestDet = d;
    }
  }
  return bestOverlap >= 0.30 ? bestDet : null;
}

// ── Violation snapshot with AI bounding box ───────────────────
// Renders a snapshot image with a single bounding box around the
// violating vehicle only. Computes object-fit:cover offset so the
// box aligns perfectly with the actual image pixels.
function ViolationSnapshot({ src, detections, matchedDetection, style, onClick, maxHeight, borderRadius }) {
  const [loaded, setLoaded] = useState(false);
  const [failed, setFailed] = useState(false);
  const imgRef = useRef(null);
  const wrapRef = useRef(null);
  const [coverPos, setCoverPos] = useState(null);

  // Compute object-fit:cover offset so SVG bbox aligns with image
  const calcCover = useCallback(() => {
    const img = imgRef.current;
    const wrap = wrapRef.current;
    if (!img || !wrap || !img.naturalWidth || !img.naturalHeight) return;
    const cW = wrap.clientWidth, cH = wrap.clientHeight;
    const nW = img.naturalWidth, nH = img.naturalHeight;
    // object-fit:cover scales to fill, then centers the overflow
    const scale = Math.max(cW / nW, cH / nH);
    const rW = nW * scale, rH = nH * scale;
    const offX = (cW - rW) / 2, offY = (cH - rH) / 2;
    setCoverPos({ offX, offY, rW, rH });
  }, []);

  useEffect(() => {
    if (!src || loaded || failed) return;
    const t = setTimeout(() => setFailed(true), 10000);
    return () => clearTimeout(t);
  }, [src, loaded, failed]);

  if (!src || failed) return (
    <div style={{width:'100%', aspectRatio:'16/7', background:'var(--bg-inset)', display:'flex', alignItems:'center', justifyContent:'center', borderRadius: borderRadius || 8, ...(style || {})}}>
      <span style={{color:'var(--text-ghost)', fontSize:12, fontWeight:500}}>No photo</span>
    </div>
  );
  const singleDet = matchedDetection && matchedDetection.bbox?.length === 4 ? matchedDetection : null;
  const DET_COLORS = { car: '#3b82f6', truck: '#8b5cf6', bus: '#0d9488', motorcycle: '#ea580c', person: '#f59e0b' };
  return (
    <div style={{borderRadius: borderRadius || 8, overflow:'hidden', background:'var(--snapshot-bg)', ...(style || {})}}>
      <div ref={wrapRef} style={{position:'relative'}}>
        <img
          ref={imgRef}
          src={src} alt="Violation snapshot"
          onLoad={() => { setLoaded(true); setTimeout(calcCover, 0); }}
          onError={() => setFailed(true)}
          onClick={onClick}
          style={{width:'100%', display: loaded ? 'block' : 'none', maxHeight: maxHeight || 'none', objectFit:'cover', cursor: onClick ? 'zoom-in' : 'default'}}
        />
        {!loaded && (
          <div style={{width:'100%', aspectRatio:'16/9', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <div className="spin" style={{marginRight:8}} />
            <span style={{color:'var(--text-ghost)', fontSize:12}}>Loading…</span>
          </div>
        )}
        {loaded && singleDet && coverPos && (() => {
          const [x1, y1, x2, y2] = singleDet.bbox;
          const cls = (singleDet.class || 'vehicle').toLowerCase();
          const color = DET_COLORS[cls] || '#3b82f6';
          // Convert normalized bbox (0-1) to pixel positions within the scaled image
          const px = coverPos.offX + x1 * coverPos.rW;
          const py = coverPos.offY + y1 * coverPos.rH;
          const pw = (x2 - x1) * coverPos.rW;
          const ph = (y2 - y1) * coverPos.rH;
          return (
            <div style={{
              position:'absolute', left:px, top:py, width:pw, height:ph,
              border:`2px solid ${color}`, borderRadius:3,
              pointerEvents:'none', boxSizing:'border-box',
            }} />
          );
        })()}
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState(() => localStorage.getItem('lotlogic_email') || '');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [resetSent, setResetSent] = useState(false);

  async function submit(e) {
    e.preventDefault();
    const trimmed = email.trim();
    if (!trimmed || !password) return;
    setLoading(true); setError(''); setResetSent(false);
    try {
      const res = await authLogin(trimmed, password);
      localStorage.setItem('lotlogic_email', trimmed);
      const base = res.subject || {};
      const role = base.type === 'partner' ? 'partner' : 'owner';
      onLogin({
        id: base.id,
        email: base.email || trimmed,
        business_name: base.display_name,
        company_name: role === 'partner' ? base.display_name : undefined,
        _role: role,
        _token: res.token,
        _expires_in: res.expires_in,
      });
    } catch (err) {
      if (err.status === 401) setError('Invalid email or password.');
      else if (err.status === 403) setError(err.message || 'Password not set. Use "Email me a setup link" below.');
      else setError(err.message || "Can't connect right now. Check your connection and try again.");
    } finally { setLoading(false); }
  }

  async function sendResetLink() {
    const trimmed = email.trim();
    if (!trimmed) { setError('Enter your email first.'); return; }
    setError('');
    try {
      await authRequestPasswordReset(trimmed);
      setResetSent(true);
    } catch {
      // Endpoint is intentionally non-revealing — show the same success message.
      setResetSent(true);
    }
  }

  return (
    <div className="login-page" role="main">
      <div className="login-box">
        <div className="login-logo" aria-hidden="true">
          <div className="login-shield">LL</div>
          <div className="login-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="login-tagline">AI-powered parking enforcement — sign in to get started</div>
        <form onSubmit={submit} aria-label="Sign in">
          <label className="field-label" htmlFor="login-email">Your email</label>
          <input
            id="login-email"
            className="field-input"
            type="email"
            placeholder="you@company.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            autoCapitalize="none"
            autoCorrect="off"
            required
            autoFocus
            autoComplete="username"
            aria-required="true"
          />
          <label className="field-label" htmlFor="login-password" style={{marginTop:12}}>Password</label>
          <input
            id="login-password"
            className="field-input"
            type="password"
            placeholder="••••••••"
            value={password}
            onChange={e => setPassword(e.target.value)}
            required
            autoComplete="current-password"
            aria-required="true"
          />
          <button className="login-btn" type="submit" disabled={loading || !email || !password} aria-busy={loading}>
            {loading ? 'Signing in…' : 'Sign In →'}
          </button>
        </form>
        {error && <div className="login-error" role="alert">{error}</div>}
        {resetSent && (
          <div className="login-note" role="status" style={{marginTop:12,fontSize:13,color:'var(--text-muted)'}}>
            If an account exists for that email, we've sent a setup link. Check your inbox.
          </div>
        )}
        <button
          type="button"
          onClick={sendResetLink}
          style={{background:'none',border:0,color:'var(--text-muted)',fontSize:13,marginTop:12,cursor:'pointer',textDecoration:'underline'}}
        >
          Forgot password? Email me a setup link.
        </button>
      </div>
    </div>
  );
}

// ── Jobs tab (current violations) ─────────────────────────────
function JobsPage({ lots, violations, alprViolations = [], loading, lotStates, onAction, isOwner, deepLinkViolationId, user }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));
  const [selectedViol, setSelectedViol] = useState(null);

  const [acting, setActing] = useState(null);
  const actingRef = useRef(false); // Guard against double-tap race condition

  const { addToast } = useToast();

  // Auto-select violation from SMS deep link
  useEffect(() => {
    if (deepLinkViolationId && violations.length && !selectedViol) {
      const match = violations.find(v => v.id === deepLinkViolationId);
      if (match) {
        setSelectedViol(match);
        // Clear URL path so refresh doesn't re-trigger
        window.history.replaceState(null, '', '/');
      }
    }
  }, [deepLinkViolationId, violations, selectedViol]);

  // Map ALPR parking pass violations into a format compatible with violation cards
  const mappedAlpr = alprViolations.map(av => ({
    ...av,
    _isALPR: true,
    detected_at: av.created_at,
    status: av.status === 'pending' ? 'alerted' : av.status === 'dispatched' ? 'acknowledged' : 'resolved',
    _origStatus: av.status,
    lot_id: null,
    _lot_name: av.properties?.name || 'Unknown Property',
    _snapshot_url: av.plate_events?.image_url || null,
    _detections: null,
    plate_text: av.plate_text,
    vehicle_color: null, vehicle_type: null, vehicle_make: null, vehicle_model: null,
    violation_type: 'parking_pass',
    zone_id: null, space_number: null, camera_id: null,
    confidence: av.plate_events?.confidence || null,
    our_revenue: 0, gross_revenue: 0,
    sms_sent_at: null, sms_delivered: null, reminder_sent_at: null,
    resolved_at: av.resolved_at || null, departed_at: null, cleared_at: null,
    action_taken: av._origStatus === 'dispatched' ? 'tow' : av._origStatus === 'resolved' ? 'dismissed' : null,
  }));
  const allViolations = [...violations, ...mappedAlpr];

  // Active jobs = only actionable violations (alerted/acknowledged)
  // Departed/pending are excluded — departed goes to "Handled Today"
  const active = allViolations
    .filter(v => ['alerted', 'acknowledged'].includes(v.status))
    .sort((a, b) => new Date(a.detected_at) - new Date(b.detected_at));

  // Recent = resolved/cleared today (calendar day)
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCutoff = todayStart.getTime();
  const recent = allViolations
    .filter(v => ['resolved', 'cleared', 'departed'].includes(v.status) && new Date(v.resolved_at || v.departed_at || v.cleared_at || v.detected_at).getTime() >= todayCutoff)
    .sort((a, b) => new Date(b.resolved_at || b.departed_at || b.cleared_at || b.detected_at) - new Date(a.resolved_at || a.departed_at || a.cleared_at || a.detected_at));

  // KPIs
  const avgWaitMins = active.length > 0
    ? Math.round(active.reduce((s, v) => s + (Date.now() - new Date(v.detected_at)) / 60000, 0) / active.length)
    : 0;
  const todayResolved = recent.length;
  const todayRevenue = recent.reduce((s, v) => s + (v.our_revenue || 0), 0);

  // Build camera_id → zones lookup for matching detections to violations
  const allCams = Object.values(lotStates).flatMap(s => s?.cameras || []);
  const camZonesMap = useMemo(() => {
    const m = {};
    allCams.forEach(c => { if (c.zones?.length) m[c.camera_id] = c.zones; });
    return m;
  }, [lotStates]);

  // Live detection counts from lot states
  const liveVehicles = allCams.reduce((s, c) => s + (c.latest_snapshot?.vehicles_detected || c.latest_snapshot?.vehicle_count || 0), 0);
  const livePeople = allCams.reduce((s, c) => s + (c.latest_snapshot?.people_detected || c.latest_snapshot?.person_count || c.latest_snapshot?.humans_detected || 0), 0);
  // AI detection quality metrics
  const totalViols = [...active, ...recent];
  const violsWithColor = totalViols.filter(v => displayColor(v.vehicle_color));
  const colorDetRate = totalViols.length > 0 ? Math.round((violsWithColor.length / totalViols.length) * 100) : null;
  const violsWithType = totalViols.filter(v => v.vehicle_type && v.vehicle_type !== 'car');
  const typeDetRate = totalViols.length > 0 ? Math.round((violsWithType.length / totalViols.length) * 100) : null;
  const aiHealthScore = totalViols.length > 0
    ? Math.round(((colorDetRate || 0) * 0.6 + (typeDetRate || 0) * 0.4))
    : null;

  const actionLabels = { boot: 'Boot', tow: 'Tow', dismissed: 'Dismiss', already_gone: 'Already Gone', no_action: 'No Action' };
  const actionColors = { boot: '#fbbf24', tow: '#ef4444', dismissed: '#a78bfa', already_gone: '#6b7280', no_action: '#6b7280' };

  // Status badge config for dedup state machine
  const statusBadge = {
    alerted:      { label: 'Active',       color: '#ef4444', bg: 'rgba(239,68,68,.12)', icon: '🔴' },
    pending:      { label: 'Active',       color: '#ef4444', bg: 'rgba(239,68,68,.12)', icon: '🔴' },
    acknowledged: { label: 'Acknowledged', color: '#f59e0b', bg: 'rgba(245,158,11,.12)', icon: '🟡' },
    cleared:      { label: 'Cleared',      color: '#4ade80', bg: 'rgba(74,222,128,.12)', icon: '✅' },
    resolved:     { label: 'Resolved',     color: '#4ade80', bg: 'rgba(74,222,128,.12)', icon: '✅' },
    departed:     { label: 'Cancelled — Vehicle Left', color: '#6b7280', bg: 'rgba(107,114,128,.12)', icon: '🚫' },
  };

  const [acking, setAcking] = useState(null);

  async function handleAcknowledge(violId) {
    if (actingRef.current) return;
    actingRef.current = true;
    setAcking(violId);
    try {
      await db.acknowledgeViolation(violId);
      addToast('Acknowledged — no more alerts until zone clears', 'success');
      if (onAction) onAction();
    } catch (e) {
      addToast('Acknowledge failed: ' + (e.message || 'Unknown error'), 'error');
    } finally { setAcking(null); actingRef.current = false; }
  }

  async function handleAction(violId, action) {
    // Guard against double-tap: if already processing any action, bail out
    if (actingRef.current) return;
    actingRef.current = true;
    setSelectedViol(null);
    // Verify violation belongs to this user's lots before executing
    const viol = violations.find(v => v.id === violId);
    if (!viol || !lots.some(l => l.id === viol.lot_id)) {
      addToast('Action denied: violation not in your lots', 'error');
      actingRef.current = false;
      return;
    }
    setActing(violId);
    try {
      const extra = {};
      // Pass fee schedule for revenue calculation on boot/tow
      if ((action === 'boot' || action === 'tow') && user) {
        extra._performerEmail = user.email;
        if (user._role === 'partner') {
          extra._partner = { id: user.id, boot_fee: user.boot_fee, tow_fee: user.tow_fee, revenue_share: user.revenue_share };
        } else {
          // Owner acting directly — record gross revenue with 100% to LotLogic (no partner split)
          extra._ownerFees = { boot_fee: 75, tow_fee: 250 };
          extra._ownerId = user.id;
        }
      }
      const result = await db.recordAction(violId, action, extra);
      if (result && result.success !== false) {
        addToast(`${actionLabels[action] || action} recorded`, 'success');
      }
      if (onAction) onAction();
    } catch (e) {
      console.error('handleAction error:', e);
      const msg = e.status === 409 ? 'Already resolved' : (e.message || 'Unknown error');
      addToast(`Action failed: ${msg}`, 'error');
      if (onAction) onAction();
    } finally { setActing(null); actingRef.current = false; }
  }

  function requestAction(violId, action) {
    haptic(action === 'tow' ? 'heavy' : action === 'boot' ? 'medium' : 'light');
    handleAction(violId, action);
  }

  // Smart departure detection: require 3 consecutive empty snapshots before flagging
  // Flags as "departed" (stays on dashboard) — does NOT auto-resolve
  const departedFlaggedRef = useRef(new Set());     // violations already flagged as departed
  const emptyStreakRef = useRef({});                 // violationId -> { count, lastSnapshotTime }
  const DEPARTED_STREAK = 3;                        // consecutive empty snapshots required (~1.5min at 30s intervals)

  // Auto-recover false departures: if backend marked departed but car is still in zone, re-alert
  const recoveredRef = useRef(new Set());
  useEffect(() => {
    if (!allCams.length) return;
    for (const v of violations) {
      if (v.status !== 'departed' || !v.zone_id || recoveredRef.current.has(v.id)) continue;
      const cam = allCams.find(c => c.camera_id === v.camera_id);
      if (!cam?.latest_snapshot) continue;
      const dets = cam.latest_snapshot.detections || [];
      const zones = camZonesMap[v.camera_id] || [];
      const stillThere = isVehicleInZone(dets, v.zone_id, zones);
      if (stillThere === true) {
        recoveredRef.current.add(v.id);
        departedFlaggedRef.current.delete(v.id);
        delete emptyStreakRef.current[v.id];
        if (supabase) {
          supabase.from('violations').update({
            status: 'alerted', departed_at: null, empty_streak: 0
          }).eq('id', v.id).then(() => {
            if (window.LOTLOGIC_DEBUG) console.log(`Auto-recovered false departure: ${v.id}, zone ${v.zone_id}`);
            if (onAction) onAction();
          });
        }
      }
    }
    // Clean recovered set for violations no longer in list
    const allIds = new Set(violations.map(v => v.id));
    for (const id of recoveredRef.current) { if (!allIds.has(id)) recoveredRef.current.delete(id); }
  }, [violations, allCams, camZonesMap]);

  useEffect(() => {
    if (!active.length || !allCams.length) return;
    for (const v of active) {
      // Skip if already flagged as departed (in DB or locally)
      if (v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id)) continue;

      const cam = allCams.find(c => c.camera_id === v.camera_id);
      if (!cam?.latest_snapshot) continue;

      const dets = cam.latest_snapshot.detections || [];
      const zones = camZonesMap[v.camera_id] || [];
      const snapTime = cam.latest_snapshot.captured_at || null;
      const gone = isVehicleInZone(dets, v.zone_id, zones);

      const streak = emptyStreakRef.current[v.id] || { count: 0, lastSnapshotTime: null };

      if (gone === false) {
        // Only count if this is a different snapshot than the last one we checked
        if (snapTime && snapTime !== streak.lastSnapshotTime) {
          streak.count++;
          streak.lastSnapshotTime = snapTime;
        }
        emptyStreakRef.current[v.id] = streak;

        if (streak.count >= DEPARTED_STREAK) {
          departedFlaggedRef.current.add(v.id);
          if (window.LOTLOGIC_DEBUG) console.log(`Vehicle departed — violation ${v.id}, zone ${v.zone_id}, ${streak.count} consecutive empty snapshots`);
          db.markDeparted(v.id, streak.count);
        }
      } else if (gone === true) {
        // Vehicle confirmed in zone — reset streak
        emptyStreakRef.current[v.id] = { count: 0, lastSnapshotTime: null };
      }
      // gone === null (inconclusive / missing data) — don't reset streak, just skip
    }
    // Clean up streaks for violations no longer active
    const activeIds = new Set(active.map(v => v.id));
    for (const id of Object.keys(emptyStreakRef.current)) {
      if (!activeIds.has(id)) delete emptyStreakRef.current[id];
    }
  }, [active, allCams, camZonesMap]);

  // Auto-dismiss stale violations:
  // 1. Violations older than 2h with no acknowledgment → auto-depart
  // 2. Violations already flagged as departed → auto-resolve after 30s grace period
  const autoDismissedRef = useRef(new Set());
  const STALE_AGE_MS = 2 * 60 * 60 * 1000; // 2 hours
  const DEPARTED_AUTO_DISMISS_MS = 30 * 1000; // 30s after departure confirmed
  const departedTimersRef = useRef({}); // violId -> timestamp when departure was first flagged

  useEffect(() => {
    if (!active.length) return;
    const now = Date.now();
    for (const v of active) {
      if (autoDismissedRef.current.has(v.id)) continue;

      // Age-based: alerted for 2+ hours with no acknowledgment
      if (v.status === 'alerted' && !v.acknowledged_at) {
        const age = now - new Date(v.detected_at).getTime();
        if (age > STALE_AGE_MS) {
          autoDismissedRef.current.add(v.id);
          if (window.LOTLOGIC_DEBUG) console.log(`Auto-dismissing stale violation ${v.id}: ${Math.round(age / 60000)}m old, no acknowledgment`);
          db.markDeparted(v.id, 0);
          continue;
        }
      }

      // Departure-confirmed: auto-resolve 30s after departure flagged
      const isDeparted = v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id);
      if (isDeparted) {
        if (!departedTimersRef.current[v.id]) {
          departedTimersRef.current[v.id] = now;
        } else if (now - departedTimersRef.current[v.id] > DEPARTED_AUTO_DISMISS_MS) {
          autoDismissedRef.current.add(v.id);
          delete departedTimersRef.current[v.id];
          if (window.LOTLOGIC_DEBUG) console.log(`Auto-resolving departed violation ${v.id} after grace period`);
          db.recordAction(v.id, 'already_gone', {}).catch(e => console.warn('Auto-dismiss failed:', e));
          continue;
        }
      } else {
        delete departedTimersRef.current[v.id]; // Reset if vehicle came back
      }
    }
    // Cleanup refs for removed violations
    const activeIds = new Set(active.map(v => v.id));
    for (const id of autoDismissedRef.current) { if (!activeIds.has(id)) autoDismissedRef.current.delete(id); }
    for (const id of Object.keys(departedTimersRef.current)) { if (!activeIds.has(id)) delete departedTimersRef.current[id]; }
  }, [active]);

  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all'); // all | urgent

  // Filter active jobs
  const filteredActive = active.filter(v => {
    if (filter === 'urgent') { const t = elapsed(v.detected_at); return t?.val >= 30; }
    return true;
  }).filter(v => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return (v.vehicle_color?.toLowerCase().includes(q)) ||
      (v.vehicle_type?.toLowerCase().includes(q)) ||
      (v.vehicle_make?.toLowerCase().includes(q)) ||
      (v.vehicle_model?.toLowerCase().includes(q)) ||
      (lotMap[v.lot_id]?.name?.toLowerCase().includes(q)) ||
      (v.zone_id?.toLowerCase().includes(q));
  });

  if (loading && violations.length === 0) {
    return <div className="page-enter"><SkeletonKPIs /><SkeletonCards count={4} /></div>;
  }

  return (
    <div className="page-enter">
      {/* KPI bar */}
      <div className="kpi-bar">
        <div className="kpi-card">
          <div className={`kpi-val ${active.length > 0 ? 'red' : 'green'}`}>{active.length}</div>
          <div className="kpi-label">Active</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${avgWaitMins >= 45 ? 'red' : 'blue'}`}>{avgWaitMins}<span style={{fontSize:12}}>m</span></div>
          <div className="kpi-label">Avg Wait</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{todayResolved}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{fmtMoney(todayRevenue)}</div>
          <div className="kpi-label">Earned</div>
        </div>
      </div>

      {/* Live detection bar */}
      {(liveVehicles > 0 || livePeople > 0) && (
        <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap'}}>
          <div className="cam-det-chip" style={{padding:'5px 10px'}}>
            <span className="det-dot vehicles" /> {liveVehicles} vehicle{liveVehicles !== 1 ? 's' : ''} tracked
          </div>
          <div className="cam-det-chip" style={{padding:'5px 10px'}}>
            <span className="det-dot people" /> {livePeople} {livePeople === 1 ? 'person' : 'people'} tracked
          </div>
          {colorDetRate != null && (
            <div className="cam-det-chip" style={{padding:'5px 10px', background: colorDetRate >= 60 ? 'rgba(74,222,128,.08)' : colorDetRate >= 30 ? 'rgba(251,191,36,.08)' : 'rgba(239,68,68,.08)', border: `1px solid ${colorDetRate >= 60 ? 'rgba(74,222,128,.2)' : colorDetRate >= 30 ? 'rgba(251,191,36,.2)' : 'rgba(239,68,68,.2)'}`}}>
              <span style={{width:7, height:7, borderRadius:'50%', background: colorDetRate >= 60 ? '#4ade80' : colorDetRate >= 30 ? '#fbbf24' : '#ef4444', flexShrink:0}} /> {colorDetRate}% color detected
            </div>
          )}
        </div>
      )}

      {/* AI Detection Health banner - only show for owners when quality is poor */}
      {isOwner && aiHealthScore != null && aiHealthScore < 50 && (
        <div style={{
          background:'rgba(245,158,11,.06)', border:'1px solid rgba(245,158,11,.2)', borderRadius:10,
          padding:'10px 14px', marginBottom:14, display:'flex', alignItems:'flex-start', gap:10
        }}>
          <div style={{fontSize:16, flexShrink:0, marginTop:1}}>⚠</div>
          <div>
            <div style={{fontSize:13, fontWeight:700, color:'#f59e0b', marginBottom:2}}>AI Detection Quality: {aiHealthScore}%</div>
            <div style={{fontSize:11, color:'#92400e', lineHeight:1.4}}>
              {(colorDetRate || 0) < 30 && 'Color detection is low — may improve with higher resolution snapshots. '}
              {violsWithType.length === 0 && 'Vehicle types show as "car" — finer classification (sedan/SUV/truck) may improve with higher resolution. '}
            </div>
          </div>
        </div>
      )}

      {/* Search and filter */}
      {active.length > 0 && (
        <div className="search-bar">
          <div className="search-wrap">
            <SearchIcon />
            <input className="search-input" placeholder="Search color, type, lot…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <button className={`filter-chip ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All</button>
          <button className={`filter-chip ${filter === 'urgent' ? 'active' : ''}`} onClick={() => setFilter('urgent')}>Urgent</button>
        </div>
      )}

      {/* Active jobs */}
      <div className="section-header">
        <div className="section-title">Open Jobs</div>
        <div className="section-count">{filteredActive.length} active</div>
      </div>

      {filteredActive.length === 0 && active.length > 0 ? (
        <div className="empty-state" style={{marginBottom: 28, padding:'30px 20px'}}>
          <div className="empty-title">No matches</div>
          <div className="empty-body">Try adjusting your search or filter</div>
        </div>
      ) : filteredActive.length === 0 ? (
        <div className="empty-state" style={{marginBottom: 28}}>
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(74,222,128,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>✓</div>
          <div className="empty-title">All clear</div>
          <div className="empty-body">No violations pending at your lots right now</div>
        </div>
      ) : (
        filteredActive.map((v, idx) => {
          const lot = lotMap[v.lot_id];
          const timer = elapsed(v.detected_at);
          const urgent = timer?.val >= 45;
          const isActing = acting === v.id;
          const anyActing = acting !== null; // Disable all buttons when any action in flight
          const typeClass = v.violation_type?.toLowerCase().includes('unauthorized')
            ? 'unauthorized' : v.violation_type?.toLowerCase().includes('overtime') ? 'overtime' : 'default';
          return (
            <div key={v.id} className={`job-card card-animated ${urgent ? 'urgent' : ''} ${(v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id)) ? 'departed' : ''}`} style={{position:'relative'}}>
              {/* Owner delete X */}
              {isOwner && (
                <button
                  onClick={async (e) => {
                    e.stopPropagation();
                    try {
                      await db.deleteViolation(v.id);
                      addToast('Job deleted', 'success');
                      if (onAction) onAction();
                    } catch (err) {
                      addToast('Failed to delete: ' + (err.message || 'Unknown error'), 'error');
                    }
                  }}
                  style={{
                    position:'absolute', top:8, right:8, zIndex:5, width:28, height:28, borderRadius:'50%',
                    background:'rgba(0,0,0,.5)', backdropFilter:'blur(4px)', border:'none', cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center', padding:0,
                  }}
                  aria-label="Delete job"
                  title="Delete job"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              )}
              {urgent && (
                <div className="job-urgent-bar">
                  <span style={{display:'inline-block', width:6, height:6, borderRadius:'50%', background:'#fff', animation:'pulse-dot 1.5s infinite'}} />
                  Needs attention — waiting {timer.val} {timer.unit}
                </div>
              )}
              {/* Snapshot photo with single bounding box on violating vehicle */}
              <ViolationSnapshot src={v._snapshot_url} detections={v._detections} matchedDetection={matchViolationDetection(v._detections, v.zone_id, camZonesMap[v.camera_id])} maxHeight={220} borderRadius={0} onClick={v._snapshot_url ? () => setSelectedViol(v) : undefined} />
              {/* Live vehicle presence indicator */}
              {(() => {
                const isDeparted = v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id);
                const streak = emptyStreakRef.current[v.id]?.count || 0;
                const verifying = !isDeparted && streak > 0;

                if (isDeparted) {
                  const departedAgo = v.departed_at
                    ? Math.round((Date.now() - new Date(v.departed_at).getTime()) / 60000)
                    : null;
                  return (
                    <div style={{
                      background:'rgba(34,197,94,.15)', borderBottom:'1px solid rgba(34,197,94,.3)',
                      padding:'8px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:8,
                    }}>
                      <span style={{color:'#4ade80', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:6}}>
                        <span style={{fontSize:14}}>&#x2714;</span>
                        Vehicle left{departedAgo != null && departedAgo > 0 ? ` ${departedAgo}m ago` : ''}
                      </span>
                      <button onClick={(e) => { e.stopPropagation(); requestAction(v.id, 'already_gone'); }} disabled={anyActing} style={{
                        background:'rgba(34,197,94,.2)', color:'#4ade80', border:'1px solid rgba(34,197,94,.3)', borderRadius:6,
                        padding:'4px 12px', fontSize:11, fontWeight:700, cursor: anyActing ? 'not-allowed' : 'pointer',
                      }}>Dismiss</button>
                    </div>
                  );
                }
                if (verifying) {
                  const pct = Math.min(100, Math.round((streak / DEPARTED_STREAK) * 100));
                  return (
                    <div style={{
                      background:'rgba(251,191,36,.08)', borderBottom:'1px solid rgba(251,191,36,.2)',
                      padding:'6px 16px', display:'flex', flexDirection:'column', gap:4,
                    }}>
                      <span style={{color:'#fbbf24', fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:6}}>
                        <div className="spin" style={{width:10, height:10, borderWidth:2}} />
                        Checking if vehicle left ({streak}/{DEPARTED_STREAK})
                      </span>
                      <div style={{height:2, borderRadius:2, background:'rgba(251,191,36,.15)', overflow:'hidden'}}>
                        <div style={{height:'100%', width:`${pct}%`, background:'#fbbf24', borderRadius:2, transition:'width .3s ease'}} />
                      </div>
                    </div>
                  );
                }
                // Live presence check — show vehicle still detected in zone
                const cam = allCams.find(c => c.camera_id === v.camera_id);
                const presence = cam?.latest_snapshot ? isVehicleInZone(
                  cam.latest_snapshot.detections || [],
                  v.zone_id,
                  camZonesMap[v.camera_id] || []
                ) : null;
                const snapAge = cam?.latest_snapshot?.captured_at
                  ? Math.round((Date.now() - new Date(cam.latest_snapshot.captured_at).getTime()) / 1000)
                  : null;
                const snapAgeLabel = snapAge != null
                  ? (snapAge < 60 ? `${snapAge}s ago` : `${Math.round(snapAge / 60)}m ago`)
                  : null;
                if (presence === true) {
                  return (
                    <div style={{
                      background:'rgba(239,68,68,.06)', borderBottom:'1px solid rgba(239,68,68,.15)',
                      padding:'6px 16px', display:'flex', alignItems:'center', gap:6,
                    }}>
                      <span style={{width:6, height:6, borderRadius:'50%', background:'#ef4444', flexShrink:0, animation:'pulse-dot 1.5s infinite'}} />
                      <span style={{color:'rgba(239,68,68,.8)', fontSize:11, fontWeight:600}}>Vehicle still in zone</span>
                      {snapAgeLabel && <span style={{color:'rgba(255,255,255,.3)', fontSize:10, marginLeft:'auto'}}>{snapAgeLabel}</span>}
                    </div>
                  );
                }
                if (presence === false) {
                  return (
                    <div style={{
                      background:'rgba(251,191,36,.06)', borderBottom:'1px solid rgba(251,191,36,.15)',
                      padding:'6px 16px', display:'flex', alignItems:'center', gap:6,
                    }}>
                      <div className="spin" style={{width:8, height:8, borderWidth:2, flexShrink:0}} />
                      <span style={{color:'rgba(251,191,36,.8)', fontSize:11, fontWeight:600}}>Vehicle not detected — verifying...</span>
                      {snapAgeLabel && <span style={{color:'rgba(255,255,255,.3)', fontSize:10, marginLeft:'auto'}}>{snapAgeLabel}</span>}
                    </div>
                  );
                }
                return null;
              })()}
              {/* Vehicle summary bar — quick-glance info for the tow operator */}
              <div className="vehicle-summary">
                {v._isALPR ? (
                  <span className="vs-item">
                    <span style={{fontWeight:800, letterSpacing:'.04em', fontFamily:'SFMono-Regular, Consolas, monospace'}}>{v.plate_text}</span>
                    <span style={{color:'var(--text-muted)', marginLeft:6}}>Unregistered plate</span>
                  </span>
                ) : (
                  <span className="vs-item">
                    {displayColor(v.vehicle_color) ? (
                      <>
                        <span style={{width:10, height:10, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(128,128,128,.3)', flexShrink:0}} />
                        <span style={{textTransform:'capitalize'}}>{[v.vehicle_color, v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : null, v.vehicle_make, v.vehicle_model].filter(Boolean).join(' ')}</span>
                      </>
                    ) : (
                      <span style={{color:'var(--text-muted)', textTransform:'capitalize'}}>{[v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : 'Vehicle', v.vehicle_make, v.vehicle_model].filter(Boolean).join(' ')}</span>
                    )}
                  </span>
                )}
                {v.zone_id && <><span className="vs-divider" /><span className="vs-item" style={{color:'var(--text-muted)'}}>Zone {v.zone_id}</span></>}
                {v.space_number && <><span className="vs-divider" /><span className="vs-item" style={{color:'var(--text-muted)'}}>#{v.space_number}</span></>}
              </div>
              {/* Lot name + timer row */}
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 16px'}}>
                <div style={{flex:1, minWidth:0}}>
                  <div className="job-lot-name" style={{fontSize:14, display:'flex', alignItems:'center', gap:8}}>
                    {v._isALPR ? v._lot_name : (lot?.name || 'Unknown Lot')}
                    {v._isALPR && <span style={{fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:6, background:'rgba(167,139,250,.15)', color:'#a78bfa', whiteSpace:'nowrap'}}>PARKING PASS</span>}
                    {/* Status badge */}
                    {(() => {
                      const badge = statusBadge[v.status] || statusBadge.pending;
                      return (
                        <span style={{
                          fontSize:10, fontWeight:700, padding:'2px 7px', borderRadius:6,
                          background: badge.bg, color: badge.color, whiteSpace:'nowrap',
                        }}>
                          {badge.icon} {badge.label}
                        </span>
                      );
                    })()}
                  </div>
                  <div className="job-lot-addr" style={{display:'flex', alignItems:'center', gap:6}}>
                    {fmtTime(v.detected_at)} · {(v.violation_type || 'violation').replace(/_/g, ' ')}
                    {v.sms_sent_at && (
                      <span style={{fontSize:10, fontWeight:600, color: v.sms_delivered ? 'var(--green)' : 'var(--yellow)'}}>
                        {v.sms_delivered ? '✓ SMS' : '○ SMS'}
                      </span>
                    )}
                    {v.reminder_sent_at && (
                      <span style={{fontSize:10, fontWeight:600, color:'var(--text-muted)'}}>
                        · Reminder sent
                      </span>
                    )}
                  </div>
                </div>
                {timer && (
                  <div className="job-timer">
                    <div className={`job-timer-val ${timer.long ? 'long' : ''}`}>{timer.val}</div>
                    <div className="job-timer-label">{timer.unit}</div>
                  </div>
                )}
              </div>
              {/* Primary actions — hidden for departed violations (dismiss from banner instead) */}
              {!(v.status === 'departed' || v.departed_at || departedFlaggedRef.current.has(v.id)) && (<>
              {v._isALPR ? (
              <>
              <div className="job-actions-row" role="group" aria-label="Enforcement actions" style={{gap:8, padding:'10px 12px'}}>
                <button className="action-btn tow" disabled={anyActing} onClick={async () => { setActing(v.id); try { await db.dispatchALPRViolation(v.id); addToast('Tow dispatched', 'success'); if (onAction) onAction(); } catch(e) { addToast('Failed: '+(e.message||''), 'error'); } setActing(null); }} aria-label="Dispatch tow" style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : 'Dispatch Tow'}
                </button>
                <button className="action-btn dismiss" disabled={anyActing} onClick={async () => { setActing(v.id); try { await db.dismissALPRViolation(v.id); addToast('Violation dismissed', 'success'); if (onAction) onAction(); } catch(e) { addToast('Failed: '+(e.message||''), 'error'); } setActing(null); }} aria-label="Dismiss violation" style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : 'Dismiss'}
                </button>
              </div>
              </>
              ) : (
              <>
              <div className="job-actions-row" role="group" aria-label="Enforcement actions" style={{gap:8, padding:'10px 12px'}}>
                <button className="action-btn boot" disabled={anyActing} onClick={() => requestAction(v.id, 'boot')} aria-label={`Boot vehicle for $${user?.boot_fee || 75}`} style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : `Boot · $${user?.boot_fee || 75}`}
                </button>
                <button className="action-btn tow" disabled={anyActing} onClick={() => requestAction(v.id, 'tow')} aria-label={`Tow vehicle for $${user?.tow_fee || 250}`} style={{padding:'12px 6px', fontSize:13}}>
                  {isActing ? '…' : `Tow · $${user?.tow_fee || 250}`}
                </button>
              </div>
              <div className="job-secondary-actions" style={{display:'flex', alignItems:'center', padding:'0 12px 10px', gap:8, flexWrap:'wrap'}}>
                  {v.status === 'alerted' && (
                    <button className="action-btn" disabled={anyActing || acking === v.id}
                      onClick={(e) => { e.stopPropagation(); handleAcknowledge(v.id); }}
                      aria-label="Acknowledge violation"
                      style={{background:'rgba(245,158,11,.12)', border:'1px solid rgba(245,158,11,.3)', color:'#f59e0b'}}>
                      {acking === v.id ? '…' : 'Acknowledge'}
                    </button>
                  )}
                  <button className="action-btn dismiss" disabled={anyActing} onClick={() => requestAction(v.id, 'dismissed')} aria-label="Dismiss violation">
                    Dismiss
                  </button>
                  <button className="action-btn gone" disabled={anyActing} onClick={() => requestAction(v.id, 'already_gone')} aria-label="Mark vehicle as already gone">
                    Gone
                  </button>
                  <div style={{flex:'1 1 auto'}} />
                {lot?.address && (
                  <a href={mapsLink(lot.address)} target="_blank" rel="noopener"
                    className="action-btn navigate" style={{textDecoration:'none', display:'flex', alignItems:'center', justifyContent:'center', gap:4}}
                    onClick={e => { e.stopPropagation(); haptic('medium'); }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Navigate
                  </a>
                )}
              </div>
              </>
              )}
              </>)}
            </div>
          );
        })
      )}

      {/* Recent completed */}
      {recent.length > 0 && (
        <>
          <div className="section-header" style={{marginTop: 24}}>
            <div className="section-title">Handled Today</div>
            <div className="section-count">{recent.length} jobs</div>
          </div>
          {recent.map(v => {
            const lot = lotMap[v.lot_id];
            const actionColor = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            const col = actionColor[v.action_taken?.toLowerCase()] || '#9ca3af';
            return (
              <div key={v.id} className="job-card" style={{position:'relative'}}>
                {/* Owner delete X */}
                {isOwner && (
                  <button
                    onClick={async (e) => {
                      e.stopPropagation();
                      try {
                        await db.deleteViolation(v.id);
                        addToast('Job deleted', 'success');
                        if (onAction) onAction();
                      } catch (err) {
                        addToast('Failed to delete: ' + (err.message || 'Unknown error'), 'error');
                      }
                    }}
                    style={{
                      position:'absolute', top:8, right:8, zIndex:5, width:28, height:28, borderRadius:'50%',
                      background:'rgba(0,0,0,.5)', backdropFilter:'blur(4px)', border:'none', cursor:'pointer',
                      display:'flex', alignItems:'center', justifyContent:'center', padding:0,
                    }}
                    aria-label="Delete job"
                    title="Delete job"
                  >
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                )}
                <div className="job-body">
                  <div className="job-top">
                    <div>
                      <div className="job-lot-name" style={{fontSize:14, display:'flex', alignItems:'center', gap:6}}>
                        {v._isALPR ? v._lot_name : (lot?.name || 'Unknown Lot')}
                        {v._isALPR && <span style={{fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4, background:'rgba(167,139,250,.15)', color:'#a78bfa'}}>PARKING PASS</span>}
                      </div>
                      <div className="job-lot-addr">{smartDate(v.detected_at)} · {fmtTime(v.detected_at)}</div>
                    </div>
                    {v.our_revenue > 0 && (
                      <div className="job-timer" style={{background:'var(--revenue-bg)'}}>
                        <div style={{fontSize:15, fontWeight:800, color:'var(--green)'}}>{fmtMoney(v.our_revenue)}</div>
                        <div className="job-timer-label">earned</div>
                      </div>
                    )}
                  </div>
                  <div className="job-details">
                    {displayColor(v.vehicle_color) ? (
                      <span style={{display:'flex', alignItems:'center', gap:4, fontSize:11, color:'var(--text-secondary)'}}>
                        <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(0,0,0,.2)', flexShrink:0}} />
                        <span style={{textTransform:'capitalize'}}>{[v.vehicle_color, v.vehicle_type && v.vehicle_type !== 'car' ? v.vehicle_type : null].filter(Boolean).join(' ')}</span>
                      </span>
                    ) : v.vehicle_type && v.vehicle_type !== 'car' ? (
                      <span style={{fontSize:11, color:'var(--text-muted)', textTransform:'capitalize'}}>{v.vehicle_type}</span>
                    ) : null}
                    {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                    {v.status === 'cleared' ? (
                      <span className="job-tag" style={{color:'#4ade80'}}>✅ <strong style={{color:'#4ade80'}}>Cleared</strong>{v.duration_seconds ? ` · ${Math.round(v.duration_seconds / 60)}m` : ''}</span>
                    ) : (v.status === 'departed' || v.action_taken === 'already_gone') ? (
                      <span className="job-tag" style={{color:'#6b7280'}}>🚫 <strong style={{color:'#6b7280'}}>Vehicle Left</strong></span>
                    ) : (
                      <span className="job-tag" style={{color: col}}>✓ <strong style={{color: col}}>{(v.action_taken || 'handled').replace(/_/g, ' ')}</strong></span>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* Violation detail modal */}
      {selectedViol && (() => {
        const cam = allCams.find(c => c.camera_id === selectedViol.camera_id);
        const latestUrl = cam?.latest_snapshot?.url || cam?.latest_snapshot?.storage_url || null;
        const latestDets = cam?.latest_snapshot?.detections || [];
        const zones = camZonesMap[selectedViol.camera_id] || [];
        const matched = matchViolationDetection(selectedViol._detections, selectedViol.zone_id, zones);
        return <ViolationProofModal
          violation={selectedViol}
          latestSnapshotUrl={latestUrl}
          latestDetections={latestDets}
          cameraZones={zones}
          matchedDetection={matched}
          tunnelSnapshotUrl={cam?.tunnel_snapshot_url}
          onClose={() => setSelectedViol(null)}
          onAutoGone={(violId) => { setSelectedViol(null); handleAction(violId, 'already_gone'); }}
        />;
      })()}

    </div>
  );
}

function EarningsPage({ violations, lots, isOwner, user, onNavigate }) {
  const [period, setPeriod] = useState('month');
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Invoicable-this-week summary (owner only): resolved tows in the last 7 days
  // that have not yet been stamped with invoiced_at and produced gross revenue.
  // This is the hand-off to the Billing tab.
  const weekCutoff = Date.now() - 7 * 86400000;
  const invoicableTows = isOwner ? violations.filter(v =>
    v.action_taken === 'tow'
    && v.status !== 'pending'
    && (v.gross_revenue || 0) > 0
    && !v.invoiced_at
    && new Date(v.resolved_at || v.detected_at).getTime() >= weekCutoff
  ) : [];
  const invoicableGross = invoicableTows.reduce((s, v) => s + (v.gross_revenue || 0), 0);

  const periodLabels = { week: 'This Week', month: 'This Month', all: 'All Time' };

  // Compute stats from the already-filtered violations prop (scoped to this user's lots)
  const now = Date.now();
  const cutoffs = { week: now - 7 * 86400000, month: now - 30 * 86400000, all: 0 };
  const periodViols = violations.filter(v => {
    const ts = new Date(v.resolved_at || v.detected_at).getTime();
    return ts >= cutoffs[period];
  });
  const resolved = periodViols.filter(v => v.action_taken && v.status !== 'pending')
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  const totalOurs = resolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
  const totalGross = resolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalViolations = periodViols.length;
  const actionsExecuted = resolved.filter(v => !['pending', 'plate_correction'].includes(v.action_taken)).length;
  const actionRate = totalViolations > 0 ? actionsExecuted / totalViolations : 0;

  // Action breakdown from local data
  const byAction = {};
  resolved.forEach(v => { if (v.action_taken && !['pending', 'plate_correction'].includes(v.action_taken)) byAction[v.action_taken] = (byAction[v.action_taken] || 0) + 1; });
  const actionEntries = Object.entries(byAction).filter(([k, v]) => v > 0 && k !== 'pending');

  // Per-lot breakdown for owners
  const byLot = {};
  resolved.forEach(v => {
    if (!byLot[v.lot_id]) byLot[v.lot_id] = { lot_id: v.lot_id, our_revenue_cents: 0, actions: 0 };
    byLot[v.lot_id].our_revenue_cents += (v.our_revenue || 0);
    byLot[v.lot_id].actions += 1;
  });
  const byLotEntries = Object.values(byLot).filter(e => e.actions > 0);

  // Daily earnings for bar chart (last 7 days)
  const dailyEarnings = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = new Date(); dayStart.setHours(0,0,0,0); dayStart.setDate(dayStart.getDate() - i);
    const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
    const dayViols = resolved.filter(v => {
      const ts = new Date(v.resolved_at || v.detected_at);
      return ts >= dayStart && ts < dayEnd;
    });
    const dayRev = dayViols.reduce((s, v) => s + (v.our_revenue || 0), 0);
    dailyEarnings.push({
      label: dayStart.toLocaleDateString('en-US', { weekday: 'short' }),
      value: dayRev,
      count: dayViols.length,
    });
  }
  const maxDailyRev = Math.max(...dailyEarnings.map(d => d.value), 1);

  return (
    <div className="page-enter">
      {/* Period picker */}
      <div className="earnings-period-row">
        {['week','month','all'].map(p => (
          <button key={p} className={`period-btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {periodLabels[p]}
          </button>
        ))}
      </div>

      {/* Hero total */}
      <div className="earnings-hero">
        <div className="earnings-label">{periodLabels[period]} {isOwner ? 'Earnings' : 'Your Earnings'}</div>
        <div className="earnings-amount">
          <span>$</span>{(totalOurs / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
        </div>
        <div className="earnings-sub">
          {actionsExecuted} job{actionsExecuted !== 1 ? 's' : ''} completed
          {isOwner ? ` · ${fmtMoney(totalGross)} gross` : ''}
        </div>
        {!isOwner && totalGross > 0 && (
          <div style={{marginTop:12, display:'flex', gap:8, justifyContent:'center'}}>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Gross </span>
              <strong style={{color:'var(--text-primary)'}}>{fmtMoney(totalGross)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>Partner </span>
              <strong style={{color:'var(--green)'}}>{fmtMoney(totalGross - totalOurs)}</strong>
            </div>
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:8, padding:'6px 12px', fontSize:12}}>
              <span style={{color:'var(--text-muted)'}}>LotLogic </span>
              <strong style={{color:'var(--accent)'}}>{fmtMoney(totalOurs)}</strong>
            </div>
          </div>
        )}
      </div>

      {/* Invoicable tows (owner only) — handoff to Billing */}
      {isOwner && invoicableTows.length > 0 && (
        <div
          onClick={() => onNavigate && onNavigate('invoices')}
          role="button"
          tabIndex={0}
          onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onNavigate && onNavigate('invoices'); } }}
          style={{
            background: 'linear-gradient(90deg, rgba(59,130,246,.12), rgba(59,130,246,.04))',
            border: '1px solid rgba(59,130,246,.35)',
            borderRadius: 12,
            padding: 14,
            marginBottom: 16,
            cursor: onNavigate ? 'pointer' : 'default',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            gap: 12,
          }}
        >
          <div>
            <div style={{fontSize: 13, color: 'var(--text-muted)', marginBottom: 2}}>Invoicable this week</div>
            <div style={{fontSize: 18, fontWeight: 800, color: 'var(--text-primary)'}}>
              {invoicableTows.length} tow{invoicableTows.length !== 1 ? 's' : ''} · {fmtMoney(invoicableGross)}
            </div>
          </div>
          <div style={{fontSize: 13, color: 'var(--accent)', fontWeight: 700, whiteSpace: 'nowrap'}}>
            Review &amp; invoice →
          </div>
        </div>
      )}

      {/* KPI cards */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{totalViolations}</div>
          <div className="kpi-label">Violations</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{actionsExecuted}</div>
          <div className="kpi-label">Actioned</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${actionRate >= 0.5 ? 'green' : actionRate >= 0.2 ? 'yellow' : 'red'}`}>
            {Math.round(actionRate * 100)}%
          </div>
          <div className="kpi-label">Action Rate</div>
        </div>
      </div>

      {/* Weekly earnings bar chart */}
      {period !== 'all' && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">Daily Earnings (Last 7 Days)</div>
          <div style={{padding:'12px 16px'}}>
            {dailyEarnings.map((d, i) => (
              <div key={i} className="bar-chart-row">
                <div className="bar-chart-label">{d.label}</div>
                <div className="bar-chart-track">
                  <div className="bar-chart-fill" style={{
                    width: `${Math.max((d.value / maxDailyRev) * 100, d.value > 0 ? 8 : 0)}%`,
                    background: d.value > 0 ? 'linear-gradient(90deg, #3b82f6, #2563eb)' : 'transparent',
                  }}>
                    {d.value > 0 && fmtMoney(d.value)}
                  </div>
                </div>
                <div className="bar-chart-value">{d.count} job{d.count !== 1 ? 's' : ''}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Action breakdown */}
      {actionEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Action</div>
          {actionEntries.map(([action, count]) => {
            const colors = { boots: '#fbbf24', tows: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            return (
              <div key={action} className="breakdown-row">
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{width:8, height:8, borderRadius:'50%', background: colors[action] || '#6b7280', flexShrink:0}} />
                  <span style={{fontSize:15, fontWeight:700, color:'var(--text-primary)', textTransform:'capitalize'}}>{action.replace(/_/g, ' ')}</span>
                </div>
                <div style={{fontSize:15, fontWeight:700, color:'var(--text-muted)'}}>{count}×</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Per-lot breakdown (owner only) */}
      {isOwner && byLotEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Lot</div>
          {byLotEntries.map(item => {
            const lot = lotMap[item.lot_id];
            return (
              <div key={item.lot_id} className="breakdown-row">
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>{lot?.name || item.lot_id?.slice(0,8)}</div>
                  <div style={{fontSize:12, color:'var(--text-faint)'}}>{item.actions} action{item.actions !== 1 ? 's' : ''}</div>
                </div>
                <div className="breakdown-amt">{fmtMoney(item.our_revenue_cents)}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Line items */}
      {resolved.length === 0 ? (
        <div className="empty-state">
          <div className="empty-title">No earnings yet {period !== 'all' ? 'this period' : ''}</div>
          <div className="empty-body">Completed jobs will show up here</div>
        </div>
      ) : (
        <div className="earnings-breakdown">
          <div className="breakdown-header">Recent Jobs</div>

// ── Confirmation review — billing_status queues per alpr_violations row ────
// Classifies each row by the same CASE logic as the DB view
// v_violation_billing_status (raw strings), then maps to 7 display buckets:
//   fraud / verify / unreported_confirmed / confirmed / pending / no_tow /
//   held_or_forced. Polls every 15s.
function normalizeTruckPlate(s) {
  return (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
}

// Mirrors v_violation_billing_status (migration 20260418011558_tow_confirmation.sql:55-66)
// byte-for-byte — returns the RAW status string so any code that compares against
// the DB view's output stays in lockstep. Do NOT collapse buckets here; that's
// render-time formatting, see displayBucketFor below.
function computeBillingStatus(v) {
  const a = v.action_taken;
  const conf = !!v.tow_confirmed_at;
  const dispatched = v.dispatched_at ? new Date(v.dispatched_at) : null;
  if (a === 'plate_correction')                 return 'no_tow';
  if (a === 'tow'     && conf)                  return 'confirmed';
  if (a == null       && conf)                  return 'unreported_confirmed';
  if (a === 'tow'     && !conf)                 return 'reported_unconfirmed';
  if (a === 'no_tow'  && conf)                  return 'disputed';
  if (a === 'no_tow'  && !conf)                 return 'no_tow';
  if (a == null && dispatched && (Date.now() - dispatched.getTime()) > 24 * 3600 * 1000) return 'no_tow_timeout';
  return 'pending';
}

// Pure raw-status → display-bucket mapper. Keeps classification (which matches
// the DB view verbatim) separate from the 7-queue UI grouping. Operator-override
// rows (billing_held_at / force_bill_at) are handled at call-site, not here.
function displayBucketFor(rawStatus) {
  switch (rawStatus) {
    case 'disputed':              return 'fraud';
    case 'reported_unconfirmed':  return 'verify';
    case 'unreported_confirmed':  return 'unreported_confirmed';
    case 'confirmed':             return 'confirmed';
    case 'pending':               return 'pending';
    case 'no_tow':                return 'no_tow';
    case 'no_tow_timeout':        return 'no_tow';
    case 'manually_held':         return 'held_or_forced';
    case 'force_billed':          return 'held_or_forced';
    default:                      return 'pending';
  }
}

// Evidence thumbnail. 80x60 on desktop, 56x42 on mobile. When `src` is present
// the element is a button that opens the shared lightbox; when missing it
// falls back to a neutral placeholder with the plate text centered.
// Props:
//   src       - image URL (nullable)
//   plate     - plate text for the placeholder + fallback alt text
//   label     - short descriptor rendered under the thumb ("Plate", "Tow")
//   onOpen    - (src, caption, downloadHref) => void, called when clicked
//   timestamp - ISO timestamp used in the lightbox caption
function EvidenceThumb({ src, plate, label, onOpen, timestamp, mobile }) {
  const dim = mobile ? { w: 56, h: 42, fs: 10 } : { w: 80, h: 60, fs: 11 };
  const caption = (plate || '—') + ' · ' + (label || 'snapshot') +
    (timestamp ? ' · ' + fmtDate(timestamp) + ' ' + fmtTime(timestamp) : '');
  const commonBoxStyle = {
    width: dim.w, height: dim.h, borderRadius: 6, border: '1px solid var(--border)',
    overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center',
    background: 'var(--bg-inset)', flexShrink: 0,
  };
  if (!src) {
    // Placeholder: monospace plate text centered on inset bg. Stays a div so
    // it isn't mistaken for an interactive element.
    return React.createElement('div', {
      role: 'img',
      'aria-label': (label || 'snapshot') + ' unavailable for ' + (plate || 'unknown plate'),
      title: 'No snapshot available',
      style: Object.assign({}, commonBoxStyle, {
        fontFamily: 'ui-monospace, Menlo, monospace', fontSize: dim.fs,
        fontWeight: 700, color: 'var(--text-faint)', letterSpacing: '.02em',
      }),
    }, plate || '—');
  }
  return React.createElement('button', {
    type: 'button',
    onClick: (e) => { e.stopPropagation(); onOpen && onOpen(src, caption, src); },
    'aria-label': 'Enlarge ' + (label || 'snapshot') + ' for ' + (plate || 'unknown plate'),
    title: caption,
    style: Object.assign({}, commonBoxStyle, {
      cursor: 'zoom-in', padding: 0, position: 'relative',
    }),
  },
    React.createElement('img', {
      src,
      alt: (label || 'snapshot') + ' for ' + (plate || 'unknown plate'),
      loading: 'lazy',
      style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' },
    }),
  );
}

// Full-screen image viewer. Reuses the focus-trap + ESC handling from PR #75
// via the shared useFocusTrap hook so keyboard users can dismiss the overlay
// the same way they dismiss ConfirmActionModal.
function ImageLightbox({ src, caption, downloadHref, onClose }) {
  const dialogRef = useRef(null);
  const titleId = useUid('lightbox-title');
  useFocusTrap(dialogRef, true, onClose);
  return React.createElement('div', {
    onClick: onClose,
    style: {
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,.82)', zIndex: 1100,
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16,
    },
  },
    React.createElement('div', {
      ref: dialogRef,
      role: 'dialog',
      'aria-modal': 'true',
      'aria-labelledby': titleId,
      tabIndex: -1,
      onClick: (e) => e.stopPropagation(),
      style: { maxWidth: 'min(1100px, 98vw)', maxHeight: '92vh', display: 'flex', flexDirection: 'column', gap: 10, outline: 'none' },
    },
      React.createElement('img', {

// Vertical 5-step review timeline: Detected, Dispatched, Acted, Confirmed,
// Invoiced. Each step has a filled dot if the event occurred, hollow
