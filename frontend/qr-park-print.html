<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking QR — LotLogic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 24px 20px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }

    .qr-view { text-align: center; padding: 20px 0; }
    .qr-view .lot-name {
      font-size: 24px;
      font-weight: 800;
      color: #f9fafb;
      margin-bottom: 8px;
    }
    .qr-view .lot-sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .qr-tile {
      display: inline-block;
      padding: 24px;
      background: #fff;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    #qrCanvas { display: block; width: 320px; height: 320px; }
    .qr-url {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #9ca3af;
      word-break: break-all;
      max-width: 480px;
      margin: 0 auto;
    }

    .loading-state { text-align: center; padding: 60px 0; color: #9ca3af; }
    .invalid-state {
      text-align: center;
      padding: 60px 20px;
    }
    .invalid-state h2 { font-size: 20px; color: #f87171; margin-bottom: 10px; }
    .invalid-state p { font-size: 14px; color: #9ca3af; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="content"><div class="loading-state">Loading…</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    const content = document.getElementById('content');

    const qs = new URLSearchParams(window.location.search);
    const lotId = qs.get('lot');

    async function init() {
      if (!lotId || !UUID_RE.test(lotId)) {
        showInvalid();
        return;
      }
      await renderView(lotId);
    }

    function showInvalid() {
      content.innerHTML =
        '<div class="invalid-state">' +
          '<h2>Invalid QR</h2>' +
          '<p>This page is missing a lot identifier. Open the lot-specific link from your admin tools.</p>' +
        '</div>';
    }

    async function renderView(id) {
      try {
        const { data, error } = await supabase
          .from('lots')
          .select('id, name')
          .eq('id', id)
          .single();
        if (error || !data) {
          showInvalid();
          return;
        }
        const target = window.location.origin + '/park?lot=' + encodeURIComponent(data.id);
        content.innerHTML =
          '<div class="qr-view">' +
            '<div class="lot-name">' + escapeHtml(data.name) + '</div>' +
            '<div class="lot-sub">Scan to register your vehicle</div>' +
            '<div class="qr-tile"><canvas id="qrCanvas"></canvas></div>' +
            '<div class="qr-url">' + escapeHtml(target) + '</div>' +
          '</div>';
        QRCode.toCanvas(document.getElementById('qrCanvas'), target, {
          width: 640,
          margin: 1,
          errorCorrectionLevel: 'M',
          color: { dark: '#0f172a', light: '#ffffff' },
        }, err => { if (err) console.error('qr:', err); });
      } catch (err) {
        console.error(err);
        showInvalid();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
