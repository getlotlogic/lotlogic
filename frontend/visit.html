<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Temporary Parking Pass</title>
  <!-- reCAPTCHA v3. The site key is a PUBLIC value by design (Google docs
       explicitly state it's safe to expose); security relies only on the
       server-side RECAPTCHA_SECRET_KEY. The key below is a placeholder —
       replace it with the real site key from the Google reCAPTCHA admin
       console. Keep Vercel env RECAPTCHA_SITE_KEY in sync so any future
       build step that injects it matches the hardcoded value.
       TODO: update this constant if you rotate the reCAPTCHA site. -->
  <meta name="recaptcha-site-key" content="RECAPTCHA_SITE_KEY_PLACEHOLDER">
  <script src="https://www.google.com/recaptcha/api.js?render=RECAPTCHA_SITE_KEY_PLACEHOLDER" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .shield {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 12px;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
    }
    .logo h1 span { color: #3b82f6; }
    .property-name {
      text-align: center;
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .property-name strong {
      display: block;
      font-size: 18px;
      color: #e5e7eb;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label .required { color: #ef4444; margin-left: 2px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #3b82f6; }
    input::placeholder { color: #4b5563; }
    select { appearance: none; cursor: pointer; }
    select option { background: #1a1d27; color: #e5e7eb; }
    .plate-input { text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; font-size: 20px; text-align: center; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .validity {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: #4ade80; fill: none; stroke-width: 2.5; }
    .success-card h2 { font-size: 20px; color: #f9fafb; margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: #9ca3af; line-height: 1.5; }
    .success-plate {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin: 16px 0;
    }
    .success-detail {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: #6b7280;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 { font-size: 18px; color: #f87171; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <script>
    // Raw fetch against Supabase PostgREST + Storage. Dropping supabase-js here
    // because its createClient() auto-opens a realtime WebSocket that can hang
    // on strict networks / extensions and leave the page stuck on "Loading...".
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    // Backend base. Used for endpoints that anon role can't read directly
    // (e.g. /visitor_passes/check-active — RLS blocks anon SELECT on
    // visitor_passes, so the QR form's pre-flight duplicate-pass check
    // MUST go through the backend's public, minimal-response endpoint).
    const BACKEND_URL = 'https://lotlogic-backend-production.up.railway.app';

    // reCAPTCHA v3 site key. Public value — Google explicitly documents
    // that the site key is meant to be exposed; security relies only on
    // the server-side RECAPTCHA_SECRET_KEY. Mirrored in the <meta> tag in
    // <head> so any future build step that does token replacement has
    // exactly one place to patch.
    const RECAPTCHA_SITE_KEY =
      (document.querySelector('meta[name=recaptcha-site-key]')?.content)
      || 'RECAPTCHA_SITE_KEY_PLACEHOLDER';

    // Fetch a fresh reCAPTCHA v3 token for the given action. Returns null
    // on script-load failure so the caller can decide whether to hard-fail
    // or continue (we hard-fail on submit — Intuit requires a valid token).
    async function getRecaptchaToken(action) {
      if (!window.grecaptcha || typeof grecaptcha.ready !== 'function') {
        return null;
      }
      return new Promise((resolve, reject) => {
        try {
          grecaptcha.ready(() => {
            grecaptcha.execute(RECAPTCHA_SITE_KEY, { action }).then(resolve, reject);
          });
        } catch (err) {
          reject(err);
        }
      });
    }

    async function pgRest(path, init = {}, timeoutMs = 10000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
          ...init,
          signal: ctrl.signal,
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            ...(init.headers || {}),
          },
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const err = new Error((body && body.message) || ('HTTP ' + res.status));
          err.code = body && body.code;
          err.details = body && body.details;
          err.status = res.status;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    const app = document.getElementById('app');

    // QR code id comes from /visit.html/<qr> in the URL, but we also accept
    // ?qr=<id> so a shared / emailed link like /visit.html?qr=... still works.
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = (pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null)
      || new URLSearchParams(window.location.search).get('qr');

    let property = null;

    async function init() {
      if (!qrCodeId) {
        showNotFound('Invalid Link', 'This temporary pass link is not valid.');
        return;
      }
      try {
        const rows = await pgRest(`/properties?select=id,name,address,property_type,policy_text,policy_phone&qr_code_id=eq.${encodeURIComponent(qrCodeId)}&limit=1`);
        const data = Array.isArray(rows) ? rows[0] : null;
        if (!data) {
          showNotFound('Lot Not Found', 'This temporary pass link is not valid or has expired.');
          return;
        }
        property = data;
        showForm();
      } catch (err) {
        console.error('init error:', err);
        showConnectionError(err);
      }
    }

    function showConnectionError(err) {
      const detail = err && (err.name === 'AbortError' ? 'Request timed out.' : (err.message || 'Network error.'));
      app.innerHTML = `
        <div class="logo"><div class="shield">LL</div><h1>Lot<span>Logic</span></h1></div>
        <div class="not-found">
          <h2>Can't reach server</h2>
          <p>${escapeHtml(detail)}</p>
          <p>Check your connection, then try again.</p>
          <button id="retryBtn" class="submit-btn" style="margin-top:18px">Try again</button>
        </div>
      `;
      const btn = document.getElementById('retryBtn');
      if (btn) btn.addEventListener('click', () => {
        app.innerHTML = '<div class="loading-state">Loading...</div>';
        init();
      });
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    // Form-mount idempotency key — same key reused on every retry of the same form.
    let idempotencyKey = null;
    function newIdempotencyKey() {
      idempotencyKey = (crypto.randomUUID && crypto.randomUUID()) ||
        (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2));
    }

    function normalizePlate(s) {
      return (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    function normalizePhone(s) {
      const digits = (s || '').replace(/\D/g, '');
      if (digits.length === 10) return '+1' + digits;
      if (digits.length === 11 && digits.startsWith('1')) return '+' + digits;
      if (digits.startsWith('+')) return s;
      return digits ? ('+' + digits) : '';
    }

    const DEFAULT_TRUCK_PLAZA_POLICY = `TRUCK PARKING POLICIES

1. DROPPED TRAILERS — Dropped trailers are NOT permitted on the property.
2. DESIGNATED PARKING ONLY — All trucks must park in marked parking spaces only. Parking is NOT allowed beside the store, around the CAT scale, at gas/diesel drop locations, beside the white air-hose building, parallel to the driveway, in front of or blocking dumpsters, or in employee parking areas.
3. PARKING TIME LIMIT — Maximum parking time is 48 hours. Once your noted time has ended, trucks must remain off the property for 24 hours before returning.
4. NO VEHICLE WASHING — Truck or trailer washing is NOT permitted on the property.
5. NO PERSONAL VEHICLES — Personal vehicles are NOT allowed in truck parking areas or employee parking areas.
6. DIESEL FUEL ISLAND — Sleeping or parking on the diesel fuel island is strictly prohibited.

TOWING ENFORCED — Violation of these policies will result in towing at the vehicle owner's expense.

LIABILITY NOTICE — The property owner and tow operator are not responsible for any damage to vehicles that occurs on the property or during towing. By agreeing below, you confirm you have read these policies and agree to follow them.`;

    function showForm() {
      newIdempotencyKey();
      if (property.property_type === 'truck_plaza') {
        showTruckPlazaForm();
      } else {
        showApartmentForm();
      }
    }

    function showApartmentForm() {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="property-name">
          Temporary Parking Pass at
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="passForm">
          <label for="visitorName">Full Name <span class="required">*</span></label>
          <input type="text" id="visitorName" placeholder="Jane Smith" required>

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="plate">License Plate <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">

          <label for="vehicleType">Vehicle Type <span class="required">*</span></label>
          <select id="vehicleType" required>
            <option value="" disabled selected>Select vehicle type</option>
            <option value="car">Car</option>
            <option value="pickup">Pickup</option>
            <option value="semi">Semi / Truck</option>
            <option value="other">Other</option>
          </select>

          <label for="stayHours">How long will you be here? <span class="required">*</span></label>
          <select id="stayHours" required>
            <option value="2">2 hours</option>
            <option value="4">4 hours</option>
            <option value="8">8 hours</option>
            <option value="12">12 hours</option>
            <option value="24" selected>24 hours</option>
            <option value="48">48 hours (maximum)</option>
          </select>

          <button type="submit" class="submit-btn" id="submitBtn">Get Temporary Pass</button>
          <div class="validity">Maximum stay: 48 hours from registration</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('passForm').addEventListener('submit', handleApartmentSubmit);
    }

    function showTruckPlazaForm() {
      const policyText = property.policy_text || DEFAULT_TRUCK_PLAZA_POLICY;
      const policyPhone = property.policy_phone ? `<p style="margin-top:8px;color:#9ca3af;font-size:12px;">Towing contact: <strong>${escapeHtml(property.policy_phone)}</strong></p>` : '';
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="property-name">
          Truck Parking Registration<br>
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="passForm">
          <label for="companyName">Company Name <span class="required">*</span></label>
          <input type="text" id="companyName" placeholder="ACME Trucking Co" required maxlength="80">

          <label for="driverName">Driver Name <span class="required">*</span></label>
          <input type="text" id="driverName" placeholder="John Smith" required maxlength="80">

          <label for="plate">Truck License Plate <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">
          <div id="preflightMsg" style="font-size:13px;color:#fbbf24;margin-top:-8px;margin-bottom:8px;"></div>

          <label for="parkingSpot">Parking Space # <span class="required">*</span></label>
          <input type="text" id="parkingSpot" placeholder="12, back, dirt lot, etc." required maxlength="20">

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="vehicleType">Vehicle Type <span class="required">*</span></label>
          <select id="vehicleType" required>
            <option value="semi" selected>Semi</option>
            <option value="box_truck">Box truck</option>
            <option value="van">Van</option>
            <option value="other">Other</option>
          </select>

          <label>Stay Duration <span class="required">*</span></label>
          <div style="display:flex;gap:12px;margin-top:6px;">
            <label style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;border:1px solid #2b2f3a;border-radius:8px;padding:12px;">
              <input type="radio" name="stayHours" value="24" checked> 24 hours
            </label>
            <label style="flex:1;display:flex;align-items:center;gap:8px;cursor:pointer;border:1px solid #2b2f3a;border-radius:8px;padding:12px;">
              <input type="radio" name="stayHours" value="48"> 48 hours
            </label>
          </div>

          <label for="placardColor" style="margin-top:18px;">Color Placard <span style="color:#6b7280;font-size:12px;">(optional)</span></label>
          <input type="text" id="placardColor" placeholder="yellow / red / blue / etc." maxlength="30">

          <div style="margin-top:24px;background:rgba(255,255,255,0.03);border:1px solid #2b2f3a;border-radius:8px;padding:16px;max-height:280px;overflow-y:auto;">
            <pre style="white-space:pre-wrap;font-family:inherit;font-size:13px;color:#cbd5e1;margin:0;">${escapeHtml(policyText)}</pre>
            ${policyPhone}
          </div>

          <label style="display:flex;align-items:flex-start;gap:10px;margin-top:14px;cursor:pointer;font-size:14px;">
            <input type="checkbox" id="policyAck" required style="margin-top:3px;">
            <span>I have read and agree to the truck parking policies above. <span class="required">*</span></span>
          </label>

          <button type="submit" class="submit-btn" id="submitBtn" style="margin-top:18px;">Register Truck</button>
          <div class="validity">Maximum stay: 48 hours from registration. Once expired, you must remain off the property for 24 hours.</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('passForm').addEventListener('submit', handleTruckPlazaSubmit);
      document.getElementById('plate').addEventListener('blur', preflightCheckPlate);
    }

    async function preflightCheckPlate() {
      const msg = document.getElementById('preflightMsg');
      msg.textContent = '';
      const plate = normalizePlate(document.getElementById('plate').value);
      if (!plate || plate.length < 2) return;
      try {
        // Pre-flight the duplicate-pass warning via the backend's public
        // /visitor_passes/check-active endpoint. Reading visitor_passes
        // directly from PostgREST returns [] under the anon role (no SELECT
        // policy), so the old direct-query path was silently useless — a
        // driver re-scanning the QR after a few hours would never see the
        // "already registered" notice. The backend endpoint is public, in
        // PUBLIC_PATHS, and returns only {active, valid_until, reference_id}.
        const url = `${BACKEND_URL}/visitor_passes/check-active`
          + `?property_id=${encodeURIComponent(property.id)}`
          + `&plate=${encodeURIComponent(plate)}`;
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 10000);
        let data = null;
        try {
          const res = await fetch(url, { signal: ctrl.signal, headers: { Accept: 'application/json' } });
          if (res.ok) {
            const text = await res.text();
            data = text ? JSON.parse(text) : null;
          }
        } finally { clearTimeout(t); }
        if (data && data.active && data.valid_until) {
          const expires = new Date(data.valid_until).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
          const ref = (data.reference_id || '').toString().toUpperCase();
          msg.textContent = ref
            ? `Already registered: pass active until ${expires} (Ref ${ref})`
            : `Already registered: pass active until ${expires}`;
        }
      } catch (_) { /* non-fatal — let submit handle it */ }
    }

    let submitting = false;

    async function handleApartmentSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const plateText = normalizePlate(document.getElementById('plate').value);
        const visitorName = document.getElementById('visitorName').value.trim();
        const vehicleType = document.getElementById('vehicleType').value;
        const stayHours = parseInt(document.getElementById('stayHours').value, 10);
        const phone = normalizePhone(document.getElementById('phone').value);

        if (!plateText || plateText.length < 2) throw new Error('Please enter a valid license plate number.');
        if (!stayHours || stayHours > 48) throw new Error('Choose how long you will be parked (max 48 hours).');

        const recaptchaToken = await getRecaptchaToken('pass_register').catch(() => null);
        if (!recaptchaToken) {
          throw new Error('Please retry — automated-access check failed.');
        }

        const result = await backendRegister('/visitor_passes/register', {
          property_id: property.id,
          plate_text: plateText,
          visitor_name: visitorName,
          vehicle_type: vehicleType || null,
          host_unit: '',
          host_name: '',
          phone: phone,
          stay_hours: stayHours,
          submission_idempotency_key: idempotencyKey,
          recaptcha_token: recaptchaToken,
        });

        const validUntil = result.valid_until ? new Date(result.valid_until)
          : new Date(Date.now() + stayHours * 60 * 60 * 1000);
        const refId = (result.reference_id || '').toString().toUpperCase();
        showSuccess({plate: result.plate_text || plateText, validUntil, stayHours, refId: refId || null, parkingSpot: null, placardColor: null});
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(friendlyErrorMessage(err)) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Get Temporary Pass';
        submitting = false;
      }
    }

    async function handleTruckPlazaSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const companyName = document.getElementById('companyName').value.trim();
        const driverName  = document.getElementById('driverName').value.trim();
        const plateText   = normalizePlate(document.getElementById('plate').value);
        const parkingSpot = document.getElementById('parkingSpot').value.trim();
        const phone       = normalizePhone(document.getElementById('phone').value);
        const vehicleType = document.getElementById('vehicleType').value;
        const stayHoursEl = document.querySelector('input[name="stayHours"]:checked');
        const stayHours   = stayHoursEl ? parseInt(stayHoursEl.value, 10) : 0;
        const placardColor = (document.getElementById('placardColor').value || '').trim();
        const policyAck = document.getElementById('policyAck').checked;

        if (!companyName) throw new Error('Company name is required.');
        if (!driverName) throw new Error('Driver name is required.');
        if (!plateText || plateText.length < 2) throw new Error('Please enter a valid plate number.');
        if (!parkingSpot) throw new Error('Parking space is required.');
        if (!phone || phone.length < 11) throw new Error('Please enter a valid phone number.');
        if (stayHours !== 24 && stayHours !== 48) throw new Error('Choose 24 or 48 hours.');
        if (!policyAck) throw new Error('You must acknowledge the parking policies.');

        const recaptchaToken = await getRecaptchaToken('pass_register').catch(() => null);
        if (!recaptchaToken) {
          throw new Error('Please retry — automated-access check failed.');
        }

        const now = new Date();
        const result = await backendRegister('/visitor_passes/register', {
          property_id: property.id,
          plate_text: plateText,
          visitor_name: driverName,
          company_name: companyName,
          vehicle_type: vehicleType,
          host_unit: '',
          host_name: '',
          phone: phone,
          parking_spot: parkingSpot,
          placard_color: placardColor || null,
          stay_hours: stayHours,
          policy_acknowledged_at: now.toISOString(),
          submission_idempotency_key: idempotencyKey,
          recaptcha_token: recaptchaToken,
        });

        const validUntil = result.valid_until ? new Date(result.valid_until)
          : new Date(now.getTime() + stayHours * 60 * 60 * 1000);
        const refId = (result.reference_id || '').toString().toUpperCase();
        showSuccess({plate: result.plate_text || plateText, validUntil, stayHours, refId: refId || null, parkingSpot, placardColor, companyName});
      } catch (err) {
        // Cooldown rejection (409 with detail "COOLDOWN: ...") — friendly message.
        const msg = (err && err.message) || '';
        if (msg.includes('COOLDOWN')) {
          errorDiv.innerHTML = '<div class="error">' + escapeHtml(msg.replace('COOLDOWN: ', '')) + '</div>';
          btn.disabled = false;
          btn.textContent = 'Register Truck';
          submitting = false;
          return;
        }
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(friendlyErrorMessage(err)) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Register Truck';
        submitting = false;
      }
    }

    // ── Backend register helper ────────────────────────────────────────
    // POST to one of the public /register endpoints. Normalizes errors so
    // the handlers above can dispatch on err.status and err.message.
    // reCAPTCHA rejects come back as 400 with detail "recaptcha:<reason>";
    // we surface a single friendly string to the user and rely on the
    // server-side log for the real reason (never log the token here).
    async function backendRegister(path, payload, timeoutMs = 12000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(BACKEND_URL + path, {
          method: 'POST',
          signal: ctrl.signal,
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const detail = body && (body.detail || body.message);
          const err = new Error(typeof detail === 'string' ? detail : ('HTTP ' + res.status));
          err.status = res.status;
          err.detail = detail;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    // Translate a backend error into a message the driver should see.
    // reCAPTCHA failures → generic retry message (don't leak the reason).
    function friendlyErrorMessage(err) {
      const msg = (err && err.message) || '';
      if (msg.startsWith('recaptcha:') || /automated-access check failed/i.test(msg)) {
        return 'Please retry — automated-access check failed.';
      }
      if (err && err.name === 'AbortError') {
        return 'Request timed out. Please try again.';
      }
      return msg || 'Something went wrong. Please try again.';
    }

    function showSuccess(opts) {
      const {plate, validUntil, stayHours, refId, parkingSpot, placardColor, companyName} = opts;
      const expiresStr = validUntil.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
      const isPlaza = property.property_type === 'truck_plaza';
      const extras = isPlaza ? `
        <div class="success-detail" style="margin-top:8px;">
          ${companyName ? `Company: <strong>${escapeHtml(companyName)}</strong><br>` : ''}
          ${parkingSpot ? `Parking space: <strong>${escapeHtml(parkingSpot)}</strong><br>` : ''}
          ${placardColor ? `Placard: <strong>${escapeHtml(placardColor)}</strong><br>` : ''}
          ${refId ? `Reference: <strong>${escapeHtml(refId)}</strong>` : ''}
        </div>
        <div class="success-detail" style="margin-top:14px;color:#6b7280;font-size:12px;">
          Save this page (screenshot or bookmark) as your registration receipt.
        </div>` : '';

      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>${isPlaza ? 'Truck Registered' : 'Temporary Pass Active'}</h2>
          <p>Your pass for <strong>${escapeHtml(property.name)}</strong> is active.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="success-detail">Valid for ${stayHours} hour${stayHours !== 1 ? 's' : ''} &mdash; until ${escapeHtml(expiresStr)}</div>
          ${extras}
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
