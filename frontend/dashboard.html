  async updateZones(cameraId, zones) {
    if (supabase) {
      // Delete existing zones for this camera, then insert new ones
      const { error: delErr } = await supabase.from('camera_zones').delete().eq('camera_id', cameraId);
      if (delErr) throw new Error('Failed to clear zones: ' + delErr.message);

      if (zones.length > 0) {
        const rows = zones.map(z => ({
          camera_id: cameraId,
          zone_id: z.zone_id,
          label: z.label || z.zone_id,
          zone_type: z.zone_type || 'no_parking',
          time_limit_minutes: z.time_limit_minutes || null,
          polygon: z.polygon,
        }));
        const { error: insErr } = await supabase.from('camera_zones').insert(rows);
        if (insErr) throw new Error('Failed to insert zones: ' + insErr.message);
      }

      // Sync to cameras.zones JSON column (backend detection uses this format)
      // Convert {x,y} percentage objects to [[x,y]] normalized 0-1 arrays
      const backendZones = zones.map((z, i) => ({
        zone_id: z.zone_id,
        violation_type: z.zone_type || 'no_parking',
        max_minutes: z.time_limit_minutes || null,
        space_number: i + 1,
        polygon: (z.polygon || []).map(pt => {
          const px = pt.x != null ? pt.x : (Array.isArray(pt) ? pt[0] * 100 : 0);
          const py = pt.y != null ? pt.y : (Array.isArray(pt) ? pt[1] * 100 : 0);
          return [Math.round(px / 100 * 10000) / 10000, Math.round(py / 100 * 10000) / 10000];
        }),
      }));
      await supabase.from('cameras').update({ zones: backendZones }).eq('id', cameraId);

      return { success: true };
    }
    return apiFetch(`/cameras/${cameraId}/zones`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ zones }),
    });
  },

  // ── Analytics ─────────────────────────────────────────────
  async getHourlyStats(lotIds) {
    if (supabase) {
      // Get violations from last 90 days grouped by hour
      const since = new Date(Date.now() - 90 * 86400000).toISOString();
      const { data, error } = await supabase
        .from('violations')
        .select('lot_id, detected_at, action_taken, gross_revenue')
        .in('lot_id', lotIds)
        .gte('detected_at', since);
      if (!error && data) {
        // Build heatmap: day_of_week x hour_of_day → count
        const heatmap = {};
        data.forEach(v => {
          const d = new Date(v.detected_at);
          const dow = d.getDay(); // 0=Sun
          const hour = d.getHours();
          const key = `${dow}-${hour}`;
          heatmap[key] = (heatmap[key] || 0) + 1;
        });
        return { heatmap, total: data.length };
      }
    }
    return { heatmap: {}, total: 0 };
  },
  async getUtilization(lotIds) {
    if (supabase) {
      // Get snapshot vehicle counts from last 7 days
      const since = new Date(Date.now() - 7 * 86400000).toISOString();
      const { data, error } = await supabase
        .from('snapshots')
        .select('lot_id, captured_at, vehicles_detected')
        .in('lot_id', lotIds)
        .gte('captured_at', since)
        .order('captured_at', { ascending: false })
        .limit(5000);
      if (!error && data) {
        // Group by hour of day → avg vehicles
        const byHour = {};
        data.forEach(s => {
          const hour = new Date(s.captured_at).getHours();
          if (!byHour[hour]) byHour[hour] = { sum: 0, count: 0 };
          byHour[hour].sum += (s.vehicles_detected || 0);
          byHour[hour].count++;
        });
        const hourly = {};
        Object.keys(byHour).forEach(h => {
          hourly[h] = Math.round(byHour[h].sum / byHour[h].count * 10) / 10;
        });
        return { hourly, totalSnapshots: data.length };
      }
    }
    return { hourly: {}, totalSnapshots: 0 };
  },
  async getRevenueProjection(lotIds) {
    if (supabase) {
      // Get last 30 days of revenue data for projection
      const since30 = new Date(Date.now() - 30 * 86400000).toISOString();
      const since7 = new Date(Date.now() - 7 * 86400000).toISOString();
      const [res30, res7] = await Promise.all([
        supabase.from('violations').select('gross_revenue, our_revenue, detected_at, action_taken')
          .in('lot_id', lotIds).gte('resolved_at', since30).neq('status', 'pending'),
        supabase.from('violations').select('gross_revenue, our_revenue, detected_at, action_taken')
          .in('lot_id', lotIds).gte('resolved_at', since7).neq('status', 'pending'),
      ]);
      const d30 = res30.data || [];
      const d7 = res7.data || [];
      const rev30 = d30.reduce((s, v) => s + (v.gross_revenue || 0), 0);
      const rev7 = d7.reduce((s, v) => s + (v.gross_revenue || 0), 0);
      const dailyAvg30 = d30.length > 0 ? rev30 / 30 : 0;
      const dailyAvg7 = d7.length > 0 ? rev7 / 7 : 0;
      const viols30 = d30.length;
      const viols7 = d7.length;
      const dailyViols30 = viols30 / 30;
      const dailyViols7 = viols7 / 7;
      return {
        monthlyProjection: Math.round(dailyAvg7 * 30),
        weeklyAvg: Math.round(rev7),
        dailyAvg: Math.round(dailyAvg7),
        trend: dailyAvg7 > dailyAvg30 ? 'up' : dailyAvg7 < dailyAvg30 ? 'down' : 'flat',
        trendPct: dailyAvg30 > 0 ? Math.round(((dailyAvg7 - dailyAvg30) / dailyAvg30) * 100) : 0,
        violationsPerDay: Math.round(dailyViols7 * 10) / 10,
        violTrend: dailyViols7 > dailyViols30 ? 'up' : dailyViols7 < dailyViols30 ? 'down' : 'flat',
        violTrendPct: dailyViols30 > 0 ? Math.round(((dailyViols7 - dailyViols30) / dailyViols30) * 100) : 0,
      };
    }
    return { monthlyProjection: 0, weeklyAvg: 0, dailyAvg: 0, trend: 'flat', trendPct: 0, violationsPerDay: 0, violTrend: 'flat', violTrendPct: 0 };
  },

  // Realtime subscription for violations
  subscribeViolations(lotIds, callback, onError) {
    if (!supabase) { if (onError) onError('Realtime not available'); return null; }
    const channel = supabase.channel('violations-realtime')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'violations',
      }, payload => {
        if (lotIds.includes(payload.new?.lot_id) || lotIds.includes(payload.old?.lot_id)) {
          callback(payload);
        }
      })
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'snapshots',
      }, payload => {
        // New snapshot from any camera — trigger refresh so frame updates
        callback(payload);
      })
      .subscribe((status) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.error('Realtime subscription failed:', status);
          if (onError) onError(status);
        }
      });
    return channel;
  },

// ── Theme hook ────────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem('lotlogic_theme') || 'light');
  useEffect(() => {
    localStorage.setItem('lotlogic_theme', theme);
    // Update meta theme-color for mobile browsers
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'dark' ? '#0c0e14' : '#f8f9fb';
  }, [theme]);
  const toggle = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);
  return { theme, toggle };
}

// ── Online/offline hook ──────────────────────────────────────
function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [reconnected, setReconnected] = useState(false);
  useEffect(() => {
    const goOnline = () => { setOnline(true); setReconnected(true); setTimeout(() => setReconnected(false), 3000); };
    const goOffline = () => { setOnline(false); setReconnected(false); };
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);
  return { online, reconnected };
}

// ── Interval-fetch hook ──────────────────────────────────────
// One-shot + interval poller. Runs `fn` once on mount, then every `ms`
// milliseconds (pass 0 or negative to disable the interval and fire once only).
// Uses a single useEffect so the initial call and the first interval tick
// can't race, and sets a `cancelled` flag so a late-returning in-flight fetch
// doesn't push stale state after unmount.
//
// Dependencies go in `deps` — treat it like the deps array on useEffect.
// Because deps is dynamic we silence exhaustive-deps at the call site.
function useIntervalFetch(fn, ms, deps) {
  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      if (cancelled) return;
      try { await fn(); } catch (_) { /* caller is responsible for error state */ }
    };
    run();
    if (ms > 0) {
      const h = setInterval(run, ms);
      return () => { cancelled = true; clearInterval(h); };
    }
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, deps);
}

// ── Haptic feedback ──────────────────────────────────────────
function haptic(style = 'light') {
  if (!navigator.vibrate) return;
  if (style === 'heavy') navigator.vibrate(30);
  else if (style === 'medium') navigator.vibrate(15);
  else navigator.vibrate(8);
}

// ── In-app notification system (replaces SMS dependency) ─────
const NotifyManager = (() => {
  let _audioCtx = null;

  function _getPrefs() {
    try {
      const raw = localStorage.getItem('lotlogic_notify_prefs');
      return raw ? JSON.parse(raw) : { sound: true, browser: true, volume: 0.4 };
    } catch { return { sound: true, browser: true, volume: 0.4 }; }
  }
  function _setPrefs(p) {
    try { localStorage.setItem('lotlogic_notify_prefs', JSON.stringify(p)); } catch {}
  }

  function getPrefs() { return _getPrefs(); }
  function updatePrefs(patch) { const p = { ..._getPrefs(), ...patch }; _setPrefs(p); return p; }

  // Two-tone chime via Web Audio API — no external audio files needed
  function playChime() {
    const prefs = _getPrefs();
    if (!prefs.sound) return;
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = _audioCtx;
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      // First tone: C6 (1047 Hz)
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.connect(gain1); gain1.connect(ctx.destination);
      osc1.frequency.value = 1047;
      osc1.type = 'sine';
      gain1.gain.setValueAtTime(prefs.volume, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc1.start(now); osc1.stop(now + 0.15);

      // Second tone: E6 (1319 Hz) — 100ms later, slightly longer
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 1319;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(prefs.volume, now + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc2.start(now + 0.1); osc2.stop(now + 0.35);
    } catch (e) { console.warn('Chime failed:', e); }
  }

  // Urgent double-chime for reminders
  function playUrgentChime() {
    playChime();
    setTimeout(playChime, 500);
  }

  // Browser Notification API
  function browserNotify(title, body, tag) {
    const prefs = _getPrefs();
    if (!prefs.browser) return;
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      new Notification(title, {
        body,
        tag: tag || 'lotlogic-violation',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🅿️</text></svg>',
        renotify: true,
        requireInteraction: false,
      });
    } catch (e) { console.warn('Browser notification failed:', e); }
  }

  // Request browser notification permission (must be user-gesture triggered)
  async function requestPermission() {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied') return 'denied';
    return await Notification.requestPermission();
  }

  function getPermission() {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  }

  // Main entry: fire notification for a new violation
  function notifyNewViolation(violation) {
    const zone = violation.zone_id || 'Unknown zone';
    const type = violation.violation_type || 'Violation';
    const desc = [violation.vehicle_color, violation.vehicle_type && violation.vehicle_type !== 'car' ? violation.vehicle_type : 'vehicle'].filter(Boolean).join(' ');

    playChime();
    haptic('heavy');
    browserNotify(
      `New ${type}`,
      `${desc} in ${zone}`,
      `violation-${violation.id}`,
    );
  }

  // Fire notification for a reminder (more urgent)
  function notifyReminder(violation) {
    const zone = violation.zone_id || 'Unknown zone';
    playUrgentChime();
    haptic('heavy');
    browserNotify(
      '30-min reminder',
      `${zone} — still waiting for action`,
      `reminder-${violation.id}`,
    );
  }

  return { getPrefs, updatePrefs, playChime, playUrgentChime, browserNotify, requestPermission, getPermission, notifyNewViolation, notifyReminder };
})();

// ── Smarter date labels ──────────────────────────────────────
function smartDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (d >= today) return 'Today';
  if (d >= yesterday) return 'Yesterday';
  const diffDays = Math.floor((today - d) / 86400000);
  if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Time helpers ──────────────────────────────────────────────
function elapsed(isoStr) {
  if (!isoStr) return null;
  const mins = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (mins < 60) return { val: mins, unit: 'MIN', long: mins >= 45 };
  const hrs = Math.floor(mins / 60);
  return { val: hrs, unit: 'HR', long: hrs >= 2 };
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const secs = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

  red: '#ef4444', blue: '#3b82f6', green: '#22c55e', yellow: '#eab308', orange: '#f97316',
  brown: '#78350f', beige: '#d6c9a3', gold: '#d4af37', tan: '#d2b48c', purple: '#a855f7',
};
function displayColor(c) {
  if (!c) return '';
  const v = String(c).trim().toLowerCase();
  if (!v || v === 'unknown' || v === 'none') return '';

const ToastContext = React.createContext({ addToast: () => {} });

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="toast-container">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

// ── Focus trap for modal dialogs ─────────────────────────────
// Minimal a11y helper for <div role="dialog">-style overlays. Responsibilities:
//   1. Stash document.activeElement when the modal opens
//   2. Move focus to the first focusable element inside the container
//   3. Keep Tab / Shift+Tab cycling inside the container
//   4. Close on ESC (via onClose)
//   5. Restore focus to the previously-focused element on unmount
// `containerRef` must point at the outermost modal surface. Pass `isOpen=true`
// to activate; pass a falsy `onClose` to suppress ESC handling.
const FOCUSABLE_SELECTOR = [
  'a[href]', 'area[href]',
  'button:not([disabled])',
  'input:not([disabled]):not([type="hidden"])',
  'select:not([disabled])',
  'textarea:not([disabled])',
  '[tabindex]:not([tabindex="-1"])',
].join(',');

function useFocusTrap(containerRef, isOpen, onClose) {
  useEffect(() => {
    if (!isOpen) return undefined;
    const previouslyFocused = document.activeElement;
    const container = containerRef.current;
    if (!container) return undefined;

    // Focus the first autofocus target, else the first focusable element,
    // else the container itself (as a non-focusable fallback we still want the
    // keyboard trap to work).
    function getFocusable() {
      return Array.from(container.querySelectorAll(FOCUSABLE_SELECTOR))
        .filter(el => !el.hasAttribute('disabled') && el.offsetParent !== null);
    }

    const autoEl = container.querySelector('[autofocus]');
    const initial = autoEl || getFocusable()[0] || container;
    try { initial.focus({ preventScroll: true }); } catch {}

    function onKey(e) {
      if (e.key === 'Escape' && typeof onClose === 'function') {
        e.stopPropagation();
        onClose();
        return;
      }
      if (e.key !== 'Tab') return;
      const focusable = getFocusable();
      if (focusable.length === 0) {
        e.preventDefault();
        return;
      }
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      const active = document.activeElement;
      if (e.shiftKey) {
        if (active === first || !container.contains(active)) {
          e.preventDefault();
          last.focus();
        }
      } else {
        if (active === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    document.addEventListener('keydown', onKey, true);
    return () => {
      document.removeEventListener('keydown', onKey, true);
      // Restore focus to the triggering element so keyboard users land back
      // where they started. Guard against the element being unmounted
      // (focus() on a detached node silently no-ops but can still throw in
      // jsdom / older Safari).
      if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
        try { previouslyFocused.focus({ preventScroll: true }); } catch {}
      }
    };
  }, [containerRef, isOpen, onClose]);
}

// Monotonically increasing counter for auto-generated DOM ids. Used by modal
// dialogs to wire aria-labelledby / aria-describedby without asking callers to
// manage ids. Ok to be a global — it's just a render-time counter.
let __uidCounter = 0;
function useUid(prefix = 'uid') {
  const ref = useRef(null);
  if (ref.current === null) {
    __uidCounter += 1;
    ref.current = `${prefix}-${__uidCounter}`;
  }
  return ref.current;
}

// ── Confirm action modal (inline, replaces window.prompt) ──────
// Reusable modal for plate-scoped operator actions: shows the plate, the
// action label, an optional reason textarea, and Confirm / Cancel buttons.
// Used by Confirmation review (force-bill / mark-no-tow / pause-billing /
// resume-billing) AND the Truck Parking Log cancel-pass flow.
//
// Props:
//   plate             - string plate shown prominently for confirmation
//   actionLabel       - verb displayed in the title (e.g. "Force bill")
//   description       - optional node under the title (falls back to generic)
//   confirmLabel      - button text (defaults to actionLabel)
//   confirmColor      - hex / token for the confirm background (red for
//                       destructive, accent for primary)
//   requireReason     - when true, Confirm stays disabled until the reason has
//                       at least 2 non-whitespace chars
//   reasonPlaceholder - placeholder text for the textarea
//   submitting        - disables buttons while a POST is in flight
//   onConfirm(reason) - called with trimmed reason (may be empty string)
//   onCancel()
function ConfirmActionModal({
  plate,
  actionLabel,
  description,
  confirmLabel,
  confirmColor,
  requireReason = false,
  reasonPlaceholder = 'Reason (optional)',
  submitting = false,
  onConfirm,
  onCancel,
}) {
  const [reason, setReason] = useState('');
  const trimmed = reason.trim();
  const disabled = submitting || (requireReason && trimmed.length < 2);
  const dialogRef = useRef(null);
  const titleId = useUid('modal-title');
  const descId = useUid('modal-desc');
  // ESC/overlay-click close is suppressed while submitting, matching the
  // existing pointer-guard on the overlay.
  const handleClose = submitting ? null : onCancel;
  useFocusTrap(dialogRef, true, handleClose);
  return (
    <div
      onClick={submitting ? undefined : onCancel}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
    >
      <div
        ref={dialogRef}
        role="dialog"
        aria-modal="true"
        aria-labelledby={titleId}
        aria-describedby={descId}
        tabIndex={-1}
        onClick={e => e.stopPropagation()}
        style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:16,maxWidth:440,width:'100%',outline:'none'}}
      >
        <div id={titleId} style={{fontSize:16,fontWeight:800,color:'var(--text-primary)',marginBottom:4}}>{actionLabel}?</div>
        <div id={descId} style={{fontSize:12,color:'var(--text-muted)',marginBottom:10}}>
          {description || <>Applies to plate <strong style={{color:'var(--text-primary)'}}>{plate || '—'}</strong>.</>}
        </div>
        <textarea
          value={reason}
          onChange={e => setReason(e.target.value)}
          rows={2}
          placeholder={reasonPlaceholder}
          autoFocus
          style={{width:'100%',padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:13,fontFamily:'inherit',resize:'vertical',boxSizing:'border-box'}}
        />
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:10}}>
          <button onClick={onCancel} disabled={submitting} className="pd-share-btn">Cancel</button>
          <button
            onClick={() => onConfirm(trimmed)}
            disabled={disabled}
            style={{
              background: confirmColor || 'var(--accent)',
              color: '#fff',
              border: '1px solid ' + (confirmColor || 'var(--accent)'),
              borderRadius: 6,
              padding: '4px 12px',
              fontSize: 12,
              fontWeight: 700,
              cursor: disabled ? 'not-allowed' : 'pointer',
              opacity: disabled ? 0.6 : 1,
            }}
          >{submitting ? '…' : (confirmLabel || actionLabel)}</button>
        </div>
      </div>
    </div>
  );
}
