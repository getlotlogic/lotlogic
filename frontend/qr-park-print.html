<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking QR — LotLogic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 24px 20px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    .back {
      display: inline-block;
      color: #3b82f6;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .back:hover { text-decoration: underline; }

    .picker h1 { font-size: 22px; font-weight: 800; color: #f9fafb; margin-bottom: 6px; }
    .picker p { color: #9ca3af; font-size: 14px; margin-bottom: 18px; }
    .picker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .picker-item {
      display: block;
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px 16px;
      border-radius: 10px;
      color: #e5e7eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: border-color 0.15s, background 0.15s;
    }
    .picker-item:hover { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
    .picker-item small {
      display: block;
      color: #6b7280;
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
      word-break: break-all;
    }

    .qr-view { text-align: center; padding: 20px 0; }
    .qr-view .lot-name {
      font-size: 24px;
      font-weight: 800;
      color: #f9fafb;
      margin-bottom: 8px;
    }
    .qr-view .lot-sub {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .qr-tile {
      display: inline-block;
      padding: 24px;
      background: #fff;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    #qrCanvas { display: block; width: 320px; height: 320px; }
    .qr-url {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #9ca3af;
      word-break: break-all;
      max-width: 480px;
      margin: 0 auto;
    }

    .loading-state { text-align: center; padding: 60px 0; color: #9ca3af; }
    .error-state {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/app">← Back to dashboard</a>
    <div id="content"><div class="loading-state">Loading…</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    const content = document.getElementById('content');

    const qs = new URLSearchParams(window.location.search);
    const lotId = qs.get('lot');

    async function init() {
      if (lotId && UUID_RE.test(lotId)) {
        await renderView(lotId);
      } else {
        await renderPicker();
      }
    }

    async function renderPicker() {
      try {
        const { data, error } = await supabase
          .from('lots')
          .select('id, name')
          .eq('active', true)
          .order('name', { ascending: true });
        if (error) throw error;
        if (!data || data.length === 0) {
          content.innerHTML = '<div class="error-state">No active lots found.</div>';
          return;
        }
        content.innerHTML =
          '<div class="picker">' +
            '<h1>Parking QR codes</h1>' +
            '<p>Pick a lot to view its QR code.</p>' +
            '<div class="picker-grid">' +
              data.map(l =>
                '<a class="picker-item" href="/park/qr?lot=' + encodeURIComponent(l.id) + '">' +
                  escapeHtml(l.name) +
                  '<small>' + escapeHtml(l.id) + '</small>' +
                '</a>'
              ).join('') +
            '</div>' +
          '</div>';
      } catch (err) {
        console.error(err);
        content.innerHTML = '<div class="error-state">Failed to load lots. ' + escapeHtml(err.message || '') + '</div>';
      }
    }

    async function renderView(id) {
      try {
        const { data, error } = await supabase
          .from('lots')
          .select('id, name')
          .eq('id', id)
          .single();
        if (error || !data) {
          content.innerHTML = '<div class="error-state">Lot not found.</div>';
          return;
        }
        const target = window.location.origin + '/park?lot=' + encodeURIComponent(data.id);
        content.innerHTML =
          '<div class="qr-view">' +
            '<div class="lot-name">' + escapeHtml(data.name) + '</div>' +
            '<div class="lot-sub">Scan to register your vehicle</div>' +
            '<div class="qr-tile"><canvas id="qrCanvas"></canvas></div>' +
            '<div class="qr-url">' + escapeHtml(target) + '</div>' +
          '</div>';
        QRCode.toCanvas(document.getElementById('qrCanvas'), target, {
          width: 640,
          margin: 1,
          errorCorrectionLevel: 'M',
          color: { dark: '#0f172a', light: '#ffffff' },
        }, err => { if (err) console.error('qr:', err); });
      } catch (err) {
        console.error(err);
        content.innerHTML = '<div class="error-state">Failed to load lot. ' + escapeHtml(err.message || '') + '</div>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
