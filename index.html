<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>LotLogic Operator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0c0e14;
      color: #e8eaf0;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,.12) 0%, transparent 70%), #0c0e14;
    }
    .login-box { width: 100%; max-width: 360px; }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .login-shield {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      flex-shrink: 0;
    }
    .login-wordmark { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .login-wordmark span { color: #3b82f6; }
    .login-tagline { font-size: 13px; color: #4b5563; margin-bottom: 36px; margin-top: 4px; letter-spacing: .01em; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .field-input {
      width: 100%;
      background: #13151d;
      border: 1.5px solid #1e2235;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: #e8eaf0;
      outline: none;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .field-input::placeholder { color: #2a2d3a; }
    .login-btn {
      width: 100%;
      margin-top: 16px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s, transform .1s;
      letter-spacing: .02em;
      box-shadow: 0 4px 20px rgba(59,130,246,.3);
    }
    .login-btn:active { opacity: .85; transform: scale(.99); }
    .login-btn:disabled { opacity: .4; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; background: #0c0e14; }

    /* ── Header ── */
    .header {
      background: rgba(12,14,20,.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1d2e;
      padding: 0 20px;
      padding-top: env(safe-area-inset-top);
      height: calc(58px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      padding-bottom: 11px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .header-shield {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.3px;
    }
    .header-wordmark { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .header-wordmark span { color: #3b82f6; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-name { font-size: 12px; color: #4b5563; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .signout-btn {
      background: #13151d;
      border: 1px solid #1e2235;
      color: #6b7280;
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .signout-btn:active { color: #e8eaf0; border-color: #374151; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(12,14,20,.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #1a1d2e;
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: #374151;
      font-family: inherit;
      transition: color .15s;
      position: relative;
    }
    .nav-item.active { color: #3b82f6; }
    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: #3b82f6;
      border-radius: 0 0 3px 3px;
    }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .nav-badge {
      position: absolute;
      top: 5px;
      right: calc(50% - 20px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      border: 1.5px solid #0c0e14;
    }

    /* ── Page content ── */
    .page-content {
      flex: 1;
      padding: 20px 16px calc(76px + env(safe-area-inset-bottom));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: #f3f4f6;
      letter-spacing: -.4px;
    }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      background: #13151d;
      border: 1px solid #1e2235;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Loading / empty ── */
    .loader { display: flex; align-items: center; justify-content: center; padding: 60px 0; gap: 10px; color: #374151; font-size: 14px; }
    .spin { width: 18px; height: 18px; border: 2px solid #1e2235; border-top-color: #3b82f6; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: .7; }
    .empty-title { font-size: 16px; font-weight: 700; color: #9ca3af; margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: #374151; }

    /* ── Job cards ── */
    .job-card {
      background: #13151d;
      border: 1px solid #1e2235;
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .job-card.urgent { border-color: rgba(220,38,38,.4); box-shadow: 0 2px 16px rgba(220,38,38,.12); }
    .job-urgent-bar {
      background: linear-gradient(90deg, #dc2626, #b91c1c);
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .job-body { padding: 14px 16px; }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .job-lot-name { font-size: 15px; font-weight: 700; color: #f3f4f6; line-height: 1.3; }
    .job-lot-addr { font-size: 12px; color: #4b5563; margin-top: 3px; }
    .job-timer {
      background: #0c0e14;
      border: 1px solid #1e2235;
      border-radius: 10px;
      padding: 7px 11px;
      text-align: center;
      min-width: 62px;
      flex-shrink: 0;
    }
    .job-timer-val { font-size: 18px; font-weight: 800; color: #3b82f6; font-variant-numeric: tabular-nums; line-height: 1; }
    .job-timer-val.long { color: #ef4444; }
    .job-timer-label { font-size: 9px; color: #374151; text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; font-weight: 600; }
    .job-details { display: flex; flex-wrap: wrap; gap: 7px; }
    .job-tag {
      background: #0c0e14;
      border: 1px solid #1e2235;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .job-tag strong { color: #d1d5db; font-weight: 600; }
    .plate-tag {
      background: #fef3c7;
      color: #1c1009;
      border-radius: 7px;
      padding: 5px 11px;
      font-size: 13px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: .1em;
      border: 1.5px solid #fbbf24;
    }
    .job-footer {
      border-top: 1px solid #1a1d2e;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .job-type-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .job-type-tag.unauthorized { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .job-type-tag.overtime { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.2); }
    .job-type-tag.default { background: #13151d; color: #6b7280; border: 1px solid #1e2235; }
    .job-action { font-size: 12px; font-weight: 600; color: #34d399; }

    /* ── Lot cards ── */
    .lot-card {
      background: #13151d;
      border: 1px solid #1e2235;
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .lot-card-top { padding: 16px; display: flex; align-items: flex-start; gap: 14px; }
    .lot-status-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .lot-status-dot.on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); }
    .lot-status-dot.off { background: #ef4444; }
    .lot-status-dot.warn { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,.5); }
    .lot-info { flex: 1; min-width: 0; }
    .lot-name { font-size: 16px; font-weight: 700; color: #f3f4f6; }
    .lot-addr { font-size: 12px; color: #4b5563; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lot-numbers { display: flex; gap: 20px; margin-top: 12px; }
    .lot-num { }
    .lot-num-val { font-size: 24px; font-weight: 800; color: #f3f4f6; line-height: 1; }
    .lot-num-val.red { color: #ef4444; }
    .lot-num-val.green { color: #4ade80; }
    .lot-num-label { font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; font-weight: 600; }
    .lot-actions { border-top: 1px solid #1a1d2e; display: flex; }
    .lot-action-btn {
      flex: 1;
      padding: 13px;
      border: none;
      background: none;
      color: #6b7280;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-right: 1px solid #1a1d2e;
      transition: color .15s, background .15s;
    }
    .lot-action-btn:last-child { border-right: none; }
    .lot-action-btn:active { background: #0c0e14; }
    .lot-action-btn.primary { color: #3b82f6; }
    .lot-action-btn a { color: inherit; text-decoration: none; }

    /* ── Cam snapshot ── */
    .cam-sheet { background: #0c0e14; border-radius: 0 0 16px 16px; overflow: hidden; }
    .cam-row { border-top: 1px solid #1a1d2e; padding: 12px 16px; }
    .cam-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cam-name { font-size: 12px; font-weight: 600; color: #6b7280; display: flex; align-items: center; gap: 6px; }
    .cam-time { font-size: 11px; color: #374151; }
    .cam-img-wrap { border-radius: 10px; overflow: hidden; background: #080a0f; aspect-ratio: 16/9; position: relative; }
    .cam-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-offline { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #1e2235; font-size: 13px; }
    .cam-viol-overlay {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(220,38,38,.9);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }
    .expand-cams-btn {
      width: 100%;
      border: none;
      background: none;
      color: #3b82f6;
      font-size: 13px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      font-family: inherit;
      border-top: 1px solid #1a1d2e;
      transition: opacity .15s;
    }
    .expand-cams-btn:active { opacity: .7; }

    /* ── Earnings ── */
    .earnings-hero {
      background: linear-gradient(135deg, #13151d 0%, #1a1410 100%);
      border: 1px solid #2a1e10;
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(59,130,246,.08);
    }
    .earnings-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #4b5563; margin-bottom: 10px; }
    .earnings-amount { font-size: 48px; font-weight: 800; color: #f3f4f6; letter-spacing: -2px; line-height: 1; }
    .earnings-amount span { color: #3b82f6; }
    .earnings-sub { font-size: 13px; color: #374151; margin-top: 8px; font-weight: 500; }
    .earnings-period-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .period-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid #1e2235;
      background: #13151d;
      color: #4b5563;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .period-btn.active { border-color: rgba(59,130,246,.4); color: #3b82f6; background: rgba(59,130,246,.08); }
    .earnings-breakdown {
      background: #13151d;
      border: 1px solid #1e2235;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .breakdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1d2e;
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid #0c0e14;
      transition: background .1s;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row:active { background: #0c0e14; }
    .breakdown-date { font-size: 13px; color: #d1d5db; font-weight: 600; }
    .breakdown-lot { font-size: 12px; color: #374151; margin-top: 2px; }
    .breakdown-right { text-align: right; }
    .breakdown-amt { font-size: 15px; font-weight: 700; color: #3b82f6; }
    .breakdown-action { font-size: 11px; color: #374151; text-transform: capitalize; margin-top: 2px; }
    .breakdown-plate { font-family: 'Courier New', monospace; font-size: 11px; color: #4b5563; font-weight: 600; margin-top: 2px; }

    /* ── KPI bar ── */
    .kpi-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .kpi-card {
      flex: 1; background: #13151d; border: 1px solid #1e2235; border-radius: 12px;
      padding: 12px 10px; text-align: center;
    }
    .kpi-val { font-size: 22px; font-weight: 800; line-height: 1; color: #f3f4f6; }
    .kpi-val.blue { color: #3b82f6; }
    .kpi-val.green { color: #4ade80; }
    .kpi-val.red { color: #ef4444; }
    .kpi-val.yellow { color: #fbbf24; }
    .kpi-label { font-size: 9px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    /* ── Action buttons on violation cards ── */
    .job-actions-row {
      display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid #1a1d2e;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1; min-width: 70px; padding: 9px 6px; border-radius: 8px; border: 1.5px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all .15s; text-align: center; text-transform: uppercase; letter-spacing: .04em;
    }
    .action-btn:active { transform: scale(.96); }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .action-btn.boot { background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.4); color: #fbbf24; }
    .action-btn.boot:hover:not(:disabled) { background: rgba(251,191,36,.2); }
    .action-btn.tow { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.4); color: #f87171; }
    .action-btn.tow:hover:not(:disabled) { background: rgba(239,68,68,.2); }
    .action-btn.dismiss { background: rgba(139,92,246,.1); border-color: rgba(139,92,246,.4); color: #a78bfa; }
    .action-btn.dismiss:hover:not(:disabled) { background: rgba(139,92,246,.2); }
    .action-btn.gone { background: rgba(107,114,128,.1); border-color: rgba(107,114,128,.4); color: #9ca3af; }
    .action-btn.gone:hover:not(:disabled) { background: rgba(107,114,128,.2); }

    /* ── Violation detail modal ── */
    .viol-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .viol-modal {
      background: #13151d; border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto; animation: slideUp .3s ease;
      border: 1px solid #1e2235; border-bottom: none;
    }
    .viol-modal-handle { width: 36px; height: 4px; background: #374151; border-radius: 2px; margin: 10px auto 0; }
    .viol-modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #080a0f; display: block; }
    .viol-modal-body { padding: 16px; }
    .viol-modal-title { font-size: 18px; font-weight: 800; color: #f3f4f6; margin-bottom: 4px; }
    .viol-modal-sub { font-size: 13px; color: #4b5563; margin-bottom: 14px; }
    .viol-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .viol-modal-stat {
      background: #0c0e14; border: 1px solid #1e2235; border-radius: 10px; padding: 10px 12px;
    }
    .viol-modal-stat-label { font-size: 10px; font-weight: 600; color: #4b5563; text-transform: uppercase; letter-spacing: .06em; }
    .viol-modal-stat-val { font-size: 15px; font-weight: 700; color: #e8eaf0; margin-top: 2px; }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px;
    }
    .toast {
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
      pointer-events: auto; text-align: center;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    .toast.success { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .toast.error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .toast.info { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; }

    /* ── Confirm dialog ── */

    /* ── Nav icons ── */
    .nav-icon { width: 20px; height: 20px; }

    /* ── Pull to refresh ── */

    .zone-editor-overlay {

    .ze-header {
      display: flex; align-items: center; justify-content: space-between;

    }

    .ze-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit; transition: opacity .15s;
    }
    .ze-btn:active { opacity: .7; }
    .ze-btn-primary { background: #3b82f6; color: #fff; }

    .ze-btn-ghost { background: #1e2235; color: #9ca3af; }
    .ze-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .ze-toolbar {

    .ze-panel {

    .ze-panel-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }

      appearance: none; -webkit-appearance: none;

  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = 'https://lotlogic-backend-production.up.railway.app';
const API_KEY = 'UJn9mwti15jbhgRUnhw6-VOk3TAt1VJAK3VNCIdAHa8';

async function apiFetch(path, options = {}) {
  const r = await fetch(API + path, {
    ...options,
    headers: { 'X-API-Key': API_KEY, ...(options.headers || {}) }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Time helpers ──────────────────────────────────────────────
function elapsed(isoStr) {
  if (!isoStr) return null;
  const mins = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (mins < 60) return { val: mins, unit: 'MIN', long: mins >= 45 };
  const hrs = Math.floor(mins / 60);
  return { val: hrs, unit: 'HR', long: hrs >= 2 };
}

function fmtMoney(cents) {
  if (!cents) return '$0.00';
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function mapsLink(address) {
  return `https://maps.google.com/?q=${encodeURIComponent(address)}`;
}

// ── Toast system ──────────────────────────────────────────────
const ToastContext = React.createContext({ addToast: () => {} });

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="toast-container">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return React.useContext(ToastContext); }

// ── Confirm dialog ────────────────────────────────────────────
function ConfirmDialog({ title, body, confirmLabel, confirmColor, onConfirm, onCancel }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={e => e.stopPropagation()}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-body">{body}</div>
        <div className="confirm-btns">
          <button className="confirm-cancel" onClick={onCancel}>Cancel</button>
          <button className="confirm-ok" style={{background: confirmColor || '#3b82f6'}} onClick={onConfirm}>{confirmLabel || 'Confirm'}</button>
        </div>
      </div>
    </div>
  );
}

// ── Violation detail modal ────────────────────────────────────
function ViolationModal({ violation, lot, onClose, onAction }) {
  const [snapshotUrl, setSnapshotUrl] = useState(null);
  const [imgLoading, setImgLoading] = useState(true);

  useEffect(() => {
    if (!violation?.snapshot_id) return;
    apiFetch(`/snapshots/${violation.snapshot_id}/url`)
      .then(data => setSnapshotUrl(data.url))
      .catch(() => {});
  }, [violation?.snapshot_id]);

  if (!violation) return null;
  const timer = elapsed(violation.detected_at);
  const isPending = violation.status === 'pending';

  return (
    <div className="viol-modal-overlay" onClick={onClose}>
      <div className="viol-modal" onClick={e => e.stopPropagation()}>
        <div className="viol-modal-handle" />
        {snapshotUrl ? (
          <img className="viol-modal-img" src={snapshotUrl} alt="Violation snapshot"
            onLoad={() => setImgLoading(false)}
            onError={() => setImgLoading(false)}
            style={{display: imgLoading ? 'none' : 'block'}} />
        ) : null}
        {(imgLoading && violation.snapshot_id) && (
          <div style={{width:'100%', aspectRatio:'16/9', background:'#080a0f', display:'flex', alignItems:'center', justifyContent:'center', color:'#374151', fontSize:13}}>
            Loading snapshot…
          </div>
        )}
        <div className="viol-modal-body">
          <div className="viol-modal-title">{lot?.name || 'Unknown Lot'}</div>
          <div className="viol-modal-sub">{lot?.address} · {fmtDate(violation.detected_at)} {fmtTime(violation.detected_at)}</div>

          <div className="viol-modal-grid">
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Status</div>
              <div className="viol-modal-stat-val" style={{color: isPending ? '#fbbf24' : '#4ade80'}}>
                {isPending ? 'Pending' : (violation.action_taken || 'Resolved')}
              </div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Wait Time</div>
              <div className="viol-modal-stat-val" style={{color: timer?.long ? '#ef4444' : '#3b82f6'}}>
                {timer ? `${timer.val} ${timer.unit}` : '—'}
              </div>
            </div>
            {violation.plate_text && (
              <div className="viol-modal-stat">
                <div className="viol-modal-stat-label">Plate</div>
                <div className="viol-modal-stat-val" style={{fontFamily:'Courier New, monospace', letterSpacing:'.1em'}}>{violation.plate_text}</div>
              </div>
            )}
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Zone</div>
              <div className="viol-modal-stat-val">{violation.zone_id || '—'}</div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Type</div>
              <div className="viol-modal-stat-val" style={{textTransform:'capitalize'}}>{(violation.violation_type || '').replace(/_/g, ' ')}</div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Vehicle</div>
              <div className="viol-modal-stat-val" style={{textTransform:'capitalize'}}>{[violation.vehicle_color, violation.vehicle_type].filter(Boolean).join(' ') || '—'}</div>
            </div>
            {violation.our_revenue > 0 && (
              <div className="viol-modal-stat">
                <div className="viol-modal-stat-label">Revenue</div>
                <div className="viol-modal-stat-val" style={{color:'#4ade80'}}>{fmtMoney(violation.our_revenue)}</div>
              </div>
            )}
            {violation.confidence && (
              <div className="viol-modal-stat">
                <div className="viol-modal-stat-label">Confidence</div>
                <div className="viol-modal-stat-val">{Math.round(parseFloat(violation.confidence) * 100)}%</div>
              </div>
            )}
          </div>

          {isPending && (
            <div className="job-actions-row" style={{padding:0, border:'none'}}>
              <button className="action-btn boot" onClick={() => onAction(violation.id, 'boot')}>Boot</button>
              <button className="action-btn tow" onClick={() => onAction(violation.id, 'tow')}>Tow</button>
              <button className="action-btn dismiss" onClick={() => onAction(violation.id, 'dismissed')}>Dismiss</button>
              <button className="action-btn gone" onClick={() => onAction(violation.id, 'already_gone')}>Gone</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SVG Nav Icons ─────────────────────────────────────────────
function NavIconJobs() {
  return <div className="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg></div>;
}
function NavIconLots() {
  return <div className="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>;
}
function NavIconEarnings() {
  return <div className="nav-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>;
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function submit(e) {
    e.preventDefault();
    if (!email.trim()) return;
    setLoading(true); setError('');
    try {
      const needle = email.trim().toLowerCase();
      // Check lot owners first, then enforcement partners
      const [owners, partners] = await Promise.all([
        apiFetch('/owners').catch(() => []),
        apiFetch('/partners').catch(() => []),
      ]);
      // Prefer last match — most recently created account is typically the active one
      const ownerMatches = owners.filter(o => o.email?.toLowerCase() === needle);
      const ownerMatch = ownerMatches.length > 0 ? ownerMatches[ownerMatches.length - 1] : null;
      if (ownerMatch) { onLogin({ ...ownerMatch, _role: 'owner' }); return; }
      const partnerMatches = partners.filter(p => p.email?.toLowerCase() === needle);
      const partnerMatch = partnerMatches.length > 0 ? partnerMatches[partnerMatches.length - 1] : null;
      if (partnerMatch) { onLogin({ ...partnerMatch, _role: 'partner', business_name: partnerMatch.company_name }); return; }
      setError("No account found for that email. Contact your LotLogic rep if you think this is wrong.");
    } catch {
      setError("Can't connect right now. Check your connection and try again.");
    } finally { setLoading(false); }
  }

  return (
    <div className="login-page">
      <div className="login-box">
        <div className="login-logo">
          <div className="login-shield">LL</div>
          <div className="login-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="login-tagline">Enforcement portal — sign in to get started</div>
        <form onSubmit={submit}>
          <label className="field-label">Your email</label>
          <input
            className="field-input"
            type="email"
            placeholder="you@company.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            autoCapitalize="none"
            autoCorrect="off"
            required
            autoFocus
          />
          <button className="login-btn" type="submit" disabled={loading}>
            {loading ? 'Signing in…' : 'Sign In →'}
          </button>
        </form>
        {error && <div className="login-error">{error}</div>}
      </div>
    </div>
  );
}

// ── Jobs tab (current violations) ─────────────────────────────
function JobsPage({ lots, violations, loading, lotStates, onAction }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));
  const [selectedViol, setSelectedViol] = useState(null);
  const [confirm, setConfirm] = useState(null); // { violId, action }
  const [acting, setActing] = useState(null); // violId currently being actioned
  const { addToast } = useToast();

  // Active jobs = pending violations, oldest first (most urgent first)
  const active = violations
    .filter(v => v.status === 'pending')
    .sort((a, b) => new Date(a.detected_at) - new Date(b.detected_at));

  // Recent = resolved in last 24h
  const cutoff = Date.now() - 86400000;
  const recent = violations
    .filter(v => v.status !== 'pending' && new Date(v.resolved_at || v.detected_at) > cutoff)
    .sort((a, b) => new Date(b.resolved_at || 0) - new Date(a.resolved_at || 0))
    .slice(0, 20);

  // KPIs
  const avgWaitMins = active.length > 0
    ? Math.round(active.reduce((s, v) => s + (Date.now() - new Date(v.detected_at)) / 60000, 0) / active.length)
    : 0;
  const todayResolved = recent.length;
  const todayRevenue = recent.reduce((s, v) => s + (v.our_revenue || 0), 0);

  const actionLabels = { boot: 'Boot', tow: 'Tow', dismissed: 'Dismiss', already_gone: 'Already Gone', no_action: 'No Action' };
  const actionColors = { boot: '#fbbf24', tow: '#ef4444', dismissed: '#a78bfa', already_gone: '#6b7280', no_action: '#6b7280' };

  async function handleAction(violId, action) {
    setConfirm(null);
    setActing(violId);
    try {
      await apiFetch(`/violations/${violId}/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action }),
      });
      addToast(`${actionLabels[action] || action} recorded successfully`, 'success');
      setSelectedViol(null);
      if (onAction) onAction();
    } catch (e) {
      addToast(`Failed to record action: ${e.message}`, 'error');
    } finally { setActing(null); }
  }

  function requestAction(violId, action) {
    if (action === 'tow') {
      setConfirm({ violId, action, title: 'Confirm Tow', body: 'This will record a tow for this vehicle. The tow fee will be applied. Continue?', color: '#ef4444' });
    } else if (action === 'boot') {
      setConfirm({ violId, action, title: 'Confirm Boot', body: 'This will record a boot for this vehicle. The boot fee will be applied. Continue?', color: '#fbbf24' });
    } else {
      handleAction(violId, action);
    }
  }

  if (loading && violations.length === 0) {
    return <div className="loader"><div className="spin" /> Loading jobs…</div>;
  }

  return (
    <div>
      {/* KPI bar */}
      <div className="kpi-bar">
        <div className="kpi-card">
          <div className={`kpi-val ${active.length > 0 ? 'red' : 'green'}`}>{active.length}</div>
          <div className="kpi-label">Pending</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${avgWaitMins >= 45 ? 'red' : 'blue'}`}>{avgWaitMins}<span style={{fontSize:12}}>m</span></div>
          <div className="kpi-label">Avg Wait</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{todayResolved}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{fmtMoney(todayRevenue)}</div>
          <div className="kpi-label">Earned</div>
        </div>
      </div>

      {/* Active jobs */}
      <div className="section-header">
        <div className="section-title">Open Jobs</div>
        <div className="section-count">{active.length} active</div>
      </div>

      {active.length === 0 ? (
        <div className="empty-state" style={{marginBottom: 28}}>
          <div className="empty-title">All clear</div>
          <div className="empty-body">No violations pending at your lots right now</div>
        </div>
      ) : (
        active.map(v => {
          const lot = lotMap[v.lot_id];
          const timer = elapsed(v.detected_at);
          const urgent = timer?.val >= 45;
          const isActing = acting === v.id;
          const typeClass = v.violation_type?.toLowerCase().includes('unauthorized')
            ? 'unauthorized' : v.violation_type?.toLowerCase().includes('overtime') ? 'overtime' : 'default';
          return (
            <div key={v.id} className={`job-card ${urgent ? 'urgent' : ''}`}>
              {urgent && (
                <div className="job-urgent-bar">
                  Needs attention — waiting {timer.val} {timer.unit}
                </div>
              )}
              <div className="job-body" style={{cursor:'pointer'}} onClick={() => setSelectedViol(v)}>
                <div className="job-top">
                  <div>
                    <div className="job-lot-name">{lot?.name || 'Unknown Lot'}</div>
                    <div className="job-lot-addr">{lot?.address || ''}</div>
                  </div>
                  {timer && (
                    <div className="job-timer">
                      <div className={`job-timer-val ${timer.long ? 'long' : ''}`}>{timer.val}</div>
                      <div className="job-timer-label">{timer.unit}</div>
                    </div>
                  )}
                </div>
                <div className="job-details">
                  {v.plate_text && <span className="plate-tag">{v.plate_text}</span>}
                  {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                  {v.space_number && <span className="job-tag">Space <strong>#{v.space_number}</strong></span>}
                  {v.vehicle_type && <span className="job-tag"><strong>{v.vehicle_type}</strong></span>}
                  {v.vehicle_color && <span className="job-tag"><strong style={{textTransform:'capitalize'}}>{v.vehicle_color}</strong></span>}
                  <span className="job-tag"><strong>{fmtTime(v.detected_at)}</strong></span>
                </div>
              </div>
              {/* Action buttons */}
              <div className="job-actions-row">
                <button className="action-btn boot" disabled={isActing} onClick={() => requestAction(v.id, 'boot')}>
                  {isActing ? '…' : 'Boot'}
                </button>
                <button className="action-btn tow" disabled={isActing} onClick={() => requestAction(v.id, 'tow')}>
                  {isActing ? '…' : 'Tow'}
                </button>
                <button className="action-btn dismiss" disabled={isActing} onClick={() => requestAction(v.id, 'dismissed')}>
                  Dismiss
                </button>
                <button className="action-btn gone" disabled={isActing} onClick={() => requestAction(v.id, 'already_gone')}>
                  Gone
                </button>
              </div>
              <div className="job-footer">
                <span className={`job-type-tag ${typeClass}`}>
                  {(v.violation_type || 'Violation').replace(/_/g, ' ')}
                </span>
                {lot?.address && (
                  <a href={mapsLink(lot.address)} target="_blank" rel="noopener" style={{fontSize:13, color:'#3b82f6', fontWeight:600, textDecoration:'none'}}
                    onClick={e => e.stopPropagation()}>
                    Directions →
                  </a>
                )}
              </div>
            </div>
          );
        })
      )}

      {/* Recent completed */}
      {recent.length > 0 && (
        <>
          <div className="section-header" style={{marginTop: 24}}>
            <div className="section-title">Handled Today</div>
            <div className="section-count">{recent.length} jobs</div>
          </div>
          {recent.map(v => {
            const lot = lotMap[v.lot_id];
            const actionColor = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            const col = actionColor[v.action_taken?.toLowerCase()] || '#9ca3af';
            return (
              <div key={v.id} className="job-card" style={{cursor:'pointer'}} onClick={() => setSelectedViol(v)}>
                <div className="job-body">
                  <div className="job-top">
                    <div>
                      <div className="job-lot-name" style={{fontSize:14}}>{lot?.name || 'Unknown Lot'}</div>
                      <div className="job-lot-addr">{fmtDate(v.detected_at)} · {fmtTime(v.detected_at)}</div>
                    </div>
                    {v.our_revenue > 0 && (
                      <div className="job-timer" style={{background:'#0a1a0a'}}>
                        <div style={{fontSize:15, fontWeight:800, color:'#4ade80'}}>{fmtMoney(v.our_revenue)}</div>
                        <div className="job-timer-label">earned</div>
                      </div>
                    )}
                  </div>
                  <div className="job-details">
                    {v.plate_text && <span className="plate-tag">{v.plate_text}</span>}
                    {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                    <span className="job-tag" style={{color: col}}>✓ <strong style={{color: col}}>{(v.action_taken || 'handled').replace(/_/g, ' ')}</strong></span>
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* Violation detail modal */}
      {selectedViol && (
        <ViolationModal
          violation={selectedViol}
          lot={lotMap[selectedViol.lot_id]}
          onClose={() => setSelectedViol(null)}
          onAction={(violId, action) => requestAction(violId, action)}
        />
      )}

      {/* Confirm dialog */}
      {confirm && (
        <ConfirmDialog
          title={confirm.title}
          body={confirm.body}
          confirmLabel={actionLabels[confirm.action]}
          confirmColor={confirm.color}
          onConfirm={() => handleAction(confirm.violId, confirm.action)}
          onCancel={() => setConfirm(null)}
        />
      )}
    </div>
  );
}

// ── Zone overlay (read-only, shown on camera snapshots) ──────
function ZoneOverlay({ zones }) {
  if (!zones || zones.length === 0) return null;
  return (
    <svg className="zone-overlay-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      {zones.map(z => {
        const pts = (z.polygon || []).map(p => `${p.x},${p.y}`).join(' ');
        const cx = (z.polygon || []).reduce((s, p) => s + p.x, 0) / (z.polygon?.length || 1);
        const cy = (z.polygon || []).reduce((s, p) => s + p.y, 0) / (z.polygon?.length || 1);
        return (
          <g key={z.zone_id}>
            <polygon className={`zone-poly ${z.zone_type || 'no_parking'}`} points={pts} />
            {z.label && <text className="zone-label-text" x={cx} y={cy} textAnchor="middle" dominantBaseline="central">{z.label}</text>}
          </g>
        );
      })}
    </svg>
  );
}

// ── Zone editor (full-screen draw/edit/delete/save) ──────────
function ZoneEditor({ cameraId, cameraName, existingZones, onClose, onSave }) {
  const [frameUrl, setFrameUrl] = useState(null);
  const [zones, setZones] = useState(() => (existingZones || []).map(z => ({...z})));
  const [selectedIdx, setSelectedIdx] = useState(null);
  const [drawing, setDrawing] = useState(false);
  const [newPoints, setNewPoints] = useState([]);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [dragIdx, setDragIdx] = useState(null);
  const svgRef = useRef(null);
  const imgRef = useRef(null);

  const ZONE_COLORS = { no_parking: '#ef4444', time_limited: '#8b5cf6', handicap_only: '#eab308' };

  // Load live frame
  useEffect(() => {
    let cancelled = false;
    async function loadFrame() {
      try {
        const r = await fetch(API + `/cameras/${cameraId}/frame`, { headers: { 'X-API-Key': API_KEY } });
        if (!r.ok) throw new Error(r.status);
        const blob = await r.blob();
        if (!cancelled) setFrameUrl(URL.createObjectURL(blob));
      } catch { if (!cancelled) setError('Could not load camera frame'); }
    }
    loadFrame();
    return () => { cancelled = true; };
  }, [cameraId]);

  function svgPoint(e) {
    const svg = svgRef.current;
    if (!svg) return null;
    const rect = svg.getBoundingClientRect();
    return {
      x: Math.round(((e.clientX - rect.left) / rect.width) * 10000) / 100,
      y: Math.round(((e.clientY - rect.top) / rect.height) * 10000) / 100,
    };
  }

  function handleCanvasClick(e) {
    if (dragIdx !== null) return;
    const pt = svgPoint(e);
    if (!pt) return;

    if (drawing) {
      // Check if clicking near first point to close
      if (newPoints.length >= 3) {
        const first = newPoints[0];
        const dist = Math.sqrt((pt.x - first.x) ** 2 + (pt.y - first.y) ** 2);
        if (dist < 3) { finishDrawing(); return; }
      }
      setNewPoints(prev => [...prev, pt]);
    } else {
      setSelectedIdx(null);
    }
  }

  function handleDoubleClick(e) {
    e.preventDefault();
    if (drawing && newPoints.length >= 3) {
      finishDrawing();
    }
  }

  function finishDrawing() {
    const id = 'zone_' + (zones.length + 1) + '_' + Date.now().toString(36);
    const newZone = {
      zone_id: id,
      label: 'Z' + (zones.length + 1),
      zone_type: 'no_parking',
      time_limit_minutes: null,
      polygon: [...newPoints],
    };
    setZones(prev => [...prev, newZone]);
    setSelectedIdx(zones.length);
    setDrawing(false);
    setNewPoints([]);
  }

  function handleVertexDrag(e, zoneIdx, pointIdx) {
    e.stopPropagation();
    e.preventDefault();
    setDragIdx({ zoneIdx, pointIdx });

    function onMove(ev) {
      const pt = svgPoint(ev);
      if (!pt) return;
      setZones(prev => {
        const updated = [...prev];
        const z = { ...updated[zoneIdx], polygon: [...updated[zoneIdx].polygon] };
        z.polygon[pointIdx] = pt;
        updated[zoneIdx] = z;
        return updated;
      });
    }

    function onUp() {
      setDragIdx(null);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchend', onUp);
    }

    function onTouchMove(ev) {
      if (ev.touches.length === 1) {
        onMove(ev.touches[0]);
      }
    }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('touchend', onUp);
  }

  function deleteZone(idx) {
    setZones(prev => prev.filter((_, i) => i !== idx));
    setSelectedIdx(null);
  }

  function updateZoneProp(idx, key, val) {
    setZones(prev => {
      const updated = [...prev];
      updated[idx] = { ...updated[idx], [key]: val };
      return updated;
    });
  }

  async function save() {
    setSaving(true);
    setError('');
    try {
      await apiFetch(`/cameras/${cameraId}/zones`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zones }),
      });
      if (onSave) onSave(zones);
      onClose();
    } catch (e) {
      setError('Failed to save zones: ' + e.message);
    } finally { setSaving(false); }
  }

  const selected = selectedIdx !== null ? zones[selectedIdx] : null;

  return (
    <div className="zone-editor-overlay">
      <div className="ze-header">
        <div className="ze-title">{cameraName} — Zone Editor</div>
        <div style={{display:'flex', gap:8}}>
          <button className="ze-btn ze-btn-ghost" onClick={onClose}>Cancel</button>
          <button className="ze-btn ze-btn-primary" onClick={save} disabled={saving}>
            {saving ? 'Saving…' : 'Save Zones'}
          </button>
        </div>
      </div>

      <div className="ze-body">
        {error && <div style={{padding:'8px 16px', background:'rgba(220,38,38,.1)', color:'#fca5a5', fontSize:13}}>{error}</div>}

        <div className="ze-canvas-wrap" onClick={handleCanvasClick} onDoubleClick={handleDoubleClick}>
          {frameUrl ? (
            <img ref={imgRef} src={frameUrl} alt="Camera frame" draggable="false" />
          ) : (
            <div style={{color:'#374151', fontSize:14}}>Loading frame…</div>
          )}

          <svg ref={svgRef} className="ze-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
            {/* Existing zones */}
            {zones.map((z, i) => {
              const pts = z.polygon.map(p => `${p.x},${p.y}`).join(' ');
              const color = ZONE_COLORS[z.zone_type] || '#ef4444';
              const isSelected = i === selectedIdx;
              const cx = z.polygon.reduce((s, p) => s + p.x, 0) / z.polygon.length;
              const cy = z.polygon.reduce((s, p) => s + p.y, 0) / z.polygon.length;
              return (
                <g key={z.zone_id}>
                  <polygon
                    className={`ze-poly ${isSelected ? 'selected' : ''}`}
                    points={pts}
                    fill={color}
                    stroke={color}
                    onClick={e => { e.stopPropagation(); setSelectedIdx(i); setDrawing(false); setNewPoints([]); }}
                  />
                  <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central"
                    style={{fontSize:'3px', fill:'#fff', fontWeight:700, pointerEvents:'none'}}>
                    {z.label}
                  </text>
                  {isSelected && z.polygon.map((p, pi) => (
                    <circle key={pi} className="ze-vertex" cx={p.x} cy={p.y} r={1.2}
                      style={{fill:'#fff', stroke:color, strokeWidth:0.5, cursor:'grab'}}
                      onMouseDown={e => handleVertexDrag(e, i, pi)}
                      onTouchStart={e => { e.preventDefault(); handleVertexDrag(e.touches[0], i, pi); }}
                      onClick={e => e.stopPropagation()}
                    />
                  ))}
                </g>
              );
            })}

            {/* Drawing in progress */}
            {drawing && newPoints.length > 0 && (
              <g>
                <polygon className="ze-drawing-poly"
                  points={newPoints.map(p => `${p.x},${p.y}`).join(' ')} />
                {newPoints.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r={1}
                    style={{fill: i === 0 ? '#3b82f6' : '#fff', stroke:'#3b82f6', strokeWidth:0.4}} />
                ))}
              </g>
            )}
          </svg>
        </div>

        {/* Drawing hint */}
        {drawing && (
          <div className="ze-hint">
            Click to place points. {newPoints.length >= 3 ? 'Double-click or click first point to close the polygon.' : `Need ${3 - newPoints.length} more point${3 - newPoints.length > 1 ? 's' : ''}.`}
          </div>
        )}

        {/* Toolbar: zone chips + new zone button */}
        <div className="ze-toolbar">
          <div className="ze-zone-list">
            {zones.map((z, i) => (
              <span key={z.zone_id}
                className={`ze-zone-chip ${i === selectedIdx ? 'active' : ''}`}
                style={{background: (ZONE_COLORS[z.zone_type] || '#ef4444') + '22', color: ZONE_COLORS[z.zone_type] || '#ef4444'}}
                onClick={() => { setSelectedIdx(i); setDrawing(false); setNewPoints([]); }}>
                {z.label || z.zone_id}
              </span>
            ))}
          </div>
          <button className="ze-btn ze-btn-primary" style={{padding:'6px 14px', fontSize:12}}
            onClick={() => { setDrawing(true); setSelectedIdx(null); setNewPoints([]); }}
            disabled={drawing}>
            + New Zone
          </button>
        </div>

        {/* Properties panel for selected zone */}
        {selected && !drawing && (
          <div className="ze-panel">
            <div className="ze-panel-row">
              <span className="ze-panel-label">Label</span>
              <input className="ze-panel-input" value={selected.label || ''} onChange={e => updateZoneProp(selectedIdx, 'label', e.target.value)} />
            </div>
            <div className="ze-panel-row">
              <span className="ze-panel-label">Type</span>
              <select className="ze-panel-select" value={selected.zone_type || 'no_parking'}
                onChange={e => updateZoneProp(selectedIdx, 'zone_type', e.target.value)}>
                <option value="no_parking">No Parking</option>
                <option value="time_limited">Time Limited</option>
                <option value="handicap_only">Handicap Only</option>
              </select>
            </div>
            {selected.zone_type === 'time_limited' && (
              <div className="ze-panel-row">
                <span className="ze-panel-label">Limit</span>
                <input className="ze-panel-input" type="number" min="1" placeholder="Minutes"
                  value={selected.time_limit_minutes || ''} onChange={e => updateZoneProp(selectedIdx, 'time_limit_minutes', parseInt(e.target.value) || null)} />
                <span style={{fontSize:12, color:'#6b7280'}}>min</span>
              </div>
            )}
            <div className="ze-panel-row" style={{marginTop:4}}>
              <span className="ze-panel-label">{selected.polygon.length} pts</span>
              <button className="ze-btn ze-btn-danger" style={{padding:'5px 12px', fontSize:12}} onClick={() => deleteZone(selectedIdx)}>
                Delete Zone
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Lots tab ──────────────────────────────────────────────────
function LotsPage({ lots, lotStates, loading, ownerRole, onZonesSaved }) {
  const [expandedCams, setExpandedCams] = useState({});
  const [editingZones, setEditingZones] = useState(null); // { cameraId, cameraName, lotId, zones }

  if (loading && lots.length === 0) {
    return <div className="loader"><div className="spin" /> Loading lots…</div>;
  }
  if (lots.length === 0) {
    return (
      <div className="empty-state">
        <div className="empty-title">No lots yet</div>
        <div className="empty-body">Your lots will appear here once they're set up</div>
      </div>
    );
  }

  return (
    <div>
      <div className="section-header">
        <div className="section-title">Your Lots</div>
        <div className="section-count">{lots.length} lot{lots.length !== 1 ? 's' : ''}</div>
      </div>
      {lots.map(lot => {
        const state = lotStates[lot.id];
        const viols = state?.total_active_violations || 0;
        const camsOn = state?.cameras_online || 0;
        const camsTotal = state?.cameras_total || 0;
        const dotClass = viols > 0 ? 'warn' : (camsOn < camsTotal ? 'warn' : 'on');
        const camsExpanded = expandedCams[lot.id];

        return (
          <div key={lot.id} className="lot-card">
            <div className="lot-card-top">
              <div className={`lot-status-dot ${dotClass}`} />
              <div className="lot-info">
                <div className="lot-name">{lot.name}</div>
                <div className="lot-addr">{lot.address}</div>
                <div className="lot-numbers">
                  <div className="lot-num">
                    <div className={`lot-num-val ${viols > 0 ? 'red' : 'green'}`}>{viols}</div>
                    <div className="lot-num-label">Open jobs</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val" style={{color: camsOn < camsTotal ? '#3b82f6' : '#4ade80'}}>
                      {camsOn}<span style={{fontSize:14, color:'#4b5563'}}>/{camsTotal}</span>
                    </div>
                    <div className="lot-num-label">Cams online</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val">{lot.total_spaces}</div>
                    <div className="lot-num-label">Spaces</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="lot-actions">
              <button className="lot-action-btn primary" onClick={() => setExpandedCams(p => ({...p, [lot.id]: !camsExpanded}))}>
                {camsExpanded ? 'Hide Cameras' : `Cameras (${camsTotal})`}
              </button>
              <button className="lot-action-btn">
                <a href={mapsLink(lot.address)} target="_blank" rel="noopener">Directions →</a>
              </button>
            </div>

            {/* Camera sheets */}
            {camsExpanded && state?.cameras && state.cameras.length > 0 && (
              <div className="cam-sheet">
                {state.cameras.map(cam => (
                  <div key={cam.camera_id} className="cam-row">
                    <div className="cam-row-header">
                      <div className="cam-name">
                        <span style={{color: cam.online ? '#4ade80' : '#ef4444', fontSize:8}}>●</span>
                        {cam.camera_name}
                        {cam.active_violations > 0 && (
                          <span style={{background:'#dc2626', color:'#fff', borderRadius:4, padding:'1px 6px', fontSize:10, fontWeight:700}}>
                            {cam.active_violations} violation{cam.active_violations>1?'s':''}
                          </span>
                        )}
                      </div>
                      <div style={{display:'flex', alignItems:'center', gap:8}}>
                        {ownerRole === 'owner' && (
                          <button className="ze-btn ze-btn-ghost" style={{padding:'3px 10px', fontSize:11}}
                            onClick={() => setEditingZones({ cameraId: cam.camera_id, cameraName: cam.camera_name, lotId: lot.id, zones: cam.zones || [] })}>
                            Edit Zones
                          </button>
                        )}
                        {cam.latest_snapshot && (
                          <div className="cam-time">{fmtTime(cam.latest_snapshot.captured_at)}</div>
                        )}
                      </div>
                    </div>
                    <div className="cam-img-wrap">
                      {cam.latest_snapshot?.url ? (
                        <>
                          <img
                            className="cam-img"
                            src={cam.latest_snapshot.url}
                            alt={cam.camera_name}
                            loading="lazy"
                            onError={e => { e.target.style.display = 'none'; e.target.nextSibling && (e.target.parentNode.innerHTML = '<div class="cam-offline">Snapshot unavailable</div>'); }}
                          />
                          <ZoneOverlay zones={cam.zones} />
                          {cam.active_violations > 0 && (
                            <div className="cam-viol-overlay">{cam.active_violations} open</div>
                          )}
                        </>
                      ) : (
                        <div className="cam-offline">{cam.online ? 'No snapshot yet' : 'Camera offline'}</div>
                      )}
                    </div>
                    {cam.latest_snapshot && (
                      <div style={{fontSize:11, color:'#4b5563', marginTop:6}}>
                        {cam.latest_snapshot.vehicles_detected != null
                          ? `${cam.latest_snapshot.vehicles_detected} vehicle${cam.latest_snapshot.vehicles_detected !== 1 ? 's' : ''} detected`
                          : 'Snapshot saved'}
                        {cam.zones && cam.zones.length > 0 && ` · ${cam.zones.length} zone${cam.zones.length > 1 ? 's' : ''}`}
                      </div>
                    )}
                    {cam.last_heartbeat && (
                      <div style={{fontSize:10, color:'#374151', marginTop:4}}>
                        Last heartbeat: {fmtTime(cam.last_heartbeat)}
                        {cam.channel !== undefined && ` · Ch ${cam.channel}`}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {camsExpanded && (!state?.cameras || state.cameras.length === 0) && (
              <div style={{padding:'14px 14px', borderTop:'1px solid #1e2130', fontSize:13, color:'#4b5563'}}>
                No cameras set up for this lot yet
              </div>
            )}
          </div>
        );
      })}

      {/* Zone editor overlay */}
      {editingZones && (
        <ZoneEditor
          cameraId={editingZones.cameraId}
          cameraName={editingZones.cameraName}
          existingZones={editingZones.zones}
          onClose={() => setEditingZones(null)}
          onSave={(savedZones) => { if (onZonesSaved) onZonesSaved(); }}
        />
      )}
    </div>
  );
}

// ── Earnings tab ──────────────────────────────────────────────
function EarningsPage({ violations, lots }) {
  const [period, setPeriod] = useState('month');
  const [revSummary, setRevSummary] = useState(null);
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  const periodDays = { week: 7, month: 30, all: 365 };
  const periodLabels = { week: 'This Week', month: 'This Month', all: 'All Time' };

  // Fetch revenue summary from dedicated endpoint
  useEffect(() => {
    apiFetch(`/violations/revenue?days=${periodDays[period]}`)
      .then(data => setRevSummary(data))
      .catch(() => setRevSummary(null));
  }, [period]);

  // Also compute from local violations as fallback for line items
  const now = Date.now();
  const cutoffs = { week: now - 7 * 86400000, month: now - 30 * 86400000, all: 0 };
  const resolved = violations.filter(v => {
    if (!v.action_taken || v.status === 'pending') return false;
    const ts = new Date(v.resolved_at || v.detected_at).getTime();
    return ts >= cutoffs[period];
  }).sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  // Use server summary if available, else local computation
  const totalOurs = revSummary ? revSummary.our_revenue_cents : resolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
  const totalGross = revSummary ? revSummary.gross_revenue_cents : resolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalViolations = revSummary ? revSummary.total_violations : resolved.length;
  const actionsExecuted = revSummary ? revSummary.actions_executed : resolved.length;
  const actionRate = revSummary ? revSummary.action_rate : (totalViolations > 0 ? actionsExecuted / totalViolations : 0);

  // Action breakdown from server
  const byAction = revSummary?.by_action_type || {};
  const actionEntries = Object.entries(byAction).filter(([k, v]) => v > 0 && k !== 'pending');

  return (
    <div>
      {/* Period picker */}
      <div className="earnings-period-row">
        {['week','month','all'].map(p => (
          <button key={p} className={`period-btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {periodLabels[p]}
          </button>
        ))}
      </div>

      {/* Hero total */}
      <div className="earnings-hero">
        <div className="earnings-label">{periodLabels[period]} Earnings</div>
        <div className="earnings-amount">
          <span>$</span>{(totalOurs / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
        </div>
        <div className="earnings-sub">{actionsExecuted} job{actionsExecuted !== 1 ? 's' : ''} completed · {fmtMoney(totalGross)} gross</div>
      </div>

      {/* KPI cards */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{totalViolations}</div>
          <div className="kpi-label">Violations</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{actionsExecuted}</div>
          <div className="kpi-label">Actioned</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${actionRate >= 0.5 ? 'green' : actionRate >= 0.2 ? 'yellow' : 'red'}`}>
            {Math.round(actionRate * 100)}%
          </div>
          <div className="kpi-label">Action Rate</div>
        </div>
      </div>

      {/* Action breakdown */}
      {actionEntries.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Action</div>
          {actionEntries.map(([action, count]) => {
            const colors = { boots: '#fbbf24', tows: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };
            return (
              <div key={action} className="breakdown-row">
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <span style={{width:8, height:8, borderRadius:'50%', background: colors[action] || '#6b7280', flexShrink:0}} />
                  <span style={{fontSize:15, fontWeight:700, color:'#e5e7eb', textTransform:'capitalize'}}>{action.replace(/_/g, ' ')}</span>
                </div>
                <div style={{fontSize:15, fontWeight:700, color:'#6b7280'}}>{count}×</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Per-lot breakdown */}
      {revSummary?.by_lot && revSummary.by_lot.length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Lot</div>
          {revSummary.by_lot.map(item => {
            const lot = lotMap[item.lot_id];
            return (
              <div key={item.lot_id} className="breakdown-row">
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'#d1d5db'}}>{lot?.name || item.lot_id?.slice(0,8)}</div>
                  <div style={{fontSize:12, color:'#4b5563'}}>{item.actions} action{item.actions !== 1 ? 's' : ''}</div>
                </div>
                <div className="breakdown-amt">{fmtMoney(item.our_revenue_cents)}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Line items */}
      {resolved.length === 0 ? (
        <div className="empty-state">
          <div className="empty-title">No earnings yet {period !== 'all' ? 'this period' : ''}</div>
          <div className="empty-body">Completed jobs will show up here</div>
        </div>
      ) : (
        <div className="earnings-breakdown">
          <div className="breakdown-header">Recent Jobs</div>
          {resolved.slice(0, 30).map(v => {
            const lot = lotMap[v.lot_id];
            return (
              <div key={v.id} className="breakdown-row">
                <div className="breakdown-left">
                  <div className="breakdown-date">{fmtDate(v.resolved_at || v.detected_at)} · {fmtTime(v.resolved_at || v.detected_at)}</div>
                  <div className="breakdown-lot">{lot?.name || '—'}</div>
                  {v.plate_text && <div className="breakdown-plate">{v.plate_text}</div>}
                </div>
                <div className="breakdown-right">
                  <div className="breakdown-amt">{v.our_revenue ? fmtMoney(v.our_revenue) : '—'}</div>
                  <div className="breakdown-action">{(v.action_taken || v.status).replace(/_/g, ' ')}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [owner, setOwner] = useState(null);
  const [tab, setTab] = useState('jobs');
  const [lots, setLots] = useState([]);
  const [lotStates, setLotStates] = useState({});
  const [violations, setViolations] = useState([]);
  const [loading, setLoading] = useState(false);
  const timerRef = useRef(null);

  const loadData = useCallback(async (o, silent = false) => {
    if (!o) return;
    if (!silent) setLoading(true);
    try {
      // Owners see only their own lots; partners see lots in their market filtered by partner_id
      const lotsUrl = o._role === 'partner'
        ? `/lots?market_id=${o.market_id}`
        : `/lots?owner_id=${o.id}`;
      let lotsData = await apiFetch(lotsUrl);
      if (o._role === 'partner') {
        lotsData = lotsData.filter(l => String(l.partner_id) === String(o.id));
      }
      setLots(lotsData);

      const [states, violsArrays] = await Promise.all([
        Promise.all(lotsData.map(l => apiFetch(`/lots/${l.id}/state`).then(s => [l.id, s]).catch(() => [l.id, null]))),
        Promise.all(lotsData.map(l => apiFetch(`/violations?lot_id=${l.id}&page_size=200`).catch(() => []))),
      ]);

      setLotStates(Object.fromEntries(states));

      const flat = [];
      lotsData.forEach((lot, i) => {
        const data = violsArrays[i];
        const items = Array.isArray(data) ? data : (data?.items || []);
        items.forEach(v => flat.push({ ...v, lot_id: v.lot_id || lot.id }));
      });
      setViolations(flat);
      // Revenue is computed client-side from lot-scoped violations (no global endpoint)
    } catch (e) { console.error(e); }
    finally { if (!silent) setLoading(false); }
  }, []);

  function login(o) {
    setOwner(o);
    loadData(o);
  }

  function logout() {
    clearInterval(timerRef.current);
    setOwner(null); setLots([]); setLotStates({}); setViolations([]);
    setTab('jobs');
  }

  useEffect(() => {
    if (!owner) return;
    timerRef.current = setInterval(() => loadData(owner, true), 30000);
    return () => clearInterval(timerRef.current);
  }, [owner, loadData]);

  if (!owner) return <LoginPage onLogin={login} />;

  const pending = violations.filter(v => v.status === 'pending').length;

  const navIcons = { jobs: NavIconJobs, lots: NavIconLots, earnings: NavIconEarnings };
  const tabs = [
    { id: 'jobs',     label: 'Jobs',     badge: pending },
    { id: 'lots',     label: 'Lots',     badge: 0 },
    { id: 'earnings', label: 'Earnings', badge: 0 },
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="header-left">
          <div className="header-shield">LL</div>
          <div className="header-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="header-right">
          <div className="header-name">{owner.business_name || owner.contact_name}</div>
          <button className="signout-btn" onClick={logout}>Sign out</button>
        </div>
      </div>

      <div className="page-content">
        {tab === 'jobs'     && <JobsPage lots={lots} violations={violations} loading={loading} lotStates={lotStates} onAction={() => loadData(owner, true)} />}
        {tab === 'lots'     && <LotsPage lots={lots} lotStates={lotStates} loading={loading} ownerRole={owner._role} onZonesSaved={() => loadData(owner, true)} />}
        {tab === 'earnings' && <EarningsPage violations={violations} lots={lots} />}
      </div>

      <div className="bottom-nav">
        {tabs.map(t => {
          const Icon = navIcons[t.id];
          return (
            <button key={t.id} className={`nav-item ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
              {t.badge > 0 && <span className="nav-badge">{t.badge}</span>}
              {Icon && <Icon />}
              <span className="nav-label">{t.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ToastProvider><App /></ToastProvider>);
</script>
</body>
</html>
