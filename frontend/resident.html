<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Resident Registration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .shield {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 12px;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
    }
    .logo h1 span { color: #3b82f6; }
    .property-name {
      text-align: center;
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .property-name strong {
      display: block;
      font-size: 18px;
      color: #e5e7eb;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label .required { color: #ef4444; margin-left: 2px; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #4b5563; }
    .plate-input { text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; font-size: 20px; text-align: center; }
    .file-upload {
      position: relative;
      width: 100%;
      padding: 16px 14px;
      background: #0f1117;
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .file-upload:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .file-upload.has-file { border-color: #4ade80; border-style: solid; }
    .file-upload input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-upload-icon { font-size: 24px; margin-bottom: 4px; color: #6b7280; }
    .file-upload-text { font-size: 13px; color: #6b7280; }
    .file-upload-name { font-size: 13px; color: #4ade80; font-weight: 600; margin-top: 4px; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: #4ade80; fill: none; stroke-width: 2.5; }
    .success-card h2 { font-size: 20px; color: #f9fafb; margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: #9ca3af; line-height: 1.5; }
    .success-plate {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin: 16px 0;
    }
    .success-detail {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .pending-badge {
      display: inline-block;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: #6b7280;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 { font-size: 18px; color: #f87171; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: #6b7280; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const app = document.getElementById('app');

    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null;

    let property = null;
    let platePhotoFile = null;
    let leaseFile = null;

    async function init() {
      if (!qrCodeId) {
        showNotFound('Invalid Link', 'This resident registration link is not valid.');
        return;
      }

      const { data, error } = await supabase
        .from('properties')
        .select('id, name, address')
        .eq('qr_code_id', qrCodeId)
        .single();

      if (error || !data) {
        showNotFound('Property Not Found', 'This registration link is not valid or has expired.');
        return;
      }

      property = data;
      showForm();
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function showForm() {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="property-name">
          Resident Vehicle Registration
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="regForm">
          <label for="holderName">Full Name <span class="required">*</span></label>
          <input type="text" id="holderName" placeholder="John Doe" required>

          <label for="unitNumber">Unit Number <span class="required">*</span></label>
          <input type="text" id="unitNumber" placeholder="Unit 204" required>

          <label for="plate">License Plate <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">

          <label for="plateExpiration">Plate / Tag Expiration Date <span class="required">*</span></label>
          <input type="date" id="plateExpiration" required>

          <label>Picture of License Plate <span class="required">*</span></label>
          <div class="file-upload" id="plateUploadZone">
            <input type="file" id="platePhoto" accept="image/*" capture="environment">
            <div class="file-upload-icon">&#128247;</div>
            <div class="file-upload-text">Tap to take photo or choose file</div>
            <div class="file-upload-name" id="plateFileName"></div>
          </div>

          <label>Copy of Lease <span class="required">*</span></label>
          <div class="file-upload" id="leaseUploadZone">
            <input type="file" id="leaseDoc" accept="image/*,.pdf,.doc,.docx">
            <div class="file-upload-icon">&#128196;</div>
            <div class="file-upload-text">Upload lease document (PDF, image, or Word)</div>
            <div class="file-upload-name" id="leaseFileName"></div>
          </div>

          <div class="row">
            <div>
              <label for="phone">Phone Number <span class="required">*</span></label>
              <input type="tel" id="phone" placeholder="(555) 123-4567" required>
            </div>
            <div>
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" placeholder="john@email.com" required>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">Register Vehicle</button>
          <div class="hint">Registration requires leasing office approval</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('regForm').addEventListener('submit', handleSubmit);

      document.getElementById('platePhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const zone = document.getElementById('plateUploadZone');
        const nameEl = document.getElementById('plateFileName');
        if (file) {
          platePhotoFile = file;
          zone.classList.add('has-file');
          nameEl.textContent = file.name;
        } else {
          platePhotoFile = null;
          zone.classList.remove('has-file');
          nameEl.textContent = '';
        }
      });

      document.getElementById('leaseDoc').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const zone = document.getElementById('leaseUploadZone');
        const nameEl = document.getElementById('leaseFileName');
        if (file) {
          leaseFile = file;
          zone.classList.add('has-file');
          nameEl.textContent = file.name;
        } else {
          leaseFile = null;
          zone.classList.remove('has-file');
          nameEl.textContent = '';
        }
      });
    }

    async function uploadFile(bucket, file, prefix) {
      const ext = file.name.split('.').pop();
      const path = prefix + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
      const { data, error } = await supabase.storage.from(bucket).upload(path, file);
      if (error) throw new Error('Upload failed: ' + error.message);
      const { data: urlData } = supabase.storage.from(bucket).getPublicUrl(path);
      return urlData.publicUrl;
    }

    let submitting = false;
    async function handleSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const holderName = document.getElementById('holderName').value.trim();
        const unitNumber = document.getElementById('unitNumber').value.trim();
        const plateRaw = document.getElementById('plate').value.trim();
        const plateText = plateRaw.toUpperCase().replace(/[^A-Z0-9]/g, '');
        const plateExpiration = document.getElementById('plateExpiration').value;
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!plateText || plateText.length < 2) {
          throw new Error('Please enter a valid license plate number.');
        }
        if (!platePhotoFile) {
          throw new Error('Please upload a picture of your license plate.');
        }
        if (!leaseFile) {
          throw new Error('Please upload a copy of your lease.');
        }

        btn.textContent = 'Uploading plate photo...';
        const platePhotoUrl = await uploadFile('resident-plates', platePhotoFile, property.id);

        btn.textContent = 'Uploading lease...';
        const leaseDocUrl = await uploadFile('resident-leases', leaseFile, property.id);

        btn.textContent = 'Registering...';
        const { data, error } = await supabase
          .from('resident_plates')
          .insert({
            property_id: property.id,
            plate_text: plateText,
            unit_number: unitNumber,
            holder_name: holderName,
            vehicle_description: '',
            active: true,
            plate_expiration: plateExpiration,
            plate_photo_url: platePhotoUrl,
            lease_doc_url: leaseDocUrl,
            phone: phone,
            email: email,
            status: 'pending',
          })
          .select()
          .single();

        if (error) {
          if (error.code === '23505') {
            throw new Error('This license plate is already registered at this property.');
          }
          throw new Error('Failed to register. Please try again.');
        }

        showSuccess(plateText);
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Register Vehicle';
        submitting = false;
      }
    }

    function showSuccess(plate) {
      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>Registration Submitted!</h2>
          <p>Your vehicle has been registered at <strong>${escapeHtml(property.name)}</strong>.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="pending-badge">Pending Leasing Office Approval</div>
          <div class="success-detail">You will be notified once your registration is approved.</div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
