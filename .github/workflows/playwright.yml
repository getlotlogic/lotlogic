name: Playwright

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'BASE_URL to test against (defaults to live beta)'
        required: false

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: e2e + a11y
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve BASE_URL
        id: base
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "value=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.VERCEL_PREVIEW_URL }}" ]; then
            echo "value=${{ secrets.VERCEL_PREVIEW_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://lotlogic-beta.vercel.app" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        env:
          BASE_URL: ${{ steps.base.outputs.value }}
          API_URL: ${{ secrets.API_URL || 'https://lotlogic-backend-production.up.railway.app' }}
          TEST_OWNER_A_EMAIL: ${{ secrets.TEST_OWNER_A_EMAIL }}
          TEST_OWNER_A_PASSWORD: ${{ secrets.TEST_OWNER_A_PASSWORD }}
          TEST_OWNER_B_EMAIL: ${{ secrets.TEST_OWNER_B_EMAIL }}
          TEST_OWNER_B_PASSWORD: ${{ secrets.TEST_OWNER_B_PASSWORD }}
          TEST_PARTNER_A_EMAIL: ${{ secrets.TEST_PARTNER_A_EMAIL }}
          TEST_PARTNER_A_PASSWORD: ${{ secrets.TEST_PARTNER_A_PASSWORD }}
        run: npm test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/playwright-report
          retention-days: 14
