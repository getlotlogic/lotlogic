<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parking Pass</title>
  <!-- reCAPTCHA v3. The site key is a PUBLIC value by design (Google docs
       explicitly state it's safe to expose); security relies only on the
       server-side RECAPTCHA_SECRET_KEY. The key below is a placeholder —
       replace it with the real site key from the Google reCAPTCHA admin
       console. Keep Vercel env RECAPTCHA_SITE_KEY in sync so any future
       build step that injects it matches the hardcoded value.
       TODO: update this constant if you rotate the reCAPTCHA site. -->
  <meta name="recaptcha-site-key" content="6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE">
  <script src="https://www.google.com/recaptcha/api.js?render=6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,500,50;9..144,700,50;9..144,800,80;9..144,900,80&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F2EAD8;
      --paper-2: #EADFC7;
      --paper-3: #DFD2B5;
      --ink: #1F1B14;
      --ink-2: #3D3528;
      --ink-3: #6F6450;
      --amber: #D97706;
      --amber-soft: #FBBF24;
      --terra: #C97A4A;
      --terra-deep: #9A5530;
      --status-ok: #4A7A48;
      --status-no: #B14535;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -.005em;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(31,27,20,0.025) 0 1.2px, transparent 1.5px),
        radial-gradient(circle at 78% 62%, rgba(31,27,20,0.02) 0 1px, transparent 1.5px),
        radial-gradient(circle at 42% 88%, rgba(31,27,20,0.018) 0 0.8px, transparent 1.2px);
      background-size: 240px 240px, 320px 320px, 200px 200px;
    }
    .card {
      background: var(--paper);
      border: 1.5px solid var(--ink);
      padding: 32px 28px;
      max-width: 440px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .shield {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-6deg);
      margin-bottom: 12px;
    }
    .logo .shield svg { display: block; }
    .logo h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 36px;
      letter-spacing: -.02em;
      line-height: 1;
      color: var(--ink);
      text-transform: none;
    }
    .logo h1 span { color: var(--amber); font-style: italic; }
    .logo h1 .o-spot {
      display: inline-block;
      width: 0.5em; height: 0.5em;
      border: 3px solid currentColor;
      border-radius: 999px;
      margin: 0 0.04em;
      position: relative;
      top: -0.06em;
    }
    .property-name {
      text-align: center;
      font-size: 14px;
      color: var(--ink-3);
      margin-bottom: 28px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .property-name strong {
      display: block;
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 700, "SOFT" 80;
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      margin-top: 6px;
      letter-spacing: -.01em;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      margin-bottom: 6px;
      margin-top: 16px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    label .required { color: var(--status-no); margin-left: 2px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--paper-2);
      border: 1.5px solid var(--ink);
      border-radius: 0;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: background 0.15s;
    }
    input:focus, select:focus { background: var(--paper-3); }
    input::placeholder { color: var(--ink-3); }
    select { appearance: none; cursor: pointer; }
    select option { background: var(--paper); color: var(--ink); }
    .plate-input {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 22px;
      text-align: center;
      font-family: 'DM Mono', ui-monospace, monospace;
      background: var(--amber-soft);
    }
    .plate-input:focus { background: var(--amber-soft); }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: var(--paper);
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: background 0.15s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { background: var(--terra-deep); border-color: var(--terra-deep); }
    .validity {
      text-align: center;
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 14px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .error {
      background: rgba(177,69,53,0.12);
      border: 1.5px solid var(--status-no);
      color: var(--status-no);
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      border: 2px solid var(--status-ok);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: var(--status-ok); fill: none; stroke-width: 2.5; }
    .success-card h2 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 28px;
      letter-spacing: -.015em;
      color: var(--ink);
      margin-bottom: 10px;
      line-height: 1.05;
    }
    .success-card h2 em { font-style: italic; color: var(--amber); }
    .success-card p { font-size: 15px; color: var(--ink-2); line-height: 1.55; }
    .success-card p em {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-variation-settings: "opsz" 14, "wght" 600, "SOFT" 50;
    }
    .success-plate {
      display: inline-block;
      background: var(--amber-soft);
      border: 1.5px solid var(--ink);
      color: var(--ink);
      padding: 10px 22px;
      font-family: 'DM Mono', ui-monospace, monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin: 18px 0;
    }
    .success-detail {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 8px;
      font-family: 'DM Mono', ui-monospace, monospace;
      letter-spacing: .04em;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: var(--ink-3);
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-variation-settings: "opsz" 14, "wght" 500, "SOFT" 50;
      font-size: 16px;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144, "wght" 800, "SOFT" 80;
      font-size: 22px;
      color: var(--status-no);
      margin-bottom: 10px;
      letter-spacing: -.01em;
    }
    .not-found p { font-size: 14px; color: var(--ink-2); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading the form…</div>
  </div>

  <script>
    // Raw fetch against Supabase PostgREST + Storage. Dropping supabase-js here
    // because its createClient() auto-opens a realtime WebSocket that can hang
    // on strict networks / extensions and leave the page stuck on "Loading...".
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    // Backend base. Used for endpoints that anon role can't read directly
    // (e.g. /visitor_passes/check-active — RLS blocks anon SELECT on
    // visitor_passes, so the QR form's pre-flight duplicate-pass check
    // MUST go through the backend's public, minimal-response endpoint).
    const BACKEND_URL = 'https://lotlogic-backend-production.up.railway.app';

    // reCAPTCHA v3 site key. Public value — Google explicitly documents
    // that the site key is meant to be exposed; security relies only on
    // the server-side RECAPTCHA_SECRET_KEY. Mirrored in the <meta> tag in
    // <head> so any future build step that does token replacement has
    // exactly one place to patch.
    const RECAPTCHA_SITE_KEY =
      (document.querySelector('meta[name=recaptcha-site-key]')?.content)
      || '6LdaAb4sAAAAACd5g-pYqnQBWHdvMmGCufwtEQnE';

    // Fetch a fresh reCAPTCHA v3 token for the given action. Returns null
    // on script-load failure so the caller can decide whether to hard-fail
    // or continue (we hard-fail on submit — Intuit requires a valid token).
    async function getRecaptchaToken(action) {
      if (!window.grecaptcha || typeof grecaptcha.ready !== 'function') {
        return null;
      }
      return new Promise((resolve, reject) => {
        try {
          grecaptcha.ready(() => {
            grecaptcha.execute(RECAPTCHA_SITE_KEY, { action }).then(resolve, reject);
          });
        } catch (err) {
          reject(err);
        }
      });
    }

    async function pgRest(path, init = {}, timeoutMs = 10000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
          ...init,
          signal: ctrl.signal,
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            ...(init.headers || {}),
          },
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const err = new Error((body && body.message) || ('HTTP ' + res.status));
          err.code = body && body.code;
          err.details = body && body.details;
          err.status = res.status;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    const app = document.getElementById('app');

    // QR code id comes from /visit.html/<qr> in the URL, but we also accept
    // ?qr=<id> so a shared / emailed link like /visit.html?qr=... still works.
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = (pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null)
      || new URLSearchParams(window.location.search).get('qr');

    let property = null;

    async function init() {
      if (!qrCodeId) {
        showNotFound('Invalid Link', 'This parking pass link is not valid.');
        return;
      }
      try {
        const rows = await pgRest(`/properties?select=id,name,address,property_type,policy_text,policy_phone&qr_code_id=eq.${encodeURIComponent(qrCodeId)}&limit=1`);
        const data = Array.isArray(rows) ? rows[0] : null;
        if (!data) {
          showNotFound('Lot Not Found', 'This parking pass link is not valid or has expired.');
          return;
        }
        property = data;
        showForm();
      } catch (err) {
        console.error('init error:', err);
        showConnectionError(err);
      }
    }

    function showConnectionError(err) {
      const detail = err && (err.name === 'AbortError' ? 'Request timed out.' : (err.message || 'Network error.'));
      app.innerHTML = `
        <div class="logo"><div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div><h1>LotL<span>o</span>gic</h1></div>
        <div class="not-found">
          <h2>Can't reach our server.</h2>
          <p>${escapeHtml(detail)}</p>
          <p>Check your connection — then give it another go.</p>
          <button id="retryBtn" class="submit-btn" style="margin-top:18px">Try again →</button>
        </div>
      `;
      const btn = document.getElementById('retryBtn');
      if (btn) btn.addEventListener('click', () => {
        app.innerHTML = '<div class="loading-state">Loading the form…</div>';
        init();
      });
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div>
          <h1>LotL<span>o</span>gic</h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    // Form-mount idempotency key — same key reused on every retry of the same form.
    let idempotencyKey = null;
    function newIdempotencyKey() {
      idempotencyKey = (crypto.randomUUID && crypto.randomUUID()) ||
        (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2));
    }

    // Drivers helpfully append the plate's state/province — "PB36041 ON",
    // "3874552 NC", "P886417 ONTARIO". The camera never reads a state suffix,
    // so a stored suffix makes the plate permanently unmatchable (observed in
    // production: PB36041ON registered, then re-registered correctly 20 min
    // later). Strip standalone trailing region tokens from the RAW input,
    // BEFORE separator-stripping destroys the token boundary — a legit plate
    // that merely ENDS in "NC" with no space is never touched.
    const REGION_TOKENS = new Set((
      'AL AK AZ AR CA CO CT DE FL GA HI ID IL IN IA KS KY LA ME MD MA MI MN MS MO MT NE NV NH NJ NM NY NC ND OH OK OR PA RI SC SD TN TX UT VT VA WA WV WI WY DC ' +
      'AB BC MB NB NL NS NT NU ON PE QC SK YT ' +
      'ALABAMA ALASKA ARIZONA ARKANSAS CALIFORNIA COLORADO CONNECTICUT DELAWARE FLORIDA GEORGIA HAWAII IDAHO ILLINOIS INDIANA IOWA KANSAS KENTUCKY LOUISIANA MAINE MARYLAND MASSACHUSETTS MICHIGAN MINNESOTA MISSISSIPPI MISSOURI MONTANA NEBRASKA NEVADA OHIO OKLAHOMA OREGON PENNSYLVANIA TENNESSEE TEXAS UTAH VERMONT VIRGINIA WASHINGTON WISCONSIN WYOMING ' +
      'ONTARIO QUEBEC ALBERTA SASKATCHEWAN MANITOBA YUKON'
    ).split(' '));
    // Two-word regions checked as a joined pair below.
    ['NEW HAMPSHIRE','NEW JERSEY','NEW MEXICO','NEW YORK','NORTH CAROLINA','NORTH DAKOTA','SOUTH CAROLINA','SOUTH DAKOTA','RHODE ISLAND','WEST VIRGINIA','NOVA SCOTIA','NEW BRUNSWICK','BRITISH COLUMBIA','PRINCE EDWARD','NORTHWEST TERRITORIES'].forEach(r => REGION_TOKENS.add(r));

    function normalizePlate(s) {
      let tokens = String(s || '').trim().toUpperCase().split(/[\s,.\-\/]+/).filter(Boolean);
      let changed = true;
      // tokens.length > 1 guard: never strip the entry down to nothing — a
      // back plate typed as just "SD" survives here and is rejected by
      // validation instead ("that looks like a state, not a plate").
      while (changed && tokens.length > 1) {
        changed = false;
        const last = tokens[tokens.length - 1];
        const lastTwo = tokens.length > 2 ? tokens[tokens.length - 2] + ' ' + last : null;
        if (lastTwo && REGION_TOKENS.has(lastTwo)) { tokens.pop(); tokens.pop(); changed = true; }
        else if (REGION_TOKENS.has(last)) { tokens.pop(); changed = true; }
      }
      return tokens.join('').replace(/[^A-Z0-9]/g, '');
    }
    function normalizePhone(s) {
      const digits = (s || '').replace(/\D/g, '');
      if (digits.length === 10) return '+1' + digits;
      if (digits.length === 11 && digits.startsWith('1')) return '+' + digits;
      if (digits.startsWith('+')) return s;
      return digits ? ('+' + digits) : '';
    }

    const DEFAULT_TRUCK_PLAZA_POLICY = `TRUCK PARKING POLICIES

1. DROPPED TRAILERS
Dropped trailers are NOT permitted on the property.

2. DESIGNATED PARKING ONLY
All trucks must park in marked parking spaces only. Parking is NOT allowed:
• Beside the store
• Around the CAT Scale
• Gas drop location
• Diesel drop location
• Beside the white air hose building
• Parallel to the driveway
• In front of or blocking dumpsters
• Employee parking areas (Employees Only)

3. PARKING TIME LIMIT
Maximum parking time is 48 HOURS. Once your noted time has ended, trucks must remain off the property for 24 hours before returning. NO EXCEPTIONS.

4. VEHICLE WASHING
Truck or trailer washing is NOT permitted anywhere on the property.

5. PERSONAL VEHICLES
Personal vehicles are NOT allowed in truck parking areas or employee parking areas.

6. DIESEL FUEL ISLAND
Sleeping or parking on the diesel fuel island is strictly prohibited.

TOWING ENFORCED
Violation of these policies will result in towing at the vehicle owner's expense. Parking enforcement is authorized by property management and carried out by the property's tow operator.

LIABILITY NOTICE
The property and tow operator are not responsible for any damage to vehicles that occurs on the property or during towing. By registering, you agree to follow all parking policies and understand this liability notice.`;

    function showForm() {
      newIdempotencyKey();
      if (property.property_type === 'truck_plaza') {
        showTruckPlazaForm();
      } else {
        showApartmentForm();
      }
    }

    function showApartmentForm() {
      app.innerHTML = `
        <div class="logo">
          <div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div>
          <h1>LotL<span>o</span>gic</h1>
        </div>
        <div class="property-name">
          parking pass at
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="passForm">
          <label for="visitorName">Full Name <span class="required">*</span></label>
          <input type="text" id="visitorName" placeholder="Jane Smith" required>

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="plate">License Plate <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">
          <div style="font-size:12px;opacity:.65;margin-top:4px;">Plate characters only — no state or province</div>

          <label for="backPlate">Back License Plate <span style="opacity:.7;font-weight:normal;">(if different)</span></label>
          <input type="text" id="backPlate" class="plate-input" placeholder="leave blank if same" maxlength="10" autocomplete="off">
          <div style="font-size:12px;opacity:.65;margin-top:4px;">Plate characters only — no state or province</div>

          <label for="stayHours">How long will you be here? <span class="required">*</span></label>
          <select id="stayHours" required>
            <option value="2">2 hours</option>
            <option value="4">4 hours</option>
            <option value="8">8 hours</option>
            <option value="12">12 hours</option>
            <option value="24" selected>24 hours</option>
            <option value="48">48 hours (maximum)</option>
          </select>

          <button type="submit" class="submit-btn" id="submitBtn">Get my pass →</button>
          <div class="validity">MAXIMUM STAY · 48 HOURS</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('passForm').addEventListener('submit', handleApartmentSubmit);
    }

    function showTruckPlazaForm() {
      app.innerHTML = `
        <div class="logo">
          <div class="shield"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1F1B14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><path d="M9 10h2a2 2 0 0 1 0 4H9zm0 0v4"/></svg></div>
          <h1>LotL<span>o</span>gic</h1>
        </div>
        <div class="property-name">
          parking pass registration<br>
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="passForm">
          <label for="plate">Truck License Plate <span class="required">*</span> <span style="opacity:.7;font-weight:normal;">(front-of-tractor)</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">
          <div style="font-size:12px;opacity:.65;margin-top:4px;">Plate characters only — no state or province</div>
          <div id="preflightMsg" style="font-size:13px;color:#9A5530;margin-top:-8px;margin-bottom:8px;font-family:'DM Mono',monospace;letter-spacing:.04em;"></div>

          <label for="backPlate">Trailer / Rear License Plate <span style="opacity:.7;font-weight:normal;">(if different)</span></label>
          <input type="text" id="backPlate" class="plate-input" placeholder="leave blank if same" maxlength="10" autocomplete="off">
          <div style="font-size:12px;opacity:.65;margin-top:4px;">Plate characters only — no state or province</div>

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="companyName">Company Name <span class="required">*</span></label>
          <input type="text" id="companyName" placeholder="ACME Trucking Co" required maxlength="80">

          <label for="driverName">Operator Name <span class="required">*</span></label>
          <input type="text" id="driverName" placeholder="John Smith" required maxlength="80">

          <label for="stayHours">Stay Duration <span class="required">*</span></label>
          <select id="stayHours" required>
            <option value="" disabled selected>Select duration</option>
            <option value="12">12 hours</option>
            <option value="24">24 hours</option>
            <option value="36">36 hours</option>
            <option value="48">48 hours</option>
          </select>

          <div style="margin-top:18px;background:#1F1B14;color:#F4ECD8;border:1.5px solid #1F1B14;padding:16px 18px;font-size:13px;line-height:1.55;letter-spacing:.02em;">
            <div style="font-family:'Fraunces',serif;font-style:italic;font-size:16px;margin-bottom:10px;color:#F4ECD8;">Towing enforced — please read the rules.</div>
            <!-- The property's official posted policy, shown as the actual signed document image.
                 Keyed by qr_code_id so each property can drop in /policy/<qr>.jpg. Falls back to
                 the text policy only if no image exists for this property. -->
            <img src="/policy/${escapeHtml(qrCodeId)}.jpg"
                 alt="Official truck parking policies"
                 style="width:100%;height:auto;display:block;border-radius:6px;background:#FFFFFF;"
                 onerror="this.style.display='none';var f=document.getElementById('policyTextFallback');if(f)f.style.display='block';" />
            <div id="policyTextFallback" style="display:none;white-space:pre-wrap;max-height:260px;overflow:auto;color:#F4ECD8;font-size:12.5px;line-height:1.5;background:#171309;border:1px solid #2A241A;border-radius:6px;padding:12px 14px;">${escapeHtml(property.policy_text || DEFAULT_TRUCK_PLAZA_POLICY)}</div>
            <div style="margin-top:12px;font-size:12px;color:#D9C9A6;">NMLD Towing &middot; ${escapeHtml(property.policy_phone || '(269) 217-6208')} &middot; Truck parking rules are in effect 24/7.</div>
            <div style="margin-top:10px;font-size:12px;color:#D9C9A6;">By submitting you confirm you have read and agree to all parking policies shown above and understand the liability notice.</div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn" style="margin-top:18px;">Get parking pass →</button>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('passForm').addEventListener('submit', handleTruckPlazaSubmit);
      document.getElementById('plate').addEventListener('blur', preflightCheckPlate);
    }

    async function preflightCheckPlate() {
      const msg = document.getElementById('preflightMsg');
      msg.textContent = '';
      const plate = normalizePlate(document.getElementById('plate').value);
      if (!plate || plate.length < 2) return;
      try {
        // Pre-flight the duplicate-pass warning via the backend's public
        // /visitor_passes/check-active endpoint. Reading visitor_passes
        // directly from PostgREST returns [] under the anon role (no SELECT
        // policy), so the old direct-query path was silently useless — a
        // driver re-scanning the QR after a few hours would never see the
        // "already registered" notice. The backend endpoint is public, in
        // PUBLIC_PATHS, and returns only {active, valid_until, reference_id}.
        const url = `${BACKEND_URL}/visitor_passes/check-active`
          + `?property_id=${encodeURIComponent(property.id)}`
          + `&plate=${encodeURIComponent(plate)}`;
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 10000);
        let data = null;
        try {
          const res = await fetch(url, { signal: ctrl.signal, headers: { Accept: 'application/json' } });
          if (res.ok) {
            const text = await res.text();
            data = text ? JSON.parse(text) : null;
          }
        } finally { clearTimeout(t); }
        if (data && data.held && data.hold_until) {
          const until = new Date(data.hold_until).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
          // Cooldown is advisory-only as of 2026-05-31 — the DB trigger no
          // longer blocks re-registration. Wording softened so drivers
          // don't think they're blocked and bail (in case they are
          // re-registering for a legitimate reason).
          msg.textContent = `Heads up — this plate was registered recently. You can still register; the property will see this flag and may follow up.`;
          msg.style.color = '#b45309';
        } else if (data && data.active && data.valid_until) {
          const expires = new Date(data.valid_until).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
          const ref = (data.reference_id || '').toString().toUpperCase();
          msg.textContent = ref
            ? `Already registered: pass active until ${expires} (Ref ${ref})`
            : `Already registered: pass active until ${expires}`;
          msg.style.color = '';
        } else {
          msg.style.color = '';
        }
      } catch (_) { /* non-fatal — let submit handle it */ }
    }

    let submitting = false;

    async function handleApartmentSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const plateText = normalizePlate(document.getElementById('plate').value);
        const backPlateRaw = document.getElementById('backPlate')?.value || '';
        const backPlateText = backPlateRaw.trim() ? normalizePlate(backPlateRaw) : null;
        const visitorName = document.getElementById('visitorName').value.trim();
        const stayHours = parseInt(document.getElementById('stayHours').value, 10);
        const phone = normalizePhone(document.getElementById('phone').value);

        if (!plateText || plateText.length < 2) throw new Error('Please enter a valid license plate number.');
        if (REGION_TOKENS.has(plateText)) throw new Error('That looks like a state, not a plate — enter the plate characters only.');
        if (backPlateText && REGION_TOKENS.has(backPlateText)) throw new Error('The back plate looks like a state name, not a plate — enter the plate characters only, or leave it blank.');
        if (backPlateText && backPlateText.length < 4) throw new Error('Back plate must be at least 4 characters, or leave it blank.');
        if (backPlateText && backPlateText === plateText) throw new Error('Back plate must differ from the front plate, or leave it blank.');
        if (!stayHours || stayHours > 48) throw new Error('Choose how long you will be parked (max 48 hours).');

        const recaptchaToken = await getRecaptchaToken('pass_register').catch(() => null);
        if (!recaptchaToken) {
          throw new Error('Please retry — automated-access check failed.');
        }

        const result = await backendRegister('/visitor_passes/register', {
          property_id: property.id,
          plate_text: plateText,
          back_plate: backPlateText,
          visitor_name: visitorName,
          host_unit: '',
          host_name: '',
          phone: phone,
          stay_hours: stayHours,
          submission_idempotency_key: idempotencyKey,
          recaptcha_token: recaptchaToken,
        });

        const validUntil = result.valid_until ? new Date(result.valid_until)
          : new Date(Date.now() + stayHours * 60 * 60 * 1000);
        const refId = (result.reference_id || '').toString().toUpperCase();
        showSuccess({plate: result.plate_text || plateText, validUntil, stayHours, refId: refId || null, parkingSpot: null});
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(friendlyErrorMessage(err)) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Get my pass →';
        submitting = false;
      }
    }

    async function handleTruckPlazaSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const companyName = document.getElementById('companyName').value.trim();
        const driverName  = document.getElementById('driverName').value.trim();
        const plateText   = normalizePlate(document.getElementById('plate').value);
        const backPlateRaw = document.getElementById('backPlate')?.value || '';
        const backPlateText = backPlateRaw.trim() ? normalizePlate(backPlateRaw) : null;
        const phone       = normalizePhone(document.getElementById('phone').value);
        const stayHours = parseInt(document.getElementById('stayHours').value, 10) || 0;

        if (!companyName) throw new Error('Company name is required.');
        if (!driverName) throw new Error('Operator name is required.');
        if (!plateText || plateText.length < 2) throw new Error('Please enter a valid license plate number.');
        if (REGION_TOKENS.has(plateText)) throw new Error('That looks like a state, not a plate — enter the plate characters only.');
        if (backPlateText && REGION_TOKENS.has(backPlateText)) throw new Error('The trailer plate looks like a state name, not a plate — enter the plate characters only, or leave it blank.');
        if (backPlateText && backPlateText.length < 4) throw new Error('Trailer/rear plate must be at least 4 characters, or leave it blank.');
        if (backPlateText && backPlateText === plateText) throw new Error('Trailer/rear plate must differ from the front plate, or leave it blank.');
        if (!phone || phone.length < 11) throw new Error('Please enter a valid phone number.');
        if (![12, 24, 36, 48].includes(stayHours)) throw new Error('Choose 12, 24, 36, or 48 hours.');

        const recaptchaToken = await getRecaptchaToken('pass_register').catch(() => null);
        if (!recaptchaToken) {
          throw new Error('Please retry — automated-access check failed.');
        }

        const now = new Date();
        const result = await backendRegister('/visitor_passes/register', {
          property_id: property.id,
          plate_text: plateText,
          back_plate: backPlateText,
          visitor_name: driverName,
          company_name: companyName,
          host_unit: '',
          host_name: '',
          phone: phone,
          stay_hours: stayHours,
          policy_acknowledged_at: now.toISOString(),
          submission_idempotency_key: idempotencyKey,
          recaptcha_token: recaptchaToken,
        });

        const validUntil = result.valid_until ? new Date(result.valid_until)
          : new Date(now.getTime() + stayHours * 60 * 60 * 1000);
        const refId = (result.reference_id || '').toString().toUpperCase();
        showSuccess({plate: result.plate_text || plateText, validUntil, stayHours, refId: refId || null, parkingSpot: null, companyName});
      } catch (err) {
        // Cooldown is allow + flag as of 2026-05-31 — the DB trigger no longer
        // blocks re-registration and the backend register endpoint no longer
        // returns a 409, so there is nothing to special-case here. The
        // pre-flight check above already surfaces an active cooldown advisory.
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(friendlyErrorMessage(err)) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Get parking pass';
        submitting = false;
      }
    }

    // ── Backend register helper ────────────────────────────────────────
    // POST to one of the public /register endpoints. Normalizes errors so
    // the handlers above can dispatch on err.status and err.message.
    // reCAPTCHA rejects come back as 400 with detail "recaptcha:<reason>";
    // we surface a single friendly string to the user and rely on the
    // server-side log for the real reason (never log the token here).
    async function backendRegister(path, payload, timeoutMs = 12000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(BACKEND_URL + path, {
          method: 'POST',
          signal: ctrl.signal,
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const detail = body && (body.detail || body.message);
          const err = new Error(typeof detail === 'string' ? detail : ('HTTP ' + res.status));
          err.status = res.status;
          err.detail = detail;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    // Translate a backend error into a message the driver should see.
    // reCAPTCHA failures → generic retry message (don't leak the reason).
    function friendlyErrorMessage(err) {
      const msg = (err && err.message) || '';
      if (msg.startsWith('recaptcha:') || /automated-access check failed/i.test(msg)) {
        return 'Please retry — automated-access check failed.';
      }
      if (err && err.name === 'AbortError') {
        return 'Request timed out. Please try again.';
      }
      return msg || 'Something went wrong. Please try again.';
    }

    function showSuccess(opts) {
      const {plate, validUntil, stayHours, refId, parkingSpot, companyName} = opts;
      const expiresStr = validUntil.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
      const isPlaza = property.property_type === 'truck_plaza';
      const extras = isPlaza ? `
        <div class="success-detail" style="margin-top:8px;">
          ${companyName ? `Company: <strong>${escapeHtml(companyName)}</strong><br>` : ''}
          ${parkingSpot ? `Parking space: <strong>${escapeHtml(parkingSpot)}</strong><br>` : ''}
          ${refId ? `Reference: <strong>${escapeHtml(refId)}</strong>` : ''}
        </div>
        <div class="success-detail" style="margin-top:14px;color:#6b7280;font-size:12px;">
          Save this page (screenshot or bookmark) as your registration receipt.
        </div>` : '';

      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>${isPlaza ? 'You\'re <em>registered.</em>' : 'You\'re <em>in.</em>'}</h2>
          <p>Pass for <em>${escapeHtml(property.name)}</em> is active. Have a good visit.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="success-detail">VALID ${stayHours}H · UNTIL ${escapeHtml(expiresStr).toUpperCase()}</div>
          ${extras}
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
