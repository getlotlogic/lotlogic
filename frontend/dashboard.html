          <button type="submit" disabled={saving} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,padding:'10px',fontSize:14,fontWeight:700,cursor:'pointer',marginTop:4}}>{saving ? 'Saving...' : 'Save Settings'}</button>
        </form>
      )}

      {/* Two QR codes — one for Temporary, one for Permanent */}
      <div className="pd-qr-grid">
        <div className="pd-qr-tile">
          <div className="pd-qr-head">
            <span className="pd-share-label" style={{color:'#3b82f6'}}>Temporary</span>
            <span className="pd-qr-sub">up to 48 hrs</span>
          </div>
          <div className="pd-qr-canvas-wrap"><canvas ref={tempQrRef} /></div>
          <div className="pd-qr-url">{tempUrl}</div>
          <button className="pd-share-btn" onClick={() => { navigator.clipboard.writeText(tempUrl); addToast('Temporary link copied', 'success'); }}>Copy link</button>
        </div>
        <div className="pd-qr-tile">
          <div className="pd-qr-head">
            <span className="pd-share-label" style={{color:'#4ade80'}}>Permanent</span>
            <span className="pd-qr-sub">owner-approved</span>
          </div>
          <div className="pd-qr-canvas-wrap"><canvas ref={permQrRef} /></div>
          <div className="pd-qr-url">{permUrl}</div>
          <button className="pd-share-btn" onClick={() => { navigator.clipboard.writeText(permUrl); addToast('Permanent link copied', 'success'); }}>Copy link</button>
        </div>
      </div>

      {/* Permanent Plates (label switches to "Permanent Plates (Employees)" on truck plazas) */}
      {(() => {
        const pendingCount = plates.filter(p => p.status === 'pending').length;
        const label = isTruckPlaza ? 'Permanent Plates (Employees)' : 'Permanent Plates';
        return (
          <div className="pd-section-head">
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span className="pd-section-title">{label}</span>
              <span className="pd-section-count">{plates.length}</span>
              {pendingCount > 0 && <span style={{fontSize:10,fontWeight:700,letterSpacing:'.06em',padding:'2px 7px',borderRadius:20,background:'rgba(251,191,36,.12)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.25)'}}>{pendingCount} PENDING</span>}
            </div>
            <button onClick={() => setShowAddPlate(!showAddPlate)} className="pd-share-btn" style={{color:'#4ade80'}}>{showAddPlate ? 'Cancel' : '+ Add'}</button>
          </div>
        );
      })()}

      {showAddPlate && (
        <form onSubmit={handleAddPlate} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:14,marginBottom:12,display:'flex',flexDirection:'column',gap:8}}>
          <input value={newPlate.plate_text} onChange={e => setNewPlate({...newPlate, plate_text: e.target.value})} placeholder="Plate (e.g. ABC1234)" required style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14,textTransform:'uppercase'}} />
          <input value={newPlate.holder_name} onChange={e => setNewPlate({...newPlate, holder_name: e.target.value})} placeholder={isTruckPlaza ? 'Employee name' : 'Holder name'} style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
          {isTruckPlaza && (
            <>
              <input type="tel" value={newPlate.phone} onChange={e => setNewPlate({...newPlate, phone: e.target.value})} placeholder="Phone" style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
              <select value={newPlate.vehicle_type} onChange={e => setNewPlate({...newPlate, vehicle_type: e.target.value})} style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}}>
                <option value="">Vehicle type…</option>
                <option value="semi">Semi</option>
                <option value="box_truck">Box truck</option>
                <option value="van">Van</option>
                <option value="car">Car</option>
                <option value="other">Other</option>
              </select>
            </>
          )}
          <input value={newPlate.vehicle_description} onChange={e => setNewPlate({...newPlate, vehicle_description: e.target.value})} placeholder={isTruckPlaza ? 'Vehicle (e.g. Freightliner Cascadia)' : 'Vehicle (e.g. Blue Honda Civic)'} style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
          {!isTruckPlaza && (
            <input value={newPlate.unit_number || ''} onChange={e => setNewPlate({...newPlate, unit_number: e.target.value})} placeholder="Unit number (optional)" style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
          )}
          <button type="submit" disabled={saving} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:6,padding:'8px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{saving ? 'Saving...' : 'Add Plate'}</button>
        </form>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {plates.map(p => {
          const mySightings = events.filter(e => e.resident_plate_id === p.id);
          return (
            <div key={p.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <div style={{minWidth:0,flex:1}}>
                  <span style={{fontWeight:800,fontSize:15,color:'var(--text-primary)',letterSpacing:'.03em',fontFamily:"'Courier New',monospace"}}>{p.plate_text}</span>
                  {p.status === 'pending' && <span style={{fontSize:10,fontWeight:700,color:'#fbbf24',background:'rgba(251,191,36,.12)',padding:'2px 6px',borderRadius:4,marginLeft:6,border:'1px solid rgba(251,191,36,.25)'}}>PENDING</span>}
                  <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>{p.holder_name || ''}{p.vehicle_type ? ` · ${p.vehicle_type}` : ''}{p.phone ? ` · ${p.phone}` : ''}</span>
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  {p.status === 'pending' && (
                    <button onClick={() => handleApprovePlate(p.id)} style={{background:'rgba(74,222,128,.12)',color:'#4ade80',border:'1px solid rgba(74,222,128,.3)',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>Approve</button>
                  )}
                  <button onClick={() => handleRemovePlate(p.id)} style={{background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:700,cursor:'pointer'}}>Remove</button>
                </div>
              </div>
              <SightingStrip sightings={mySightings} cameras={cameras} nowTick={nowTick} />
            </div>
          );
        })}
        {plates.length === 0 && <div className="pd-empty">No permanent plates yet</div>}
      </div>

      {/* Temporary Passes / Truck Parking Log — variant depends on property_type */}
      {isTruckPlaza ? (
        <>
          <div className="pd-section-head">
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span className="pd-section-title">Truck Parking Log</span>
              <span className="pd-section-count">{passTotalCount.toLocaleString()}</span>
            </div>
            <div className="pd-section-meta">
              <span style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',animation:'pulse-dot 1.5s infinite'}} />
              Live
            </div>
          </div>
          <ErrorBoundary label="truck parking log"><TruckParkingLog propertyId={propertyId} /></ErrorBoundary>
        </>
      ) : (() => {
        const activeVisitors = visitorPasses.filter(v => {
          if (v.status && v.status !== 'active') return false;
          return !v.valid_until || new Date(v.valid_until).getTime() > nowTick;
        });
        return (
          <>
            <div className="pd-section-head">
              <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                <span className="pd-section-title">Temporary Passes</span>
                <span className="pd-section-count">{activeVisitors.length}</span>
              </div>
              <div className="pd-section-meta">
                <span style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',animation:'pulse-dot 1.5s infinite'}} />
                Live
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {activeVisitors.length === 0 ? (
                <div className="pd-empty">No active temporary passes</div>
              ) : activeVisitors.map(v => {
                const remainMs = v.valid_until ? new Date(v.valid_until).getTime() - nowTick : 0;
                const urgent = remainMs > 0 && remainMs < 60 * 60 * 1000;
                const mySightings = events.filter(e => e.visitor_pass_id === v.id);
                return (
                  <div key={v.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                          <span style={{fontFamily:"'Courier New',monospace",background:'#fef3c7',color:'#1c1009',border:'1.5px solid #fbbf24',fontWeight:800,letterSpacing:'.08em',fontSize:13,padding:'3px 9px',borderRadius:4}}>{v.plate_text}</span>
                          {v.visitor_name && <span style={{fontSize:12,color:'var(--text-primary)',fontWeight:600}}>{v.visitor_name}</span>}
                          {v.vehicle_type && <span style={{fontSize:11,color:'var(--text-muted)',background:'var(--bg-inset)',padding:'2px 7px',borderRadius:4,textTransform:'capitalize'}}>{v.vehicle_type}</span>}
                        </div>
                        <div style={{fontSize:11,color:'var(--text-faint)',marginTop:3}}>
                          {v.valid_until ? <>Expires {new Date(v.valid_until).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</> : 'No expiry'}
                          {v.phone ? ` · ${v.phone}` : ''}
                        </div>
                      </div>
                      {v.valid_until && (
                        <span style={{
                          fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,whiteSpace:'nowrap',
                          background: urgent ? 'rgba(251,191,36,.12)' : 'rgba(74,222,128,.12)',
                          color: urgent ? '#fbbf24' : '#4ade80',
                          border: urgent ? '1px solid rgba(251,191,36,.25)' : '1px solid rgba(74,222,128,.25)',
                        }}>{fmtPassRemaining(remainMs)}</span>
                      )}
                    </div>
                    <SightingStrip sightings={mySightings} cameras={cameras} nowTick={nowTick} />
                  </div>
                );
              })}
            </div>
          </>
        );
      })()}

      {/* Cameras */}
      <div className="pd-section-head">
        <div style={{display:'flex',alignItems:'baseline',gap:8}}>
          <span className="pd-section-title">ALPR Cameras</span>
          <span className="pd-section-count">{cameras.length}</span>
        </div>
        <button onClick={() => { setShowAddCam(!showAddCam); setNewApiKey(null); }} className="pd-share-btn" style={{color:'#3b82f6'}}>{showAddCam ? 'Cancel' : '+ Register'}</button>
      </div>

      {newApiKey && (
        <div style={{background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.3)',borderRadius:8,padding:12,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:'#4ade80',marginBottom:4}}>Camera registered! Save this API key (shown once):</div>
          <div style={{fontSize:13,fontFamily:'monospace',color:'var(--text-primary)',wordBreak:'break-all',background:'var(--bg-inset)',padding:8,borderRadius:6}}>{newApiKey}</div>
        </div>
      )}

      {showAddCam && (
        <form onSubmit={handleAddCamera} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:14,marginBottom:12,display:'flex',flexDirection:'column',gap:8}}>
          <input value={newCam.name} onChange={e => setNewCam({...newCam, name: e.target.value})} placeholder="Camera name" required style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
          <input value={newCam.location_description} onChange={e => setNewCam({...newCam, location_description: e.target.value})} placeholder="Location (e.g. Main entrance)" style={{padding:'8px 10px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:14}} />
          <button type="submit" disabled={saving} style={{background:'var(--accent)',color:'#fff',border:'none',borderRadius:6,padding:'8px',fontSize:13,fontWeight:700,cursor:'pointer'}}>{saving ? 'Registering...' : 'Register Camera'}</button>
        </form>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {cameras.map(c => (
          <div key={c.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontWeight:700,fontSize:14,color:'var(--text-primary)'}}>{c.name}</div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:6,background:c.active?'rgba(74,222,128,.12)':'rgba(239,68,68,.12)',color:c.active?'#4ade80':'#ef4444'}}>{c.active ? 'Active' : 'Disabled'}</span>
                <button onClick={async () => { if (!confirm('Remove camera "' + c.name + '"?')) return; try { await db.removeALPRCamera(c.id); const cams = await db.getALPRCameras(propertyId); setCameras(cams); } catch (err) { addToast('Failed to remove camera. ' + (err.message || ''), 'error'); } }} style={{background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'2px 8px',fontSize:10,fontWeight:700,cursor:'pointer'}}>Remove</button>
              </div>
            </div>
            {c.location_description && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{c.location_description}</div>}
            {c.last_seen_at && <div style={{fontSize:11,color:'var(--text-faint)',marginTop:2}}>Last seen: {new Date(c.last_seen_at).toLocaleString()}</div>}
          </div>
        ))}
        {cameras.length === 0 && <div className="pd-empty">No cameras registered</div>}
      </div>

      {/* Needs Review — match_status held for human decision before enforcement */}
      {(() => {
        const reviewable = events.filter(e => ['low_confidence','review_needed','camera_suspended'].includes(e.match_status));
        if (reviewable.length === 0) return null;
        const statusLabel = {
          low_confidence:   { label: 'Low confidence', color: '#fbbf24' },
          review_needed:    { label: 'Ambiguous match', color: '#fbbf24' },
          camera_suspended: { label: 'Camera suspended', color: '#f87171' },
        };
        return (
          <>
            <div className="pd-section-head">
              <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                <span className="pd-section-title">Needs Review</span>
                <span className="pd-section-count">{reviewable.length}</span>
              </div>
              <div className="pd-section-meta" style={{color:'#fbbf24'}}>No enforcement until cleared</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>
              {reviewable.slice(0, 10).map(ev => {
                const cam = cameraById[ev.camera_id];
                const conf = typeof ev.confidence === 'number' ? Math.round(ev.confidence * (ev.confidence <= 1 ? 100 : 1)) : null;
                const s = statusLabel[ev.match_status] || { label: ev.match_status, color: 'var(--text-faint)' };
                return (
                  <div key={ev.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',display:'flex',alignItems:'center',gap:12}}>
                    {ev.image_url && <img src={ev.image_url} alt="plate" loading="lazy" style={{width:60,height:46,objectFit:'cover',borderRadius:6,border:'1px solid var(--border-subtle)',flexShrink:0}} />}
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontFamily:"'Courier New',monospace",background:'#fef3c7',color:'#1c1009',border:'1.5px solid #fbbf24',fontWeight:800,letterSpacing:'.08em',fontSize:13,padding:'3px 9px',borderRadius:4}}>{ev.plate_text}</span>
                        <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',padding:'3px 8px',borderRadius:20,background:`${s.color}20`,color:s.color,border:`1px solid ${s.color}40`}}>{s.label}</span>
                        {conf != null && <span style={{fontSize:11,color:'var(--text-faint)'}}>{conf}%</span>}
                      </div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>
                        {cam ? cam.name : 'Camera'} · {new Date(ev.created_at).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
                      </div>
                      {ev.match_reason && <div style={{fontSize:10,color:'var(--text-faint)',marginTop:2,fontStyle:'italic'}}>{ev.match_reason}</div>}
                    </div>
                    <div style={{display:'flex',gap:6,flexShrink:0}}>
                      <button
                        onClick={async () => {
                          try {
                            const fd = new FormData();
                            fd.append('reason', 'operator review');
                            await apiFetch(`/alpr/events/${ev.id}/dismiss`, { method: 'POST', body: fd });
                            addToast('Event dismissed', 'success');
                            refreshEvents();
                          } catch (err) { addToast('Dismiss failed: ' + (err.message || ''), 'error'); }
                        }}
                        style={{background:'rgba(148,163,184,.12)',color:'var(--text-muted)',border:'1px solid var(--border)',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:700,cursor:'pointer'}}>Dismiss</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        );
      })()}

      {/* Recent plate detections (live ALPR feed) */}
      <div className="pd-section-head">
        <div style={{display:'flex',alignItems:'baseline',gap:8}}>
          <span className="pd-section-title">Plate Detections</span>
          <span className="pd-section-count">{events.length}</span>
        </div>
        <div className="pd-section-meta">
          <span style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',animation:'pulse-dot 1.5s infinite'}} />
          Live
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {events.length === 0 ? (
          <div className="pd-empty">No plate detections yet</div>
        ) : events.map(ev => {
          const cam = cameraById[ev.camera_id];
          const conf = typeof ev.confidence === 'number' ? Math.round(ev.confidence * (ev.confidence <= 1 ? 100 : 1)) : null;
          const evType = ev.event_type || 'patrol';
          const evColor = evType === 'entry' ? '#4ade80' : (evType === 'exit' ? '#f59e0b' : '#60a5fa');
          const statusColor = ev.match_status === 'matched' ? '#4ade80'
            : ['low_confidence','review_needed','camera_suspended'].includes(ev.match_status) ? '#fbbf24'
            : ev.match_status === 'unmatched' ? '#f87171'
            : 'var(--text-faint)';
          return (
            <div key={ev.id} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',display:'flex',alignItems:'center',gap:12}}>
              {ev.image_url && (
                <img src={ev.image_url} alt="plate" loading="lazy"
                  style={{width:52,height:40,objectFit:'cover',borderRadius:6,border:'1px solid var(--border-subtle)',flexShrink:0,background:'var(--bg-inset)'}} />
              )}
              <div style={{minWidth:0,flex:1}}>

// ── Main App ──────────────────────────────────────────────────
function App() {
  const { addToast } = useToast();
  const { theme, toggle: toggleTheme } = useTheme();
  const { online, reconnected } = useOnlineStatus();
  const [owner, setOwner] = useState(() => {
    try {
      const s = localStorage.getItem('lotlogic_session');
      if (!s) return null;
      const parsed = JSON.parse(s);
      // Session expires after 7 days locally, or sooner if the JWT is missing.
      if (!parsed._token) {
        localStorage.removeItem('lotlogic_session');
        return null;
      }
      if (parsed._ts && Date.now() - parsed._ts > 7 * 86400000) {
        localStorage.removeItem('lotlogic_session');
        return null;
      }
      return parsed;
    } catch { return null; }
  });

  useEffect(() => {
    function onAuthExpired() {
      setOwner(null);
    }
    window.addEventListener('lotlogic:auth-expired', onAuthExpired);
    return () => window.removeEventListener('lotlogic:auth-expired', onAuthExpired);
  }, []);
  // Parse deep link from SMS: /violations/{id} → open jobs tab and highlight
  const [deepLinkViolationId] = useState(() => {
    const path = window.location.pathname || '';
    const match = path.match(/\/violations\/([0-9a-f-]{36})/i);
    return match ? match[1] : null;
  });
  const [tab, setTab] = useState(() => {
    try { return localStorage.getItem('lotlogic_tab') || 'jobs'; } catch { return 'jobs'; }
  });
  const [lots, setLots] = useState([]);
  const [lotStates, setLotStates] = useState({});
  const [violations, setViolations] = useState([]);
  const [alprViolations, setAlprViolations] = useState([]);
  const [partners, setPartners] = useState([]);
  const [viewAs, setViewAs] = useState(null); // null = owner view, partner object = operator impersonation
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [autoRefresh, setAutoRefresh] = useState(() => {
    try { const v = localStorage.getItem('lotlogic_autorefresh'); return v !== 'false'; } catch { return true; }
  });
  const [refreshInterval, setRefreshInterval] = useState(() => {
    try { return parseInt(localStorage.getItem('lotlogic_refresh_interval')) || 30000; } catch { return 30000; }
  });
  const timerRef = useRef(null);

  // Persist settings across refresh
  useEffect(() => {
    try { localStorage.setItem('lotlogic_tab', tab); } catch {}
  }, [tab]);
  useEffect(() => {
    try { localStorage.setItem('lotlogic_autorefresh', String(autoRefresh)); } catch {}
  }, [autoRefresh]);
  useEffect(() => {
    try { localStorage.setItem('lotlogic_refresh_interval', String(refreshInterval)); } catch {}
  }, [refreshInterval]);

  const isOwner = owner?._role === 'owner' && !viewAs;
  const isOperator = owner?._role === 'partner' || !!viewAs;

  // When viewing as operator, filter lots/violations to that partner's lots
  const effectiveUser = viewAs ? { ...viewAs, _role: 'partner' } : owner;
  const viewAsLotIds = viewAs ? lots.filter(l => l.partner_id === viewAs.id).map(l => l.id) : null;
  const effectiveLots = viewAsLotIds ? lots.filter(l => viewAsLotIds.includes(l.id)) : lots;
  const effectiveViolations = viewAsLotIds ? violations.filter(v => viewAsLotIds.includes(v.lot_id)) : violations;
  const effectiveLotStates = viewAsLotIds
    ? Object.fromEntries(Object.entries(lotStates).filter(([id]) => viewAsLotIds.includes(id)))
    : lotStates;

  const realtimeRef = useRef(null);
  const loadIdRef = useRef(0); // Guard against race conditions in concurrent loadData calls

  const loadData = useCallback(async (o, silent = false) => {
    if (!o) return;
    const myId = ++loadIdRef.current; // Each call gets a unique ID
    if (!silent) setLoading(true);
    try {
      const filter = o._role === 'partner'
        ? { partner_id: o.id }
        : { owner_id: o.id };
      const lotsData = await db.getLots(filter);
      if (loadIdRef.current !== myId) return; // Stale call, discard
      setLots(lotsData);

      // Fetch enforcement partners for owner's lots
      if (o._role === 'owner') {
        db.getPartnersForLots(lotsData).then(p => setPartners(p)).catch(() => {});
      }

      const [states, violsArrays] = await Promise.all([
        Promise.all(lotsData.map(l => db.getLotState(l.id).then(s => [l.id, s]).catch(() => [l.id, null]))),
        Promise.all(lotsData.map(l => db.getViolations(l.id).catch(() => []))),
      ]);
      if (loadIdRef.current !== myId) return; // Stale call, discard

      setLotStates(Object.fromEntries(states));

      const flat = [];
      lotsData.forEach((lot, i) => {
        const data = violsArrays[i];
        const items = Array.isArray(data) ? data : (data?.items || []);
        items.forEach(v => flat.push({ ...v, lot_id: v.lot_id || lot.id }));
      });
      setViolations(flat);

      // Load ALPR violations (all statuses for Jobs page + Passes tab)
      db.getAllALPRViolations(o.id, null, o._role).then(v => setAlprViolations(v)).catch(() => {});

      setLastRefresh(new Date());
    } catch (e) {
      console.error(e);
      if (!silent) addToast('Failed to load data. Check your connection.', 'error');
    }
    finally { if (!silent) setLoading(false); }
  }, [addToast]);

  function login(o) {
    const session = { ...o, _ts: Date.now() };
    setOwner(session);
    try { localStorage.setItem('lotlogic_session', JSON.stringify(session)); } catch {}
    applySupabaseAuth(session._token);
    loadData(session);
  }

  function logout() {
    loadIdRef.current++; // Invalidate any in-flight loadData calls
    clearInterval(timerRef.current);
    if (realtimeRef.current) { supabase?.removeChannel(realtimeRef.current); realtimeRef.current = null; }
    if (alprRealtimeRef.current) { supabase?.removeChannel(alprRealtimeRef.current); alprRealtimeRef.current = null; }
    setOwner(null); setLots([]); setLotStates({}); setViolations([]); setAlprViolations([]); setPartners([]); setViewAs(null);
    setTab('jobs');
    try { localStorage.removeItem('lotlogic_session'); localStorage.removeItem('lotlogic_email'); } catch {}
  }

  // Pull-to-refresh handler
  async function handlePullRefresh() {
    if (refreshing || !owner) return;
    setRefreshing(true);
    haptic('medium');
    await loadData(owner, true);
    setRefreshing(false);
    haptic('light');
  }

  // Pull-to-refresh gesture
  const touchStartY = useRef(0);
  const pullDistance = useRef(0);
  const [showPTR, setShowPTR] = useState(false);
  useEffect(() => {
    if (!owner) return;
    const el = document.querySelector('.page-content');
    if (!el) return;
    function onTouchStart(e) { if (el.scrollTop <= 0) touchStartY.current = e.touches[0].clientY; else touchStartY.current = 0; }
    function onTouchMove(e) {
      if (!touchStartY.current) return;
      pullDistance.current = e.touches[0].clientY - touchStartY.current;
      if (pullDistance.current > 60 && el.scrollTop <= 0) setShowPTR(true);
    }
    function onTouchEnd() {
      if (showPTR || pullDistance.current > 80) handlePullRefresh();
      touchStartY.current = 0; pullDistance.current = 0; setShowPTR(false);
    }
    el.addEventListener('touchstart', onTouchStart, { passive: true });
    el.addEventListener('touchmove', onTouchMove, { passive: true });
    el.addEventListener('touchend', onTouchEnd, { passive: true });
    return () => {
      el.removeEventListener('touchstart', onTouchStart);
      el.removeEventListener('touchmove', onTouchMove);
      el.removeEventListener('touchend', onTouchEnd);
    };
  }); // eslint-disable-line -- intentionally re-runs to capture latest handlePullRefresh/showPTR

  // Load data on mount if session was restored
  useEffect(() => { if (owner) loadData(owner); }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Retry on reconnect
  useEffect(() => { if (reconnected && owner) loadData(owner, true); }, [reconnected]);

  // Auto-refresh + session expiration check
  useEffect(() => {
    if (!owner) return;
    if (!autoRefresh) { clearInterval(timerRef.current); return; }
    timerRef.current = setInterval(() => {
      // Check session expiration (7 days)
      if (owner._ts && Date.now() - owner._ts > 7 * 86400000) {
        addToast('Session expired. Please log in again.', 'error');
        logout();
        return;
      }
      if (navigator.onLine) loadData(owner, true);
    }, refreshInterval);
    return () => clearInterval(timerRef.current);
  }, [owner, loadData, autoRefresh, refreshInterval]);

  // Fast snapshot poll (every 10s) — refreshes latest_snapshot for cameras with active violations
  // so departure banners on cards update without waiting for the full 30s loadData cycle
  useEffect(() => {
    if (!supabase || !owner) return;
    const activeCamIds = () => {
      const pending = violations.filter(v => ['pending', 'alerted', 'acknowledged'].includes(v.status));
      return [...new Set(pending.map(v => v.camera_id).filter(Boolean))];
    };
    const pollSnapshots = async () => {
      const camIds = activeCamIds();
      if (camIds.length === 0) return;
      try {
        const results = await Promise.all(camIds.map(cid =>
          supabase.from('snapshots')
            .select('camera_id, storage_url, url, raw_detections, captured_at, vehicles_detected')
            .eq('camera_id', cid)
            .order('captured_at', { ascending: false })
            .limit(1)
            .then(r => r.data?.[0] || null)
        ));
        setLotStates(prev => {
          const next = { ...prev };
          let changed = false;
          for (const [lotId, state] of Object.entries(next)) {
            if (!state?.cameras) continue;
            const updatedCams = state.cameras.map(cam => {
              const snap = results.find(r => r && r.camera_id === cam.camera_id);
              if (!snap) return cam;
              const base = snap.storage_url || snap.url;
              const newCaptured = snap.captured_at;
              // Only update if we have a newer snapshot
              if (cam.latest_snapshot?.captured_at && newCaptured && new Date(newCaptured) <= new Date(cam.latest_snapshot.captured_at)) return cam;
              changed = true;
              return {
                ...cam,
                latest_snapshot: {
                  url: base ? base + (base.includes('?') ? '&' : '?') + '_t=' + Date.now() : null,
                  captured_at: newCaptured,
                  vehicles_detected: snap.vehicles_detected || 0,
                  people_detected: 0,
                  plates_read: 0,
                  plate_readings: [],
                  detections: snap.raw_detections?.detections?.map((d, i) => ({
                    id: `det_${i}`,
                    type: d.class === 'person' ? 'person' : 'vehicle',
                    bbox: d.bbox ? { x: d.bbox[0] * 100, y: d.bbox[1] * 100, w: (d.bbox[2] - d.bbox[0]) * 100, h: (d.bbox[3] - d.bbox[1]) * 100 } : null,
                    confidence: d.conf,
                    label: d.class,
                  })) || [],
                },
              };
            });
            if (changed) next[lotId] = { ...state, cameras: updatedCams };
          }
          return changed ? next : prev;
        });
      } catch (e) { console.warn('Fast snapshot poll error:', e); }
    };
    pollSnapshots(); // run immediately on mount, don't wait 10s
    const iv = setInterval(pollSnapshots, 10000);
    return () => clearInterval(iv);
  }, [owner, violations]);

  // Subscribe to realtime violation changes
  useEffect(() => {
    if (!owner || lots.length === 0) return;
    const lotIds = lots.map(l => l.id);
    // Debounce burst events (e.g. zone-guardian bulk updates) — collapse any
    // payloads that arrive within 800ms into a single loadData call. Previously
    // every event fired a full lots + properties(id) refetch, which showed up
    // as a 15+ query storm during zone re-evaluation.
    let refreshTimer = null;
    const channel = db.subscribeViolations(lotIds, (payload) => {
      if (payload.eventType === 'INSERT' && payload.new?.status === 'alerted') {
        NotifyManager.notifyNewViolation(payload.new);
      }
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => { loadData(owner, true); }, 800);
    }, (errStatus) => {
      addToast('Live updates disconnected. Data refreshes every 30s.', 'error');
    });
    realtimeRef.current = channel;
    return () => {
      if (refreshTimer) clearTimeout(refreshTimer);
      if (channel) supabase?.removeChannel(channel);
    };
  }, [owner, lots.length, loadData, addToast]);

  // Subscribe to ALPR violation changes
  const alprRealtimeRef = useRef(null);
  useEffect(() => {
    if (!owner) return;
    let active = true;
    let refreshTimer = null;
    db.getProperties(owner.id, owner._role).then(props => {
      if (!active || !props || props.length === 0) return;
      const propIds = props.map(p => p.id);
      if (alprRealtimeRef.current) supabase?.removeChannel(alprRealtimeRef.current);
      const ch = db.subscribeALPRViolations(propIds, () => {
        if (!active) return;
        // Debounce bursts — collapse rapid plate-event / violation updates into
        // one refetch so we don't hammer /alpr_violations + /properties(id).
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(() => {
          if (!active) return;
          db.getAllALPRViolations(owner.id, null, owner._role).then(v => { if (active) setAlprViolations(v); }).catch(() => {});
        }, 800);
      });
      alprRealtimeRef.current = ch;
    }).catch(() => {});
    return () => {
      active = false;
      if (refreshTimer) clearTimeout(refreshTimer);
      if (alprRealtimeRef.current) supabase?.removeChannel(alprRealtimeRef.current);
    };
  }, [owner]);

  if (!owner) return <LoginPage onLogin={login} />;

  const pending = effectiveViolations.filter(v => ['pending', 'alerted', 'acknowledged'].includes(v.status)).length;
  const alprPending = alprViolations.filter(v => v.status === 'pending').length;

  // Handle "View as Operator" from Overview page
  function handleViewAs(partner) {
    setViewAs(partner);
    setTab('jobs');
    haptic('medium');
  }
  function exitViewAs() {
    setViewAs(null);
    setTab('overview');
    haptic('light');
  }

  // Role-based navigation:
  // Owner:    Overview + Jobs + Lots + Earnings + Invoices + Account
  // Operator (or viewing-as): Jobs + Lots + Activity + Earnings + Account
  const NavIconInvoices = () => React.createElement('svg', {width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'}, React.createElement('path', {d:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'}), React.createElement('polyline', {points:'14 2 14 8 20 8'}), React.createElement('line', {x1:'8',y1:'13',x2:'16',y2:'13'}), React.createElement('line', {x1:'8',y1:'17',x2:'12',y2:'17'}));
  const NavIconAnalytics = () => React.createElement('svg', {width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'}, React.createElement('line', {x1:'18',y1:'20',x2:'18',y2:'10'}), React.createElement('line', {x1:'12',y1:'20',x2:'12',y2:'4'}), React.createElement('line', {x1:'6',y1:'20',x2:'6',y2:'14'}));
  const navIcons = { overview: NavIconOverview, jobs: NavIconJobs, lots: NavIconLots, earnings: NavIconEarnings, invoices: NavIconInvoices, activity: NavIconActivity, account: NavIconAccount, analytics: NavIconAnalytics };
  // Tab roles (kept intentionally narrow so each surface has one meaning):
  //   Jobs     → every violation needing action (enforcement + ALPR unified)
  //   Lots     → register + manage properties (plates, passes, cameras, plate detections)
  //   Analytics/Activity → summaries
  //   Earnings → $$
  const navTabs = isOwner ? [
    { id: 'jobs',     label: 'Jobs',     badge: pending + alprPending },
    { id: 'lots',     label: 'Lots',     badge: 0 },
    { id: 'analytics',label: 'Analytics',badge: 0 },
    { id: 'earnings', label: 'Earnings', badge: 0 },
    { id: 'invoices', label: 'Billing',  badge: 0 },
    { id: 'account',  label: 'Account',  badge: 0 },
  ] : [
    { id: 'jobs',     label: 'Jobs',     badge: pending + alprPending },
    { id: 'lots',     label: 'Lots',     badge: 0 },
    { id: 'activity', label: 'Activity', badge: 0 },
    { id: 'earnings', label: 'Earnings', badge: 0 },
    { id: 'account',  label: 'Account',  badge: 0 },
  ];

  const lastRefreshLabel = lastRefresh ? (
    Math.floor((Date.now() - lastRefresh) / 1000) < 10 ? 'Just now' :
    Math.floor((Date.now() - lastRefresh) / 1000) < 60 ? `${Math.floor((Date.now() - lastRefresh) / 1000)}s ago` :
    `${Math.floor((Date.now() - lastRefresh) / 60000)}m ago`
  ) : null;

  return (
    <div className={`app ${theme === 'dark' ? '' : 'theme-light'}`}>
      {/* Offline / reconnected banners */}
      {!online && <div className="offline-banner" role="alert">You're offline — data may be stale</div>}
      {reconnected && online && <div className="reconnected-banner" role="status">Back online — refreshing data</div>}

      <header className="header" role="banner">
        <div className="header-left">
          <div className="header-shield" aria-hidden="true">LL</div>
          <div className="header-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="header-right">
          <button
            className={`theme-toggle-btn ${theme === 'light' ? 'light' : ''}`}
            onClick={() => { toggleTheme(); haptic('light'); }}
            aria-label={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
            title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
          />
          {lastRefresh && (
            <div className={`conn-indicator ${online ? 'online' : 'offline'}`} title={lastRefreshLabel ? `Updated ${lastRefreshLabel}` : ''}>
              <span className={`conn-dot ${online ? 'on' : 'off'}`} />
              <span>{online ? (supabase ? 'Live' : 'Online') : 'Offline'}</span>
            </div>
          )}
          <div className="header-name" title={owner.business_name || owner.contact_name}>{owner.business_name || owner.contact_name}</div>
        </div>
      </header>

      <main id="main-content" className="page-content" role="main">
        {/* "Viewing as operator" banner */}
        {viewAs && (
          <div style={{
            background:'linear-gradient(90deg, rgba(167,139,250,.15), rgba(59,130,246,.1))',
            border:'1px solid rgba(167,139,250,.3)', borderRadius:10, margin:'0 0 12px',
            padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <div>
              <div style={{fontSize:12, fontWeight:700, color:'#a78bfa', textTransform:'uppercase', letterSpacing:'.05em'}}>Viewing as Operator</div>
              <div style={{fontSize:14, fontWeight:800, color:'var(--text-primary)', marginTop:2}}>{viewAs.company_name || viewAs.contact_name}</div>
            </div>
            <button onClick={exitViewAs} style={{
              background:'rgba(255,255,255,.1)', color:'var(--text-primary)', border:'1px solid var(--border)',
              borderRadius:8, padding:'6px 14px', fontSize:12, fontWeight:700, cursor:'pointer',
            }}>
              Exit
            </button>
          </div>
        )}

        {/* Pull to refresh indicator */}
        {(showPTR || refreshing) && (
          <div className="ptr-spinner" role="status" aria-label="Refreshing">
            <span className="spin" />{refreshing ? 'Refreshing…' : 'Release to refresh'}
          </div>
        )}
        {/* Last updated */}
        {lastRefresh && !loading && (
          <div className="last-updated" aria-live="polite">Updated {lastRefreshLabel}</div>
        )}

        <div key={tab + (viewAs?.id || '')} className="page-slide">
          {tab === 'overview' && !viewAs && <OverviewPage violations={violations} lots={lots} partners={partners} lotStates={lotStates} onViewAs={handleViewAs} />}
          {tab === 'jobs' && <JobsPage lots={effectiveLots} violations={effectiveViolations} alprViolations={alprViolations} loading={loading} lotStates={effectiveLotStates} onAction={() => loadData(owner, true)} isOwner={isOwner} deepLinkViolationId={deepLinkViolationId} user={effectiveUser} />}
          {tab === 'lots' && <ALPRPropertiesPage user={effectiveUser} />}
          {tab === 'earnings' && <EarningsPage violations={effectiveViolations} lots={effectiveLots} isOwner={isOwner} user={effectiveUser} onNavigate={setTab} />}
          {tab === 'analytics' && isOwner && <AnalyticsPage lots={lots} violations={violations} partners={partners} isOwner={isOwner} onNavigate={setTab} />}
          {tab === 'invoices' && isOwner && <InvoicesPage lots={lots} partners={partners} user={owner} />}
          {tab === 'activity' && isOperator && <OperatorActivityPage violations={effectiveViolations} lots={effectiveLots} />}
          {tab === 'account' && <AccountPage user={owner} onLogout={logout} autoRefresh={autoRefresh} setAutoRefresh={setAutoRefresh} refreshInterval={refreshInterval} setRefreshInterval={setRefreshInterval} />}
        </div>
      </main>

      <nav className="bottom-nav" role="navigation" aria-label="Main navigation">
        {navTabs.map(t => {
          const Icon = navIcons[t.id];
          return (
            <button key={t.id}
              className={`nav-item ${tab === t.id ? 'active' : ''}`}
              onClick={() => { setTab(t.id); haptic('light'); }}
              aria-label={`${t.label}${t.badge > 0 ? `, ${t.badge} pending` : ''}`}
              aria-current={tab === t.id ? 'page' : undefined}
              role="tab"
              aria-selected={tab === t.id}
            >
              {t.badge > 0 && <span className="nav-badge" aria-hidden="true">{t.badge}</span>}
              {Icon && <Icon />}
              <span className="nav-label">{t.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary label="the dashboard"><ToastProvider><App /></ToastProvider></ErrorBoundary>
);
</script>
</body>
</html>
