<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visitor Parking Pass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .shield {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 12px;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
    }
    .logo h1 span { color: #3b82f6; }
    .property-name {
      text-align: center;
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .property-name strong {
      display: block;
      font-size: 18px;
      color: #e5e7eb;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label .required { color: #ef4444; margin-left: 2px; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #3b82f6; }
    input::placeholder { color: #4b5563; }
    select { appearance: none; cursor: pointer; }
    select option { background: #1a1d27; color: #e5e7eb; }
    .plate-input { text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; font-size: 20px; text-align: center; }
    .file-upload {
      position: relative;
      width: 100%;
      padding: 16px 14px;
      background: #0f1117;
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .file-upload:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .file-upload.has-file { border-color: #4ade80; border-style: solid; }
    .file-upload input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .file-upload-icon { font-size: 24px; margin-bottom: 4px; color: #6b7280; }
    .file-upload-text { font-size: 13px; color: #6b7280; }
    .file-upload-name { font-size: 13px; color: #4ade80; font-weight: 600; margin-top: 4px; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .validity {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: #4ade80; fill: none; stroke-width: 2.5; }
    .success-card h2 { font-size: 20px; color: #f9fafb; margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: #9ca3af; line-height: 1.5; }
    .success-plate {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin: 16px 0;
    }
    .success-detail {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: #6b7280;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 { font-size: 18px; color: #f87171; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: #6b7280; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const app = document.getElementById('app');

    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null;

    let property = null;
    let idPhotoFile = null;

    async function init() {
      try {
        if (!qrCodeId) {
          showNotFound('Invalid Link', 'This visitor registration link is not valid.');
          return;
        }

        const { data, error } = await supabase
          .from('properties')
          .select('id, name, address')
          .eq('qr_code_id', qrCodeId)
          .single();

        if (error || !data) {
          showNotFound('Property Not Found', 'This visitor registration link is not valid or has expired.');
          return;
        }

        property = data;
        showForm();
      } catch (err) {
        showNotFound('Connection Error', 'Unable to connect. Please check your internet and try again.');
        console.error('init error:', err);
      }
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function showForm() {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="property-name">
          Register Visitor Parking at
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="passForm">
          <label for="visitorName">Full Name <span class="required">*</span></label>
          <input type="text" id="visitorName" placeholder="Jane Smith" required>

          <label for="parkingSpot">Parking Spot Number</label>
          <input type="text" id="parkingSpot" placeholder="A-12">

          <label for="plate">Tag / License Plate Number <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">

          <label for="tagExpiration">Tag Expiration Date</label>
          <input type="date" id="tagExpiration">

          <label>Picture of ID</label>
          <div class="file-upload" id="idUploadZone">
            <input type="file" id="idPhoto" accept="image/*" capture="environment">
            <div class="file-upload-icon">&#128247;</div>
            <div class="file-upload-text">Tap to take photo or choose file</div>
            <div class="file-upload-name" id="idFileName"></div>
          </div>

          <label for="hostUnit">Unit Number You're Visiting <span class="required">*</span></label>
          <input type="text" id="hostUnit" placeholder="Unit 204" required>

          <label for="stayDays">Extent of Stay <span class="required">*</span></label>
          <select id="stayDays" required>
            <option value="1">1 Day</option>
            <option value="2">2 Days</option>
            <option value="3">3 Days (Maximum)</option>
          </select>

          <div class="row">
            <div>
              <label for="phone">Phone Number <span class="required">*</span></label>
              <input type="tel" id="phone" placeholder="(555) 123-4567" required>
            </div>
            <div>
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" placeholder="jane@email.com" required>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">Register Visitor Pass</button>
          <div class="validity">Maximum stay: 3 days from registration</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('passForm').addEventListener('submit', handleSubmit);
      document.getElementById('idPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const zone = document.getElementById('idUploadZone');
        const nameEl = document.getElementById('idFileName');
        if (file) {
          idPhotoFile = file;
          zone.classList.add('has-file');
          nameEl.textContent = file.name;
        } else {
          idPhotoFile = null;
          zone.classList.remove('has-file');
          nameEl.textContent = '';
        }
      });
    }

    async function uploadFile(bucket, file, prefix) {
      if (file.size > 10 * 1024 * 1024) throw new Error('File must be under 10MB.');
      const ext = file.name.split('.').pop();
      const path = prefix + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
      const { data, error } = await supabase.storage.from(bucket).upload(path, file);
      if (error) throw new Error('Upload failed: ' + error.message);
      const { data: urlData } = supabase.storage.from(bucket).getPublicUrl(path);
      return urlData.publicUrl;
    }

    let submitting = false;
    async function handleSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const plateRaw = document.getElementById('plate').value.trim();
        const plateText = plateRaw.toUpperCase().replace(/[^A-Z0-9]/g, '');
        const visitorName = document.getElementById('visitorName').value.trim();
        const parkingSpot = document.getElementById('parkingSpot').value.trim() || null;
        const tagExpiration = document.getElementById('tagExpiration').value || null;
        const hostUnit = document.getElementById('hostUnit').value.trim();
        const stayDays = parseInt(document.getElementById('stayDays').value, 10);
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();

        if (!plateText || plateText.length < 2) {
          throw new Error('Please enter a valid license plate number.');
        }

        let idPhotoUrl = null;
        if (idPhotoFile) {
          btn.textContent = 'Uploading ID...';
          idPhotoUrl = await uploadFile('visitor-ids', idPhotoFile, property.id);
        }

        btn.textContent = 'Registering...';
        const validFrom = new Date();
        const validUntil = new Date(validFrom.getTime() + stayDays * 24 * 60 * 60 * 1000);

        const { data, error } = await supabase
          .from('visitor_passes')
          .insert({
            property_id: property.id,
            plate_text: plateText,
            visitor_name: visitorName,
            host_unit: hostUnit,
            host_name: '',
            valid_from: validFrom.toISOString(),
            valid_until: validUntil.toISOString(),
            status: 'active',
            parking_spot: parkingSpot,
            tag_expiration: tagExpiration,
            id_photo_url: idPhotoUrl,
            stay_days: stayDays,
            phone: phone,
            email: email,
          })
          .select()
          .single();

        if (error) throw new Error('Failed to register pass. Please try again.');

        showSuccess(plateText, validUntil, stayDays);
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false;
        btn.textContent = 'Register Visitor Pass';
        submitting = false;
      }
    }

    function showSuccess(plate, validUntil, stayDays) {
      const expiresStr = validUntil.toLocaleString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });

      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>Visitor Pass Registered!</h2>
          <p>Your visitor parking pass for <strong>${escapeHtml(property.name)}</strong> has been registered.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="success-detail">Valid for ${stayDays} day${stayDays > 1 ? 's' : ''} &mdash; until ${escapeHtml(expiresStr)}</div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
