function TimelineStrip({ row }) {
  const detectedAt = (row._plate_event && row._plate_event.created_at) || row.created_at;
  const dispatchedAt = row.dispatched_at || row.sms_sent_at;
  const actedAt = row.action_at;
  const confirmedAt = row.tow_confirmed_at;
  const invoicedAt = row.invoiced_at;
  const channel = channelIcon(row.action_channel);
  const evidence = row.tow_confirmation || null;

  const steps = [
    { key: 'detected',   label: 'Detected',   at: detectedAt,  icon: null },
    { key: 'dispatched', label: 'Dispatched', at: dispatchedAt, icon: channel && (row.sms_sent_at && !row.dispatched_at) ? { icon: '\uD83D\uDCAC', label: 'SMS' } : null, note: row.dispatched_at ? null : (row.sms_sent_at ? 'SMS only' : null) },
    { key: 'acted',      label: 'Acted',      at: actedAt,      icon: channel, note: row.action_taken || null },
    { key: 'confirmed',  label: 'Confirmed',  at: confirmedAt,  icon: confirmedAt ? { icon: '\uD83D\uDCF7', label: 'camera_sighting' } : null, note: evidence && typeof evidence.delta_seconds === 'number' ? `plate Δ +${Math.round(evidence.delta_seconds)}s` : null },
    { key: 'invoiced',   label: 'Invoiced',   at: invoicedAt,   icon: null,  note: row.quickbooks_invoice_id ? ('QB ' + String(row.quickbooks_invoice_id).slice(0, 8)) : null },
  ];

  return React.createElement('div', {

function ConfirmationReviewView({ user, lots, partnersProp }) {
  const [rows, setRows] = React.useState(null);
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [actingId, setActingId] = React.useState(null);
  const [expanded, setExpanded] = React.useState(() => new Set(['fraud', 'verify']));
  // Staged operator action waiting on modal confirmation. null == closed.
  // Shape: { violationId, plate, endpoint, label, destructive }
  const [pendingAction, setPendingAction] = React.useState(null);
  // Image viewer (lightbox) state — null or { src, caption, downloadHref }.
  const [lightbox, setLightbox] = React.useState(null);
  // Filter state. `rangeDays` drives the `created_at` lower bound. The
  // property selector is owner-only — partners are scoped to their own
  // tow_company_id via RLS anyway.
  const [rangeDays, setRangeDays] = React.useState(7);
  const [propertyFilter, setPropertyFilter] = React.useState('all');
  const partnerName = React.useMemo(() => {
    const m = {};
    (partnersProp || []).forEach(p => { m[p.id] = p.company_name || p.contact_name; });
    return m;
  }, [partnersProp]);
  // Property lookup map (id → {name, tow_company_id}). Populated from the
  // `properties` pre-query in refresh — feeds the property filter dropdown
  // and provides fallback labels if the FK join doesn't hydrate.
  const [propMap, setPropMap] = React.useState({});

  const ownerId = user?.id;
  const role = user?._role === 'partner' ? 'partner' : 'owner';

  const refresh = React.useCallback(async (silent = false) => {
    if (!ownerId || !supabase) { setRows([]); return; }
    if (!silent) setBusy(true);
    setErr('');
    try {
      const propCol = role === 'partner' ? 'tow_company_id' : 'owner_id';
      const propQ = await supabase.from('properties').select('id, name, owner_id, tow_company_id').eq(propCol, ownerId);
      if (propQ.error) throw new Error(propQ.error.message);
      const props = propQ.data || [];
      const propIds = props.map(p => p.id);
      const pm = {};
      props.forEach(p => { pm[p.id] = { name: p.name, tow_company_id: p.tow_company_id }; });
      setPropMap(pm);
      if (propIds.length === 0) { setRows([]); return; }
      // Window is driven by the operator-selected range, clamped 1-90 days.
      const winDays = Math.max(1, Math.min(90, rangeDays || 7));
      const since = new Date(Date.now() - winDays * 86400000).toISOString();
      const { data, error } = await supabase
        .from('alpr_violations')
        .select('id, property_id, plate_text, status, action_taken, action_channel, action_at, tow_confirmed_at, tow_confirmation, billing_held_at, force_bill_at, invoiced_at, dispatched_at, sms_sent_at, created_at, notes, plate_event_id, quickbooks_invoice_id, properties(name, tow_company_id)')
        .in('property_id', propIds)
        .gte('created_at', since)
        .order('created_at', { ascending: false })
        .limit(400);
      if (error) throw new Error(error.message);
      const baseRows = data || [];

      // Batch-fetch joined plate_events in two buckets:
      //   (1) the original detection snapshot (alpr_violations.plate_event_id)
      //   (2) the truck-sighting snapshot (tow_confirmation.truck_entry_event_id)
      // One .in() query covers both — O(1) round-trips regardless of row count.
      const plateEventIds = Array.from(new Set(baseRows.map(r => r.plate_event_id).filter(Boolean)));
      const truckEventIds = Array.from(new Set(baseRows
        .map(r => r.tow_confirmation && r.tow_confirmation.truck_entry_event_id)
        .filter(Boolean)));
      const allEventIds = Array.from(new Set([...plateEventIds, ...truckEventIds]));
      const eventsById = {};
      if (allEventIds.length > 0) {
        const { data: events, error: eventsErr } = await supabase
          .from('plate_events')
          .select('id, image_url, confidence, event_type, created_at')
          .in('id', allEventIds);
        if (eventsErr) throw new Error(eventsErr.message);
        (events || []).forEach(ev => { eventsById[ev.id] = ev; });
      }

      // Batch-fetch the most recent visitor_pass per (property_id, plate_text)
      // pair present in the current row set. RLS already restricts reads to
      // the caller's properties so the wide-in is safe.
      const plateTexts = Array.from(new Set(baseRows.map(r => (r.plate_text || '').trim().toUpperCase()).filter(Boolean)));
      const passesByKey = {};

          .from('visitor_passes')
          .select('id, property_id, plate_text, visitor_name, company_name, parking_spot, placard_color, phone, valid_from, valid_until, status, policy_acknowledged_at, stay_days, created_at')

          .in('plate_text', plateTexts)

// ── Tow-truck plates editor (enforcement partner self-settings) ────
// Writes directly to enforcement_partners.tow_truck_plates via Supabase REST.
// Normalization matches the tow-confirm edge function so stored plates
// compare cleanly against camera sightings.
function TowTruckPlatesEditor({ user }) {
  const [plates, setPlates] = React.useState(() => (user?.tow_truck_plates || []).slice());
  const [draft, setDraft] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [saved, setSaved] = React.useState(false);

  // Stringified signature of the incoming plates array. Using just `user?.id`
  // missed updates where the parent refetched and only the plates array
  // mutated (same user id, different list). Re-sync whenever the list
  // content changes.
  const userPlatesKey = JSON.stringify(user?.tow_truck_plates ?? []);
  React.useEffect(() => {
    // Re-sync on user id change or plates array content change.
    setPlates((user?.tow_truck_plates || []).slice());
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [user?.id, userPlatesKey]);

  async function persist(next) {
    setSaving(true); setErr(''); setSaved(false);
    try {
      if (!supabase || !user?.id) throw new Error('Not authenticated');
      const { error } = await supabase
        .from('enforcement_partners')
        .update({ tow_truck_plates: next })
        .eq('id', user.id);
      if (error) throw new Error(error.message);
      setPlates(next);
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (e) {
      setErr(e.message || String(e));
    } finally {
      setSaving(false);
    }
  }

  function addPlate() {
    const norm = normalizeTruckPlate(draft);
    if (!norm) { setDraft(''); return; }
    if (plates.includes(norm)) { setDraft(''); return; }
    const next = [...plates, norm];
    setDraft('');
    persist(next);
  }

  function removePlate(p) {
    const next = plates.filter(x => x !== p);
    persist(next);
  }

  return React.createElement('div', { className: 'settings-section' },
    React.createElement('div', { className: 'settings-section-title' }, 'Tow-truck plates'),
    React.createElement('div', {
      style: { fontSize: 12, color: 'var(--text-muted)', padding: '0 0 10px' }
    }, 'Plates of tow trucks operated by this partner. Camera sightings of these plates confirm that a tow actually happened.'),

    React.createElement('div', {
      style: { display: 'flex', flexWrap: 'wrap', gap: 6, padding: '4px 0 10px' }
    },
      plates.length === 0
        ? React.createElement('span', { style: { fontSize: 12, color: 'var(--text-faint)' } }, 'No plates registered yet.')
        : plates.map(p => React.createElement('span', {
            key: p,
            style: {
              display: 'inline-flex', alignItems: 'center', gap: 6,
              fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 12, fontWeight: 700,
              padding: '4px 4px 4px 10px', borderRadius: 8,
              background: 'var(--bg-inset)', border: '1px solid var(--border)', color: 'var(--text-primary)',
            }
          },
            p,
            React.createElement('button', {
              onClick: () => removePlate(p), disabled: saving,
              title: 'Remove plate',
              'aria-label': 'Remove tow-truck plate ' + p,
              style: {
                background: 'transparent', border: 'none', color: 'var(--text-faint)',
                cursor: saving ? 'wait' : 'pointer', padding: '0 6px', fontSize: 14, lineHeight: 1,
              },
            }, '\u2715'),
          )),
    ),

    React.createElement('div', {
      style: { display: 'flex', gap: 8, alignItems: 'center', padding: '4px 0' }
    },
      React.createElement('input', {
        type: 'text',
        value: draft,
        onChange: e => setDraft(e.target.value),
        onKeyDown: e => { if (e.key === 'Enter') { e.preventDefault(); addPlate(); } },
        placeholder: 'Add plate (e.g. T-123-AB)',
        disabled: saving,
        style: {
          flex: 1, fontSize: 13, padding: '6px 10px', borderRadius: 6,
          border: '1px solid var(--border)', background: 'var(--bg-inset)',
          color: 'var(--text-primary)', fontFamily: 'ui-monospace, Menlo, monospace', textTransform: 'uppercase',
        },
      }),
      React.createElement('button', {
        onClick: addPlate,
        disabled: saving || !normalizeTruckPlate(draft),
        style: {
          fontSize: 13, padding: '6px 14px', borderRadius: 6, cursor: 'pointer', fontWeight: 700,
          border: '1px solid var(--accent)', background: 'var(--accent)', color: '#fff',
          opacity: (saving || !normalizeTruckPlate(draft)) ? 0.6 : 1,
        }
      }, saving ? 'Saving…' : 'Add plate'),
    ),

    err && React.createElement('div', {
      style: { fontSize: 12, color: '#ef4444', padding: '6px 0 0' }
    }, err),
    saved && !err && React.createElement('div', {
      style: { fontSize: 12, color: 'var(--green)', padding: '6px 0 0' }
    }, 'Saved'),
  );
}

// ── Operator Activity page (no revenue, just job history) ────
function OperatorActivityPage({ violations, lots }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Show completed actions in last 7 days
  const cutoff = Date.now() - 7 * 86400000;
  const completed = violations
    .filter(v => v.status !== 'pending' && v.action_taken && new Date(v.resolved_at || v.detected_at) > cutoff)
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCount = completed.filter(v => new Date(v.resolved_at || v.detected_at).getTime() >= todayStart.getTime()).length;
  const weekCount = completed.length;

  const actionColors = { boot: '#fbbf24', tow: '#f87171', dismissed: '#a78bfa', no_action: '#6b7280', already_gone: '#6b7280' };

  // Group by date (using smart labels)
  const grouped = {};
  completed.forEach(v => {
    const dateKey = smartDate(v.resolved_at || v.detected_at);
    if (!grouped[dateKey]) grouped[dateKey] = [];
    grouped[dateKey].push(v);
  });
  const dateGroups = Object.entries(grouped);

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Your Activity</div>
        <div className="section-count">{weekCount} this week</div>
      </div>

      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val blue">{todayCount}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{weekCount}</div>
          <div className="kpi-label">This Week</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${todayCount > 0 ? 'green' : 'red'}`}>
            {todayCount > 0 ? 'Active' : 'None'}
          </div>
          <div className="kpi-label">Status</div>
        </div>
      </div>

      {dateGroups.length === 0 ? (
        <div className="empty-state">
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>⚡</div>
          <div className="empty-title">No activity yet</div>
          <div className="empty-body">Completed jobs will appear here as you work</div>
        </div>
      ) : (
        dateGroups.map(([dateLabel, items]) => (
          <div key={dateLabel}>
            <div style={{fontSize:12, fontWeight:700, color:'var(--text-faint)', marginBottom:8, marginTop:16, textTransform:'uppercase', letterSpacing:'.06em'}}>
              {dateLabel}
            </div>
            {items.map(v => {
              const lot = lotMap[v.lot_id];
              const col = actionColors[v.action_taken?.toLowerCase()] || '#9ca3af';
              return (
                <div key={v.id} className="job-card card-animated" style={{marginBottom:8}}>
                  <div className="job-body" style={{padding:'12px 16px'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8}}>
                      <div>
                        <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>{lot?.name || 'Unknown Lot'}</div>
                        <div style={{fontSize:12, color:'var(--text-faint)'}}>{fmtTime(v.resolved_at || v.detected_at)}</div>
                      </div>
                      <span style={{padding:'4px 10px', borderRadius:20, fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.04em', color:col, background:col + '15', border:`1px solid ${col}33`}}>
                        {(v.action_taken || 'handled').replace(/_/g, ' ')}
                      </span>
                    </div>
                    <div className="job-details">
                      {v.plate_text && (
                        <span className="plate-tag" style={{fontSize:11, padding:'3px 8px', display:'flex', alignItems:'center', gap:4}}>

                          {v.plate_text}
                        </span>
                      )}
                      {!v.plate_text && (
                        <span className="job-tag" style={{display:'flex', alignItems:'center', gap:4, color: displayColor(v.vehicle_color) ? 'inherit' : 'var(--text-faint)'}}>
                          {displayColor(v.vehicle_color) ? (
                            <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(255,255,255,.15)', flexShrink:0}} />
                          ) : (
                            <span style={{width:8, height:8, borderRadius:3, background:'var(--unknown-pattern)', border:'1px solid var(--unknown-border)', flexShrink:0}} />
                          )}

                        </span>

                      {v.vehicle_make && <span className="job-tag" style={{color:'var(--purple)'}}><strong style={{textTransform:'capitalize'}}>{[v.vehicle_make, v.vehicle_model].filter(Boolean).join(' ')}</strong></span>}

                </div>
              );
            })}
          </div>
        ))
      )}
    </div>
  );
}

// ── Owner Overview page — per-operator stats + "View as" ──────
function OverviewPage({ violations, lots, partners, lotStates, onViewAs }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Map partner_id → lots assigned
  const partnerLots = {};
  lots.forEach(l => {
    if (l.partner_id) {
      if (!partnerLots[l.partner_id]) partnerLots[l.partner_id] = [];
      partnerLots[l.partner_id].push(l);
    }
  });

  // Global KPIs
  const _activeStatuses = ['pending', 'alerted', 'acknowledged'];
  const _closedStatuses = ['resolved', 'cleared', 'departed'];
  const pending = violations.filter(v => _activeStatuses.includes(v.status)).length;
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayResolved = violations.filter(v => _closedStatuses.includes(v.status) && new Date(v.resolved_at || v.cleared_at || v.detected_at) >= todayStart).length;
  const totalGross = violations.filter(v => _closedStatuses.includes(v.status)).reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const totalOurs = violations.filter(v => _closedStatuses.includes(v.status)).reduce((s, v) => s + (v.our_revenue || 0), 0);

  // Camera stats
  const allCams = Object.values(lotStates).flatMap(s => s?.cameras || []);
  const camsOnline = allCams.filter(c => c.online).length;
  const camsTotal = allCams.length;

  // Per-operator stats
  const operatorStats = partners.map(p => {
    const pLots = partnerLots[p.id] || [];
    const pLotIds = pLots.map(l => l.id);
    const pViols = violations.filter(v => pLotIds.includes(v.lot_id));
    const pPending = pViols.filter(v => _activeStatuses.includes(v.status)).length;
    const pResolved = pViols.filter(v => _closedStatuses.includes(v.status));
    const pTodayResolved = pResolved.filter(v => new Date(v.resolved_at || v.detected_at) >= todayStart).length;
    const pGross = pResolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
    const pOurs = pResolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
    const pPartnerPay = pGross - pOurs;
    const booted = pResolved.filter(v => v.action_taken === 'boot').length;
    const towed = pResolved.filter(v => v.action_taken === 'tow').length;
    const dismissed = pResolved.filter(v => v.action_taken === 'dismissed' || v.action_taken === 'already_gone' || v.action_taken === 'no_action').length;
    // Avg response time (detected → resolved) in minutes
    const responseTimes = pResolved.filter(v => v.detected_at && v.resolved_at).map(v => (new Date(v.resolved_at) - new Date(v.detected_at)) / 60000);
    const avgResponse = responseTimes.length > 0 ? Math.round(responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length) : null;

    return { partner: p, lots: pLots, pending: pPending, todayResolved: pTodayResolved, totalResolved: pResolved.length, gross: pGross, ours: pOurs, partnerPay: pPartnerPay, booted, towed, dismissed, avgResponse };
  });

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Overview</div>
        <div className="section-count">{lots.length} lot{lots.length !== 1 ? 's' : ''} · {partners.length} operator{partners.length !== 1 ? 's' : ''}</div>
      </div>

      {/* Global KPIs */}
      <div className="kpi-bar" style={{marginBottom:16}}>
        <div className="kpi-card">
          <div className="kpi-val red">{pending}</div>
          <div className="kpi-label">Active</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{todayResolved}</div>
          <div className="kpi-label">Resolved Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val blue">{camsOnline}/{camsTotal}</div>
          <div className="kpi-label">Cameras</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{fmtMoney(totalOurs)}</div>
          <div className="kpi-label">Revenue</div>
        </div>
      </div>

      {/* Per-operator cards */}
      <div className="section-header" style={{marginTop:20}}>
        <div className="section-title">Operators</div>
      </div>

      {operatorStats.length === 0 ? (
        <div className="empty-state">
          <div style={{width:48, height:48, borderRadius:12, background:'rgba(59,130,246,.1)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px', fontSize:22}}>👥</div>
          <div className="empty-title">No operators assigned</div>
          <div className="empty-body">Enforcement partners linked to your lots will appear here</div>
        </div>
      ) : operatorStats.map(os => (
        <div key={os.partner.id} className="card-animated" style={{

          marginBottom:12, overflow:'hidden',
        }}>
          {/* Operator header */}
          <div style={{padding:'14px 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:16, fontWeight:800, color:'var(--text-primary)'}}>{os.partner.company_name || os.partner.contact_name}</div>
              <div style={{fontSize:12, color:'var(--text-faint)', marginTop:2}}>{os.partner.email} · {os.lots.length} lot{os.lots.length !== 1 ? 's' : ''}</div>

            <button onClick={() => onViewAs(os.partner)} style={{

              borderRadius:8, padding:'6px 12px', fontSize:12, fontWeight:700, cursor:'pointer',

          {/* Operator KPIs */}

      {/* Revenue split summary */}
      {totalGross > 0 && (
        <div className="earnings-breakdown" style={{marginTop:8, marginBottom:16}}>

            </div>
            <div style={{fontSize:15, fontWeight:700, color:'var(--accent)'}}>{fmtMoney(totalOurs)}</div>
          </div>
          {operatorStats.map(os => os.partnerPay > 0 && (

    </div>
  );
}

// ── Analytics tab ──────────────────────────────────────────────
function AnalyticsPage({ lots, violations, partners = [], isOwner, onNavigate }) {
  const [hourlyData, setHourlyData] = useState(null);
  const [utilData, setUtilData] = useState(null);
  const [projData, setProjData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selectedLot, setSelectedLot] = useState('all');

  const lotIds = lots.map(l => l.id);
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  useEffect(() => {
    if (lotIds.length === 0) { setLoading(false); return; }
    setLoading(true);
    const ids = selectedLot === 'all' ? lotIds : [selectedLot];
    Promise.all([
      db.getHourlyStats(ids),
      db.getUtilization(ids),
      db.getRevenueProjection(ids),
    ]).then(([h, u, p]) => {
      setHourlyData(h);
      setUtilData(u);
      setProjData(p);
      setLoading(false);
    }).catch(() => setLoading(false));
  }, [lots.length, selectedLot]);

  if (loading) return <div className="page-enter"><SkeletonKPIs /><SkeletonCards count={3} /></div>;

  if (lots.length === 0) {
    return (
      <div className="page-enter" style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>
        <div style={{fontSize:14,fontWeight:700,color:'var(--text-secondary)',marginBottom:4}}>No analytics yet</div>
        <div style={{fontSize:12}}>Add a lot on the Lots tab to start seeing utilization, revenue projections, and hourly stats.</div>
      </div>
    );
  }

  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const maxHeat = hourlyData ? Math.max(...Object.values(hourlyData.heatmap), 1) : 1;

  // Get total spaces for utilization percentage
  const filteredLots = selectedLot === 'all' ? lots : lots.filter(l => l.id === selectedLot);
  const totalSpaces = filteredLots.reduce((s, l) => s + (l.total_spaces || 0), 0);

  return (
    <div className="page-enter">
      <div className="section-header">
        <div className="section-title">Analytics</div>
        {lots.length > 1 && (
          <select value={selectedLot} onChange={e => setSelectedLot(e.target.value)}
            style={{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:8, padding:'5px 10px', fontSize:12, fontWeight:600, color:'var(--text-secondary)', fontFamily:'inherit'}}>
            <option value="all">All Lots</option>
            {lots.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
          </select>
        )}
      </div>

      {/* Revenue Projections */}
      {projData && (
        <div className="analytics-card">
          <div className="analytics-card-title">Revenue Projections</div>
          <div className="projection-row">
            <div className="projection-label">Monthly projection</div>
            <div>
              <span className="projection-val green">${projData.monthlyProjection.toLocaleString()}</span>
              {projData.trendPct !== 0 && (
                <span className={`projection-trend ${projData.trend}`}>
                  {projData.trend === 'up' ? '+' : ''}{projData.trendPct}%
                </span>
              )}
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Daily average</div>
            <div>
              <span className="projection-val blue">${projData.dailyAvg.toLocaleString()}</span>
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Last 7 days total</div>
            <div>
              <span className="projection-val">${projData.weeklyAvg.toLocaleString()}</span>
            </div>
          </div>
          <div className="projection-row">
            <div className="projection-label">Violations per day</div>
            <div>
              <span className="projection-val">{projData.violationsPerDay}</span>
              {projData.violTrendPct !== 0 && (
                <span className={`projection-trend ${projData.violTrend}`}>
                  {projData.violTrend === 'up' ? '+' : ''}{projData.violTrendPct}%
                </span>
              )}
            </div>
          </div>
        </div>
      )}

      {/* By Partner — tow count + revenue per partner (owner only) */}
      {isOwner && (() => {
        const now = Date.now();
        const since30 = now - 30 * 86400000;
        const lotPartner = Object.fromEntries(lots.map(l => [l.id, l.partner_id]));
        const partnerName = Object.fromEntries(partners.map(p => [p.id, p.company_name]));
        const agg = {};
        violations.forEach(v => {
          if (v.action_taken !== 'tow' || v.status === 'pending') return;
          const ts = new Date(v.resolved_at || v.detected_at).getTime();
          if (ts < since30) return;
          const pid = lotPartner[v.lot_id];
          if (!pid) return;
          if (!agg[pid]) agg[pid] = { partner_id: pid, tows: 0, gross: 0, invoicable_tows: 0, invoicable_gross: 0 };
          agg[pid].tows += 1;
          agg[pid].gross += (v.gross_revenue || 0);
          if (!v.invoiced_at && (v.gross_revenue || 0) > 0) {
            agg[pid].invoicable_tows += 1;
            agg[pid].invoicable_gross += (v.gross_revenue || 0);
          }
        });
        const rows = Object.values(agg).sort((a, b) => b.gross - a.gross);
        if (rows.length === 0) return null;
        return (
          <div className="analytics-card">
            <div className="analytics-card-title">By Partner (Last 30 Days)</div>
            {rows.map(r => (
              <div key={r.partner_id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--text-primary)'}}>
                    {partnerName[r.partner_id] || r.partner_id.slice(0, 8)}
                  </div>
                  <div style={{fontSize:12, color:'var(--text-muted)', marginTop:2}}>
                    {r.tows} tow{r.tows !== 1 ? 's' : ''} · {fmtMoney(r.gross)} gross
                  </div>
                </div>
                {r.invoicable_tows > 0 && (
                  <button
                    onClick={() => onNavigate && onNavigate('invoices')}
                    style={{fontSize:12, padding:'6px 10px', borderRadius:6, border:'1px solid rgba(59,130,246,.4)', background:'rgba(59,130,246,.1)', color:'var(--accent)', cursor:'pointer', fontWeight:600, whiteSpace:'nowrap'}}
                  >
                    Invoice {r.invoicable_tows} · {fmtMoney(r.invoicable_gross)}
                  </button>
                )}
              </div>
            ))}
          </div>
        );
      })()}

      {/* Peak Violation Hours Heatmap */}
      {hourlyData && (
        <div className="analytics-card">
          <div className="analytics-card-title">Peak Violation Hours (Last 90 Days)</div>
          <div style={{overflowX:'auto', paddingBottom:4}}>
            <div className="heatmap-grid" style={{minWidth:360}}>
              {/* Hour labels */}
              <div />
              {Array.from({length: 24}, (_, h) => (
                <div key={`h${h}`} className="heatmap-hour">{h % 3 === 0 ? `${h}` : ''}</div>
              ))}
              {/* Days */}
              {dayNames.map((day, dow) => (
                <React.Fragment key={day}>
                  <div className="heatmap-label">{day}</div>
                  {Array.from({length: 24}, (_, hour) => {
                    const count = hourlyData.heatmap[`${dow}-${hour}`] || 0;
                    const intensity = count / maxHeat;
                    const bg = count === 0
                      ? 'var(--bg-inset)'
                      : `rgba(239, 68, 68, ${0.15 + intensity * 0.85})`;
                    return (
                      <div key={`${dow}-${hour}`} className="heatmap-cell"
                        style={{background: bg}}
                        title={`${day} ${hour}:00 — ${count} violation${count !== 1 ? 's' : ''}`}
                      />
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:6, marginTop:8, justifyContent:'flex-end'}}>
            <span style={{fontSize:10, color:'var(--text-faint)'}}>Low</span>
            {[0.15, 0.35, 0.55, 0.75, 1].map((v, i) => (
              <div key={i} style={{width:12, height:12, borderRadius:2, background:`rgba(239,68,68,${v})`}} />
            ))}
            <span style={{fontSize:10, color:'var(--text-faint)'}}>High</span>
          </div>
        </div>
      )}

      {/* Lot Utilization */}
      {utilData && totalSpaces > 0 && (
        <div className="analytics-card">
          <div className="analytics-card-title">Avg. Vehicles by Hour (Last 7 Days)</div>
          {Array.from({length: 24}, (_, hour) => {
            const avg = utilData.hourly[hour] || 0;
            const pct = Math.min((avg / totalSpaces) * 100, 100);
            const color = pct > 80 ? '#ef4444' : pct > 50 ? '#fbbf24' : '#4ade80';
            return (
              <div key={hour} className="utilization-bar-row">
                <div className="utilization-bar-label">{hour.toString().padStart(2, '0')}:00</div>
                <div className="utilization-bar-track">
                  <div className="utilization-bar-fill" style={{width: `${pct}%`, background: color}} />
                </div>
                <div className="utilization-bar-val">{avg.toFixed(1)}</div>
              </div>
            );
          }).filter((_, hour) => {
            // Only show hours 6am-11pm to reduce clutter
            return hour >= 6 && hour <= 23;
          })}
          <div style={{fontSize:11, color:'var(--text-faint)', marginTop:8, textAlign:'center'}}>
            {totalSpaces} total spaces across {filteredLots.length} lot{filteredLots.length !== 1 ? 's' : ''}
          </div>
        </div>
      )}

      {utilData && totalSpaces === 0 && (
        <div className="analytics-card">
          <div className="analytics-card-title">Lot Utilization</div>
          <div style={{padding:'16px 0', textAlign:'center', color:'var(--text-faint)', fontSize:13}}>
            Set total spaces on your lots to see utilization percentages
          </div>
        </div>
      )}

      {/* Quick stats */}
      <div className="analytics-card">
        <div className="analytics-card-title">Quick Stats</div>
        <div className="kpi-bar">
          <div className="kpi-card">
            <div className="kpi-val blue">{hourlyData?.total || 0}</div>
            <div className="kpi-label">Violations (90d)</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-val green">{lots.length}</div>
            <div className="kpi-label">Active Lots</div>
          </div>
          <div className="kpi-card">
            <div className="kpi-val">{utilData?.totalSnapshots || 0}</div>
            <div className="kpi-label">Snapshots (7d)</div>
          </div>
        </div>
      </div>

      {/* Link to operator overview */}
      {isOwner && onNavigate && (
        <button onClick={() => onNavigate('overview')} style={{
          width:'100%', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:12,
          padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
          cursor:'pointer', fontFamily:'inherit', marginTop:4,
        }}>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>Operator Overview</div>
            <div style={{fontSize:12, color:'var(--text-faint)', marginTop:2}}>View per-operator stats and impersonate partners</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      )}
    </div>
  );
}

// ── ALPR Page Components ─────────────────────────────────────

// Shown under every plate / visitor-pass row: a compact strip of the most
// recent plate_events linked to that registration. Each thumbnail surfaces
// the match_status and rolling OCR confidence so an operator can glance
// at a pass and see whether anything looks wrong before it ever becomes a
// tow candidate.
function SightingStrip({ sightings, cameras, nowTick }) {
  if (!sightings || sightings.length === 0) {
    return (
      <div style={{fontSize:11,color:'var(--text-faint)',fontStyle:'italic'}}>No ALPR sightings yet.</div>
    );
  }
  const cameraById = Object.fromEntries((cameras || []).map(c => [c.id, c]));
  const sorted = [...sightings].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const lastSeenMs = nowTick - new Date(sorted[0].created_at).getTime();
  const lastSeenStr = lastSeenMs < 60000 ? 'just now'
    : lastSeenMs < 3600000 ? Math.floor(lastSeenMs / 60000) + 'm ago'
    : lastSeenMs < 86400000 ? Math.floor(lastSeenMs / 3600000) + 'h ago'
    : Math.floor(lastSeenMs / 86400000) + 'd ago';
  const lowConfCount = sorted.filter(s => s.match_status === 'low_confidence').length;
  return (
    <div style={{borderTop:'1px dashed var(--border-subtle)',paddingTop:8}}>
      <div style={{display:'flex',alignItems:'center',gap:10,fontSize:11,color:'var(--text-muted)',marginBottom:6}}>
        <span style={{fontWeight:700,color:'var(--text-secondary)',letterSpacing:'.04em',textTransform:'uppercase'}}>{sorted.length} sighting{sorted.length === 1 ? '' : 's'}</span>
        <span>· last seen {lastSeenStr}</span>
        {lowConfCount > 0 && (
          <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:4,background:'rgba(251,191,36,.12)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.25)'}}>{lowConfCount} LOW CONFIDENCE</span>
        )}
      </div>
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
        {sorted.slice(0, 10).map(ev => {
          const cam = cameraById[ev.camera_id];
          const conf = typeof ev.confidence === 'number' ? Math.round(ev.confidence * (ev.confidence <= 1 ? 100 : 1)) : null;
          const statusColor = ev.match_status === 'matched' ? '#4ade80'
            : ev.match_status === 'low_confidence' ? '#fbbf24'
            : ev.match_status === 'camera_suspended' ? '#f87171'
            : 'var(--text-faint)';
          const title = `${cam?.name || 'camera'} · ${new Date(ev.created_at).toLocaleString()} · ${ev.match_status}${conf != null ? ` · ${conf}%` : ''}`;
          return (
            <div key={ev.id} title={title} style={{flexShrink:0,width:72,display:'flex',flexDirection:'column',gap:2}}>
              <div style={{position:'relative',width:72,height:54,borderRadius:6,overflow:'hidden',border:'1px solid var(--border-subtle)',background:'var(--bg-inset)'}}>
                {ev.image_url
                  ? <img src={ev.image_url} alt="plate sighting" loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover'}} />
                  : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--text-faint)'}}>No image</div>
                }
                <div style={{position:'absolute',top:3,right:3,width:8,height:8,borderRadius:'50%',background:statusColor,boxShadow:'0 0 0 2px rgba(0,0,0,.35)'}} />
              </div>
              <div style={{fontSize:10,color:'var(--text-faint)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                {new Date(ev.created_at).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}{conf != null ? ` · ${conf}%` : ''}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Truck Parking Log ────────────────────────────────────────
// Paginated, filterable temporary-pass log for truck_plaza properties.
// Data comes from the backend /visitor_passes/parking-log endpoint — the same
// shape as the CSV export so the two never drift.
function TruckParkingLog({ propertyId }) {
  const { addToast } = useToast();
  const [rows, setRows] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(1);
  const pageSize = 100;
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [filters, setFilters] = useState(() => {
    const today = new Date();
    const iso = today.toISOString().slice(0, 10);
    return { date_from: iso, date_to: iso, plate: '', company_name: '', status: '' };
  });
  const [pendingFilters, setPendingFilters] = useState(filters);
  const [cancelModal, setCancelModal] = useState(null); // { id, plate_text } | null
  const [cancelling, setCancelling] = useState(false);
  const [exporting, setExporting] = useState(false);

  const load = useCallback(async () => {
    if (!propertyId) return;
    setLoading(true);
    setErr(null);
    try {
      const res = await db.getParkingLog(propertyId, {
        ...filters,
        page,
        page_size: pageSize,
      });
      setRows(res.items || []);
      setTotal(res.total ?? (res.items?.length || 0));
    } catch (e) {
      setErr(e.message || 'Failed to load log');
    }
    setLoading(false);
  }, [propertyId, filters, page]);

  // One-shot load per `load` identity. External changes to visitor_passes
  // no longer trigger a full reload of the log — the parent's realtime
  // channel already refreshes its own list; the log owns its filter +
  // pagination state and uses the explicit Refresh button (via applyFilters)
  // or filter changes to refetch.
  useIntervalFetch(load, 0, [load]);

  async function handleCancel(reason) {
    if (!cancelModal) return;
    setCancelling(true);
    try {
      await db.cancelVisitorPass(cancelModal.id, reason || undefined);
      addToast('Pass cancelled', 'success');
      setCancelModal(null);
      load();
    } catch (e) {
      addToast('Cancel failed: ' + (e.message || ''), 'error');
    } finally {
      setCancelling(false);
    }
  }

  async function handleExport() {
    setExporting(true);
    try {
      const blob = await db.getParkingLog(propertyId, { ...filters, format: 'csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const today = new Date().toISOString().slice(0, 10);
      a.download = `truck-parking-log-${today}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      addToast('Export failed: ' + (e.message || ''), 'error');
    }
    setExporting(false);
  }

  function applyFilters(e) {
    e?.preventDefault();
    setPage(1);
    setFilters(pendingFilters);
  }

  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  // Export uses the last-applied `filters`, not `pendingFilters`. If the user
  // edited the form but hasn't clicked Apply, the CSV would silently reflect
  // stale filters. Disable the Export button until the form is re-applied.
  const filtersDirty = (
    pendingFilters.date_from !== filters.date_from ||
    pendingFilters.date_to !== filters.date_to ||
    pendingFilters.plate !== filters.plate ||
    pendingFilters.company_name !== filters.company_name ||
    pendingFilters.status !== filters.status
  );
  const inputStyle = {padding:'6px 8px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-primary)',fontSize:12};
  const thStyle = {textAlign:'left',padding:'6px 8px',fontSize:10,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--text-muted)',borderBottom:'1px solid var(--border)',whiteSpace:'nowrap'};
  const tdStyle = {padding:'8px',fontSize:12,color:'var(--text-primary)',borderBottom:'1px solid var(--border-subtle)',verticalAlign:'top'};
  const statusColor = {
    active: '#4ade80',
    expired: 'var(--text-muted)',
    cancelled: '#ef4444',
    revoked: '#ef4444',
    towed: '#f59e0b',
  };

  return (
    <div>
      <form onSubmit={applyFilters} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,padding:10,marginBottom:10,display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(140px, 1fr))',gap:8,alignItems:'end'}}>
        <label style={{display:'flex',flexDirection:'column',gap:3,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>From
          <input type="date" value={pendingFilters.date_from} onChange={e => setPendingFilters({...pendingFilters, date_from: e.target.value})} style={inputStyle} />
        </label>
        <label style={{display:'flex',flexDirection:'column',gap:3,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>To
          <input type="date" value={pendingFilters.date_to} onChange={e => setPendingFilters({...pendingFilters, date_to: e.target.value})} style={inputStyle} />
        </label>
        <label style={{display:'flex',flexDirection:'column',gap:3,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>Plate
          <input type="text" value={pendingFilters.plate} onChange={e => setPendingFilters({...pendingFilters, plate: e.target.value})} placeholder="ABC 1234" style={inputStyle} />
        </label>
        <label style={{display:'flex',flexDirection:'column',gap:3,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>Company
          <input type="text" value={pendingFilters.company_name} onChange={e => setPendingFilters({...pendingFilters, company_name: e.target.value})} placeholder="ACME" style={inputStyle} />
        </label>
        <label style={{display:'flex',flexDirection:'column',gap:3,fontSize:10,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase'}}>Status
          <select value={pendingFilters.status} onChange={e => setPendingFilters({...pendingFilters, status: e.target.value})} style={inputStyle}>
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
            <option value="cancelled">Cancelled</option>
            <option value="towed">Towed</option>
          </select>
        </label>
        <div style={{display:'flex',gap:6,alignSelf:'end'}}>
          <button type="submit" className="pd-share-btn" style={{color:'#60a5fa'}}>Apply</button>
          <button
            type="button"
            onClick={handleExport}
            disabled={exporting || filtersDirty}
            title={filtersDirty ? 'Apply filters before exporting' : undefined}
            className="pd-share-btn"
            style={{color:'#4ade80'}}
          >{exporting ? 'Exporting…' : 'Export CSV'}</button>
        </div>
      </form>

      {err && <div style={{padding:12,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,color:'#ef4444',fontSize:12,marginBottom:10}}>{err}</div>}

      <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:10,overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr>
              <th style={thStyle}>Registered</th>
              <th style={thStyle}>Company</th>
              <th style={thStyle}>Driver</th>
              <th style={thStyle}>Plate</th>
              <th style={thStyle}>Spot</th>
              <th style={thStyle}>Phone</th>
              <th style={thStyle}>Stay</th>
              <th style={thStyle}>Placard</th>
              <th style={thStyle}>Status</th>
              <th style={thStyle}>Policy</th>
              <th style={thStyle}>Expires</th>
              <th style={thStyle}>Cancelled</th>
              <th style={thStyle}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {loading && rows.length === 0 ? (
              <tr><td colSpan={13} style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:12}}>Loading…</td></tr>
            ) : rows.length === 0 ? (
              <tr><td colSpan={13} style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:12}}>No entries for these filters</td></tr>
            ) : rows.map(r => {
              const s = r.status || 'active';
              const color = statusColor[s] || 'var(--text-muted)';
              const isActive = s === 'active';
              return (
                <tr key={r.id}>
                  <td style={tdStyle}>{r.created_at ? new Date(r.created_at).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—'}</td>
                  <td style={tdStyle}>{r.company_name || '—'}</td>
                  <td style={tdStyle}>{r.visitor_name || '—'}</td>
                  <td style={{...tdStyle,fontFamily:"'Courier New',monospace",fontWeight:700,letterSpacing:'.05em'}}>{r.plate_text}</td>
                  <td style={tdStyle}>{r.parking_spot || '—'}</td>
                  <td style={tdStyle}>{r.phone || '—'}</td>
                  <td style={tdStyle}>{r.stay_days ? `${r.stay_days}d` : '—'}</td>
                  <td style={tdStyle}>{r.placard_color || '—'}</td>
                  <td style={tdStyle}><span aria-label={`Pass status: ${s}`} style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,background:`${color}18`,color,border:`1px solid ${color}40`,textTransform:'uppercase'}}>{s}</span></td>
                  <td style={tdStyle}>{r.policy_acknowledged_at ? <span style={{color:'#4ade80',fontWeight:700}}>✓</span> : <span style={{color:'var(--text-faint)'}}>—</span>}</td>
                  <td style={tdStyle}>{r.valid_until ? new Date(r.valid_until).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—'}</td>
                  <td style={tdStyle}>
                    {r.cancelled_at ? (
                      <>
                        <div>{new Date(r.cancelled_at).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>
                        {r.cancelled_by && <div style={{fontSize:10,color:'var(--text-faint)'}}>by {r.cancelled_by}</div>}
                      </>
                    ) : '—'}
                  </td>
                  <td style={tdStyle}>
                    {isActive && (
                      <button
                        onClick={() => setCancelModal({ id: r.id, plate_text: r.plate_text })}
                        style={{background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.3)',borderRadius:6,padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}
                      >Cancel</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,fontSize:12,color:'var(--text-muted)'}}>
        <div>{total.toLocaleString()} total · page {page} of {totalPages}</div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={() => setPage(Math.max(1, page - 1))} disabled={page <= 1 || loading} className="pd-share-btn">Prev</button>
          <button onClick={() => setPage(Math.min(totalPages, page + 1))} disabled={page >= totalPages || loading} className="pd-share-btn">Next</button>
        </div>
      </div>

      {cancelModal && (
        <ConfirmActionModal
          plate={cancelModal.plate_text}
          actionLabel="Cancel pass"
          description={<>Soft-cancels the active pass for <strong style={{color:'var(--text-primary)'}}>{cancelModal.plate_text}</strong>. The row stays in the log.</>}
          confirmLabel="Cancel pass"
          confirmColor="#ef4444"
          reasonPlaceholder="Reason (optional)"
          submitting={cancelling}
          onConfirm={(reason) => handleCancel(reason)}
          onCancel={() => { if (!cancelling) setCancelModal(null); }}
        />
      )}
    </div>
  );
}

function ALPRPropertyDetailPage({ propertyId, onBack }) {
  const { addToast } = useToast();
  const [property, setProperty] = useState(null);
  const [plates, setPlates] = useState([]);
  const [cameras, setCameras] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAddPlate, setShowAddPlate] = useState(false);
  const [showAddCam, setShowAddCam] = useState(false);
  const [newPlate, setNewPlate] = useState({ plate_text: '', unit_number: '', holder_name: '', vehicle_description: '', phone: '', vehicle_type: '' });
  const [newCam, setNewCam] = useState({ name: '', location_description: '' });
  const [newApiKey, setNewApiKey] = useState(null);
  const [saving, setSaving] = useState(false);
  const [visitorPasses, setVisitorPasses] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState(null);
  const [passTotalCount, setPassTotalCount] = useState(0);
  const nowTick = useNowTick();
  const tempQrRef = useRef(null);
  const permQrRef = useRef(null);

  const isTruckPlaza = property?.property_type === 'truck_plaza';

  const loadAll = useCallback(async () => {
    if (!propertyId) return;
    setLoading(true);
    const [prop, pl, cam, ev, vp, pCount] = await Promise.all([
      db.getProperty(propertyId),
      db.getResidentPlates(propertyId),
      db.getALPRCameras(propertyId),
      db.getRecentPlateEvents(propertyId, 50),
      db.getVisitorPasses(propertyId, { limit: 50 }),
      db.countVisitorPasses(propertyId),
    ]);
    setProperty(prop);
    setPlates(pl);
    setCameras(cam);
    setEvents(ev);
    setVisitorPasses(vp);
    setPassTotalCount(pCount);
    setLoading(false);
  }, [propertyId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Render the Temporary + Permanent QR codes once we know the property
  useEffect(() => {
    if (!property?.qr_code_id || typeof QRCode === 'undefined') return;
    const opts = { width: 320, margin: 1, errorCorrectionLevel: 'M', color: { dark: '#0f172a', light: '#ffffff' } };
    if (tempQrRef.current) QRCode.toCanvas(tempQrRef.current, `${window.location.origin}/temp/${property.qr_code_id}`, opts, err => { if (err) console.error('temp qr:', err); });
    if (permQrRef.current) QRCode.toCanvas(permQrRef.current, `${window.location.origin}/perm/${property.qr_code_id}`, opts, err => { if (err) console.error('perm qr:', err); });
  }, [property?.qr_code_id]);

  // ── Permanent plates (new /perm submissions land here) ──
  // Same live pattern as parking regs and plate events so the admin doesn't
  // have to reload after a resident submits the form.
  const refreshPlates = useCallback(async () => {
    if (!propertyId) return;
    const pl = await db.getResidentPlates(propertyId);
    setPlates(pl);
  }, [propertyId]);
  useIntervalFetch(refreshPlates, 20000, [refreshPlates]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshPlates, 200);
    const channel = supabase.channel('resident-plates-' + propertyId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'resident_plates',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshPlates]);
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible') refreshPlates(); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [refreshPlates]);

  // ── Visitor passes (new /visit submissions land here) ──
  const refreshVisitorPasses = useCallback(async () => {
    if (!propertyId) return;
    const [vp, count] = await Promise.all([
      db.getVisitorPasses(propertyId, { limit: 50 }),
      db.countVisitorPasses(propertyId),
    ]);
    setVisitorPasses(vp);
    setPassTotalCount(count);
  }, [propertyId]);
  useIntervalFetch(refreshVisitorPasses, 20000, [refreshVisitorPasses]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshVisitorPasses, 200);
    const channel = supabase.channel('visitor-passes-' + propertyId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'visitor_passes',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshVisitorPasses]);
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible') refreshVisitorPasses(); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [refreshVisitorPasses]);

  // ── ALPR cameras (register / remove + last_seen updates) ──
  const refreshCameras = useCallback(async () => {
    if (!propertyId) return;
    const cam = await db.getALPRCameras(propertyId);
    setCameras(cam);
  }, [propertyId]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshCameras, 250);
    const channel = supabase.channel('alpr-cameras-' + propertyId)
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'alpr_cameras',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshCameras]);

  // ── Recent plate detections (ALPR) ──
  // Keep this list fresh the same way as parking regs: realtime + 20s poll + visibility.
  const refreshEvents = useCallback(async () => {
    if (!propertyId) return;
    const ev = await db.getRecentPlateEvents(propertyId, 50);
    setEvents(ev);
  }, [propertyId]);
  useIntervalFetch(refreshEvents, 20000, [refreshEvents]);
  useEffect(() => {
    if (!supabase || !propertyId) return;
    const debouncedRefresh = makeDebounced(refreshEvents, 200);
    const channel = supabase.channel('plate-events-' + propertyId)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'plate_events',
        filter: 'property_id=eq.' + propertyId,
      }, debouncedRefresh)
      .subscribe();
    return () => { supabase.removeChannel(channel); };
  }, [propertyId, refreshEvents]);
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible') refreshEvents(); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [refreshEvents]);

  const cameraById = useMemo(() => Object.fromEntries((cameras || []).map(c => [c.id, c])), [cameras]);

  async function handleAddPlate(e) {
    e.preventDefault();
    setSaving(true);
    try {
      const payload = { ...newPlate, property_id: propertyId };
      payload.holder_role = isTruckPlaza ? 'employee' : 'resident';
      if (isTruckPlaza) {
        // Apartment-only fields stay NULL on employee rows.
        delete payload.unit_number;
        delete payload.lease_doc_url;
        delete payload.plate_expiration;
      }
      await db.addResidentPlate(payload);
      setNewPlate({ plate_text: '', unit_number: '', holder_name: '', vehicle_description: '', phone: '', vehicle_type: '' });
      setShowAddPlate(false);
      const pl = await db.getResidentPlates(propertyId);
      setPlates(pl);
    } catch (err) { addToast('Failed to add plate. ' + (err.message || ''), 'error'); }
    setSaving(false);
  }

  async function handleSaveSettings(e) {
    e.preventDefault();
    if (!settingsDraft) return;
    setSaving(true);
    try {
      const updates = {};
      // property_type change only allowed when there are zero passes.
      if (settingsDraft.property_type !== property.property_type) {
        if (passTotalCount > 0) {
          addToast('Cannot change property type after passes have been recorded.', 'error');
          setSaving(false);
          return;
        }
        updates.property_type = settingsDraft.property_type;
      }
      if (settingsDraft.property_type === 'truck_plaza') {
        updates.policy_text = settingsDraft.policy_text || DEFAULT_TRUCK_PLAZA_POLICY;
        updates.policy_phone = settingsDraft.policy_phone || null;
      }
      const updated = await db.updateProperty(propertyId, updates);
      setProperty(updated);
      setShowSettings(false);
      addToast('Settings saved', 'success');
    } catch (err) {
      addToast('Failed to save settings. ' + (err.message || ''), 'error');
    }
    setSaving(false);
  }

  async function handleRemovePlate(id) {
    await db.removeResidentPlate(id);
    // Use functional setState so a realtime event landing between click and
    // commit doesn't get clobbered by the closure-captured `plates`. Mirrors
    // handleApprovePlate below.
    setPlates(prev => prev.filter(p => p.id !== id));
  }

  async function handleApprovePlate(id) {
    try {
      await db.approveResidentPlate(id);
      setPlates(prev => prev.map(p => p.id === id ? { ...p, status: 'approved' } : p));
      addToast('Plate approved', 'success');
    } catch (err) {
      addToast('Failed to approve. ' + (err.message || ''), 'error');
    }
  }

  async function handleAddCamera(e) {
    e.preventDefault();
    setSaving(true);
    try {
      const cam = await db.registerALPRCamera({ ...newCam, property_id: propertyId });
      setNewApiKey(cam.api_key);
      setNewCam({ name: '', location_description: '' });
      const cams = await db.getALPRCameras(propertyId);
      setCameras(cams);
    } catch (err) { addToast('Failed to register camera. ' + (err.message || ''), 'error'); }
    setSaving(false);
  }

  if (loading) return <div className="page-enter"><div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading...</div></div>;
  if (!property) return <div className="page-enter"><div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Lot not found</div></div>;

  const tempUrl = `${window.location.origin}/temp/${property.qr_code_id}`;
  const permUrl = `${window.location.origin}/perm/${property.qr_code_id}`;

  return (
    <div className="page-enter">
      <button onClick={onBack} style={{background:'none',border:'none',color:'var(--accent)',fontSize:13,fontWeight:700,cursor:'pointer',padding:0,marginBottom:12}}>← Back to Lots</button>

      <div style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,padding:'16px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{fontSize:18,fontWeight:800,color:'var(--text-primary)'}}>{property.name}</div>

            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',padding:'2px 7px',borderRadius:20,background:isTruckPlaza?'rgba(251,146,60,.12)':'rgba(96,165,250,.12)',color:isTruckPlaza?'#fb923c':'#60a5fa',border:isTruckPlaza?'1px solid rgba(251,146,60,.3)':'1px solid rgba(96,165,250,.3)',display:'inline-block',marginTop:6}}>{isTruckPlaza ? 'Truck Plaza' : 'Apartment'}</div>

            <>
              <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',marginTop:4}}>Parking Policy Text</label>

                style={{padding:'10px 12px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:12,fontFamily:'monospace',resize:'vertical'}}

              <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',marginTop:4}}>Towing Contact Phone</label>
              <input type="tel" value={settingsDraft.policy_phone} onChange={e => setSettingsDraft({...settingsDraft, policy_phone: e.target.value})} placeholder="+12692176208" style={{padding:'10px 12px',background:'var(--bg-inset)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:14}} />
            </>
