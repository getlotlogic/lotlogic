  <title>LotLogic — AI Parking Enforcement</title>
  <meta name="description" content="AI-powered parking lot enforcement dashboard. Manage violations, cameras, and earnings in real time." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-weight='800' font-size='14' fill='white' text-anchor='middle'%3ELL%3C/text%3E%3C/svg%3E" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #13151d;
      --bg-inset: #080a0f;
      --bg-elevated: #1a1d2e;
      --border: #1e2235;
      --border-subtle: #1a1d2e;
      --text-primary: #f3f4f6;
      --text-secondary: #e8eaf0;
      --text-muted: #6b7280;
      --text-faint: #4b5563;
      --text-ghost: #374151;
      --text-dim: #2a2d3a;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --green: #4ade80;
      --red: #ef4444;
      --yellow: #fbbf24;
      --purple: #a78bfa;
      --unknown-pattern: repeating-conic-gradient(#4b5563 0% 25%, #374151 0% 50%) 50%/4px 4px;
      --unknown-border: rgba(255,255,255,.08);
      --snapshot-bg: #080a0f;
      --earnings-gradient: linear-gradient(135deg, #13151d 0%, #1a1410 100%);
      --earnings-border: #2a1e10;
      --revenue-bg: #0a1a0a;
    }
    .theme-light {
      --bg-primary: #f8f9fb;
      --bg-card: #fff;
      --bg-inset: #f3f4f6;
      --bg-elevated: #fff;
      --border: #e5e7eb;
      --border-subtle: #e5e7eb;
      --text-primary: #1a1a2e;
      --text-secondary: #1a1a2e;
      --text-muted: #6b7280;
      --text-faint: #6b7280;
      --text-ghost: #9ca3af;
      --text-dim: #c0c4cc;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #d97706;
      --purple: #7c3aed;
      --unknown-pattern: repeating-conic-gradient(#d1d5db 0% 25%, #e5e7eb 0% 50%) 50%/4px 4px;
      --unknown-border: rgba(0,0,0,.1);
      --snapshot-bg: #e5e7eb;
      --earnings-gradient: linear-gradient(135deg, #fff 0%, #fef9f0 100%);
      --earnings-border: #e5e7eb;
      --revenue-bg: #f0fdf4;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-secondary);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,.08) 0%, transparent 70%), var(--bg-primary);
    }
    .login-box { width: 100%; max-width: 360px; }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .login-shield {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      flex-shrink: 0;
    }
    .login-wordmark { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .login-wordmark span { color: #3b82f6; }
    .login-tagline { font-size: 13px; color: var(--text-faint); margin-bottom: 36px; margin-top: 4px; letter-spacing: .01em; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .field-input {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text-secondary);
      outline: none;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .field-input::placeholder { color: var(--text-dim); }
    .login-btn {
      width: 100%;
      margin-top: 16px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s, transform .1s;
      letter-spacing: .02em;
      box-shadow: 0 4px 20px rgba(59,130,246,.3);
    }
    .login-btn:active { opacity: .85; transform: scale(.99); }
    .login-btn:disabled { opacity: .4; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg-primary); }

    /* ── Header ── */
    .header {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 20px;
      padding-top: env(safe-area-inset-top);
      height: calc(58px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      padding-bottom: 11px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .header-shield {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.3px;
    }
    .header-wordmark { font-size: 17px; font-weight: 800; color: var(--text-primary); letter-spacing: -.3px; }
    .header-wordmark span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-name { font-size: 12px; color: var(--text-faint); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .signout-btn {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .signout-btn:active { color: var(--text-secondary); border-color: var(--border); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-ghost);
      font-family: inherit;
      transition: color .15s;
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .nav-badge {
      position: absolute;
      top: 5px;
      right: calc(50% - 20px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      border: 1.5px solid var(--bg-card);
    }

    /* ── Page content ── */
    .page-content {
      flex: 1;
      padding: 20px 16px calc(76px + env(safe-area-inset-bottom));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -.4px;
    }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Loading / empty ── */
    .loader { display: flex; align-items: center; justify-content: center; padding: 60px 0; gap: 10px; color: var(--text-muted); font-size: 14px; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: .7; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--text-faint); }

    /* ── Job cards ── */
    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .job-card.urgent { border-color: rgba(220,38,38,.4); box-shadow: 0 2px 16px rgba(220,38,38,.12); }
    .job-urgent-bar {
      background: linear-gradient(90deg, #dc2626, #b91c1c);
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .job-body { padding: 14px 16px; }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .job-lot-name { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .job-lot-addr { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
    .job-timer {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 11px;
      text-align: center;
      min-width: 62px;
      flex-shrink: 0;
    }
    .job-timer-val { font-size: 18px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; }
    .job-timer-val.long { color: var(--red); }
    .job-timer-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; font-weight: 600; }
    .job-details { display: flex; flex-wrap: wrap; gap: 7px; }
    .job-tag {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .job-tag strong { color: var(--text-primary); font-weight: 600; }
    .plate-tag {
      background: #fef3c7;
      color: #1c1009;
      border-radius: 7px;
      padding: 5px 11px;
      font-size: 13px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: .1em;
      border: 1.5px solid #fbbf24;
    }
    .job-footer {
      border-top: 1px solid var(--border-subtle);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .job-type-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .job-type-tag.unauthorized { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .job-type-tag.overtime { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.2); }
    .job-type-tag.default { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
    .job-action { font-size: 12px; font-weight: 600; color: #34d399; }

    /* ── Lot cards ── */
    .lot-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .lot-card-top { padding: 16px; display: flex; align-items: flex-start; gap: 14px; }
    .lot-status-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .lot-status-dot.on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); }
    .lot-status-dot.off { background: #ef4444; }
    .lot-status-dot.warn { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,.5); }
    .lot-info { flex: 1; min-width: 0; }
    .lot-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .lot-addr { font-size: 12px; color: var(--text-faint); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lot-numbers { display: flex; gap: 20px; margin-top: 12px; }
    .lot-num { }
    .lot-num-val { font-size: 24px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .lot-num-val.red { color: var(--red); }
    .lot-num-val.green { color: var(--green); }
    .lot-num-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; font-weight: 600; }
    .lot-actions { border-top: 1px solid var(--border-subtle); display: flex; }
    .lot-action-btn {
      flex: 1;
      padding: 13px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-right: 1px solid var(--border-subtle);
      transition: color .15s, background .15s;
    }
    .lot-action-btn:last-child { border-right: none; }
    .lot-action-btn:active { background: var(--bg-inset); }
    .lot-action-btn.primary { color: var(--accent); }
    .lot-action-btn a { color: inherit; text-decoration: none; }

    /* ── Cam snapshot ── */
    .cam-sheet { background: var(--bg-inset); border-radius: 0 0 16px 16px; overflow: hidden; }
    .cam-row { border-top: 1px solid var(--border-subtle); padding: 12px 16px; }
    .cam-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cam-name { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .cam-time { font-size: 11px; color: var(--text-faint); }
    .cam-img-wrap { border-radius: 10px; overflow: hidden; background: var(--snapshot-bg); aspect-ratio: 16/9; position: relative; }
    .cam-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-offline { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-ghost); font-size: 13px; }
    .cam-viol-overlay {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(220,38,38,.9);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }
    .expand-cams-btn {
      width: 100%;
      border: none;
      background: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      font-family: inherit;
      border-top: 1px solid var(--border-subtle);
      transition: opacity .15s;
    }
    .expand-cams-btn:active { opacity: .7; }

    /* ── Earnings ── */
    .earnings-hero {
      background: var(--earnings-gradient);
      border: 1px solid var(--earnings-border);
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(59,130,246,.08);
    }
    .earnings-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-faint); margin-bottom: 10px; }
    .earnings-amount { font-size: 48px; font-weight: 800; color: var(--text-primary); letter-spacing: -2px; line-height: 1; }
    .earnings-amount span { color: var(--accent); }
    .earnings-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
    .earnings-period-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .period-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-faint);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .period-btn.active { border-color: rgba(59,130,246,.4); color: #3b82f6; background: rgba(59,130,246,.08); }
    .earnings-breakdown {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .breakdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--bg-inset);
      transition: background .1s;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row:active { background: var(--bg-inset); }
    .breakdown-date { font-size: 13px; color: var(--text-primary); font-weight: 600; }
    .breakdown-lot { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .breakdown-right { text-align: right; }
    .breakdown-amt { font-size: 15px; font-weight: 700; color: var(--accent); }
    .breakdown-action { font-size: 11px; color: var(--text-muted); text-transform: capitalize; margin-top: 2px; }
    .breakdown-plate { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text-faint); font-weight: 600; margin-top: 2px; }

    /* ── KPI bar ── */
    .kpi-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .kpi-card {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 10px; text-align: center;
    }
    .kpi-val { font-size: 22px; font-weight: 800; line-height: 1; color: var(--text-primary); }
    .kpi-val.blue { color: var(--accent); }
    .kpi-val.green { color: var(--green); }
    .kpi-val.red { color: var(--red); }
    .kpi-val.yellow { color: var(--yellow); }
    .kpi-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    /* ── Action buttons on violation cards ── */
    .job-actions-row {
      display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1; min-width: 70px; padding: 9px 6px; border-radius: 8px; border: 1.5px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all .15s; text-align: center; text-transform: uppercase; letter-spacing: .04em;
    }
    .action-btn:active { transform: scale(.96); }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .action-btn.boot { background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.4); color: #fbbf24; }
    .action-btn.boot:hover:not(:disabled) { background: rgba(251,191,36,.2); }
    .action-btn.tow { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.4); color: #f87171; }
    .action-btn.tow:hover:not(:disabled) { background: rgba(239,68,68,.2); }
    .action-btn.dismiss { background: rgba(139,92,246,.1); border-color: rgba(139,92,246,.4); color: #a78bfa; }
    .action-btn.dismiss:hover:not(:disabled) { background: rgba(139,92,246,.2); }
    .action-btn.gone { background: rgba(107,114,128,.1); border-color: rgba(107,114,128,.4); color: #9ca3af; }
    .action-btn.gone:hover:not(:disabled) { background: rgba(107,114,128,.2); }

    /* ── Violation detail modal ── */
    .viol-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .viol-modal {
      background: var(--bg-card); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto; animation: slideUp .3s ease;
      border: 1px solid var(--border); border-bottom: none;
    }
    .viol-modal-handle { width: 36px; height: 4px; background: var(--text-ghost); border-radius: 2px; margin: 10px auto 0; }
    .viol-modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--snapshot-bg); display: block; }
    .viol-modal-body { padding: 16px; }
    .viol-modal-title { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
    .viol-modal-sub { font-size: 13px; color: var(--text-faint); margin-bottom: 14px; }
    .viol-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .viol-modal-stat {
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    }
    .viol-modal-stat-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; }
    .viol-modal-stat-val { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-top: 2px; }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px;
    }
    .toast {
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
      pointer-events: auto; text-align: center;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    .toast.success { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .toast.error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .toast.info { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 250;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .confirm-box {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
      max-width: 320px; width: 100%; text-align: center;
    }
    .confirm-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .confirm-body { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: opacity .15s; }
    .confirm-btns button:active { opacity: .7; }
    .confirm-cancel { background: var(--bg-inset); color: var(--text-muted); }
    .confirm-ok { color: #fff; }

    /* ── Success overlay (boot/tow confirmation) ── */
    .success-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 260;
      background: rgba(0,0,0,.75); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      animation: successFadeIn .3s ease;
    }
    @keyframes successFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .success-box {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px;
      max-width: 340px; width: 100%; text-align: center;
      animation: successPop .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes successPop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .success-icon {
      width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .success-icon.boot { background: rgba(251,191,36,.15); }
    .success-icon.tow { background: rgba(239,68,68,.15); }
    .success-title { font-size: 20px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .success-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .success-done {
      width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; border: none; background: #3b82f6; color: #fff;
      transition: opacity .15s;
    }
    .success-done:active { opacity: .7; }

    /* ── Nav icons ── */
    .nav-icon { width: 20px; height: 20px; }
    .nav-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Pull to refresh ── */
    .ptr-indicator {
      text-align: center; padding: 8px 0; color: var(--text-muted); font-size: 12px; font-weight: 600;
      transition: all .2s;
    }

    /* ── Camera health ── */
    .cam-health { display: flex; gap: 10px; margin-top: 6px; }
    .cam-health-stat { font-size: 10px; color: var(--text-faint); }
    .cam-health-stat strong { color: var(--text-muted); }

    /* ── Zone overlay (read-only on snapshots) ── */
    .cam-img-wrap { position: relative; }
    .zone-overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .zone-poly { stroke-width: 1.5; fill-opacity: 0.18; }
    .zone-poly.no_parking { fill: #ef4444; stroke: #ef4444; }
    .zone-poly.time_limited { fill: #8b5cf6; stroke: #8b5cf6; }
    .zone-poly.handicap_only { fill: #eab308; stroke: #eab308; }
    .zone-label-text { font-size: 8px; font-weight: 700; fill: #fff; pointer-events: none; }

    /* ── Zone editor (full-screen) ── */
    .zone-editor-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary); z-index: 200; display: flex; flex-direction: column;
    }
    .ze-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-card); flex-shrink: 0;
    }
    .ze-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .ze-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit; transition: opacity .15s;
    }
    .ze-btn:active { opacity: .7; }
    .ze-btn-primary { background: #3b82f6; color: #fff; }
    .ze-btn-danger { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
    .ze-btn-ghost { background: var(--bg-inset); color: var(--text-muted); }
    .ze-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .ze-canvas-wrap {
      flex: 1; position: relative; overflow: hidden; cursor: crosshair;
      display: flex; align-items: center; justify-content: center; background: var(--snapshot-bg);
    }
    .ze-canvas-wrap img { max-width: 100%; max-height: 100%; display: block; user-select: none; -webkit-user-drag: none; }
    .ze-svg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    }
    .ze-poly { stroke-width: 2; fill-opacity: 0.2; cursor: pointer; }
    .ze-poly.selected { stroke-dasharray: 6 3; fill-opacity: 0.3; stroke-width: 2.5; }
    .ze-vertex {
      r: 5; fill: #fff; stroke: #3b82f6; stroke-width: 2; cursor: grab;
    }
    .ze-vertex:hover { r: 7; }
    .ze-drawing-line { stroke: #3b82f6; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    .ze-drawing-poly { fill: rgba(59,130,246,.15); stroke: #3b82f6; stroke-width: 1.5; }

    .ze-toolbar {
      display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border-subtle);
      background: var(--bg-card); flex-shrink: 0; flex-wrap: wrap; align-items: center;
    }
    .ze-zone-list {
      display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
    }
    .ze-zone-chip {
      padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; transition: all .15s;
    }
    .ze-zone-chip.active { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.25); }

    .ze-panel {
      padding: 12px 16px; border-top: 1px solid var(--border-subtle); background: var(--bg-card); flex-shrink: 0;
    }
    .ze-panel-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .ze-panel-row:last-child { margin-bottom: 0; }
    .ze-panel-label { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 50px; text-transform: uppercase; letter-spacing: .05em; }
    .ze-panel-input {
      flex: 1; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; color: var(--text-secondary); outline: none; font-family: inherit;
    }
    .ze-panel-input:focus { border-color: var(--accent); }
    .ze-panel-select {
      flex: 1; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px; color: var(--text-secondary); outline: none; font-family: inherit;
      appearance: none; -webkit-appearance: none;
    }
    .ze-panel-select:focus { border-color: var(--accent); }
    .ze-status { font-size: 12px; color: var(--text-faint); padding: 4px 0; }
    .ze-hint { font-size: 11px; color: var(--text-ghost); text-align: center; padding: 8px; }

    /* ── Live feed controls ── */
    .ze-feed-controls {
      display: flex; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card); flex-shrink: 0; align-items: center; flex-wrap: wrap;
    }
    .ze-feed-status {
      display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
    }
    .ze-feed-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ze-feed-dot.live { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); animation: pulse-dot 2s infinite; }
    .ze-feed-dot.paused { background: #fbbf24; }
    .ze-feed-dot.offline { background: #ef4444; }
    .ze-refresh-btn {
      padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-inset); color: var(--text-muted);
      font-family: inherit; transition: all .15s;
    }
    .ze-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ze-refresh-btn:active { opacity: .7; }
    .ze-refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
    .ze-interval-select {
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 11px; color: var(--text-muted); font-family: inherit;
      outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;
    }

    /* ── Detection overlays on canvas ── */
    .ze-detection-bbox { fill: none; stroke-width: 0.5; rx: 0.3; ry: 0.3; }
    .ze-detection-bbox.vehicle { stroke: #3b82f6; }
    .ze-detection-bbox.person { stroke: #f59e0b; }
    .ze-detection-label {
      font-size: 2px; font-weight: 700; pointer-events: none;
    }
    .ze-detection-label-bg {
      rx: 0.3; ry: 0.3;
    }

    /* ── Detection sidebar panel ── */
    .ze-detections-panel {
      border-top: 1px solid var(--border-subtle); background: var(--bg-card); flex-shrink: 0;
      max-height: 220px; overflow-y: auto;
    }
    .ze-det-header {
      padding: 8px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--bg-inset);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-card); z-index: 1;
    }
    .ze-det-tabs { display: flex; gap: 4px; }
    .ze-det-tab {
      padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700;
      cursor: pointer; border: 1px solid transparent; background: none; color: var(--text-faint);
      font-family: inherit; text-transform: uppercase; letter-spacing: .05em;
      transition: all .15s;
    }
    .ze-det-tab.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,.08); }
    .ze-det-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 16px;
      border-bottom: 1px solid var(--bg-inset); transition: background .1s;
    }
    .ze-det-item:hover { background: var(--bg-inset); }
    .ze-det-icon {
      width: 32px; height: 32px; border-radius: 6px; display: flex;
      align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .ze-det-icon.vehicle { background: rgba(59,130,246,.12); }
    .ze-det-icon.person { background: rgba(245,158,11,.12); }
    .ze-det-info { flex: 1; min-width: 0; }
    .ze-det-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .ze-det-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
    .ze-det-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
    }
    .ze-det-badge.plate {
      background: #fef3c7; color: #1c1009; border: 1px solid #fbbf24;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: .1em;
    }
    .ze-det-badge.conf { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .ze-det-badge.color-swatch {
      width: 16px; height: 16px; border-radius: 4px; padding: 0; min-width: 16px;
      border: 1.5px solid rgba(255,255,255,.2);
    }

    /* ── Snapshot detection summary on cam cards ── */
    .cam-det-summary {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
    }
    .cam-det-chip {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px;
    }
    .cam-det-chip .det-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cam-det-chip .det-dot.vehicles { background: #3b82f6; }
    .cam-det-chip .det-dot.people { background: #f59e0b; }
    .cam-det-chip .det-dot.plates { background: #4ade80; }

    /* ── Toggle switch ── */
    .ze-toggle-wrap { display: flex; align-items: center; gap: 6px; }
    .ze-toggle {
      width: 34px; height: 18px; border-radius: 9px; border: none; cursor: pointer;
      position: relative; transition: background .2s; padding: 0;
    }
    .ze-toggle.on { background: #3b82f6; }
    .ze-toggle.off { background: var(--text-ghost); }
    .ze-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transition: transform .2s;
    }
    .ze-toggle.on::after { transform: translateX(16px); }
    .ze-toggle-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }

    /* ── Loading skeletons ── */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 8px;
    }
    .skeleton-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      margin-bottom: 10px; overflow: hidden; padding: 16px;
    }
    .skeleton-line { height: 12px; margin-bottom: 10px; border-radius: 6px; }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w40 { width: 40%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w30 { width: 30%; }
    .skeleton-line.thick { height: 20px; }
    .skeleton-row { display: flex; gap: 8px; }
    .skeleton-circle { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-img { width: 100%; aspect-ratio: 16/9; border-radius: 10px; }
    .skeleton-kpi { flex: 1; height: 68px; border-radius: 12px; }

    /* ── Card entrance animations ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-animated {
      animation: cardIn .35s ease both;
    }
    .card-animated:nth-child(1) { animation-delay: 0s; }
    .card-animated:nth-child(2) { animation-delay: .05s; }
    .card-animated:nth-child(3) { animation-delay: .1s; }
    .card-animated:nth-child(4) { animation-delay: .15s; }
    .card-animated:nth-child(5) { animation-delay: .2s; }
    .card-animated:nth-child(6) { animation-delay: .25s; }
    .card-animated:nth-child(7) { animation-delay: .3s; }
    .card-animated:nth-child(8) { animation-delay: .35s; }

    /* ── Search / filter bar ── */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
    }
    .search-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px 10px 36px; font-size: 14px; color: var(--text-secondary);
      outline: none; font-family: inherit; transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .search-input::placeholder { color: var(--text-dim); }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-ghost); pointer-events: none;
    }
    .filter-chip {
      padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-faint);
      font-family: inherit; transition: all .15s; white-space: nowrap;
    }
    .filter-chip.active { border-color: rgba(59,130,246,.4); color: var(--accent); background: rgba(59,130,246,.08); }
    .filter-chip:active { transform: scale(.96); }

    /* ── Inline bar chart ── */
    .bar-chart { margin-bottom: 16px; }
    .bar-chart-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .bar-chart-label { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 52px; text-align: right; }
    .bar-chart-track {
      flex: 1; height: 24px; background: var(--bg-inset); border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-chart-fill {
      height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 8px;
      font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
      transition: width .6s ease;
      min-width: fit-content;
    }
    .bar-chart-value { font-size: 12px; font-weight: 700; color: var(--text-muted); min-width: 40px; }

    /* ── Confidence bar ── */
    .conf-bar-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .conf-bar {
      width: 40px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .conf-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

    /* ── Settings page ── */
    .settings-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; margin-bottom: 12px;
    }
    .settings-section-title {
      padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--bg-inset);
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--bg-inset);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-info { flex: 1; min-width: 0; }
    .settings-row-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .settings-row-desc { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
    .settings-row-value { font-size: 13px; color: var(--text-muted); font-weight: 500; max-width: 180px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Occupancy bar ── */
    .occupancy-wrap { margin-top: 10px; }
    .occupancy-bar-track {
      width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .occupancy-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .occupancy-label { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--text-faint); font-weight: 600; }

    /* ── Connection indicator ── */
    .conn-indicator {
      display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px; background: rgba(74,222,128,.08);
      border: 1px solid rgba(74,222,128,.15);
    }
    .conn-indicator.online { color: #4ade80; }
    .conn-indicator.offline { color: #ef4444; background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.15); }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
    .conn-dot.on { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,.4); }
    .conn-dot.off { background: #ef4444; }

    /* ── Relative time badge ── */
    .time-ago {
      font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 2px 6px;
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 4px;
    }

    /* ── Snapshot zoom ── */
    .snap-zoom-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
      background: rgba(0,0,0,.9); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out; animation: fadeIn .2s ease;
    }
    .snap-zoom-overlay img {
      max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .snap-zoom-close {
      position: absolute; top: 20px; right: 20px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(255,255,255,.1); border: none;
      color: #fff; font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background .15s;
    }
    .snap-zoom-close:hover { background: rgba(255,255,255,.2); }

    /* ── Trend indicator ── */
    .trend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; }
    .trend.up { color: #4ade80; }
    .trend.down { color: #ef4444; }
    .trend.flat { color: #6b7280; }

    /* ── Stat card enhanced ── */
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 2px;
    }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; }
    .stat-card-val { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text-primary); }
    .stat-card-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .stat-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }

    /* ── Pulsing alert dot ── */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .alert-pulse { position: relative; }
    .alert-pulse::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%; border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease infinite;
    }

    /* ── Smooth page transitions ── */
    .page-enter { animation: cardIn .3s ease both; }

    /* ── Supabase realtime pulse ── */
    .conn-indicator.online .conn-dot.on {
      animation: pulse-dot 2s ease infinite;
    }

    /* ── Enhanced card hover ── */
    .job-card { transition: transform .15s ease, box-shadow .15s ease; }
    .job-card:active { transform: scale(.99); }
    .lot-card { transition: transform .15s ease, box-shadow .15s ease; }
    .lot-card:active { transform: scale(.99); }

    /* ── Improved scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-ghost); }

    /* ── Data source badge ── */

      text-transform: uppercase; letter-spacing: .06em;

    }

    /* ── Theme toggle ── */
    .theme-toggle-btn {

    .theme-toggle-btn::after {

      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); transition: transform .3s, background .3s;

    /* ── Offline banner ── */
    .offline-banner {
      position: fixed; top: calc(58px + env(safe-area-inset-top)); left: 0; right: 0;
      z-index: 100; text-align: center; padding: 8px 16px;
      font-size: 12px; font-weight: 700;
      background: rgba(239,68,68,.12); color: #f87171;
      border-bottom: 1px solid rgba(239,68,68,.25);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      animation: slideDown .3s ease;
    }
    .reconnected-banner {
      position: fixed; top: calc(58px + env(safe-area-inset-top)); left: 0; right: 0;
      z-index: 100; text-align: center; padding: 8px 16px;
      font-size: 12px; font-weight: 700;

async function apiFetch(path, options = {}) {

// ── Supabase data layer (with Rails API fallback) ─────────────

const db = {
  async getOwners(email) {

        .select('*')

          snapshot_width: cam.snapshot_width || 640,

  async getViolations(lotId) {

        .from('violations')
        .select('*, snapshots:snapshot_id(url)')

  async getViolationsByPartner(partnerId) {
    if (supabase) {
      const { data, error } = await supabase

        const byAction = {};

        return {

          gross_revenue_cents: Math.round(totalGross * 100),

  async addCamera(body) {

    const channel = supabase.channel('violations-realtime')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'violations',

        if (lotIds.includes(payload.new?.lot_id) || lotIds.includes(payload.old?.lot_id)) {

      .subscribe((status) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.error('Realtime subscription failed:', status);
          if (onError) onError(status);
        }

    return channel;
  },

// ── Theme hook ────────────────────────────────────────────────

// ── Online/offline hook ──────────────────────────────────────
function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [reconnected, setReconnected] = useState(false);
  useEffect(() => {
    const goOnline = () => { setOnline(true); setReconnected(true); setTimeout(() => setReconnected(false), 3000); };
    const goOffline = () => { setOnline(false); setReconnected(false); };
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);
  return { online, reconnected };
}

function haptic(style = 'light') {
  if (!navigator.vibrate) return;

  else navigator.vibrate(8);
}

// ── Smarter date labels ──────────────────────────────────────
function smartDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (d >= today) return 'Today';
  if (d >= yesterday) return 'Yesterday';
  const diffDays = Math.floor((today - d) / 86400000);
  if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Time helpers ──────────────────────────────────────────────
function elapsed(isoStr) {
  if (!isoStr) return null;
  const mins = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (mins < 60) return { val: mins, unit: 'MIN', long: mins >= 45 };
  const hrs = Math.floor(mins / 60);
  return { val: hrs, unit: 'HR', long: hrs >= 2 };
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const secs = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// ── Toast system ──────────────────────────────────────────────
const ToastContext = React.createContext({ addToast: () => {} });

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <ToastContext.Provider value={{ addToast }}>
      {children}
      <div className="toast-container">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

function useToast() { return React.useContext(ToastContext); }

          {snapshotUrl && !imgLoading && (
            <div style={{position:'absolute', bottom:8, right:8}}>
              <span className="time-ago">{timeAgo(violation.detected_at)}</span>
            </div>
          )}
        </div>
        <div className="viol-modal-body">
          <div className="viol-modal-title">{lot?.name || 'Unknown Lot'}</div>
          <div className="viol-modal-sub">{lot?.address} · {fmtDate(violation.detected_at)} {fmtTime(violation.detected_at)}</div>

          <div className="viol-modal-grid">
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Status</div>
              <div className="viol-modal-stat-val" style={{color: isPending ? 'var(--yellow)' : 'var(--green)'}}>
                {isPending ? 'Pending' : (violation.action_taken || 'Resolved')}
              </div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Wait Time</div>
              <div className="viol-modal-stat-val" style={{color: timer?.long ? 'var(--red)' : 'var(--accent)'}}>
                {timer ? `${timer.val} ${timer.unit}` : '—'}
              </div>
            </div>
            <div className="viol-modal-stat" style={{gridColumn: violation.plate_text ? 'auto' : '1 / -1'}}>
              <div className="viol-modal-stat-label">License Plate</div>
              {violation.plate_text ? (
                <div className="viol-modal-stat-val" style={{fontFamily:'Courier New, monospace', letterSpacing:'.1em', display:'flex', alignItems:'center', gap:6}}>
                  {violation.plate_text}
                  {violation.plate_confidence != null && (() => {
                    const conf = Math.round(parseFloat(violation.plate_confidence) * 100);
                    const confColor = conf >= 80 ? '#4ade80' : conf >= 50 ? '#fbbf24' : '#ef4444';
                    return <span style={{fontSize:11, fontWeight:600, color:confColor, fontFamily:'Inter, sans-serif'}}>({conf}%)</span>;
                  })()}
                </div>
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div className="viol-modal-stat-val" style={{color:'var(--text-muted)', display:'flex', alignItems:'center', gap:5, flex:'none'}}>
                    <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#6b7280" strokeWidth="1.5"/><line x1="4" y1="4" x2="12" y2="12" stroke="#6b7280" strokeWidth="1.5"/></svg>
                    Not captured
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:4, flex:1}}>
                    <input
                      type="text"
                      placeholder="Enter plate manually"
                      value={manualPlate}
                      onChange={e => setManualPlate(e.target.value.toUpperCase())}
                      maxLength={10}
                      style={{
                        background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:6, padding:'5px 8px',
                        fontSize:12, color:'var(--text-secondary)', fontFamily:'Courier New, monospace', letterSpacing:'.1em',
                        width:110, outline:'none',
                      }}
                      onFocus={e => { e.target.style.borderColor = '#3b82f6'; }}
                      onBlur={e => { e.target.style.borderColor = ''; }}
                    />
                    {manualPlate.trim().length >= 2 && (
                      <button
                        disabled={savingPlate}
                        onClick={async () => {
                          setSavingPlate(true);
                          try {
                            await db.recordAction(violation.id, 'plate_correction', { plate_text: manualPlate.trim(), status: 'pending' });
                            addToast('Plate saved', 'success');
                            if (onAction) onAction();
                          } catch {
                            addToast('Could not save plate — backend may not support this yet', 'error');
                          } finally { setSavingPlate(false); }
                        }}
                        style={{
                          background:'#2563eb', color:'#fff', border:'none', borderRadius:6, padding:'5px 10px',
                          fontSize:11, fontWeight:700, cursor:'pointer', whiteSpace:'nowrap',
                        }}
                      >{savingPlate ? '…' : 'Save'}</button>
                    )}
                  </div>
                </div>
              )}
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Zone</div>
              <div className="viol-modal-stat-val">{violation.zone_id || '—'}</div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Type</div>
              <div className="viol-modal-stat-val" style={{textTransform:'capitalize'}}>{(violation.violation_type || '').replace(/_/g, ' ')}</div>
            </div>
            <div className="viol-modal-stat">
              <div className="viol-modal-stat-label">Vehicle</div>
              <div className="viol-modal-stat-val" style={{textTransform:'capitalize', display:'flex', alignItems:'center', gap:6}}>
                {displayColor(violation.vehicle_color) ? (
                  <span style={{width:12, height:12, borderRadius:4, background:colorHex(violation.vehicle_color), border:'1.5px solid rgba(255,255,255,.2)', flexShrink:0}} />
                ) : (
                  <span style={{width:12, height:12, borderRadius:4, background:'var(--unknown-pattern)', border:'1.5px solid var(--unknown-border)', flexShrink:0}} title="Color not detected" />
                )}
                {displayColor(violation.vehicle_color)
                  ? [violation.vehicle_color, violation.vehicle_type !== 'car' ? violation.vehicle_type : null].filter(Boolean).join(' ')
                  : (violation.vehicle_type && violation.vehicle_type !== 'car' ? violation.vehicle_type : 'Unknown')}
                {isLowConfColor(violation.vehicle_color) && (
                  <span style={{fontSize:9, color:'var(--text-muted)', fontWeight:600, textTransform:'uppercase', letterSpacing:'.05em'}}>low conf</span>
                )}
              </div>
            </div>
            {violation.vehicle_make && (
              <div className="viol-modal-stat">
                <div className="viol-modal-stat-label">Make/Model</div>
                <div className="viol-modal-stat-val" style={{textTransform:'capitalize'}}>{[violation.vehicle_make, violation.vehicle_model].filter(Boolean).join(' ')}</div>
              </div>
            )}
            {violation.our_revenue > 0 && (
              <div className="viol-modal-stat">
                <div className="viol-modal-stat-label">Revenue</div>
                <div className="viol-modal-stat-val" style={{color:'var(--green)'}}>{fmtMoney(violation.our_revenue)}</div>
              </div>
            )}
            {violation.confidence && (() => {
              const conf = Math.round(parseFloat(violation.confidence) * 100);
              const confColor = conf >= 80 ? '#4ade80' : conf >= 50 ? '#fbbf24' : '#ef4444';
              return (
                <div className="viol-modal-stat">
                  <div className="viol-modal-stat-label">AI Confidence</div>
                  <div className="viol-modal-stat-val" style={{color:confColor, display:'flex', alignItems:'center', gap:6}}>
                    {conf}%
                    <div style={{flex:1, maxWidth:60, height:4, borderRadius:2, background:'var(--border)'}}>
                      <div style={{width:`${conf}%`, height:'100%', borderRadius:2, background:confColor}} />
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>

          {/* SMS notification status */}
          {violation.sms_sent_at && (
            <div style={{background:'var(--bg-inset)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 12px', marginBottom:14, display:'flex', alignItems:'center', gap:8}}>
              <span style={{fontSize:14}}>
                {violation.sms_delivered ? '✓' : '○'}
              </span>
              <div>
                <div style={{fontSize:12, fontWeight:600, color: violation.sms_delivered ? 'var(--green)' : 'var(--yellow)'}}>
                  SMS {violation.sms_delivered ? 'Delivered' : 'Sent'}
                </div>
                <div style={{fontSize:11, color:'var(--text-faint)'}}>{timeAgo(violation.sms_sent_at)}</div>
              </div>
            </div>
          )}

          {isPending && (
            <div className="job-actions-row" style={{padding:0, border:'none'}}>
              <button className="action-btn boot" onClick={() => onAction(violation.id, 'boot')}>Boot</button>
              <button className="action-btn tow" onClick={() => onAction(violation.id, 'tow')}>Tow</button>
              <button className="action-btn dismiss" onClick={() => onAction(violation.id, 'dismissed')}>Dismiss</button>
              <button className="action-btn gone" onClick={() => onAction(violation.id, 'already_gone')}>Gone</button>
            </div>
          )}
        </div>
      </div>
      {zoomed && <ImageZoom src={snapshotUrl} alt="Violation snapshot" onClose={() => setZoomed(false)} />}
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState(() => localStorage.getItem('lotlogic_email') || '');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function submit(e) {
    e.preventDefault();
    if (!email.trim()) return;
    setLoading(true); setError('');
    try {
      const needle = email.trim().toLowerCase();
      // Check lot owners first, then enforcement partners
      const [owners, partners] = await Promise.all([
        db.getOwners(needle).catch(() => []),
        db.getPartners(needle).catch(() => []),
      ]);
      // Find matching accounts — if duplicates exist, check which has lots assigned
      const ownerMatches = owners.filter(o => o.email?.toLowerCase() === needle);
      if (ownerMatches.length > 0) {
        // Find which owner (if any) actually has lots assigned
        const lotsChecks = await Promise.all(ownerMatches.map(o =>
          db.getLots({ owner_id: o.id }).then(l => l.length).catch(() => 0)
        ));
        const withLotsIdx = ownerMatches.findIndex((_, i) => lotsChecks[i] > 0);
        if (withLotsIdx >= 0) {
          const ownerMatch = ownerMatches[withLotsIdx];
          localStorage.setItem('lotlogic_email', email.trim());
          onLogin({ ...ownerMatch, _role: 'owner', business_name: ownerMatch.business_name || ownerMatch.contact_name }); return;
        }
        // Owner exists but has no lots — fall through to check enforcement partners
      }
      const partnerMatches = partners.filter(p => p.email?.toLowerCase() === needle);
      if (partnerMatches.length > 0) {
        let partnerMatch = partnerMatches[partnerMatches.length - 1]; // default to last
        if (partnerMatches.length > 1) {
          const lotsChecks = await Promise.all(partnerMatches.map(p =>
            db.getLots({ partner_id: p.id }).then(l => l.length).catch(() => 0)
          ));
          const withLots = partnerMatches.findIndex((_, i) => lotsChecks[i] > 0);
          if (withLots >= 0) partnerMatch = partnerMatches[withLots];
        }
        localStorage.setItem('lotlogic_email', email.trim());
        onLogin({ ...partnerMatch, _role: 'partner', business_name: partnerMatch.company_name }); return;
      }
      setError("No account found for that email. Contact your LotLogic rep if you think this is wrong.");
    } catch {
      setError("Can't connect right now. Check your connection and try again.");
    } finally { setLoading(false); }
  }

  return (
    <div className="login-page" role="main">
      <div className="login-box">
        <div className="login-logo" aria-hidden="true">
          <div className="login-shield">LL</div>
          <div className="login-wordmark">Lot<span>Logic</span></div>
        </div>
        <div className="login-tagline">AI-powered parking enforcement — sign in to get started</div>
        <form onSubmit={submit} aria-label="Sign in">
          <label className="field-label" htmlFor="login-email">Your email</label>
          <input
            id="login-email"
            className="field-input"
            type="email"
            placeholder="you@company.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            autoCapitalize="none"
            autoCorrect="off"
            required
            autoFocus
            aria-required="true"
          />
          <button className="login-btn" type="submit" disabled={loading} aria-busy={loading}>
            {loading ? 'Signing in…' : 'Sign In →'}
          </button>
        </form>
        {error && <div className="login-error" role="alert">{error}</div>}
      </div>
    </div>
  );
}

// ── Jobs tab (current violations) ─────────────────────────────
function JobsPage({ lots, violations, loading, lotStates, onAction, isOwner, deepLinkViolationId, user }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));
  const [selectedViol, setSelectedViol] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [acting, setActing] = useState(null);
  const actingRef = useRef(false); // Guard against double-tap race condition
  const [successAction, setSuccessAction] = useState(null);
  const { addToast } = useToast();

  // Auto-select violation from SMS deep link
  useEffect(() => {
    if (deepLinkViolationId && violations.length && !selectedViol) {
      const match = violations.find(v => v.id === deepLinkViolationId);
      if (match) {
        setSelectedViol(match);
        // Clear URL path so refresh doesn't re-trigger
        window.history.replaceState(null, '', '/');
      }
    }
  }, [deepLinkViolationId, violations, selectedViol]);

  // Active jobs = pending violations, oldest first (most urgent first)
  const active = violations
    .filter(v => v.status === 'pending')
    .sort((a, b) => new Date(a.detected_at) - new Date(b.detected_at));

  // Recent = resolved today (calendar day)
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayCutoff = todayStart.getTime();
  const recent = violations
    .filter(v => v.status !== 'pending' && new Date(v.resolved_at || v.detected_at).getTime() >= todayCutoff)
    .sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  // KPIs
  const avgWaitMins = active.length > 0
    ? Math.round(active.reduce((s, v) => s + (Date.now() - new Date(v.detected_at)) / 60000, 0) / active.length)
    : 0;
  const todayResolved = recent.length;
  const todayRevenue = recent.reduce((s, v) => s + (v.our_revenue || 0), 0);

  // Live detection counts from lot states
  const allCams = Object.values(lotStates).flatMap(s => s?.cameras || []);
  const liveVehicles = allCams.reduce((s, c) => s + (c.latest_snapshot?.vehicles_detected || c.latest_snapshot?.vehicle_count || 0), 0);
  const livePeople = allCams.reduce((s, c) => s + (c.latest_snapshot?.people_detected || c.latest_snapshot?.person_count || c.latest_snapshot?.humans_detected || 0), 0);
  const livePlates = allCams.reduce((s, c) => {
    const snap = c.latest_snapshot;
    if (!snap) return s;
    return s + (snap.plates_read || snap.plate_count || (snap.plate_readings ? snap.plate_readings.length : 0));
  }, 0);

  // Plate readings with confidence from violations
  const platesWithConf = active.filter(v => v.plate_text).map(v => ({
    plate: v.plate_text,
    confidence: v.confidence,
    color: v.vehicle_color,
    type: v.vehicle_type,
  }));

  // Plate read rate across all violations
  const totalViols = [...active, ...recent];
  const violsWithPlate = totalViols.filter(v => v.plate_text);
  const plateReadRate = totalViols.length > 0 ? Math.round((violsWithPlate.length / totalViols.length) * 100) : null;

  // AI detection quality metrics
  const violsWithColor = totalViols.filter(v => displayColor(v.vehicle_color));
  const colorDetRate = totalViols.length > 0 ? Math.round((violsWithColor.length / totalViols.length) * 100) : null;
  const violsWithType = totalViols.filter(v => v.vehicle_type && v.vehicle_type !== 'car');
  // AI health: weight color detection higher since plates require Plate Recognizer API quota
  const aiHealthScore = totalViols.length > 0
    ? Math.round(((plateReadRate || 0) * 0.3 + (colorDetRate || 0) * 0.5 + (violsWithType.length / totalViols.length * 100) * 0.2))
    : null;

  const actionLabels = { boot: 'Boot', tow: 'Tow', dismissed: 'Dismiss', already_gone: 'Already Gone', no_action: 'No Action' };
  const actionColors = { boot: '#fbbf24', tow: '#ef4444', dismissed: '#a78bfa', already_gone: '#6b7280', no_action: '#6b7280' };

  async function handleAction(violId, action) {
    // Guard against double-tap: if already processing any action, bail out
    if (actingRef.current) return;
    actingRef.current = true;
    setConfirm(null);
    setSelectedViol(null);
    // Verify violation belongs to this user's lots before executing
    const viol = violations.find(v => v.id === violId);
    if (!viol || !lots.some(l => l.id === viol.lot_id)) {
      addToast('Action denied: violation not in your lots', 'error');
      actingRef.current = false;
      return;
    }
    setActing(violId);
    try {
      const extra = {};
      // Pass partner fee schedule for revenue calculation on boot/tow
      if ((action === 'boot' || action === 'tow') && user) {
        extra._partner = { id: user.id, boot_fee: user.boot_fee, tow_fee: user.tow_fee, revenue_share: user.revenue_share };
      }
      const result = await db.recordAction(violId, action, extra);
      if (result && result.success !== false) {
        if (action === 'boot' || action === 'tow') {
          const viol = violations.find(v => v.id === violId);
          const lotName = viol ? lotMap[viol.lot_id]?.name : null;
          setSuccessAction({ action, lotName, plate: viol?.plate_text, zone: viol?.zone_id || viol?.space_number });
        } else {
          addToast(`${actionLabels[action] || action} recorded`, 'success');
        }
      }
      if (onAction) onAction();
    } catch (e) {
      console.error('handleAction error:', e);
      const msg = e.status === 409 ? 'Already resolved' : (e.message || 'Unknown error');
      addToast(`Action failed: ${msg}`, 'error');
      if (onAction) onAction();
    } finally { setActing(null); actingRef.current = false; }
  }

  function requestAction(violId, action) {
    haptic(action === 'tow' ? 'heavy' : action === 'boot' ? 'medium' : 'light');
    const bootFee = user?.boot_fee || 75;
    const towFee = user?.tow_fee || 250;
    if (action === 'tow') {
      setConfirm({ violId, action, title: 'Confirm Tow', body: `This will record a tow for this vehicle. Tow fee: $${towFee}. Continue?`, color: '#ef4444' });
    } else if (action === 'boot') {
      setConfirm({ violId, action, title: 'Confirm Boot', body: `This will record a boot for this vehicle. Boot fee: $${bootFee}. Continue?`, color: '#fbbf24' });
    } else {
      handleAction(violId, action);
    }
  }

  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all'); // all | urgent | plates

  // Filter active jobs
  const filteredActive = active.filter(v => {
    if (filter === 'urgent') { const t = elapsed(v.detected_at); return t?.val >= 30; }
    if (filter === 'plates') return !!v.plate_text;
    if (filter === 'no_plate') return !v.plate_text;
    return true;
  }).filter(v => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return (v.plate_text?.toLowerCase().includes(q)) ||
      (v.vehicle_color?.toLowerCase().includes(q)) ||
      (v.vehicle_type?.toLowerCase().includes(q)) ||
      (v.vehicle_make?.toLowerCase().includes(q)) ||
      (v.vehicle_model?.toLowerCase().includes(q)) ||
      (lotMap[v.lot_id]?.name?.toLowerCase().includes(q)) ||
      (v.zone_id?.toLowerCase().includes(q));
  });

  if (loading && violations.length === 0) {
    return <div className="page-enter"><SkeletonKPIs /><SkeletonCards count={4} /></div>;
  }

  return (
    <div className="page-enter">
      {/* KPI bar */}
      <div className="kpi-bar">
        <div className="kpi-card">
          <div className={`kpi-val ${active.length > 0 ? 'red' : 'green'}`}>{active.length}</div>
          <div className="kpi-label">Pending</div>
        </div>
        <div className="kpi-card">
          <div className={`kpi-val ${avgWaitMins >= 45 ? 'red' : 'blue'}`}>{avgWaitMins}<span style={{fontSize:12}}>m</span></div>
          <div className="kpi-label">Avg Wait</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{todayResolved}</div>
          <div className="kpi-label">Today</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-val green">{fmtMoney(todayRevenue)}</div>
          <div className="kpi-label">Earned</div>
        </div>
      </div>

      {/* Live detection bar */}
      {(liveVehicles > 0 || livePeople > 0 || livePlates > 0) && (
        <div style={{display:'flex', gap:8, marginBottom:14, flexWrap:'wrap'}}>
          <div className="cam-det-chip" style={{padding:'5px 10px'}}>
            <span className="det-dot vehicles" /> {liveVehicles} vehicle{liveVehicles !== 1 ? 's' : ''} tracked
          </div>
          <div className="cam-det-chip" style={{padding:'5px 10px'}}>
            <span className="det-dot people" /> {livePeople} {livePeople === 1 ? 'person' : 'people'} tracked
          </div>
          {livePlates > 0 && (
            <div className="cam-det-chip" style={{padding:'5px 10px'}}>
              <span className="det-dot plates" /> {livePlates} plate{livePlates !== 1 ? 's' : ''} read
            </div>
          )}
          {plateReadRate != null && (
            <div className="cam-det-chip" style={{padding:'5px 10px', background: plateReadRate >= 60 ? 'rgba(74,222,128,.08)' : plateReadRate >= 30 ? 'rgba(251,191,36,.08)' : 'rgba(239,68,68,.08)', border: `1px solid ${plateReadRate >= 60 ? 'rgba(74,222,128,.2)' : plateReadRate >= 30 ? 'rgba(251,191,36,.2)' : 'rgba(239,68,68,.2)'}`}}>
              <span style={{width:7, height:7, borderRadius:'50%', background: plateReadRate >= 60 ? '#4ade80' : plateReadRate >= 30 ? '#fbbf24' : '#ef4444', flexShrink:0}} /> {plateReadRate}% plate read rate
            </div>
          )}
          {colorDetRate != null && (

          <div className="section-header" style={{marginTop: 24}}>

                    </div>
                    {v.our_revenue > 0 && (
                      <div className="job-timer" style={{background:'var(--revenue-bg)'}}>
                        <div style={{fontSize:15, fontWeight:800, color:'var(--green)'}}>{fmtMoney(v.our_revenue)}</div>
                        <div className="job-timer-label">earned</div>

                    )}
                  </div>
                  <div className="job-details">
                    {v.plate_text ? (
                      <span className="plate-tag" style={{display:'flex', alignItems:'center', gap:4}}>
                        {displayColor(v.vehicle_color) && <span style={{width:8, height:8, borderRadius:3, background:colorHex(v.vehicle_color), border:'1px solid rgba(0,0,0,.2)', flexShrink:0}} />}
                        {v.plate_text}
                      </span>
                    ) : (
                      <span className="plate-tag no-plate" style={{display:'flex', alignItems:'center', gap:4, background:'rgba(239,68,68,.08)', border:'1px solid rgba(239,68,68,.2)', color:'#ef4444', fontSize:10}}>No plate</span>
                    )}
                    {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                    <span className="job-tag" style={{color: col}}>✓ <strong style={{color: col}}>{(v.action_taken || 'handled').replace(/_/g, ' ')}</strong></span>
                  </div>

            );
          })}
