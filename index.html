<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>LotLogic Operator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #111318;
      color: #f0f2f5;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #111318;
    }
    .login-box {
      width: 100%;
      max-width: 380px;
    }
    .login-wordmark {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }
    .login-wordmark span { color: #f97316; }
    .login-tagline {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 36px;
    }
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 7px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .field-input {
      width: 100%;
      background: #1c1f27;
      border: 1.5px solid #2a2d38;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px; /* prevent zoom on iOS */
      color: #f0f2f5;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: #f97316; }
    .field-input::placeholder { color: #3d4147; }
    .login-btn {
      width: 100%;
      margin-top: 18px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      letter-spacing: .01em;
    }
    .login-btn:active { background: #ea6c0a; }
    .login-btn:disabled { background: #7c3c13; color: #c2742e; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      background: #2a1010;
      border: 1px solid #5c1a1a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: #111318;
      border-bottom: 1px solid #1e2130;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-wordmark { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .header-wordmark span { color: #f97316; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-name { font-size: 13px; color: #6b7280; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .signout-btn {
      background: none;
      border: 1.5px solid #2a2d38;
      color: #6b7280;
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111318;
      border-top: 1px solid #1e2130;
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: #4b5563;
      font-family: inherit;
      transition: color .1s;
      position: relative;
    }
    .nav-item.active { color: #f97316; }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .nav-badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 18px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* ── Page content ── */
    .page-content {
      flex: 1;
      padding: 16px 16px calc(70px + env(safe-area-inset-bottom));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 19px;
      font-weight: 800;
      color: #f9fafb;
      letter-spacing: -.3px;
    }
    .section-count {
      font-size: 13px;
      color: #6b7280;
    }

    /* ── Loading / empty ── */
    .loader { display: flex; align-items: center; justify-content: center; padding: 60px 0; gap: 10px; color: #4b5563; font-size: 14px; }
    .spin { width: 18px; height: 18px; border: 2px solid #1e2130; border-top-color: #f97316; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 56px 20px; }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty-title { font-size: 17px; font-weight: 700; color: #d1d5db; margin-bottom: 6px; }
    .empty-body { font-size: 14px; color: #4b5563; }

    /* ── Job cards (violations) ── */
    .job-card {
      background: #1c1f27;
      border: 1.5px solid #2a2d38;
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .job-card.urgent { border-color: #7f1d1d; }
    .job-urgent-bar { background: #dc2626; padding: 6px 14px; font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 6px; }
    .job-body { padding: 14px; }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .job-lot-name { font-size: 15px; font-weight: 700; color: #f9fafb; line-height: 1.2; }
    .job-lot-addr { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .job-timer {
      background: #111318;
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      min-width: 60px;
      flex-shrink: 0;
    }
    .job-timer-val { font-size: 17px; font-weight: 800; color: #f97316; font-variant-numeric: tabular-nums; }
    .job-timer-val.long { color: #ef4444; }
    .job-timer-label { font-size: 9px; color: #4b5563; text-transform: uppercase; letter-spacing: .05em; margin-top: 1px; }
    .job-details { display: flex; flex-wrap: wrap; gap: 8px; }
    .job-tag {
      background: #111318;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .job-tag strong { color: #e5e7eb; font-weight: 600; }
    .plate-tag {
      background: #fef3c7;
      color: #1c1917;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: .08em;
    }
    .job-footer {
      border-top: 1px solid #1e2130;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .job-type-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .job-type-tag.unauthorized { background: #431407; color: #fb923c; }
    .job-type-tag.overtime { background: #1e1b4b; color: #a5b4fc; }
    .job-type-tag.default { background: #1f2937; color: #9ca3af; }
    .job-resolved-footer { font-size: 12px; color: #4b5563; }
    .job-action { font-size: 12px; font-weight: 600; color: #34d399; }

    /* ── Lot cards ── */
    .lot-card {
      background: #1c1f27;
      border: 1.5px solid #2a2d38;
      border-radius: 14px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .lot-card-top {
      padding: 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .lot-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .lot-status-dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .lot-status-dot.off { background: #ef4444; }
    .lot-status-dot.warn { background: #f97316; box-shadow: 0 0 6px #f97316; }
    .lot-info { flex: 1; min-width: 0; }
    .lot-name { font-size: 16px; font-weight: 700; color: #f9fafb; }
    .lot-addr { font-size: 13px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lot-numbers { display: flex; gap: 14px; margin-top: 10px; }
    .lot-num { text-align: center; }
    .lot-num-val { font-size: 22px; font-weight: 800; color: #f9fafb; }
    .lot-num-val.red { color: #ef4444; }
    .lot-num-val.green { color: #4ade80; }
    .lot-num-label { font-size: 11px; color: #4b5563; text-transform: uppercase; letter-spacing: .04em; margin-top: 1px; }
    .lot-actions {
      border-top: 1px solid #1e2130;
      display: flex;
    }
    .lot-action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-right: 1px solid #1e2130;
      transition: color .15s, background .15s;
    }
    .lot-action-btn:last-child { border-right: none; }
    .lot-action-btn:active { background: #111318; }
    .lot-action-btn.primary { color: #f97316; }
    .lot-action-btn a { color: inherit; text-decoration: none; }

    /* ── Cam snapshot ── */
    .cam-sheet {
      background: #111318;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
    }
    .cam-row {
      border-top: 1px solid #1e2130;
      padding: 10px 14px;
    }
    .cam-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .cam-name { font-size: 12px; font-weight: 600; color: #9ca3af; display: flex; align-items: center; gap: 6px; }
    .cam-time { font-size: 11px; color: #4b5563; }
    .cam-img-wrap { border-radius: 8px; overflow: hidden; background: #0a0b0e; aspect-ratio: 16/9; position: relative; }
    .cam-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cam-offline { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #374151; font-size: 13px; }
    .cam-viol-overlay {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(220,38,38,.85);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .expand-cams-btn {
      width: 100%;
      border: none;
      background: none;
      color: #f97316;
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      font-family: inherit;
      border-top: 1px solid #1e2130;
    }

    /* ── Earnings ── */
    .earnings-hero {
      background: #1c1f27;
      border: 1.5px solid #2a2d38;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }
    .earnings-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; margin-bottom: 8px; }
    .earnings-amount { font-size: 46px; font-weight: 800; color: #f9fafb; letter-spacing: -1px; }
    .earnings-amount span { color: #f97316; }
    .earnings-sub { font-size: 13px; color: #4b5563; margin-top: 6px; }
    .earnings-period-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .period-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid #2a2d38;
      background: #1c1f27;
      color: #6b7280;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .period-btn.active { border-color: #f97316; color: #f97316; background: #1c1107; }
    .earnings-breakdown {
      background: #1c1f27;
      border: 1.5px solid #2a2d38;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .breakdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e2130;
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .01em;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid #111318;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-left { }
    .breakdown-date { font-size: 13px; color: #e5e7eb; font-weight: 600; }
    .breakdown-lot { font-size: 12px; color: #4b5563; margin-top: 2px; }
    .breakdown-right { text-align: right; }
    .breakdown-amt { font-size: 15px; font-weight: 700; color: #f97316; }
    .breakdown-action { font-size: 11px; color: #4b5563; text-transform: capitalize; margin-top: 2px; }
    .breakdown-plate { font-family: 'Courier New', monospace; font-size: 11px; color: #6b7280; font-weight: 600; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = 'https://lotlogic-backend-production.up.railway.app';
const API_KEY = 'UJn9mwti15jbhgRUnhw6-VOk3TAt1VJAK3VNCIdAHa8';

async function apiFetch(path, options = {}) {
  const r = await fetch(API + path, {
    ...options,
    headers: { 'X-API-Key': API_KEY, ...(options.headers || {}) }
  });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── Time helpers ──────────────────────────────────────────────
function elapsed(isoStr) {
  if (!isoStr) return null;
  const mins = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (mins < 60) return { val: mins, unit: 'MIN', long: mins >= 45 };
  const hrs = Math.floor(mins / 60);
  return { val: hrs, unit: 'HR', long: hrs >= 2 };
}

function fmtMoney(cents) {
  if (!cents) return '$0.00';
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function mapsLink(address) {
  return `https://maps.google.com/?q=${encodeURIComponent(address)}`;
}

// ── Login ─────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function submit(e) {
    e.preventDefault();
    if (!email.trim()) return;
    setLoading(true); setError('');
    try {
      const needle = email.trim().toLowerCase();
      // Check lot owners first, then enforcement partners
      const [owners, partners] = await Promise.all([
        apiFetch('/owners').catch(() => []),
        apiFetch('/partners').catch(() => []),
      ]);
      const ownerMatch = owners.find(o => o.email?.toLowerCase() === needle);
      if (ownerMatch) { onLogin({ ...ownerMatch, _role: 'owner' }); return; }
      const partnerMatch = partners.find(p => p.email?.toLowerCase() === needle);
      if (partnerMatch) { onLogin({ ...partnerMatch, _role: 'partner', business_name: partnerMatch.company_name }); return; }
      setError("No account found for that email. Contact your LotLogic rep if you think this is wrong.");
    } catch {
      setError("Can't connect right now. Check your connection and try again.");
    } finally { setLoading(false); }
  }

  return (
    <div className="login-page">
      <div className="login-box">
        <div className="login-wordmark">Lot<span>Logic</span></div>
        <div className="login-tagline">Operator portal — sign in to get started</div>
        <form onSubmit={submit}>
          <label className="field-label">Your email</label>
          <input
            className="field-input"
            type="email"
            placeholder="you@company.com"
            value={email}
            onChange={e => setEmail(e.target.value)}
            autoCapitalize="none"
            autoCorrect="off"
            required
            autoFocus
          />
          <button className="login-btn" type="submit" disabled={loading}>
            {loading ? 'Signing in…' : 'Sign In →'}
          </button>
        </form>
        {error && <div className="login-error">{error}</div>}
      </div>
    </div>
  );
}

// ── Jobs tab (current violations) ─────────────────────────────
function JobsPage({ lots, violations, loading, lotStates }) {
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Active jobs = pending violations, oldest first (most urgent first)
  const active = violations
    .filter(v => v.status === 'pending')
    .sort((a, b) => new Date(a.detected_at) - new Date(b.detected_at));

  // Recent = resolved in last 24h
  const cutoff = Date.now() - 86400000;
  const recent = violations
    .filter(v => v.status !== 'pending' && new Date(v.resolved_at || v.detected_at) > cutoff)
    .sort((a, b) => new Date(b.resolved_at || 0) - new Date(a.resolved_at || 0))
    .slice(0, 10);

  if (loading && violations.length === 0) {
    return <div className="loader"><div className="spin" /> Loading jobs…</div>;
  }

  return (
    <div>
      {/* Active jobs */}
      <div className="section-header">
        <div className="section-title">Open Jobs</div>
        <div className="section-count">{active.length} active</div>
      </div>

      {active.length === 0 ? (
        <div className="empty-state" style={{marginBottom: 28}}>
          <div className="empty-icon">✅</div>
          <div className="empty-title">All clear</div>
          <div className="empty-body">No violations pending at your lots right now</div>
        </div>
      ) : (
        active.map(v => {
          const lot = lotMap[v.lot_id];
          const timer = elapsed(v.detected_at);
          const urgent = timer?.val >= 45;
          const typeClass = v.violation_type?.toLowerCase().includes('unauthorized')
            ? 'unauthorized' : v.violation_type?.toLowerCase().includes('overtime') ? 'overtime' : 'default';
          return (
            <div key={v.id} className={`job-card ${urgent ? 'urgent' : ''}`}>
              {urgent && (
                <div className="job-urgent-bar">
                  🔴 Needs attention — waiting {timer.val} {timer.unit}
                </div>
              )}
              <div className="job-body">
                <div className="job-top">
                  <div>
                    <div className="job-lot-name">{lot?.name || 'Unknown Lot'}</div>
                    <div className="job-lot-addr">{lot?.address || ''}</div>
                  </div>
                  {timer && (
                    <div className="job-timer">
                      <div className={`job-timer-val ${timer.long ? 'long' : ''}`}>{timer.val}</div>
                      <div className="job-timer-label">{timer.unit}</div>
                    </div>
                  )}
                </div>
                <div className="job-details">
                  {v.plate_text && <span className="plate-tag">{v.plate_text}</span>}
                  {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                  {v.space_number && <span className="job-tag">Space <strong>#{v.space_number}</strong></span>}
                  {v.vehicle_type && <span className="job-tag">🚗 <strong>{v.vehicle_type}</strong></span>}
                  <span className="job-tag">📅 <strong>{fmtTime(v.detected_at)}</strong></span>
                </div>
              </div>
              <div className="job-footer">
                <span className={`job-type-tag ${typeClass}`}>
                  {v.violation_type || 'Violation'}
                </span>
                {lot?.address && (
                  <a href={mapsLink(lot.address)} target="_blank" rel="noopener" style={{fontSize:13, color:'#f97316', fontWeight:600, textDecoration:'none'}}>
                    📍 Directions
                  </a>
                )}
              </div>
            </div>
          );
        })
      )}

      {/* Recent completed */}
      {recent.length > 0 && (
        <>
          <div className="section-header" style={{marginTop: 24}}>
            <div className="section-title">Handled Today</div>
            <div className="section-count">{recent.length} jobs</div>
          </div>
          {recent.map(v => {
            const lot = lotMap[v.lot_id];
            const actionColor = { booted: '#fbbf24', towed: '#f87171', dismissed: '#a78bfa', noaction: '#6b7280' };
            const col = actionColor[v.action_taken?.toLowerCase()] || '#9ca3af';
            return (
              <div key={v.id} className="job-card">
                <div className="job-body">
                  <div className="job-top">
                    <div>
                      <div className="job-lot-name" style={{fontSize:14}}>{lot?.name || 'Unknown Lot'}</div>
                      <div className="job-lot-addr">{fmtDate(v.detected_at)} · {fmtTime(v.detected_at)}</div>
                    </div>
                    {v.our_revenue > 0 && (
                      <div className="job-timer" style={{background:'#0a1a0a'}}>
                        <div style={{fontSize:15, fontWeight:800, color:'#4ade80'}}>{fmtMoney(v.our_revenue)}</div>
                        <div className="job-timer-label">earned</div>
                      </div>
                    )}
                  </div>
                  <div className="job-details">
                    {v.plate_text && <span className="plate-tag">{v.plate_text}</span>}
                    {v.zone_id && <span className="job-tag">Zone <strong>{v.zone_id}</strong></span>}
                    <span className="job-tag" style={{color: col}}>✓ <strong style={{color: col}}>{v.action_taken || 'handled'}</strong></span>
                  </div>
                </div>
              </div>
            );
          })}
        </>
      )}
    </div>
  );
}

// ── Lots tab ──────────────────────────────────────────────────
function LotsPage({ lots, lotStates, loading }) {
  const [expandedCams, setExpandedCams] = useState({});

  if (loading && lots.length === 0) {
    return <div className="loader"><div className="spin" /> Loading lots…</div>;
  }
  if (lots.length === 0) {
    return (
      <div className="empty-state">
        <div className="empty-icon">🅿️</div>
        <div className="empty-title">No lots yet</div>
        <div className="empty-body">Your lots will appear here once they're set up</div>
      </div>
    );
  }

  return (
    <div>
      <div className="section-header">
        <div className="section-title">Your Lots</div>
        <div className="section-count">{lots.length} lot{lots.length !== 1 ? 's' : ''}</div>
      </div>
      {lots.map(lot => {
        const state = lotStates[lot.id];
        const viols = state?.total_active_violations || 0;
        const camsOn = state?.cameras_online || 0;
        const camsTotal = state?.cameras_total || 0;
        const dotClass = viols > 0 ? 'warn' : (camsOn < camsTotal ? 'warn' : 'on');
        const camsExpanded = expandedCams[lot.id];

        return (
          <div key={lot.id} className="lot-card">
            <div className="lot-card-top">
              <div className={`lot-status-dot ${dotClass}`} />
              <div className="lot-info">
                <div className="lot-name">{lot.name}</div>
                <div className="lot-addr">{lot.address}</div>
                <div className="lot-numbers">
                  <div className="lot-num">
                    <div className={`lot-num-val ${viols > 0 ? 'red' : 'green'}`}>{viols}</div>
                    <div className="lot-num-label">Open jobs</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val" style={{color: camsOn < camsTotal ? '#f97316' : '#4ade80'}}>
                      {camsOn}<span style={{fontSize:14, color:'#4b5563'}}>/{camsTotal}</span>
                    </div>
                    <div className="lot-num-label">Cams online</div>
                  </div>
                  <div className="lot-num">
                    <div className="lot-num-val">{lot.total_spaces}</div>
                    <div className="lot-num-label">Spaces</div>
                  </div>
                </div>
              </div>
            </div>

            <div className="lot-actions">
              <button className="lot-action-btn primary" onClick={() => setExpandedCams(p => ({...p, [lot.id]: !camsExpanded}))}>
                📷 {camsExpanded ? 'Hide cams' : `View cams (${camsTotal})`}
              </button>
              <button className="lot-action-btn">
                <a href={mapsLink(lot.address)} target="_blank" rel="noopener">📍 Directions</a>
              </button>
            </div>

            {/* Camera sheets */}
            {camsExpanded && state?.cameras && state.cameras.length > 0 && (
              <div className="cam-sheet">
                {state.cameras.map(cam => (
                  <div key={cam.camera_id} className="cam-row">
                    <div className="cam-row-header">
                      <div className="cam-name">
                        <span style={{color: cam.online ? '#4ade80' : '#ef4444', fontSize:8}}>●</span>
                        {cam.camera_name}
                        {cam.active_violations > 0 && (
                          <span style={{background:'#dc2626', color:'#fff', borderRadius:4, padding:'1px 6px', fontSize:10, fontWeight:700}}>
                            {cam.active_violations} violation{cam.active_violations>1?'s':''}
                          </span>
                        )}
                      </div>
                      {cam.latest_snapshot && (
                        <div className="cam-time">{fmtTime(cam.latest_snapshot.captured_at)}</div>
                      )}
                    </div>
                    <div className="cam-img-wrap">
                      {cam.latest_snapshot?.url ? (
                        <>
                          <img
                            className="cam-img"
                            src={cam.latest_snapshot.url}
                            alt={cam.camera_name}
                            loading="lazy"
                          />
                          {cam.active_violations > 0 && (
                            <div className="cam-viol-overlay">⚠️ {cam.active_violations} open</div>
                          )}
                        </>
                      ) : (
                        <div className="cam-offline">{cam.online ? '📷 No snapshot yet' : '📵 Camera offline'}</div>
                      )}
                    </div>
                    {cam.latest_snapshot && (
                      <div style={{fontSize:11, color:'#4b5563', marginTop:6}}>
                        {cam.latest_snapshot.vehicles_detected != null
                          ? `${cam.latest_snapshot.vehicles_detected} vehicle${cam.latest_snapshot.vehicles_detected !== 1 ? 's' : ''} detected`
                          : 'Snapshot saved'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {camsExpanded && (!state?.cameras || state.cameras.length === 0) && (
              <div style={{padding:'14px 14px', borderTop:'1px solid #1e2130', fontSize:13, color:'#4b5563'}}>
                No cameras set up for this lot yet
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Earnings tab ──────────────────────────────────────────────
function EarningsPage({ violations, lots }) {
  const [period, setPeriod] = useState('week');
  const lotMap = Object.fromEntries(lots.map(l => [l.id, l]));

  // Filter resolved violations by period
  const now = Date.now();
  const cutoffs = {
    week:  now - 7 * 86400000,
    month: now - 30 * 86400000,
    all:   0,
  };

  const resolved = violations.filter(v => {
    if (!v.action_taken || v.status === 'pending') return false;
    const ts = new Date(v.resolved_at || v.detected_at).getTime();
    return ts >= cutoffs[period];
  }).sort((a, b) => new Date(b.resolved_at || b.detected_at) - new Date(a.resolved_at || a.detected_at));

  const totalOurs = resolved.reduce((s, v) => s + (v.our_revenue || 0), 0);
  const totalGross = resolved.reduce((s, v) => s + (v.gross_revenue || 0), 0);
  const actionCounts = {};
  resolved.forEach(v => {
    const k = v.action_taken || 'other';
    actionCounts[k] = (actionCounts[k] || 0) + 1;
  });

  const periodLabels = { week: 'This Week', month: 'This Month', all: 'All Time' };

  return (
    <div>
      {/* Period picker */}
      <div className="earnings-period-row">
        {['week','month','all'].map(p => (
          <button key={p} className={`period-btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {periodLabels[p]}
          </button>
        ))}
      </div>

      {/* Hero total */}
      <div className="earnings-hero">
        <div className="earnings-label">{periodLabels[period]} Earnings</div>
        <div className="earnings-amount">
          <span>$</span>{(totalOurs / 100).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
        </div>
        <div className="earnings-sub">{resolved.length} job{resolved.length !== 1 ? 's' : ''} completed · {fmtMoney(totalGross)} gross</div>
      </div>

      {/* Action breakdown */}
      {Object.keys(actionCounts).length > 0 && (
        <div className="earnings-breakdown" style={{marginBottom:16}}>
          <div className="breakdown-header">By Action</div>
          {Object.entries(actionCounts).map(([action, count]) => {
            const earned = resolved.filter(v => v.action_taken === action).reduce((s,v) => s + (v.our_revenue||0), 0);
            return (
              <div key={action} className="breakdown-row">
                <div style={{fontSize:15, fontWeight:700, color:'#e5e7eb', textTransform:'capitalize'}}>{action}</div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:15, fontWeight:700, color:'#f97316'}}>{fmtMoney(earned)}</div>
                  <div style={{fontSize:12, color:'#4b5563'}}>{count}×</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Line items */}
      {resolved.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">💰</div>
          <div className="empty-title">No earnings yet {period !== 'all' ? 'this period' : ''}</div>
          <div className="empty-body">Completed jobs will show up here</div>
        </div>
      ) : (
        <div className="earnings-breakdown">
          <div className="breakdown-header">All Jobs {periodLabels[period]}</div>
          {resolved.map(v => {
            const lot = lotMap[v.lot_id];
            return (
              <div key={v.id} className="breakdown-row">
                <div className="breakdown-left">
                  <div className="breakdown-date">{fmtDate(v.resolved_at || v.detected_at)} · {fmtTime(v.resolved_at || v.detected_at)}</div>
                  <div className="breakdown-lot">{lot?.name || '—'}</div>
                  {v.plate_text && <div className="breakdown-plate">{v.plate_text}</div>}
                </div>
                <div className="breakdown-right">
                  <div className="breakdown-amt">{v.our_revenue ? fmtMoney(v.our_revenue) : '—'}</div>
                  <div className="breakdown-action">{v.action_taken || v.status}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [owner, setOwner] = useState(null);
  const [tab, setTab] = useState('jobs');
  const [lots, setLots] = useState([]);
  const [lotStates, setLotStates] = useState({});
  const [violations, setViolations] = useState([]);
  const [revenue, setRevenue] = useState(null);
  const [loading, setLoading] = useState(false);
  const timerRef = useRef(null);

  const loadData = useCallback(async (o, silent = false) => {
    if (!o) return;
    if (!silent) setLoading(true);
    try {
      // Owners see only their own lots; partners see only lots they are assigned to
      const lotsUrl = o._role === 'partner'
        ? `/lots` // fetched below, filtered client-side by partner_id
        : `/lots?owner_id=${o.id}`;
      let lotsData = await apiFetch(lotsUrl);
      if (o._role === 'partner') {
        lotsData = lotsData.filter(l => String(l.partner_id) === String(o.id));
      }
      setLots(lotsData);

      const [states, violsArrays] = await Promise.all([
        Promise.all(lotsData.map(l => apiFetch(`/lots/${l.id}/state`).then(s => [l.id, s]).catch(() => [l.id, null]))),
        Promise.all(lotsData.map(l => apiFetch(`/violations?lot_id=${l.id}&page_size=200`).catch(() => []))),
      ]);

      setLotStates(Object.fromEntries(states));

      const flat = [];
      lotsData.forEach((lot, i) => {
        const data = violsArrays[i];
        const items = Array.isArray(data) ? data : (data?.items || []);
        items.forEach(v => flat.push({ ...v, lot_id: v.lot_id || lot.id }));
      });
      setViolations(flat);
      // Revenue is computed client-side from lot-scoped violations (no global endpoint)
    } catch (e) { console.error(e); }
    finally { if (!silent) setLoading(false); }
  }, []);

  function login(o) {
    setOwner(o);
    loadData(o);
  }

  function logout() {
    clearInterval(timerRef.current);
    setOwner(null); setLots([]); setLotStates({}); setViolations([]); setRevenue(null);
    setTab('jobs');
  }

  useEffect(() => {
    if (!owner) return;
    timerRef.current = setInterval(() => loadData(owner, true), 30000);
    return () => clearInterval(timerRef.current);
  }, [owner, loadData]);

  if (!owner) return <LoginPage onLogin={login} />;

  const pending = violations.filter(v => v.status === 'pending').length;

  const tabs = [
    { id: 'jobs',     icon: '🚨', label: 'Jobs',    badge: pending },
    { id: 'lots',     icon: '🅿️', label: 'Lots',    badge: 0 },
    { id: 'earnings', icon: '💰', label: 'Earnings', badge: 0 },
  ];

  return (
    <div className="app">
      <div className="header">
        <div className="header-wordmark">Lot<span>Logic</span></div>
        <div className="header-right">
          <div className="header-name">{owner.business_name || owner.contact_name}</div>
          <button className="signout-btn" onClick={logout}>Sign out</button>
        </div>
      </div>

      <div className="page-content">
        {tab === 'jobs'     && <JobsPage lots={lots} violations={violations} loading={loading} lotStates={lotStates} />}
        {tab === 'lots'     && <LotsPage lots={lots} lotStates={lotStates} loading={loading} />}
        {tab === 'earnings' && <EarningsPage violations={violations} lots={lots} />}
      </div>

      <div className="bottom-nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-item ${tab === t.id ? 'active' : ''}`} onClick={() => setTab(t.id)}>
            {t.badge > 0 && <span className="nav-badge">{t.badge}</span>}
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
