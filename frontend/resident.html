<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Permanent Pass Request</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo .shield {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 12px;
      font-weight: 900;
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f9fafb;
    }
    .logo h1 span { color: #3b82f6; }
    .property-name {
      text-align: center;
      font-size: 16px;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .property-name strong {
      display: block;
      font-size: 18px;
      color: #e5e7eb;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label .required { color: #ef4444; margin-left: 2px; }
    input {
      width: 100%;
      padding: 12px 14px;
      background: #0f1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e5e7eb;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #4b5563; }
    .plate-input { text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; font-size: 20px; text-align: center; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 12px;
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-card { text-align: center; }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(74,222,128,0.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .success-icon svg { width: 32px; height: 32px; stroke: #4ade80; fill: none; stroke-width: 2.5; }
    .success-card h2 { font-size: 20px; color: #f9fafb; margin-bottom: 8px; }
    .success-card p { font-size: 14px; color: #9ca3af; line-height: 1.5; }
    .success-plate {
      display: inline-block;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      margin: 16px 0;
    }
    .success-detail {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
    .pending-badge {
      display: inline-block;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24;
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }
    .loading-state {
      text-align: center;
      padding: 40px 0;
      color: #6b7280;
    }
    .not-found { text-align: center; padding: 20px 0; }
    .not-found h2 { font-size: 18px; color: #f87171; margin-bottom: 8px; }
    .not-found p { font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="loading-state">Loading...</div>
  </div>

  <script>
    // Raw fetch against Supabase PostgREST — matches /park and /visit. The
    // supabase-js SDK opens a realtime WebSocket on createClient() that can
    // hang on strict networks and leave the page stuck on "Loading...".
    const SUPABASE_URL = 'https://nzdkoouoaedbbccraoti.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56ZGtvb3VvYWVkYmJjY3Jhb3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzg2OTQsImV4cCI6MjA4ODcxNDY5NH0.WrlTCKEmmziBUX1E9vBmBpHRSg7_RRKBLIxSPKy189E';

    async function pgRest(path, init = {}, timeoutMs = 10000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
          ...init,
          signal: ctrl.signal,
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            ...(init.headers || {}),
          },
        });
        const text = await res.text();
        const body = text ? JSON.parse(text) : null;
        if (!res.ok) {
          const err = new Error((body && body.message) || ('HTTP ' + res.status));
          err.code = body && body.code;
          err.details = body && body.details;
          err.status = res.status;
          throw err;
        }
        return body;
      } finally { clearTimeout(t); }
    }

    const app = document.getElementById('app');

    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const qrCodeId = pathParts.length >= 2 ? pathParts[pathParts.length - 1] : null;

    let property = null;

    async function init() {
      if (!qrCodeId) {
        showNotFound('Invalid Link', 'This permanent pass link is not valid.');
        return;
      }
      try {
        const rows = await pgRest(`/properties?select=id,name,address,property_type&qr_code_id=eq.${encodeURIComponent(qrCodeId)}&limit=1`);
        const data = Array.isArray(rows) ? rows[0] : null;
        if (!data) {
          showNotFound('Property Not Found', 'This registration link is not valid or has expired.');
          return;
        }
        property = data;
        showForm();
      } catch (err) {
        console.error('init error:', err);
        showConnectionError(err);
      }
    }

    function showConnectionError(err) {
      const detail = err && (err.name === 'AbortError' ? 'Request timed out.' : (err.message || 'Network error.'));
      app.innerHTML = `
        <div class="logo"><div class="shield">LL</div><h1>Lot<span>Logic</span></h1></div>
        <div class="not-found">
          <h2>Can't reach server</h2>
          <p>${escapeHtml(detail)}</p>
          <p>Check your connection, then try again.</p>
          <button id="retryBtn" class="submit-btn" style="margin-top:18px">Try again</button>
        </div>
      `;
      const btn = document.getElementById('retryBtn');
      if (btn) btn.addEventListener('click', () => {
        app.innerHTML = '<div class="loading-state">Loading...</div>';
        init();
      });
    }

    function showNotFound(title, message) {
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="not-found">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }

    function showForm() {
      const isPlaza = property.property_type === 'truck_plaza';
      const headline = isPlaza ? 'Employee Plate Registration' : 'Permanent Pass Request';
      const submitLabel = isPlaza ? 'Register Employee Plate' : 'Request Permanent Pass';
      app.innerHTML = `
        <div class="logo">
          <div class="shield">LL</div>
          <h1>Lot<span>Logic</span></h1>
        </div>
        <div class="property-name">
          ${escapeHtml(headline)} at
          <strong>${escapeHtml(property.name)}</strong>
        </div>
        <form id="regForm">
          <label for="holderName">Full Name <span class="required">*</span></label>
          <input type="text" id="holderName" placeholder="John Doe" required>

          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="(555) 123-4567" required>

          <label for="plate">License Plate <span class="required">*</span></label>
          <input type="text" id="plate" class="plate-input" placeholder="ABC 1234" required maxlength="10" autocomplete="off">

          <label for="vehicleType">Vehicle Type <span class="required">*</span></label>
          <select id="vehicleType" required>
            <option value="" disabled selected>Select vehicle type</option>
            <option value="car">Car</option>
            <option value="pickup">Pickup</option>
            <option value="semi">Semi / Truck</option>
            <option value="other">Other</option>
          </select>

          <button type="submit" class="submit-btn" id="submitBtn">${escapeHtml(submitLabel)}</button>
          <div class="hint">Pending owner approval</div>
          <div id="errorMsg"></div>
        </form>
      `;

      document.getElementById('regForm').addEventListener('submit', handleSubmit);
    }

    let submitting = false;
    async function handleSubmit(e) {
      e.preventDefault();
      if (submitting) return;
      submitting = true;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';

      try {
        const holderName = document.getElementById('holderName').value.trim();
        const plateRaw = document.getElementById('plate').value.trim();
        const plateText = plateRaw.toUpperCase().replace(/[^A-Z0-9]/g, '');
        const vehicleType = document.getElementById('vehicleType').value;
        const phone = document.getElementById('phone').value.trim();

        if (!plateText || plateText.length < 2) {
          throw new Error('Please enter a valid license plate number.');
        }

        try {
          await pgRest('/resident_plates', {
            method: 'POST',
            headers: { Prefer: 'return=minimal' },
            body: JSON.stringify({
              property_id: property.id,
              plate_text: plateText,
              holder_name: holderName,
              holder_role: property.property_type === 'truck_plaza' ? 'employee' : 'resident',
              vehicle_description: '',
              vehicle_type: vehicleType || null,
              active: true,
              phone: phone,
              status: 'pending',
            }),
          });
        } catch (error) {
          if (error.code === '23505') {
            throw new Error('This license plate is already registered at this lot.');
          }
          throw new Error('Failed to register. ' + (error.message || 'Please try again.'));
        }

        showSuccess(plateText);
      } catch (err) {
        errorDiv.innerHTML = '<div class="error">' + escapeHtml(err.message) + '</div>';
        btn.disabled = false;
        btn.textContent = property.property_type === 'truck_plaza'
          ? 'Register Employee Plate'
          : 'Request Permanent Pass';
        submitting = false;
      }
    }

    function showSuccess(plate) {
      app.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h2>Request Submitted</h2>
          <p>Your permanent pass request for <strong>${escapeHtml(property.name)}</strong> has been submitted.</p>
          <div class="success-plate">${escapeHtml(plate)}</div>
          <div class="pending-badge">Pending Owner Approval</div>
          <div class="success-detail">You'll be notified once your pass is approved.</div>
        </div>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
