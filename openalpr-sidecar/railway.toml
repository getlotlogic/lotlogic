[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# Both ONNX models load in <10s on Railway hobby tier. 60s gives 6× margin
# vs the 30-35s cold-start estimate for the v3 stack (down from 90s on the
# easyocr-only v2 stack which needed 300s).
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
