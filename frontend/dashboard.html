  <title>LotLogic — AI Parking Enforcement</title>
  <meta name="description" content="AI-powered parking lot enforcement dashboard. Manage violations, cameras, and earnings in real time." />
  <meta name="theme-color" content="#0c0e14" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Ctext x='16' y='22' font-family='Inter,sans-serif' font-weight='800' font-size='14' fill='white' text-anchor='middle'%3ELL%3C/text%3E%3C/svg%3E" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    :root {
      --bg-primary: #0c0e14;
      --bg-card: #13151d;
      --bg-inset: #080a0f;
      --bg-elevated: #1a1d2e;
      --border: #1e2235;
      --border-subtle: #1a1d2e;
      --text-primary: #f3f4f6;
      --text-secondary: #e8eaf0;
      --text-muted: #6b7280;
      --text-faint: #4b5563;
      --text-ghost: #374151;
      --text-dim: #2a2d3a;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --green: #4ade80;
      --red: #ef4444;
      --yellow: #fbbf24;
      --purple: #a78bfa;
      --unknown-pattern: repeating-conic-gradient(#4b5563 0% 25%, #374151 0% 50%) 50%/4px 4px;
      --unknown-border: rgba(255,255,255,.08);
      --snapshot-bg: #080a0f;
      --earnings-gradient: linear-gradient(135deg, #13151d 0%, #1a1410 100%);
      --earnings-border: #2a1e10;
      --revenue-bg: #0a1a0a;
    }
    .theme-light {
      --bg-primary: #f8f9fb;
      --bg-card: #fff;
      --bg-inset: #f3f4f6;
      --bg-elevated: #fff;
      --border: #e5e7eb;
      --border-subtle: #e5e7eb;
      --text-primary: #1a1a2e;
      --text-secondary: #1a1a2e;
      --text-muted: #6b7280;
      --text-faint: #6b7280;
      --text-ghost: #9ca3af;
      --text-dim: #c0c4cc;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #d97706;
      --purple: #7c3aed;
      --unknown-pattern: repeating-conic-gradient(#d1d5db 0% 25%, #e5e7eb 0% 50%) 50%/4px 4px;
      --unknown-border: rgba(0,0,0,.1);
      --snapshot-bg: #e5e7eb;
      --earnings-gradient: linear-gradient(135deg, #fff 0%, #fef9f0 100%);
      --earnings-border: #e5e7eb;
      --revenue-bg: #f0fdf4;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-secondary);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Login ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,246,.08) 0%, transparent 70%), var(--bg-primary);
    }
    .login-box { width: 100%; max-width: 360px; }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .login-shield {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.5px;
      box-shadow: 0 4px 16px rgba(59,130,246,.35);
      flex-shrink: 0;
    }
    .login-wordmark { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
    .login-wordmark span { color: #3b82f6; }
    .login-tagline { font-size: 13px; color: var(--text-faint); margin-bottom: 36px; margin-top: 4px; letter-spacing: .01em; }
    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .field-input {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text-secondary);
      outline: none;
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .field-input::placeholder { color: var(--text-dim); }
    .login-btn {
      width: 100%;
      margin-top: 16px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s, transform .1s;
      letter-spacing: .02em;
      box-shadow: 0 4px 20px rgba(59,130,246,.3);
    }
    .login-btn:active { opacity: .85; transform: scale(.99); }
    .login-btn:disabled { opacity: .4; cursor: not-allowed; }
    .login-error {
      margin-top: 14px;
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ── App shell ── */
    .app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg-primary); }

    /* ── Header ── */
    .header {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 20px;
      padding-top: env(safe-area-inset-top);
      height: calc(58px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      padding-bottom: 11px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 9px; }
    .header-shield {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.3px;
    }
    .header-wordmark { font-size: 17px; font-weight: 800; color: var(--text-primary); letter-spacing: -.3px; }
    .header-wordmark span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-name { font-size: 12px; color: var(--text-faint); max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .signout-btn {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .signout-btn:active { color: var(--text-secondary); border-color: var(--border); }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-ghost);
      font-family: inherit;
      transition: color .15s;
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }
    .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .nav-badge {
      position: absolute;
      top: 5px;
      right: calc(50% - 20px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
      border: 1.5px solid var(--bg-card);
    }

    /* ── Page content ── */
    .page-content {
      flex: 1;
      padding: 20px 16px calc(76px + env(safe-area-inset-bottom));
      padding-left: calc(16px + env(safe-area-inset-left));
      padding-right: calc(16px + env(safe-area-inset-right));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -.4px;
    }
    .section-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Loading / empty ── */
    .loader { display: flex; align-items: center; justify-content: center; padding: 60px 0; gap: 10px; color: var(--text-muted); font-size: 14px; }
    .spin { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: .7; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
    .empty-body { font-size: 13px; color: var(--text-faint); }

    /* ── Job cards ── */
    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .job-card.urgent { border-color: rgba(220,38,38,.4); box-shadow: 0 2px 16px rgba(220,38,38,.12); }
    .job-card.departed { opacity: .55; border-color: rgba(34,197,94,.3); }
    .job-urgent-bar {
      background: linear-gradient(90deg, #dc2626, #b91c1c);
      padding: 7px 16px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: .07em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .job-body { padding: 14px 16px; }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .job-lot-name { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .job-lot-addr { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
    .job-timer {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 11px;
      text-align: center;
      min-width: 62px;
      flex-shrink: 0;
    }
    .job-timer-val { font-size: 18px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; line-height: 1; }
    .job-timer-val.long { color: var(--red); }
    .job-timer-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; font-weight: 600; }
    .job-details { display: flex; flex-wrap: wrap; gap: 7px; }
    .job-tag {
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .job-tag strong { color: var(--text-primary); font-weight: 600; }
    .plate-tag {
      background: #fef3c7;
      color: #1c1009;
      border-radius: 7px;
      padding: 5px 11px;
      font-size: 13px;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: .1em;
      border: 1.5px solid #fbbf24;
    }
    .job-footer {
      border-top: 1px solid var(--border-subtle);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .job-type-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .job-type-tag.unauthorized { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .job-type-tag.overtime { background: rgba(139,92,246,.12); color: #a78bfa; border: 1px solid rgba(139,92,246,.2); }
    .job-type-tag.default { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
    .job-action { font-size: 12px; font-weight: 600; color: #34d399; }

    /* ── Lot cards ── */
    .lot-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .lot-card-top { padding: 16px; display: flex; align-items: flex-start; gap: 14px; }
    .lot-status-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .lot-status-dot.on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); }
    .lot-status-dot.off { background: #ef4444; }
    .lot-status-dot.warn { background: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,.5); }
    .lot-info { flex: 1; min-width: 0; }
    .lot-name { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .lot-addr { font-size: 12px; color: var(--text-faint); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lot-numbers { display: flex; gap: 20px; margin-top: 12px; }
    .lot-num { }
    .lot-num-val { font-size: 24px; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .lot-num-val.red { color: var(--red); }
    .lot-num-val.green { color: var(--green); }
    .lot-num-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; font-weight: 600; }
    .lot-actions { border-top: 1px solid var(--border-subtle); display: flex; }
    .lot-action-btn {
      flex: 1;
      padding: 13px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-right: 1px solid var(--border-subtle);
      transition: color .15s, background .15s;
    }
    .lot-action-btn:last-child { border-right: none; }
    .lot-action-btn:active { background: var(--bg-inset); }
    .lot-action-btn.primary { color: var(--accent); }
    .lot-action-btn a { color: inherit; text-decoration: none; }

    /* ── Cam snapshot ── */
    .cam-sheet { background: var(--bg-inset); border-radius: 0 0 16px 16px; overflow: hidden; }
    .cam-row { border-top: 1px solid var(--border-subtle); padding: 12px 16px; }
    .cam-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cam-name { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .cam-time { font-size: 11px; color: var(--text-faint); }
    .cam-img-wrap { border-radius: 10px; overflow: hidden; background: var(--snapshot-bg); aspect-ratio: 16/9; position: relative; }
    .cam-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .cam-offline { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-ghost); font-size: 13px; }
    .cam-viol-overlay {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(220,38,38,.9);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 6px;
      backdrop-filter: blur(4px);
    }
    .expand-cams-btn {
      width: 100%;
      border: none;
      background: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      font-family: inherit;
      border-top: 1px solid var(--border-subtle);
      transition: opacity .15s;
    }
    .expand-cams-btn:active { opacity: .7; }

    /* ── Earnings ── */
    .earnings-hero {
      background: var(--earnings-gradient);
      border: 1px solid var(--earnings-border);
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(59,130,246,.08);
    }
    .earnings-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-faint); margin-bottom: 10px; }
    .earnings-amount { font-size: 48px; font-weight: 800; color: var(--text-primary); letter-spacing: -2px; line-height: 1; }
    .earnings-amount span { color: var(--accent); }
    .earnings-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
    .earnings-period-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .period-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-faint);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .period-btn.active { border-color: rgba(59,130,246,.4); color: #3b82f6; background: rgba(59,130,246,.08); }
    .earnings-breakdown {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .breakdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--bg-inset);
      transition: background .1s;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row:active { background: var(--bg-inset); }
    .breakdown-date { font-size: 13px; color: var(--text-primary); font-weight: 600; }
    .breakdown-lot { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .breakdown-right { text-align: right; }
    .breakdown-amt { font-size: 15px; font-weight: 700; color: var(--accent); }
    .breakdown-action { font-size: 11px; color: var(--text-muted); text-transform: capitalize; margin-top: 2px; }
    .breakdown-plate { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text-faint); font-weight: 600; margin-top: 2px; }

    /* ── KPI bar ── */
    .kpi-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .kpi-card {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 10px; text-align: center;
    }
    .kpi-val { font-size: 22px; font-weight: 800; line-height: 1; color: var(--text-primary); }
    .kpi-val.blue { color: var(--accent); }
    .kpi-val.green { color: var(--green); }
    .kpi-val.red { color: var(--red); }
    .kpi-val.yellow { color: var(--yellow); }
    .kpi-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    /* ── Action buttons on violation cards ── */
    .job-actions-row {
      display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1; min-width: 70px; padding: 9px 6px; border-radius: 8px; border: 1.5px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all .15s; text-align: center; text-transform: uppercase; letter-spacing: .04em;
    }
    .job-secondary-actions .action-btn { flex: 0 0 auto; min-width: unset; padding: 8px 14px; white-space: nowrap; }
    .action-btn:active { transform: scale(.96); }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .action-btn.boot { background: rgba(251,191,36,.1); border-color: rgba(251,191,36,.4); color: #fbbf24; }
    .action-btn.boot:hover:not(:disabled) { background: rgba(251,191,36,.2); }
    .action-btn.tow { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.4); color: #f87171; }
    .action-btn.tow:hover:not(:disabled) { background: rgba(239,68,68,.2); }
    .action-btn.dismiss { background: rgba(139,92,246,.1); border-color: rgba(139,92,246,.4); color: #a78bfa; }
    .action-btn.dismiss:hover:not(:disabled) { background: rgba(139,92,246,.2); }
    .action-btn.gone { background: rgba(107,114,128,.1); border-color: rgba(107,114,128,.4); color: #9ca3af; }
    .action-btn.gone:hover:not(:disabled) { background: rgba(107,114,128,.2); }

    /* ── Violation detail modal ── */
    .viol-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .viol-modal {
      background: var(--bg-card); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto; animation: slideUp .3s ease;
      border: 1px solid var(--border); border-bottom: none;
    }
    .viol-modal-handle { width: 36px; height: 4px; background: var(--text-ghost); border-radius: 2px; margin: 10px auto 0; }
    .viol-modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--snapshot-bg); display: block; }
    .viol-modal-body { padding: 16px; }
    .viol-modal-title { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 4px; }
    .viol-modal-sub { font-size: 13px; color: var(--text-faint); margin-bottom: 14px; }
    .viol-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .viol-modal-stat {
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    }
    .viol-modal-stat-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; }
    .viol-modal-stat-val { font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-top: 2px; }

    /* ── Toast notifications ── */
    .toast-container {
      position: fixed; top: calc(60px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 90%; max-width: 400px;
    }
    .toast {
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
      pointer-events: auto; text-align: center;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    .toast.success { background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3); color: #4ade80; }
    .toast.error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; }
    .toast.info { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 250;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .confirm-box {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
      max-width: 320px; width: 100%; text-align: center;
    }
    .confirm-title { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .confirm-body { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; transition: opacity .15s; }
    .confirm-btns button:active { opacity: .7; }
    .confirm-cancel { background: var(--bg-inset); color: var(--text-muted); }
    .confirm-ok { color: #fff; }



    /* ── Permits modal ── */
    .permits-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease;
    }
    .permits-sheet {
      background: var(--bg-card); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px;
      max-height: 90vh; overflow-y: auto; animation: slideUp .3s ease;
      border: 1px solid var(--border); border-bottom: none;
      padding-bottom: env(safe-area-inset-bottom);
      overscroll-behavior: contain;
    }
    .permits-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0;
      background: var(--bg-card); z-index: 1;
    }
    .permits-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
    .permit-card {
      padding: 12px 16px; border-bottom: 1px solid var(--bg-inset);
      display: flex; align-items: center; justify-content: space-between;
    }
    .permit-card:last-child { border-bottom: none; }
    .permit-plate {
      background: #fef3c7; color: #1c1009; border-radius: 6px; padding: 4px 10px;
      font-size: 14px; font-weight: 800; font-family: 'Courier New', monospace;
      letter-spacing: .1em; border: 1.5px solid #fbbf24;
    }
    .permit-type-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      padding: 3px 8px; border-radius: 20px;
    }
    .permit-type-badge.whitelist { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.2); }
    .permit-type-badge.monthly { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .permit-type-badge.temporary { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.2); }
    .permit-type-badge.employee { background: rgba(167,139,250,.12); color: #a78bfa; border: 1px solid rgba(167,139,250,.2); }
    .permit-add-form {
      padding: 16px; border-top: 1px solid var(--border-subtle);
      background: var(--bg-inset);
    }
    .permit-form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .permit-form-row .field-input { flex: 1; padding: 10px 12px; font-size: 14px; border-radius: 10px; }
    .permit-form-row select {
      background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-size: 14px; color: var(--text-secondary); font-family: inherit;
    }

    /* ── Parking registrations (inside permits-sheet) ── */
    .parking-qr-block {
      padding: 16px 16px 14px; border-bottom: 1px solid var(--border-subtle);
      text-align: center; background: var(--bg-inset);
    }
    .parking-qr-tile {
      display: inline-block; padding: 10px; background: #fff; border-radius: 10px;
      margin-bottom: 8px;
    }
    .parking-qr-tile canvas { display: block; width: 160px; height: 160px; }
    .parking-qr-url {
      font-family: 'Courier New', monospace; font-size: 11px; color: var(--text-muted);
      word-break: break-all; margin: 4px auto 10px; max-width: 420px;
    }
    .parking-qr-copy {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--text-primary);
      cursor: pointer; font-family: inherit;
    }
    .parking-qr-copy:hover { border-color: var(--accent); color: var(--accent); }
    .parking-filter {
      display: flex; gap: 6px; padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .parking-filter button {
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 12px; font-weight: 700; color: var(--text-muted);
      cursor: pointer; font-family: inherit;
    }
    .parking-filter button.active {
      background: rgba(59,130,246,.12); border-color: var(--accent); color: var(--accent);
    }
    .parking-reg-row {
      padding: 12px 16px; border-bottom: 1px solid var(--bg-inset);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .parking-reg-row:last-child { border-bottom: none; }
    .parking-reg-plate {
      background: #fef3c7; color: #1c1009; border-radius: 6px; padding: 4px 10px;
      font-size: 14px; font-weight: 800; font-family: 'Courier New', monospace;
      letter-spacing: .1em; border: 1.5px solid #fbbf24;
    }
    .parking-reg-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .parking-reg-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      padding: 3px 8px; border-radius: 20px;
    }
    .parking-reg-badge.active { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.2); }
    .parking-reg-badge.expired { background: rgba(107,114,128,.12); color: var(--text-muted); border: 1px solid var(--border); }
    .parking-reg-badge.cooldown { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.2); }
    .parking-reg-badge.cancelled { background: rgba(239,68,68,.12); color: #ef4444; border: 1px solid rgba(239,68,68,.2); }

    /* ── Property detail (Passes tab) shared styles ── */
    .pd-share-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 4px 14px; margin-bottom: 16px;
    }
    .pd-share-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border-subtle);
    }
    .pd-share-row:last-child { border-bottom: none; }
    .pd-share-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      min-width: 78px; flex-shrink: 0;
    }
    .pd-share-url {
      flex: 1; min-width: 0; font-size: 12px; color: var(--text-muted); font-family: monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pd-share-btn {
      background: var(--bg-inset); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
      flex-shrink: 0;
    }
    .pd-share-btn:hover { color: var(--text-primary); border-color: var(--text-faint); }
    .pd-section-head {
      display: flex; justify-content: space-between; align-items: center;
      margin: 20px 0 8px; gap: 8px;
    }
    .pd-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .pd-section-count {
      font-size: 11px; color: var(--text-faint); font-weight: 600;
    }
    .pd-section-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-faint); letter-spacing: .04em;
    }
    .pd-empty {
      text-align: center; padding: 16px; color: var(--text-faint); font-size: 12px;
    }
    .pd-qr-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
    }
    @media (max-width: 520px) { .pd-qr-grid { grid-template-columns: 1fr; } }
    .pd-qr-tile {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; text-align: center;
    }
    .pd-qr-head {
      display: flex; align-items: baseline; gap: 8px; width: 100%; justify-content: space-between;
    }
    .pd-qr-sub { font-size: 10px; color: var(--text-faint); letter-spacing: .04em; }
    .pd-qr-canvas-wrap {
      background: #fff; padding: 8px; border-radius: 8px; line-height: 0;
    }
    .pd-qr-canvas-wrap canvas { display: block; width: 160px; height: 160px; }
    .pd-qr-url {
      font-family: monospace; font-size: 11px; color: var(--text-muted);
      word-break: break-all; max-width: 100%;
    }

    /* ── Analytics ── */
    .analytics-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .analytics-card-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .heatmap-grid {
      display: grid; grid-template-columns: 30px repeat(24, 1fr); gap: 1px; font-size: 8px;
    }
    .heatmap-cell {
      aspect-ratio: 1; border-radius: 2px; min-width: 0;
    }
    .heatmap-label { display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; color: var(--text-faint); font-weight: 600; }
    .heatmap-hour { display: flex; align-items: center; justify-content: center; color: var(--text-ghost); font-weight: 600; }
    .utilization-bar-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .utilization-bar-label { font-size: 11px; color: var(--text-muted); font-weight: 600; min-width: 32px; }
    .utilization-bar-track {
      flex: 1; height: 20px; background: var(--bg-inset); border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .utilization-bar-fill { height: 100%; border-radius: 5px; transition: width .5s ease; }
    .utilization-bar-val { font-size: 11px; font-weight: 700; color: var(--text-secondary); min-width: 36px; text-align: right; }
    .projection-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--bg-inset);
    }
    .projection-row:last-child { border-bottom: none; }
    .projection-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
    .projection-val { font-size: 18px; font-weight: 800; color: var(--text-primary); }
    .projection-val.green { color: var(--green); }
    .projection-val.blue { color: var(--accent); }
    .projection-trend { font-size: 11px; font-weight: 600; margin-left: 6px; }
    .projection-trend.up { color: var(--green); }
    .projection-trend.down { color: var(--red); }

    /* ── Navigate button on job cards ── */
    .action-btn.navigate {
      background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.4); color: #10b981;
    }
    .action-btn.navigate:hover:not(:disabled) { background: rgba(16,185,129,.2); }

    /* ── Nav icons ── */
    .nav-icon { width: 20px; height: 20px; }
    .nav-icon svg { width: 100%; height: 100%; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Pull to refresh ── */
    .ptr-indicator {
      text-align: center; padding: 8px 0; color: var(--text-muted); font-size: 12px; font-weight: 600;
      transition: all .2s;
    }

    /* ── Camera health ── */
    .cam-health { display: flex; gap: 10px; margin-top: 6px; }
    .cam-health-stat { font-size: 10px; color: var(--text-faint); }
    .cam-health-stat strong { color: var(--text-muted); }

    /* ── Zone overlay (read-only on snapshots) ── */
    .cam-img-wrap { position: relative; }
    .zone-overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .zone-poly { stroke-width: 0.4; fill-opacity: 0.08; }
    .zone-poly.no_parking { fill: #ef4444; stroke: #ef4444; }
    .zone-poly.unauthorized { fill: #3b82f6; stroke: #3b82f6; }
    .zone-poly.time_limited { fill: #8b5cf6; stroke: #8b5cf6; }
    .zone-poly.handicap_only { fill: #eab308; stroke: #eab308; }
    .zone-poly.fire_lane { fill: #f97316; stroke: #f97316; }
    .zone-poly.reserved { fill: #06b6d4; stroke: #06b6d4; }
    .zone-poly.permit_only { fill: #10b981; stroke: #10b981; }
    .zone-poly.loading_zone { fill: #64748b; stroke: #64748b; }
    .zone-poly.double_parked { fill: #ec4899; stroke: #ec4899; }
    .zone-poly.blocking { fill: #f43f5e; stroke: #f43f5e; }
    .zone-poly.expired_meter { fill: #a855f7; stroke: #a855f7; }
    .zone-poly.abandoned { fill: #78716c; stroke: #78716c; }
    .zone-label-text { font-size: 2.5px; font-weight: 600; fill: rgba(255,255,255,0.7); pointer-events: none; text-shadow: 0 0 1px rgba(0,0,0,0.5); }

    /* ── Zone editor (full-screen) ── */
    .zone-editor-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary); z-index: 200; display: flex; flex-direction: column;
    }
    .ze-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-card); flex-shrink: 0;
    }
    .ze-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .ze-btn {
      padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit; transition: opacity .15s;
    }
    .ze-btn:active { opacity: .7; }
    .ze-btn-primary { background: #3b82f6; color: #fff; }
    .ze-btn-danger { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
    .ze-btn-ghost { background: var(--bg-inset); color: var(--text-muted); }
    .ze-body { flex: 1; display: flex; flex-direction: row; overflow: hidden; }
    .ze-canvas-wrap {
      flex: 1; position: relative; overflow: hidden; cursor: crosshair; background: var(--snapshot-bg);
    }
    .ze-canvas-wrap img { position: absolute; display: block; user-select: none; -webkit-user-drag: none; }
    .ze-svg { position: absolute; }
    .ze-poly { stroke-width: 0.4; fill-opacity: 0.15; cursor: pointer; }
    .ze-poly.selected { stroke-dasharray: 1.5 0.8; fill-opacity: 0.25; stroke-width: 0.5; }
    .ze-vertex {
      r: 0.8; fill: #fff; stroke: #3b82f6; stroke-width: 0.3; cursor: grab;
    }
    .ze-vertex:hover { r: 1.1; }
    .ze-drawing-line { stroke: #3b82f6; stroke-width: 0.3; stroke-dasharray: 1 0.8; fill: none; }
    .ze-drawing-poly { fill: rgba(59,130,246,.1); stroke: #3b82f6; stroke-width: 0.3; }

    .ze-sidebar {
      width: 280px; flex-shrink: 0; display: flex; flex-direction: column;
      border-left: 1px solid var(--border-subtle); background: var(--bg-card); overflow-y: auto;
    }
    .ze-toolbar {
      display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card); flex-shrink: 0; flex-wrap: wrap; align-items: center;
    }
    .ze-zone-list {
      display: flex; gap: 4px; flex-wrap: wrap; flex: 1;
    }
    .ze-zone-chip {
      padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1.5px solid transparent; transition: all .15s;
    }
    .ze-zone-chip.active { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.25); }

    .ze-panel {
      padding: 6px 12px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-card); flex-shrink: 0;
    }
    .ze-panel-row { display: flex; gap: 6px; align-items: center; margin-bottom: 4px; }
    .ze-panel-row:last-child { margin-bottom: 0; }
    .ze-panel-label { font-size: 10px; font-weight: 600; color: var(--text-muted); min-width: 40px; text-transform: uppercase; letter-spacing: .05em; }
    .ze-panel-input {
      flex: 1; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; font-size: 11px; color: var(--text-secondary); outline: none; font-family: inherit;
    }
    .ze-panel-input:focus { border-color: var(--accent); }
    .ze-panel-select {
      flex: 1; background: var(--bg-inset); border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; font-size: 11px; color: var(--text-secondary); outline: none; font-family: inherit;
      appearance: none; -webkit-appearance: none;
    }
    .ze-panel-select:focus { border-color: var(--accent); }
    .ze-status { font-size: 10px; color: var(--text-faint); padding: 2px 0; }
    .ze-hint { font-size: 10px; color: var(--text-ghost); text-align: center; padding: 8px 12px; border-bottom: 1px solid var(--border-subtle); }

    /* ── Live feed controls ── */
    .ze-feed-controls {
      display: flex; gap: 6px; padding: 4px 12px; border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-card); flex-shrink: 0; align-items: center; flex-wrap: wrap;
    }
    .ze-feed-status {
      display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600;
    }
    .ze-feed-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ze-feed-dot.live { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.5); animation: pulse-dot 2s infinite; }
    .ze-feed-dot.paused { background: #fbbf24; }
    .ze-feed-dot.offline { background: #ef4444; }
    .ze-refresh-btn {
      padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-inset); color: var(--text-muted);
      font-family: inherit; transition: all .15s;
    }
    .ze-refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ze-refresh-btn:active { opacity: .7; }
    .ze-refresh-btn:disabled { opacity: .4; cursor: not-allowed; }
    .ze-interval-select {
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 4px;
      padding: 3px 6px; font-size: 10px; color: var(--text-muted); font-family: inherit;
      outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;
    }

    /* ── Detection overlays on canvas ── */
    .ze-detection-bbox { fill: none; stroke-width: 0.25; rx: 0.2; ry: 0.2; }
    .ze-detection-bbox.vehicle { stroke: #3b82f6; }
    .ze-detection-bbox.person { stroke: #f59e0b; }
    .ze-detection-label {
      font-size: 1.4px; font-weight: 700; pointer-events: none;
    }
    .ze-detection-label-bg {
      rx: 0.2; ry: 0.2;
    }

    /* ── Detection sidebar panel ── */
    .ze-detections-panel {
      border-top: 1px solid var(--border-subtle); background: var(--bg-card);
      flex: 1; overflow-y: auto; min-height: 0;
    }
    .ze-det-header {
      padding: 4px 12px; font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--bg-inset);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-card); z-index: 1;
    }
    .ze-det-tabs { display: flex; gap: 4px; }
    .ze-det-tab {
      padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 700;
      cursor: pointer; border: 1px solid transparent; background: none; color: var(--text-faint);
      font-family: inherit; text-transform: uppercase; letter-spacing: .05em;
      transition: all .15s;
    }
    .ze-det-tab.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,.08); }
    .ze-det-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 16px;
      border-bottom: 1px solid var(--bg-inset); transition: background .1s;
    }
    .ze-det-item:hover { background: var(--bg-inset); }
    .ze-det-icon {
      width: 32px; height: 32px; border-radius: 6px; display: flex;
      align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .ze-det-icon.vehicle { background: rgba(59,130,246,.12); }
    .ze-det-icon.person { background: rgba(245,158,11,.12); }
    .ze-det-info { flex: 1; min-width: 0; }
    .ze-det-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .ze-det-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
    .ze-det-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0;
    }
    .ze-det-badge.plate {
      background: #fef3c7; color: #1c1009; border: 1px solid #fbbf24;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: .1em;
    }
    .ze-det-badge.conf { background: rgba(74,222,128,.12); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .ze-det-badge.color-swatch {
      width: 16px; height: 16px; border-radius: 4px; padding: 0; min-width: 16px;
      border: 1.5px solid rgba(255,255,255,.2);
    }

    /* ── Snapshot detection summary on cam cards ── */
    .cam-det-summary {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
    }
    .cam-det-chip {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px;
    }
    .cam-det-chip .det-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cam-det-chip .det-dot.vehicles { background: #3b82f6; }
    .cam-det-chip .det-dot.people { background: #f59e0b; }
    .cam-det-chip .det-dot.plates { background: #4ade80; }

    /* ── Toggle switch ── */
    .ze-toggle-wrap { display: flex; align-items: center; gap: 6px; }
    .ze-toggle {
      width: 34px; height: 18px; border-radius: 9px; border: none; cursor: pointer;
      position: relative; transition: background .2s; padding: 0;
    }
    .ze-toggle.on { background: #3b82f6; }
    .ze-toggle.off { background: var(--text-ghost); }
    .ze-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transition: transform .2s;
    }
    .ze-toggle.on::after { transform: translateX(16px); }
    .ze-toggle-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }

    /* ── Loading skeletons ── */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: 8px;
    }
    .skeleton-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      margin-bottom: 10px; overflow: hidden; padding: 16px;
    }
    .skeleton-line { height: 12px; margin-bottom: 10px; border-radius: 6px; }
    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w40 { width: 40%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w30 { width: 30%; }
    .skeleton-line.thick { height: 20px; }
    .skeleton-row { display: flex; gap: 8px; }
    .skeleton-circle { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-img { width: 100%; aspect-ratio: 16/9; border-radius: 10px; }
    .skeleton-kpi { flex: 1; height: 68px; border-radius: 12px; }

    /* ── Card entrance animations ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }
    .card-animated {
      animation: cardIn .35s ease both;
    }
    .card-animated:nth-child(1) { animation-delay: 0s; }
    .card-animated:nth-child(2) { animation-delay: .05s; }
    .card-animated:nth-child(3) { animation-delay: .1s; }
    .card-animated:nth-child(4) { animation-delay: .15s; }
    .card-animated:nth-child(5) { animation-delay: .2s; }
    .card-animated:nth-child(6) { animation-delay: .25s; }
    .card-animated:nth-child(7) { animation-delay: .3s; }
    .card-animated:nth-child(8) { animation-delay: .35s; }

    /* ── Search / filter bar ── */
    .search-bar {
      display: flex; gap: 8px; margin-bottom: 14px; align-items: center;
    }
    .search-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px 10px 36px; font-size: 14px; color: var(--text-secondary);
      outline: none; font-family: inherit; transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .search-input::placeholder { color: var(--text-dim); }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-ghost); pointer-events: none;
    }
    .filter-chip {
      padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-faint);
      font-family: inherit; transition: all .15s; white-space: nowrap;
    }
    .filter-chip.active { border-color: rgba(59,130,246,.4); color: var(--accent); background: rgba(59,130,246,.08); }
    .filter-chip:active { transform: scale(.96); }

    /* ── Inline bar chart ── */
    .bar-chart { margin-bottom: 16px; }
    .bar-chart-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .bar-chart-label { font-size: 12px; font-weight: 600; color: var(--text-muted); min-width: 52px; text-align: right; }
    .bar-chart-track {
      flex: 1; height: 24px; background: var(--bg-inset); border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-chart-fill {
      height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 8px;
      font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
      transition: width .6s ease;
      min-width: fit-content;
    }
    .bar-chart-value { font-size: 12px; font-weight: 700; color: var(--text-muted); min-width: 40px; }

    /* ── Confidence bar ── */
    .conf-bar-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .conf-bar {
      width: 40px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .conf-bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }

    /* ── Settings page ── */
    .settings-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; margin-bottom: 12px;
    }
    .settings-section-title {
      padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--bg-inset);
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--bg-inset);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-info { flex: 1; min-width: 0; }
    .settings-row-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .settings-row-desc { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
    .settings-row-value { font-size: 13px; color: var(--text-muted); font-weight: 500; max-width: 180px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Occupancy bar ── */
    .occupancy-wrap { margin-top: 10px; }
    .occupancy-bar-track {
      width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .occupancy-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .occupancy-label { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--text-faint); font-weight: 600; }

    /* ── Connection indicator ── */
    .conn-indicator {
      display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 6px; background: rgba(74,222,128,.08);
      border: 1px solid rgba(74,222,128,.15);
    }
    .conn-indicator.online { color: #4ade80; }
    .conn-indicator.offline { color: #ef4444; background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.15); }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; }
    .conn-dot.on { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,.4); }
    .conn-dot.off { background: #ef4444; }

    /* ── Relative time badge ── */
    .time-ago {
      font-size: 10px; font-weight: 600; color: var(--text-muted); padding: 2px 6px;
      background: var(--bg-inset); border: 1px solid var(--border); border-radius: 4px;
    }

    /* ── Snapshot zoom ── */
    .snap-zoom-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
      background: rgba(0,0,0,.9); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out; animation: fadeIn .2s ease;
    }
    .snap-zoom-overlay img {
      max-width: 95vw; max-height: 90vh; object-fit: contain; border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .snap-zoom-close {
      position: absolute; top: 20px; right: 20px; width: 36px; height: 36px;
      border-radius: 50%; background: rgba(255,255,255,.1); border: none;
      color: #fff; font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background .15s;
    }
    .snap-zoom-close:hover { background: rgba(255,255,255,.2); }

    /* ── Trend indicator ── */
    .trend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; }
    .trend.up { color: #4ade80; }
    .trend.down { color: #ef4444; }
    .trend.flat { color: #6b7280; }

    /* ── Stat card enhanced ── */
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 2px;
    }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; }
    .stat-card-val { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text-primary); }
    .stat-card-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
    .stat-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }

    /* ── Pulsing alert dot ── */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .alert-pulse { position: relative; }
    .alert-pulse::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%; border: 2px solid currentColor;
      animation: pulse-ring 1.5s ease infinite;
    }

    /* ── Smooth page transitions ── */
    .page-enter { animation: cardIn .3s ease both; }

    /* ── Supabase realtime pulse ── */
    .conn-indicator.online .conn-dot.on {
      animation: pulse-dot 2s ease infinite;
    }

    /* ── Enhanced card hover ── */
    .job-card { transition: transform .15s ease, box-shadow .15s ease; }
    .job-card:active { transform: scale(.99); }
    .lot-card { transition: transform .15s ease, box-shadow .15s ease; }
    .lot-card:active { transform: scale(.99); }

    /* ── Improved scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-ghost); }

    /* ── Data source badge ── */
    .data-source-badge {
      font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .06em;
      background: rgba(74,222,128,.08); color: #4ade80; border: 1px solid rgba(74,222,128,.15);
    }
    /* ── Owner white theme ── */
    .theme-light { background: #f8f9fb; color: #1a1a2e; }
    .theme-light .header { background: rgba(255,255,255,.95); border-bottom-color: #e5e7eb; }
    .theme-light .header-wordmark { color: #1a1a2e; }
    .theme-light .header-name { color: #6b7280; }
    .theme-light .bottom-nav { background: rgba(255,255,255,.97); border-top-color: #e5e7eb; }
    .theme-light .nav-item { color: #9ca3af; }
    .theme-light .nav-item.active { color: #2563eb; }
    .theme-light .nav-item.active::before { background: #2563eb; }
    .theme-light .nav-badge { border-color: #fff; }

    /* Cards */
    .theme-light .job-card,
    .theme-light .lot-card,
    .theme-light .earnings-breakdown,
    .theme-light .settings-section,
    .theme-light .stat-card,
    .theme-light .kpi-card { background: #fff; border-color: #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,.06); }

    /* Text */
    .theme-light .section-title,
    .theme-light .job-lot-name,
    .theme-light .lot-name,
    .theme-light .earnings-amount,
    .theme-light .kpi-val,
    .theme-light .viol-modal-title,
    .theme-light .stat-card-val,
    .theme-light .lot-num-val,
    .theme-light .confirm-title,
    .theme-light .settings-row-label,
    .theme-light .ze-title,
    .theme-light .ze-det-title,
    .theme-light .breakdown-date { color: #1a1a2e; }

    .theme-light .section-count,
    .theme-light .job-lot-addr,
    .theme-light .lot-addr,
    .theme-light .kpi-label,
    .theme-light .lot-num-label,
    .theme-light .cam-name,
    .theme-light .cam-time,
    .theme-light .earnings-label,
    .theme-light .earnings-sub,
    .theme-light .breakdown-lot,
    .theme-light .breakdown-action,
    .theme-light .breakdown-plate,
    .theme-light .settings-row-desc,
    .theme-light .settings-row-value,
    .theme-light .confirm-body,
    .theme-light .viol-modal-sub,
    .theme-light .viol-modal-stat-label,
    .theme-light .ze-panel-label,
    .theme-light .ze-det-sub,
    .theme-light .ze-status,
    .theme-light .ze-hint,
    .theme-light .ze-toggle-label,
    .theme-light .login-tagline,
    .theme-light .job-timer-label,
    .theme-light .empty-body,
    .theme-light .bar-chart-label { color: #6b7280; }

    .theme-light .empty-title { color: #4b5563; }

    /* Muted backgrounds */
    .theme-light .job-timer,
    .theme-light .viol-modal-stat,
    .theme-light .time-ago,
    .theme-light .cam-det-chip,
    .theme-light .section-count { background: #f3f4f6; border-color: #e5e7eb; }

    /* Borders / dividers */
    .theme-light .job-footer,
    .theme-light .lot-actions,
    .theme-light .lot-action-btn,
    .theme-light .job-actions-row,
    .theme-light .breakdown-row,
    .theme-light .breakdown-header,
    .theme-light .settings-section-title,
    .theme-light .settings-row,
    .theme-light .ze-header,
    .theme-light .ze-toolbar,
    .theme-light .ze-panel,
    .theme-light .ze-feed-controls,
    .theme-light .ze-detections-panel,
    .theme-light .ze-det-header,
    .theme-light .ze-det-item,
    .theme-light .cam-row,
    .theme-light .expand-cams-btn { border-color: #e5e7eb; }

    .theme-light .breakdown-row { border-bottom-color: #f3f4f6; }
    .theme-light .breakdown-row:active { background: #f3f4f6; }

    /* Buttons & inputs */
    .theme-light .lot-action-btn { color: #6b7280; }

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo, memo } = React;

// ── Error boundary ────────────────────────────────────────────
// Catches render / lifecycle throws in a subtree so a malformed record
// (e.g. tow_confirmation.delta_seconds === NaN) can't take the whole
// dashboard down. React 18 still supports class-component boundaries —
// there is no hook equivalent for componentDidCatch.
//
// Fallback UI: "Something went wrong loading this view" with the error
// message tucked into a <details> for devs / support. A Reload tab
// button resets the boundary's state so transient errors recover
// without a full page reload.
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
    this.handleReset = this.handleReset.bind(this);
  }

  static getDerivedStateFromError(error) {
    return { error };
  }

  componentDidCatch(error, info) {
    // Surface enough context for after-the-fact debugging without leaking
    // user data. Uses console.error (not the ungated logger) so the dev
    // console stays clean in normal operation.
    if (typeof window !== 'undefined' && window.console && window.console.error) {
      window.console.error('[ErrorBoundary:' + (this.props.label || 'unknown') + ']', error, info);
    }
  }

  handleReset() {
    this.setState({ error: null });
  }

  render() {
    const { error } = this.state;
    if (!error) return this.props.children;
    const label = this.props.label || 'this view';
    const message = (error && (error.message || String(error))) || 'Unknown error';
    return (
      React.createElement('div', {
        role: 'alert',
        style: {
          margin: 16,
          padding: 16,
          background: 'rgba(239,68,68,.08)',
          border: '1px solid rgba(239,68,68,.3)',
          borderRadius: 10,
          color: 'var(--text-primary)',
        },
      },
        React.createElement('div', {
          style: { fontSize: 14, fontWeight: 800, color: '#ef4444', marginBottom: 6 },
        }, 'Something went wrong loading ' + label + '.'),
        React.createElement('div', {
          style: { fontSize: 12, color: 'var(--text-muted)', marginBottom: 10 },
        }, 'Try reloading. If it keeps happening, please report the details below.'),
        React.createElement('div', { style: { display: 'flex', gap: 8, marginBottom: 10 } },
          React.createElement('button', {
            onClick: this.handleReset,
            style: {
              fontSize: 12, fontWeight: 700, padding: '6px 12px', borderRadius: 6,
              border: '1px solid var(--accent)', background: 'var(--accent)', color: '#fff', cursor: 'pointer',
            },
          }, 'Reload tab'),
        ),
        React.createElement('details', null,
          React.createElement('summary', {
            style: { fontSize: 12, color: 'var(--text-muted)', cursor: 'pointer' },
          }, 'Error details'),
          React.createElement('pre', {
            style: {
              fontSize: 11, color: 'var(--text-muted)', marginTop: 6,
              whiteSpace: 'pre-wrap', wordBreak: 'break-word',
              background: 'var(--bg-inset)', padding: 8, borderRadius: 6,
              border: '1px solid var(--border)',
            },
          }, message),
        ),
      )
    );
  }
}

// ── Shared helpers (parking passes) ──────────────────────────
// Format a millisecond duration as "Xh Ym left" / "Zm left" / "<1m left" / "Expired"
function fmtPassRemaining(ms) {
  if (ms <= 0) return 'Expired';
  const sec = Math.floor(ms / 1000);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h >= 1) return `${h}h ${m}m left`;
  if (m >= 1) return `${m}m left`;
  return '<1m left';
}

// Return a debounced version of fn that coalesces calls within `wait` ms.
// Useful for realtime callbacks that can fire in bursts.
function makeDebounced(fn, wait) {
  let t = null;
  return function debounced(...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; fn(...args); }, wait);
  };
}

// Keep a dashboard-wide ticker so every "time-left" label counts down in lockstep
// without each component setting its own interval.
const NOW_TICK_LISTENERS = new Set();
let NOW_TICK_INTERVAL = null;
function useNowTick(everyMs = 30000) {
  const [t, setT] = useState(() => Date.now());
  useEffect(() => {
    const cb = () => setT(Date.now());
    NOW_TICK_LISTENERS.add(cb);
    if (!NOW_TICK_INTERVAL) {
      NOW_TICK_INTERVAL = setInterval(() => {
        NOW_TICK_LISTENERS.forEach(l => l());
      }, everyMs);
    }
    return () => {
      NOW_TICK_LISTENERS.delete(cb);
      if (NOW_TICK_LISTENERS.size === 0 && NOW_TICK_INTERVAL) {
        clearInterval(NOW_TICK_INTERVAL);
        NOW_TICK_INTERVAL = null;
      }
    };
  }, [everyMs]);
  return t;
}

let _supabaseToken = null;

    const h = new Headers((init && init.headers) || (input && input.headers) || {});
    h.set('Authorization', 'Bearer ' + _supabaseToken);

const API = 'https://lotlogic-backend-production.up.railway.app';

// The backend scopes every response to the account whose JWT is presented.
// We stopped shipping the shared service key from the browser as part of the
// property-access-control rollout — clients must now be authenticated as a user.
function getSessionToken() {
  try {
    const raw = localStorage.getItem('lotlogic_session');
    if (!raw) return null;

  } catch {
    return null;

async function apiFetch(path, options = {}) {
  const token = getSessionToken();
  const headers = { ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const r = await fetch(API + path, { ...options, headers });
  if (r.status === 401) {
    // Session expired or invalid — clear and force re-login.
    try { localStorage.removeItem('lotlogic_session'); } catch {}
    window.dispatchEvent(new CustomEvent('lotlogic:auth-expired'));
  }
  if (!r.ok) {
    let msg = `Server error (${r.status})`;
    try {
      const body = await r.json();
      if (body.detail) msg = body.detail;
      else if (body.error) msg = body.error;
    } catch {}
    const err = new Error(msg);
    err.status = r.status;
    throw err;
  }
  return r.json();
}

async function authLogin(email, password) {

  let body = null;
  try { body = await r.json(); } catch {}
  if (!r.ok) {
    const err = new Error(body?.detail || `Sign-in failed (${r.status})`);
    err.status = r.status;
    throw err;
  }
  return body;
}

          latest_snapshot: snap ? {
            url: (snap.storage_url || snap.url) ? (snap.storage_url || snap.url) + (((snap.storage_url || snap.url).includes('?')) ? '&' : '?') + '_t=' + Date.now() : null,
            captured_at: snap.captured_at,

            plates_read: snap.raw_detections?.detections?.filter(d => d.plate_text).length || 0,
            plate_readings: snap.raw_detections?.detections?.filter(d => d.plate_text).map(d => d.plate_text) || [],
            detections: snap.raw_detections?.detections?.map((d, i) => ({
              id: `det_${i}`,

  // Shared: attach snapshot URL + detections to violation rows.
  // If the violation's own snapshot has no storage_url, fall back to
  // the latest snapshot from the same camera that does.
  async _enrichViolations(data) {
    const viols = data.map(v => {
      const snap = v.snapshots;
      const nv = normalizeViolation(v);
      // Priority: violation's own snapshot_url (original detection image),
      // then joined snapshot's storage_url, then null (will fallback below)
      nv._snapshot_url = v.snapshot_url || snap?.storage_url || null;
      nv._detections = snap?.raw_detections?.detections || [];
      delete nv.snapshots;
      return nv;
    });
    // Find violations that need snapshot data: either missing URL or missing detections
    const needsData = viols.filter(v => (!v._snapshot_url || !v._detections?.length) && v.camera_id);
    if (needsData.length > 0 && supabase) {
      try {
        await Promise.all(needsData.map(async v => {
          // First try: fetch by snapshot_id if available
          if (v.snapshot_id) {
            const { data: snap } = await supabase
              .from('snapshots')
              .select('storage_url, raw_detections')
              .eq('id', v.snapshot_id)
              .single();
            if (snap) {
              if (!v._snapshot_url && snap.storage_url) v._snapshot_url = snap.storage_url;
              if (!v._detections?.length) v._detections = snap.raw_detections?.detections || [];
              return;
            }
          }
          // Second try: match by snapshot_url to get detections
          if (v._snapshot_url && !v._detections?.length) {
            const { data: snaps } = await supabase
              .from('snapshots')
              .select('raw_detections')
              .eq('storage_url', v._snapshot_url)
              .limit(1);
            if (snaps?.[0]?.raw_detections?.detections?.length) {
              v._detections = snaps[0].raw_detections.detections;
              return;
            }
          }
          // Third try: snapshot closest to detected_at from the same camera
          if (!v._snapshot_url) {
            const { data: snaps } = await supabase
              .from('snapshots')
              .select('storage_url, raw_detections')
              .eq('camera_id', v.camera_id)
              .not('storage_url', 'is', null)
              .lte('captured_at', v.detected_at)
              .order('captured_at', { ascending: false })
              .limit(1);
            if (snaps?.[0]) {
              v._snapshot_url = snaps[0].storage_url;
              if (!v._detections?.length) v._detections = snaps[0].raw_detections?.detections || [];
            }
          }
        }));
      } catch (e) {
        console.error('Snapshot enrichment failed:', e);
      }
    }
    // Look up the original detection-time snapshot for each violation.
    // violation.snapshot_url may have been overwritten by the backend (old bug),
    // so we always resolve the snapshot closest to detected_at as the true detection image.
    if (supabase) {
      try {
        await Promise.all(viols.map(async v => {
          if (!v.camera_id || !v.detected_at) return;
          const { data: snaps } = await supabase
            .from('snapshots')
            .select('storage_url, raw_detections')
            .eq('camera_id', v.camera_id)
            .not('storage_url', 'is', null)
            .lte('captured_at', v.detected_at)
            .order('captured_at', { ascending: false })
            .limit(1);
          if (snaps?.[0]?.storage_url) {
            v._detection_snapshot_url = snaps[0].storage_url;
            if (!v._detections?.length) {
              v._detections = snaps[0].raw_detections?.detections || [];
            }
          }
        }));
      } catch (e) {
        console.error('Detection snapshot lookup failed:', e);
      }
    }
    return viols;
  },
  async getViolations(lotId) {
    if (supabase) {
      const { data, error } = await supabase

        .select('*, snapshots:snapshot_id(storage_url, raw_detections)')

  async recordAction(violId, action, extra = {}) {
    if (supabase) {
      try {
        if (action === 'plate_correction') {
          const { error } = await supabase.from('violations').update({
            plate_text: extra.plate_text,
          }).eq('id', violId);
          if (error) throw new Error(error.message || 'Plate update failed');
          return { success: true };
        }
        // Build clean update object — only real DB columns
        const updates = {
          action_taken: action,
          status: 'resolved',
          resolved_at: new Date().toISOString(),
        };
        // Calculate revenue from fee schedule for boot/tow
        if (action === 'boot' || action === 'tow') {
          if (extra._partner) {
            const p = extra._partner;
            const grossFee = action === 'boot' ? (p.boot_fee || 75) : (p.tow_fee || 250);
            const share = p.revenue_share != null ? p.revenue_share : 0.30;
            updates.gross_revenue = grossFee;
            updates.our_revenue = Math.round(grossFee * share);
            updates.partner_id = p.id;
          } else if (extra._ownerFees) {
            const f = extra._ownerFees;
            const grossFee = action === 'boot' ? (f.boot_fee || 75) : (f.tow_fee || 250);
            updates.gross_revenue = grossFee;
            updates.our_revenue = grossFee; // Owner keeps 100%
          }
        }
        // Dismissed / already gone / no action = zero revenue (action-rate only)
        // Also clear zone_id so the backend won't dedup-match this resolved
        // violation against new detections in the same zone.
        // Fetch camera_id + zone_id BEFORE update (dismiss clears zone_id)
        const { data: _vPre } = await supabase.from('violations').select('camera_id, zone_id').eq('id', violId).single();
        const _preCameraId = _vPre?.camera_id;
        const _preZoneId = _vPre?.zone_id;

        if (action === 'dismissed' || action === 'already_gone' || action === 'no_action') {
          updates.gross_revenue = 0;
          updates.our_revenue = 0;
          updates.zone_id = null;
        }
        const { error } = await supabase.from('violations').update(updates).eq('id', violId);
        if (error) throw new Error(error.message || 'Update failed');

        // Reset zone_occupancy so the next scan can fire a new violation
        if (_preCameraId && _preZoneId) {
          await supabase.from('zone_occupancy')
            .update({ violation_triggered: false })
            .eq('camera_id', _preCameraId)
            .eq('zone_id', _preZoneId);
        }

        // Log boot/tow actions for invoicing
        if (action === 'boot' || action === 'tow') {
          try {
            // Fetch violation details for the log
            const { data: viol } = await supabase.from('violations').select('lot_id, plate_text, vehicle_color, vehicle_type').eq('id', violId).single();
            const lot_id = viol?.lot_id;
            const vehicleParts = [viol?.vehicle_color, viol?.vehicle_type].filter(Boolean);
            const vehicle_description = vehicleParts.length ? vehicleParts.join(' ') : (viol?.vehicle_type || null);
            // Determine who performed the action and fee split
            let logEntry = {
              violation_id: violId,
              lot_id,
              action_type: action,
              plate_text: viol?.plate_text || null,
              vehicle_description,
              performed_at: updates.resolved_at,
            };
            if (extra._partner) {
              const p = extra._partner;
              const grossFee = action === 'boot' ? (p.boot_fee || 75) : (p.tow_fee || 250);
              const share = p.revenue_share != null ? p.revenue_share : 0.30;
              logEntry.partner_id = p.id;
              logEntry.performed_by = 'partner';
              logEntry.performer_email = extra._performerEmail || null;
              logEntry.gross_fee = grossFee;
              logEntry.our_revenue = Math.round(grossFee * share);
              logEntry.partner_payout = grossFee - logEntry.our_revenue;
              logEntry.owner_payout = 0;
            } else if (extra._ownerFees) {
              logEntry.owner_id = extra._ownerId || null;
              logEntry.performed_by = 'owner';
              logEntry.performer_email = extra._performerEmail || null;
              const grossFee = action === 'boot' ? (extra._ownerFees.boot_fee || 75) : (extra._ownerFees.tow_fee || 250);
              logEntry.gross_fee = grossFee;
              logEntry.our_revenue = grossFee;
              logEntry.partner_payout = 0;
              logEntry.owner_payout = grossFee;
            }
            await supabase.from('action_logs').insert(logEntry);
          } catch (logErr) {
            console.warn('Action logged to violations but action_log insert failed:', logErr);
          }
        }

        return { success: true };
      } catch (e) {
        console.error('Supabase recordAction error:', e);
        // Try Rails API fallback
        try {
          const { _partner, ...cleanExtra } = extra;
          return await apiFetch(`/violations/${violId}/action`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...cleanExtra }),
          });
        } catch (_) {
          throw e; // Both failed — throw original Supabase error
        }
      }
    }
    const { _partner, ...cleanExtra } = extra;
    return apiFetch(`/violations/${violId}/action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...cleanExtra }),
    });
  },

  async getRevenue(days) {
    if (supabase) {
      const since = new Date(Date.now() - days * 86400000).toISOString();
      const { data, error } = await supabase
        .from('violations')
        .select('*')
        .in('status', ['resolved', 'cleared'])
        .gte('detected_at', since);
      if (!error && data) {
        // Revenue stored as dollars in DB
        const totalOur = data.reduce((s, v) => s + (v.our_revenue || 0), 0);
        const totalGross = data.reduce((s, v) => s + (v.gross_revenue || 0), 0);
        const actioned = data.filter(v => v.action_taken && !['pending', 'plate_correction'].includes(v.action_taken));
        const byAction = {};
        actioned.forEach(v => { byAction[v.action_taken] = (byAction[v.action_taken] || 0) + 1; });
        return {
          our_revenue_cents: Math.round(totalOur * 100), // convert dollars → cents for fmtMoney
          gross_revenue_cents: Math.round(totalGross * 100),
          total_violations: data.length,
          actions_executed: actioned.length,
          action_rate: data.length > 0 ? actioned.length / data.length : 0,
          by_action_type: byAction,
        };
      }
    }
    return apiFetch(`/violations/revenue?days=${days}`);
  },
