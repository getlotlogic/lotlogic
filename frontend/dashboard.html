  async recordAction(violId, action, extra = {}) {
    if (supabase) {
      try {
        if (action === 'plate_correction') {
          const { error } = await supabase.from('violations').update({
            plate_text: extra.plate_text,
          }).eq('id', violId);
          if (error) throw new Error(error.message || 'Plate update failed');
          return { success: true };
        }
        // Build clean update object — only real DB columns
        const updates = {
          action_taken: action,
          status: 'resolved',
          resolved_at: new Date().toISOString(),
        };
        // Calculate revenue from fee schedule for boot/tow
        if (action === 'boot' || action === 'tow') {
          if (extra._partner) {
            const p = extra._partner;
            const grossFee = action === 'boot' ? (p.boot_fee || 75) : (p.tow_fee || 250);
            const share = p.revenue_share != null ? p.revenue_share : 0.30;
            updates.gross_revenue = grossFee;
            updates.our_revenue = Math.round(grossFee * share);
            updates.partner_id = p.id;
          } else if (extra._ownerFees) {
            const f = extra._ownerFees;
            const grossFee = action === 'boot' ? (f.boot_fee || 75) : (f.tow_fee || 250);
            updates.gross_revenue = grossFee;
            updates.our_revenue = grossFee; // Owner keeps 100%
          }
        }
        // Dismissed / already gone / no action = zero revenue (action-rate only)
        // Also clear zone_id so the backend won't dedup-match this resolved
        // violation against new detections in the same zone.
        // Fetch camera_id + zone_id BEFORE update (dismiss clears zone_id)
        const { data: _vPre } = await supabase.from('violations').select('camera_id, zone_id').eq('id', violId).single();
        const _preCameraId = _vPre?.camera_id;
        const _preZoneId = _vPre?.zone_id;

        if (action === 'dismissed' || action === 'already_gone' || action === 'no_action') {
          updates.gross_revenue = 0;
          updates.our_revenue = 0;
          updates.zone_id = null;
        }
        const { error } = await supabase.from('violations').update(updates).eq('id', violId);
        if (error) throw new Error(error.message || 'Update failed');

        // Reset zone_occupancy so the next scan can fire a new violation
        if (_preCameraId && _preZoneId) {
          await supabase.from('zone_occupancy')
            .update({ violation_triggered: false })
            .eq('camera_id', _preCameraId)
            .eq('zone_id', _preZoneId);
        }

        // Log boot/tow actions for invoicing
        if (action === 'boot' || action === 'tow') {
          try {
            // Fetch violation details for the log
            const { data: viol } = await supabase.from('violations').select('lot_id, plate_text, vehicle_color, vehicle_type').eq('id', violId).single();
            const lot_id = viol?.lot_id;
            const vehicleParts = [viol?.vehicle_color, viol?.vehicle_type].filter(Boolean);
            const vehicle_description = vehicleParts.length ? vehicleParts.join(' ') : (viol?.vehicle_type || null);
            // Determine who performed the action and fee split
            let logEntry = {
              violation_id: violId,
              lot_id,
              action_type: action,
              plate_text: viol?.plate_text || null,
              vehicle_description,
              performed_at: updates.resolved_at,
            };
            if (extra._partner) {
              const p = extra._partner;
              const grossFee = action === 'boot' ? (p.boot_fee || 75) : (p.tow_fee || 250);
              const share = p.revenue_share != null ? p.revenue_share : 0.30;
              logEntry.partner_id = p.id;
              logEntry.performed_by = 'partner';
              logEntry.performer_email = extra._performerEmail || null;
              logEntry.gross_fee = grossFee;
              logEntry.our_revenue = Math.round(grossFee * share);
              logEntry.partner_payout = grossFee - logEntry.our_revenue;
              logEntry.owner_payout = 0;
            } else if (extra._ownerFees) {
              logEntry.owner_id = extra._ownerId || null;
              logEntry.performed_by = 'owner';
              logEntry.performer_email = extra._performerEmail || null;
              const grossFee = action === 'boot' ? (extra._ownerFees.boot_fee || 75) : (extra._ownerFees.tow_fee || 250);
              logEntry.gross_fee = grossFee;
              logEntry.our_revenue = grossFee;
              logEntry.partner_payout = 0;
              logEntry.owner_payout = grossFee;
            }
            await supabase.from('action_logs').insert(logEntry);
          } catch (logErr) {
            console.warn('Action logged to violations but action_log insert failed:', logErr);
          }
        }

        return { success: true };
      } catch (e) {
        console.error('Supabase recordAction error:', e);
        // Try Rails API fallback
        try {
          const { _partner, ...cleanExtra } = extra;
          return await apiFetch(`/violations/${violId}/action`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, ...cleanExtra }),
          });
        } catch (_) {
          throw e; // Both failed — throw original Supabase error
        }
      }
    }
    const { _partner, ...cleanExtra } = extra;
    return apiFetch(`/violations/${violId}/action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, ...cleanExtra }),
    });
  },
  // Mark a violation as departed (vehicle left zone, confirmed by consecutive empty snapshots)

  async getRevenue(days) {

      const { data, error } = await supabase
        .from('violations')
        .select('*')
        .in('status', ['resolved', 'cleared'])
        .gte('detected_at', since);

        const totalOur = data.reduce((s, v) => s + (v.our_revenue || 0), 0);

  async updateZones(cameraId, zones) {
    if (supabase) {
      // Delete existing zones for this camera, then insert new ones
      const { error: delErr } = await supabase.from('camera_zones').delete().eq('camera_id', cameraId);
      if (delErr) throw new Error('Failed to clear zones: ' + delErr.message);

      if (zones.length > 0) {
        const rows = zones.map(z => ({
          camera_id: cameraId,
          zone_id: z.zone_id,
          label: z.label || z.zone_id,
          zone_type: z.zone_type || 'no_parking',

        const { error: insErr } = await supabase.from('camera_zones').insert(rows);
        if (insErr) throw new Error('Failed to insert zones: ' + insErr.message);
      }

      // Sync to cameras.zones JSON column (backend detection uses this format)
      // Convert {x,y} percentage objects to [[x,y]] normalized 0-1 arrays
      const backendZones = zones.map((z, i) => ({
        zone_id: z.zone_id,
        violation_type: z.zone_type || 'no_parking',
        max_minutes: z.time_limit_minutes || null,
        space_number: i + 1,
        polygon: (z.polygon || []).map(pt => {
          const px = pt.x != null ? pt.x : (Array.isArray(pt) ? pt[0] * 100 : 0);
          const py = pt.y != null ? pt.y : (Array.isArray(pt) ? pt[1] * 100 : 0);
          return [Math.round(px / 100 * 10000) / 10000, Math.round(py / 100 * 10000) / 10000];
        }),
      }));
      await supabase.from('cameras').update({ zones: backendZones }).eq('id', cameraId);

      return { success: true };
    }
    return apiFetch(`/cameras/${cameraId}/zones`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ zones }),
    });

  async deleteViolation(violId, isAlpr = false) {

      // delete path silently no-ops for ALPR rows because the WHERE matches
      // zero rows in the wrong table — no error, no toast feedback, looks

      if (isAlpr) {

        return;

      // Fetch camera_id + zone_id before deleting so we can reset occupancy
      const { data: _vPre } = await supabase.from('violations').select('camera_id, zone_id').eq('id', violId).single();

          .update({ violation_triggered: false })
          .eq('camera_id', _vPre.camera_id)

  // ── Analytics ─────────────────────────────────────────────
  async getHourlyStats(lotIds) {
    if (supabase) {
      // Get violations from last 90 days grouped by hour
      const since = new Date(Date.now() - 90 * 86400000).toISOString();
      const { data, error } = await supabase
        .from('violations')
        .select('lot_id, detected_at, action_taken, gross_revenue')
        .in('lot_id', lotIds)
        .gte('detected_at', since);
      if (!error && data) {
        // Build heatmap: day_of_week x hour_of_day → count
        const heatmap = {};
        data.forEach(v => {
          const d = new Date(v.detected_at);
          const dow = d.getDay(); // 0=Sun
          const hour = d.getHours();
          const key = `${dow}-${hour}`;
          heatmap[key] = (heatmap[key] || 0) + 1;
        });
        return { heatmap, total: data.length };
      }
    }
    return { heatmap: {}, total: 0 };
  },
  async getUtilization(lotIds) {
    if (supabase) {
      // Get snapshot vehicle counts from last 7 days
      const since = new Date(Date.now() - 7 * 86400000).toISOString();
      const { data, error } = await supabase
        .from('snapshots')
        .select('lot_id, captured_at, vehicles_detected')
        .in('lot_id', lotIds)
        .gte('captured_at', since)
        .order('captured_at', { ascending: false })
        .limit(5000);
      if (!error && data) {
        // Group by hour of day → avg vehicles
        const byHour = {};
        data.forEach(s => {
          const hour = new Date(s.captured_at).getHours();
          if (!byHour[hour]) byHour[hour] = { sum: 0, count: 0 };
          byHour[hour].sum += (s.vehicles_detected || 0);
          byHour[hour].count++;
        });
        const hourly = {};
        Object.keys(byHour).forEach(h => {
          hourly[h] = Math.round(byHour[h].sum / byHour[h].count * 10) / 10;
        });
        return { hourly, totalSnapshots: data.length };
      }
    }
    return { hourly: {}, totalSnapshots: 0 };
  },
  async getRevenueProjection(lotIds) {
    if (supabase) {
      // Get last 30 days of revenue data for projection
      const since30 = new Date(Date.now() - 30 * 86400000).toISOString();
      const since7 = new Date(Date.now() - 7 * 86400000).toISOString();
      const [res30, res7] = await Promise.all([
        supabase.from('violations').select('gross_revenue, our_revenue, detected_at, action_taken')
          .in('lot_id', lotIds).gte('resolved_at', since30).neq('status', 'pending'),
        supabase.from('violations').select('gross_revenue, our_revenue, detected_at, action_taken')
          .in('lot_id', lotIds).gte('resolved_at', since7).neq('status', 'pending'),
      ]);
      const d30 = res30.data || [];
      const d7 = res7.data || [];
      const rev30 = d30.reduce((s, v) => s + (v.gross_revenue || 0), 0);
      const rev7 = d7.reduce((s, v) => s + (v.gross_revenue || 0), 0);
      const dailyAvg30 = d30.length > 0 ? rev30 / 30 : 0;
      const dailyAvg7 = d7.length > 0 ? rev7 / 7 : 0;
      const viols30 = d30.length;
      const viols7 = d7.length;
      const dailyViols30 = viols30 / 30;
      const dailyViols7 = viols7 / 7;
      return {
        monthlyProjection: Math.round(dailyAvg7 * 30),
        weeklyAvg: Math.round(rev7),
        dailyAvg: Math.round(dailyAvg7),
        trend: dailyAvg7 > dailyAvg30 ? 'up' : dailyAvg7 < dailyAvg30 ? 'down' : 'flat',
        trendPct: dailyAvg30 > 0 ? Math.round(((dailyAvg7 - dailyAvg30) / dailyAvg30) * 100) : 0,
        violationsPerDay: Math.round(dailyViols7 * 10) / 10,
        violTrend: dailyViols7 > dailyViols30 ? 'up' : dailyViols7 < dailyViols30 ? 'down' : 'flat',
        violTrendPct: dailyViols30 > 0 ? Math.round(((dailyViols7 - dailyViols30) / dailyViols30) * 100) : 0,
      };
    }
    return { monthlyProjection: 0, weeklyAvg: 0, dailyAvg: 0, trend: 'flat', trendPct: 0, violationsPerDay: 0, violTrend: 'flat', violTrendPct: 0 };
  },

  // Realtime subscription for violations
  subscribeViolations(lotIds, callback, onError) {
    if (!supabase) { if (onError) onError('Realtime not available'); return null; }
    const channel = supabase.channel('violations-realtime')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'violations',
      }, payload => {
        if (lotIds.includes(payload.new?.lot_id) || lotIds.includes(payload.old?.lot_id)) {
          callback(payload);
        }
      })
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'snapshots',
      }, payload => {
        // New snapshot from any camera — trigger refresh so frame updates
        callback(payload);
      })
      .subscribe((status) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.error('Realtime subscription failed:', status);
          if (onError) onError(status);
        }
      });
    return channel;
  },

  async getProperties(userId, role) {
    if (!userId) return [];
    if (supabase) {
      let q = supabase.from('properties').select('*');
      // Platform admins see every property; RLS still gates non-admins via
      // owner_id / tow_company_id policies. Read the flag from the live
      // session object first (server-fresh from /auth/login or /auth/me)
      // and fall back to JWT decoding for backward-compat with sessions
      // cached before the flag was surfaced on the subject.
      const isAdmin = (() => {
        try {
          const session = JSON.parse(localStorage.getItem('lotlogic_session') || '{}');
          if (session.is_platform_admin === true) return true;
          if (session.is_platform_admin === false) return false;
          const tok = session._token;
          if (!tok) return false;
          const p = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
          return !!p.is_platform_admin;
        } catch { return false; }
      })();
      if (!isAdmin) {
        if (role === 'partner') q = q.eq('tow_company_id', userId);
        else q = q.eq('owner_id', userId);
      }
      q = q.order('created_at', { ascending: false });
      const { data, error } = await q;
      if (!error && data) return data;
    }
    return [];

  // For each violation, attach the paired camera's snapshot — the second
  // camera at the same gate that fired motion (with or without OCR)
  // around the same time as the entry plate event. Lets the operator
  // visually verify that BOTH cameras at the gate saw the vehicle, not
  // just one. A single-camera read is structurally ambiguous (front or
  // back of a truck?) — the paired snapshot disambiguates.
  async _enrichWithPairedSnapshot(violations) {
    if (!supabase || !violations.length) return violations;
    // Pull all candidate paired events in one batch. Window: ±60s around
    // each violation's entry time, scoped to the partner camera at the
    // same gate.
    const PAIR_WINDOW_SEC = 60;
    const fetchOne = async (v) => {
      const ev = v.plate_events;
      if (!ev || !ev.created_at) return null;
      const gateId = ev.alpr_cameras?.gate_id;
      const camId = ev.camera_id;
      if (!gateId || !camId) return null;
      const t = new Date(ev.created_at).getTime();
      const lo = new Date(t - PAIR_WINDOW_SEC * 1000).toISOString();
      const hi = new Date(t + PAIR_WINDOW_SEC * 1000).toISOString();
      const { data } = await supabase
        .from('plate_events')
        .select('image_url, created_at, alpr_cameras!inner(gate_id, name)')
        .eq('alpr_cameras.gate_id', gateId)
        .neq('camera_id', camId)
        .not('image_url', 'is', null)
        .gte('created_at', lo)
        .lte('created_at', hi)
        .order('created_at', { ascending: true })
        .limit(1);
      return (data || [])[0] || null;
    };
    const paired = await Promise.all(violations.map(fetchOne));
    violations.forEach((v, i) => {
      v._paired_snapshot_url = paired[i]?.image_url || null;
      v._paired_camera_name = paired[i]?.alpr_cameras?.name || null;
    });
    return violations;
  },
  async updateALPRViolation(id, updates) {
    if (supabase) {
      const { data, error } = await supabase.from('alpr_violations').update(updates).eq('id', id).select().single();
      if (error) throw new Error(error.message);
      return data;
    }
    return null;
  },
  async dispatchALPRViolation(id) {
    // Operator confirms a tow via the dashboard. action_taken='tow' + action_channel='dashboard'
    // are the partner-reply signal; the camera-side confirmation worker writes tow_confirmed_at
    // independently. Both feed into v_violation_billing_status.
    const now = new Date().toISOString();
    return this.updateALPRViolation(id, {
      status: 'dispatched',
      dispatched_at: now,
      action_taken: 'tow',
      action_channel: 'dashboard',
      action_at: now,
    });
  },
  async dismissALPRViolation(id, notes) {
    const now = new Date().toISOString();
    return this.updateALPRViolation(id, {
      status: 'dismissed',
      resolved_at: now,
      action_taken: 'no_tow',
      action_channel: 'dashboard',
      action_at: now,
      notes: notes || 'Dismissed by operator',
    });
  },
  async getTowJobs(opts = {}) {
    if (supabase) {
      let q = supabase.from('tow_jobs').select('*, properties(name), alpr_violations(plate_text)');
      if (opts.propertyId) q = q.eq('property_id', opts.propertyId);
      if (opts.towCompanyId) q = q.eq('tow_company_id', opts.towCompanyId);
      if (opts.status) q = q.eq('status', opts.status);
      q = q.order('created_at', { ascending: false }).limit(opts.limit || 100);
      const { data, error } = await q;
      if (!error && data) return data;
    }
    return [];
  },
  async recordTowJob(job) {
    if (supabase) {
      const fee = parseFloat(job.tow_fee) || 0;
      const rate = job.commission_rate ?? 0.25;
      const commission = Math.round(fee * rate * 100) / 100;
      const { data, error } = await supabase.from('tow_jobs').insert({
        ...job,
        tow_fee: fee,
        commission_rate: rate,
        commission_amount: commission,
        dispatched_at: new Date().toISOString(),
      }).select().single();
      if (error) throw new Error(error.message);
      // Mark violation as resolved (best-effort — tow job is already recorded)
      if (job.violation_id) {
        try { await supabase.from('alpr_violations').update({ status: 'resolved', resolved_at: new Date().toISOString() }).eq('id', job.violation_id); } catch (_) { console.error('Failed to resolve violation after tow job creation'); }
      }
      return data;
    }
    return null;
  },
  async getALPRStats(userId, role) {
    if (supabase) {
      const propIds = await this._getPropertyIds(userId, role);
      if (propIds.length === 0) return { activeViolations: 0, activePasses: 0, towJobsMonth: 0, commissionMonth: 0, properties: 0 };
      const monthAgo = new Date(Date.now() - 30 * 86400000).toISOString();
      const now = new Date().toISOString();
      const [viols, passes, jobs] = await Promise.all([
        supabase.from('alpr_violations').select('id', { count: 'exact', head: true }).in('property_id', propIds).in('status', ['pending', 'dispatched']),
        supabase.from('visitor_passes').select('id', { count: 'exact', head: true }).in('property_id', propIds).eq('status', 'active').gte('valid_until', now),
        supabase.from('tow_jobs').select('commission_amount').in('property_id', propIds).gte('created_at', monthAgo),
      ]);
      const commission = (jobs.data || []).reduce((s, j) => s + (parseFloat(j.commission_amount) || 0), 0);
      return {
        activeViolations: viols.count || 0,
        activePasses: passes.count || 0,
        towJobsMonth: (jobs.data || []).length,
        commissionMonth: commission,
        properties: propIds.length,
      };
    }
    return { activeViolations: 0, activePasses: 0, towJobsMonth: 0, commissionMonth: 0, properties: 0 };
  },
  subscribeALPRViolations(propertyIds, callback) {
    if (!supabase || !propertyIds?.length) return null;
    const channel = supabase.channel('alpr-violations-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'alpr_violations' }, payload => {
        if (propertyIds.includes(payload.new?.property_id) || propertyIds.includes(payload.old?.property_id)) {
          callback(payload);
        }
      })
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'plate_events' }, payload => {
        if (propertyIds.includes(payload.new?.property_id)) callback(payload);
      })
      .subscribe();
    return channel;
  },
};

// ── Theme hook ────────────────────────────────────────────────
function useTheme() {
  const [theme, setTheme] = useState(() => localStorage.getItem('lotlogic_theme') || 'light');
  useEffect(() => {
    localStorage.setItem('lotlogic_theme', theme);
    // Update meta theme-color for mobile browsers
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'dark' ? '#0c0e14' : '#f8f9fb';
  }, [theme]);
  const toggle = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);
  return { theme, toggle };
}

// ── Online/offline hook ──────────────────────────────────────
function useOnlineStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [reconnected, setReconnected] = useState(false);
  useEffect(() => {
    const goOnline = () => { setOnline(true); setReconnected(true); setTimeout(() => setReconnected(false), 3000); };
    const goOffline = () => { setOnline(false); setReconnected(false); };
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, []);
  return { online, reconnected };
}

// ── Interval-fetch hook ──────────────────────────────────────
// One-shot + interval poller. Runs `fn` once on mount, then every `ms`
// milliseconds (pass 0 or negative to disable the interval and fire once only).
// Uses a single useEffect so the initial call and the first interval tick
// can't race, and sets a `cancelled` flag so a late-returning in-flight fetch
// doesn't push stale state after unmount.
//
// Dependencies go in `deps` — treat it like the deps array on useEffect.
// Because deps is dynamic we silence exhaustive-deps at the call site.
function useIntervalFetch(fn, ms, deps) {
  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      if (cancelled) return;
      try { await fn(); } catch (_) { /* caller is responsible for error state */ }
    };
    run();
    if (ms > 0) {
      const h = setInterval(run, ms);
      return () => { cancelled = true; clearInterval(h); };
    }
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, deps);
}

// ── Haptic feedback ──────────────────────────────────────────
function haptic(style = 'light') {
  if (!navigator.vibrate) return;
  if (style === 'heavy') navigator.vibrate(30);
  else if (style === 'medium') navigator.vibrate(15);
  else navigator.vibrate(8);
}

// ── In-app notification system (replaces SMS dependency) ─────
const NotifyManager = (() => {
  let _audioCtx = null;

  function _getPrefs() {
    try {
      const raw = localStorage.getItem('lotlogic_notify_prefs');
      return raw ? JSON.parse(raw) : { sound: true, browser: true, volume: 0.4 };
    } catch { return { sound: true, browser: true, volume: 0.4 }; }
  }
  function _setPrefs(p) {
    try { localStorage.setItem('lotlogic_notify_prefs', JSON.stringify(p)); } catch {}
  }

  function getPrefs() { return _getPrefs(); }
  function updatePrefs(patch) { const p = { ..._getPrefs(), ...patch }; _setPrefs(p); return p; }

  // Two-tone chime via Web Audio API — no external audio files needed
  function playChime() {
    const prefs = _getPrefs();
    if (!prefs.sound) return;
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = _audioCtx;
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      // First tone: C6 (1047 Hz)
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.connect(gain1); gain1.connect(ctx.destination);
      osc1.frequency.value = 1047;
      osc1.type = 'sine';
      gain1.gain.setValueAtTime(prefs.volume, now);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc1.start(now); osc1.stop(now + 0.15);

      // Second tone: E6 (1319 Hz) — 100ms later, slightly longer
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 1319;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(prefs.volume, now + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc2.start(now + 0.1); osc2.stop(now + 0.35);
    } catch (e) { console.warn('Chime failed:', e); }
  }

  // Urgent double-chime for reminders
  function playUrgentChime() {
    playChime();
    setTimeout(playChime, 500);
  }

  // Browser Notification API
  function browserNotify(title, body, tag) {
    const prefs = _getPrefs();
    if (!prefs.browser) return;
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      new Notification(title, {
        body,
        tag: tag || 'lotlogic-violation',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🅿️</text></svg>',
        renotify: true,
        requireInteraction: false,
      });
    } catch (e) { console.warn('Browser notification failed:', e); }
  }

  // Request browser notification permission (must be user-gesture triggered)
  async function requestPermission() {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied') return 'denied';
    return await Notification.requestPermission();
  }

  function getPermission() {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  }

  // Main entry: fire notification for a new violation
  function notifyNewViolation(violation) {
    const zone = violation.zone_id || 'Unknown zone';
    const type = violation.violation_type || 'Violation';
    const desc = [violation.vehicle_color, violation.vehicle_type && violation.vehicle_type !== 'car' ? violation.vehicle_type : 'vehicle'].filter(Boolean).join(' ');

    playChime();
    haptic('heavy');
    browserNotify(
      `New ${type}`,
      `${desc} in ${zone}`,
      `violation-${violation.id}`,
    );
  }

  // Fire notification for a reminder (more urgent)
  function notifyReminder(violation) {
    const zone = violation.zone_id || 'Unknown zone';
    playUrgentChime();
    haptic('heavy');
    browserNotify(
      '30-min reminder',
      `${zone} — still waiting for action`,
      `reminder-${violation.id}`,
    );
  }

  return { getPrefs, updatePrefs, playChime, playUrgentChime, browserNotify, requestPermission, getPermission, notifyNewViolation, notifyReminder };
})();

// ── Smarter date labels ──────────────────────────────────────
function smartDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (d >= today) return 'Today';
  if (d >= yesterday) return 'Yesterday';
  const diffDays = Math.floor((today - d) / 86400000);
  if (diffDays < 7) return d.toLocaleDateString('en-US', { weekday: 'long' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Time helpers ──────────────────────────────────────────────
function elapsed(isoStr) {
  if (!isoStr) return null;
  const mins = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (mins < 60) return { val: mins, unit: 'MIN', long: mins >= 45 };
  const hrs = Math.floor(mins / 60);
  return { val: hrs, unit: 'HR', long: hrs >= 2 };
}

function timeAgo(isoStr) {
  if (!isoStr) return '';
  const secs = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

// ── Truck-plaza vehicle-event bundling ───────────────────────────────────
// Takes raw plate_events at a property and groups them into "vehicle events"
// — one per physical truck that passed through. Rule (operator-approved
// 2026-05-21, see memory/project_truck_plaza_pass_lifecycle.md):
//   • Same camera: join if gap ≤ 5s OR (gap ≤ 60s AND plate Lev≤2 / substring
//     of any plate already in the bundle).
//   • Cross-camera: join if gap ≤ 10s to any prior camera's last seen.
// Returns bundles in a shape compatible with the existing no_registration_
// violations row UI: { id, raw_plate, first_seen_at, last_seen_at, evidence,
// presence_strength, ... } so the rendering code doesn't have to change.
function bundleVehicleEvents(plateEvents, verifiedPairs = []) {
  // verifiedPairs: { plate_a, plate_b } rows from inferred_plate_pairs
  // where verified_at IS NOT NULL AND dismissed_at IS NULL. These are
  // operator-confirmed identities — two plate strings that belong to
  // the SAME physical vehicle. Because license plates are unique vehicle
  // IDs, two reads of the two plates in a verified pair within any
  // reasonable parking-stay window can only be the same truck. So we
  // merge them aggressively (4-hour window) without the FP risk that
  // unverified-pair merging would carry.
  const synonymOf = new Map(); // plate -> Set<plate>
  for (const { plate_a, plate_b } of verifiedPairs) {
    if (!plate_a || !plate_b) continue;
    if (!synonymOf.has(plate_a)) synonymOf.set(plate_a, new Set([plate_a]));
    if (!synonymOf.has(plate_b)) synonymOf.set(plate_b, new Set([plate_b]));
    synonymOf.get(plate_a).add(plate_b);
    synonymOf.get(plate_b).add(plate_a);
  }
  function platesAreSynonyms(p1, p2) {
    if (!p1 || !p2 || p1 === p2) return p1 === p2;
    return synonymOf.get(p1)?.has(p2) === true;
  }
  // 4 hours covers a typical short truck-plaza stay end-to-end (driver
  // pulls in → registers → eats / sleeps → drives out). Reads of the
  // two plates of a verified pair within this window collapse to one
  // vehicle event.
  const SYNONYM_WINDOW_SEC = 4 * 60 * 60;

  function lev(a, b) {
    if (!a || !b) return Math.max((a || '').length, (b || '').length);
    if (a === b) return 0;
    if (Math.abs(a.length - b.length) > 3) return 99;
    const m = a.length, n = b.length;
    let prev = Array.from({ length: n + 1 }, (_, i) => i);
    for (let i = 1; i <= m; i++) {
      const curr = [i, ...Array(n).fill(0)];
      for (let j = 1; j <= n; j++) {
        const cost = a[i-1] === b[j-1] ? 0 : 1;
        curr[j] = Math.min(curr[j-1] + 1, prev[j] + 1, prev[j-1] + cost);
      }
      prev = curr;
    }
    return prev[n];
  }
  function similar(a, b) {
    if (!a || !b) return false;
    if (a === b) return true;
    if (a.length >= 4 && b.length >= 4 && (a.includes(b) || b.includes(a))) return true;
    if (a.length >= 4 && b.length >= 4 && lev(a, b) <= 2) return true;
    return false;
  }

  const events = [...plateEvents]
    .filter(e => e && e.created_at)
    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  const bundles = [];
  for (const ev of events) {
    const evTs = new Date(ev.created_at).getTime() / 1000;
    const plate = ev.normalized_plate || '';
    let placed = false;
    // Scan back through recent bundles. The verified-synonym window
    // (4h) means we may need to merge into a bundle several hours old,
    // so the lookback has to cover that. 200 bundles ≈ 5h at Charlotte
    // traffic (~40 transits/hr), comfortably past the synonym window.
    for (let i = bundles.length - 1; i >= Math.max(0, bundles.length - 200); i--) {
      const b = bundles[i];
      const lastInCam = b.cams[ev.camera_id];
      const lastAny = Math.max(...Object.values(b.cams));
      const plateMatch = plate && [...b.plates].some(p => similar(plate, p));
      // Verified-pair synonym match — operator-confirmed same vehicle.
      // Safe even with a wide window because a plate is a unique
      // vehicle ID; two reads of (plate_a, plate_b) within 4 hours
      // can only be the same physical truck.
      const synonymMatch = plate && [...b.plates].some(p => platesAreSynonyms(plate, p));

      // Same-camera continuation: short gap OR plate-similar within 60s
      // OR verified synonym within the longer window.
      if (lastInCam !== undefined) {
        const gap = evTs - lastInCam;
        if (gap <= 5 || (gap <= 60 && plateMatch) || (gap <= SYNONYM_WINDOW_SEC && synonymMatch)) {
          b.events.push(ev);
          if (plate) b.plates.add(plate);
          b.cams[ev.camera_id] = evTs;
          placed = true;
          break;
        }
      }
      // Cross-camera: a camera this bundle hasn't seen yet, with another
      // camera's read within 10s — OR within the longer window if the
      // plates are a verified synonym pair.
      else if (lastAny !== undefined && ((evTs - lastAny) <= 10 || ((evTs - lastAny) <= SYNONYM_WINDOW_SEC && synonymMatch))) {
        b.events.push(ev);
        if (plate) b.plates.add(plate);
        b.cams[ev.camera_id] = evTs;
        placed = true;
        break;
      }
    }
    if (!placed) {
      bundles.push({
        events: [ev],
        plates: new Set(plate ? [plate] : []),
        cams: { [ev.camera_id]: evTs },
      });
    }
  }

  // Project to the dashboard's expected shape (compatible with the legacy
  // no_registration_violations row consumer).
  return bundles.map(b => {
    const evs = b.events;
    const firstSeen = evs[0].created_at;
    const lastSeen = evs[evs.length - 1].created_at;
    const spanSec = (new Date(lastSeen) - new Date(firstSeen)) / 1000;
    const bestEv = evs.reduce((best, e) =>
      (Number(e.confidence) || 0) > (Number(best?.confidence) || 0) ? e : best,
      evs[0]
    );
    const distinctPlates = [...new Set(evs.map(e => e.normalized_plate).filter(Boolean))];
    const cameras = [...new Set(evs.map(e => e.camera_id))];
    const isLingering = evs.length >= 3 && spanSec >= 60;
    const anyPass = evs.some(e => ['visitor_pass','visitor_pass_fuzzy','overstay'].includes(e.match_status));
    const anyTow = evs.some(e => e.match_status === 'partner_truck');

    return {
      // Stable synthetic id (first plate_event_id) — used as React key.
      id: `bundle-${evs[0].id}`,
      // Compat fields the no-reg row UI expects:
      raw_plate: bestEv.plate_text || bestEv.normalized_plate || '—',
      normalized_plate: bestEv.normalized_plate || '—',
      best_confidence: Number(bestEv.confidence) || 0,
      first_seen_at: firstSeen,
      last_seen_at: lastSeen,
      flagged_at: firstSeen,
      created_at: firstSeen,
      presence_strength: isLingering ? 'lingered' : 'brief',
      status: 'flagged',
      evidence: evs.map(e => ({
        url: e.image_url,
        taken_at: e.created_at,
        confidence: Number(e.confidence) || 0,
        camera_id: e.camera_id,
        source: 'onboard',
      })),
      // New bundle-specific fields the UI can show:
      _bundle: {
        camera_count: cameras.length,
        camera_ids: cameras,
        distinct_plates: distinctPlates,
        is_lingering: isLingering,
        any_pass_matched: anyPass,
        any_tow_matched: anyTow,
        span_seconds: Math.round(spanSec),
        plate_event_ids: evs.map(e => e.id),
      },
    };
  });
}

// Filter to "Possible No Registration Evidence Package" candidates:
// truck genuinely lingered AND no pass match AND no tow match.
// Drive-throughs (singletons / short bursts) and pass-matched vehicles
// stay out of this surface. They're still in plate_events for first-seen
// backfill and other surfaces.
function filterEvidencePackages(bundles) {
  return bundles.filter(b =>
    b._bundle.is_lingering &&
    !b._bundle.any_pass_matched &&
    !b._bundle.any_tow_matched
  );
}

// Vehicle color helpers — YOLO/Plate Recognizer return lowercased names.
// Anything missing / "unknown" is treated as no color so UI can show a neutral tag.
const VEHICLE_COLOR_HEX = {
  black: '#111827', white: '#f9fafb', silver: '#9ca3af', gray: '#6b7280', grey: '#6b7280',
  red: '#ef4444', blue: '#3b82f6', green: '#22c55e', yellow: '#eab308', orange: '#f97316',

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, msg, type }]);

        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}

  );
}

// ── Focus trap for modal dialogs ─────────────────────────────
// Minimal a11y helper for <div role="dialog">-style overlays. Responsibilities:
//   1. Stash document.activeElement when the modal opens
//   2. Move focus to the first focusable element inside the container
//   3. Keep Tab / Shift+Tab cycling inside the container
//   4. Close on ESC (via onClose)
//   5. Restore focus to the previously-focused element on unmount
// `containerRef` must point at the outermost modal surface. Pass `isOpen=true`
// to activate; pass a falsy `onClose` to suppress ESC handling.
const FOCUSABLE_SELECTOR = [
  'a[href]', 'area[href]',
  'button:not([disabled])',
  'input:not([disabled]):not([type="hidden"])',
  'select:not([disabled])',
  'textarea:not([disabled])',
  '[tabindex]:not([tabindex="-1"])',
].join(',');

function useFocusTrap(containerRef, isOpen, onClose) {
  useEffect(() => {
    if (!isOpen) return undefined;
    const previouslyFocused = document.activeElement;
    const container = containerRef.current;
    if (!container) return undefined;

    // Focus the first autofocus target, else the first focusable element,
    // else the container itself (as a non-focusable fallback we still want the
    // keyboard trap to work).
    function getFocusable() {
      return Array.from(container.querySelectorAll(FOCUSABLE_SELECTOR))
        .filter(el => !el.hasAttribute('disabled') && el.offsetParent !== null);
    }

    const autoEl = container.querySelector('[autofocus]');
    const initial = autoEl || getFocusable()[0] || container;
    try { initial.focus({ preventScroll: true }); } catch {}

    function onKey(e) {
      if (e.key === 'Escape' && typeof onClose === 'function') {
        e.stopPropagation();
        onClose();
        return;
      }
      if (e.key !== 'Tab') return;
      const focusable = getFocusable();
      if (focusable.length === 0) {
        e.preventDefault();
        return;
      }
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      const active = document.activeElement;
      if (e.shiftKey) {
        if (active === first || !container.contains(active)) {
          e.preventDefault();
          last.focus();
        }
      } else {
        if (active === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    document.addEventListener('keydown', onKey, true);
    return () => {
      document.removeEventListener('keydown', onKey, true);
      // Restore focus to the triggering element so keyboard users land back
      // where they started. Guard against the element being unmounted
      // (focus() on a detached node silently no-ops but can still throw in
      // jsdom / older Safari).
      if (previouslyFocused && typeof previouslyFocused.focus === 'function') {
        try { previouslyFocused.focus({ preventScroll: true }); } catch {}
      }
    };
  }, [containerRef, isOpen, onClose]);
}

// Monotonically increasing counter for auto-generated DOM ids. Used by modal
// dialogs to wire aria-labelledby / aria-describedby without asking callers to
// manage ids. Ok to be a global — it's just a render-time counter.
let __uidCounter = 0;
function useUid(prefix = 'uid') {
  const ref = useRef(null);
  if (ref.current === null) {
    __uidCounter += 1;
    ref.current = `${prefix}-${__uidCounter}`;
  }
  return ref.current;
}

// Reusable modal for plate-scoped operator actions: shows the plate, the

//                       at least 2 non-whitespace chars

function ConfirmActionModal({
  plate,
  actionLabel,
  description,
  confirmLabel,

  requireReason = false,
  reasonPlaceholder = 'Reason (optional)',
  submitting = false,
  onConfirm,
  onCancel,
}) {
  const [reason, setReason] = useState('');

  // ESC/overlay-click close is suppressed while submitting, matching the

  useFocusTrap(dialogRef, true, handleClose);
  return (
    <div
      onClick={submitting ? undefined : onCancel}
