[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

# Edge function deploy-time settings. Default is verify_jwt=true but:
# - camera-snapshot has its own URL-secret auth for untrusted camera POSTs
# - cron-sessions-sweep is invoked by pg_cron with no auth header
# Both MUST be false, or pg_cron returns 401 every tick and cameras
# get rejected. This config.toml is read by `supabase functions deploy`
# so settings persist across redeploys.
[functions.cron-sessions-sweep]
verify_jwt = false

[functions.cron-no-reg-sweep]
verify_jwt = false

[functions.camera-snapshot]
verify_jwt = false

[functions.pr-ingest]
verify_jwt = false

[functions.tow-dispatch-email]
verify_jwt = false

[functions.tow-confirm]
verify_jwt = false

[functions.check-violations]
verify_jwt = false

[functions.notify-expiring-plates]
verify_jwt = false

[functions.camera-debug]
verify_jwt = false

[functions.cron-plate-pair-learn]
verify_jwt = false

[functions.tow-dispatch-sms]
verify_jwt = false

# Invoked by pg_cron (no auth header) — see recovery/pg_cron.sql.
[functions.weather-pull]
verify_jwt = false

[functions.weather-risk-eval]
verify_jwt = false

# RUT pollers POST uptime here with their own shared secret.
[functions.camera-watchdog]
verify_jwt = false
