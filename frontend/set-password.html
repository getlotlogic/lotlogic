<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Set your password — LotView</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 70% 55% at 50% -10%, rgba(251,191,36,.15) 0%, transparent 65%),
        #0E0F11;
      color: #E2E2DC; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; line-height: 1.5; letter-spacing: -.005em;
      -webkit-font-smoothing: antialiased;
    }
    main.shell {
      background: #181A1E; border: 1px solid #2A2C31; border-radius: 16px;
      padding: 32px 24px; max-width: 440px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    .brand { text-align: center; margin-bottom: 22px; }
    .brand .shield {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #FBBF24, #D97706); border-radius: 12px;
      font-family: 'Anton', sans-serif; font-size: 18px; color: #1A1206;
      margin-bottom: 10px; box-shadow: 0 6px 18px rgba(251,191,36,.35), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .brand .wordmark {
      font-family: 'Anton', system-ui, sans-serif; font-size: 30px;
      letter-spacing: .03em; text-transform: uppercase; color: #F5F5F0; line-height: 1;
    }
    .brand .wordmark span { color: #FBBF24; }
    h1 {
      font-family: 'Anton', system-ui, sans-serif; font-size: 22px; font-weight: 400;
      letter-spacing: .02em; text-transform: uppercase; color: #F5F5F0; margin: 4px 0 6px; text-align: center;
    }
    h1.ok { color: #22C55E; }
    h1.err { color: #EF4444; }
    p.sub { font-size: 13.5px; color: #9A9B95; text-align: center; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #8B8C86;
            text-transform: uppercase; letter-spacing: .08em; margin: 14px 0 6px; font-family: 'DM Mono', monospace; }
    input {
      width: 100%; padding: 13px 14px; background: #0A0B0D; border: 1px solid #2A2C31;
      border-radius: 9px; color: #F5F5F0; font-size: 16px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .linkbtn { background: none; border: 0; color: #FBBF24; font-family: inherit; font-size: 12.5px;
               cursor: pointer; text-decoration: underline; padding: 0; margin: 0; width: auto; }
    input:focus { border-color: #FBBF24; box-shadow: 0 0 0 3px rgba(251,191,36,.16); }
    .hint { font-size: 11.5px; color: #6F7069; margin-top: 6px; font-family: 'DM Mono', monospace; }
    button {
      width: 100%; margin-top: 22px; background: linear-gradient(135deg, #FBBF24, #D97706);
      color: #1A1206; border: 0; padding: 15px 22px; font-size: 14px; font-weight: 800;
      border-radius: 10px; cursor: pointer; font-family: 'Manrope', sans-serif;
      text-transform: uppercase; letter-spacing: .1em; transition: opacity .2s, transform .1s;
      box-shadow: 0 6px 22px rgba(251,191,36,.25), inset 0 1px 0 rgba(255,255,255,.35);
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: .93; }
    button:active:not(:disabled) { transform: scale(.99); }
    .signin-btn { background: #2A2C31; color: #F5F5F0; box-shadow: none; }
    .msg { border-radius: 9px; padding: 11px 13px; font-size: 13px; margin-top: 16px; text-align: center; }
    .msg.error { background: rgba(239,68,68,.12); border: 1px solid #EF4444; color: #EF4444; }
    .msg.info  { background: rgba(251,191,36,.10); border: 1px solid rgba(251,191,36,.4); color: #FBBF24; }
    .note { color: #6F7069; font-size: 11px; margin-top: 18px; text-align: center;
            letter-spacing: .1em; text-transform: uppercase; font-weight: 600; }
    a { color: #FBBF24; }
  </style>
</head>
<body>
  <main class="shell" id="app">
    <div class="brand">
      <div class="shield" aria-hidden="true">LV</div>
      <div class="wordmark">Lot<span>View</span></div>
    </div>
    <div id="body"><p class="sub">Loading…</p></div>
  </main>

  <script>
    // Invite-based account activation: consume the reset/setup token in the URL
    // and let the user set their own password. Vanilla JS so it loads instantly.
    const API = 'https://lotlogic-backend-production.up.railway.app';
    const APP_URL = 'https://lotlogicparking.com/app';
    const body = document.getElementById('body');

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    const token = new URLSearchParams(window.location.search).get('token');

    function renderInvalid(msg){
      body.innerHTML =
        '<h1 class="err">Link expired</h1>' +
        '<p class="sub">' + esc(msg || 'This activation link is invalid or has expired.') + '</p>' +
        '<button class="signin-btn" id="reqnew">Request a new link</button>' +
        '<div class="note">A fresh link will be sent to your account email.</div>';
      document.getElementById('reqnew').addEventListener('click', function(){ renderRequest(); });
    }

    // Self-service: request a fresh activation link if the old one expired.
    function renderRequest(){
      body.innerHTML =
        '<h1>Request a new link</h1>' +
        '<p class="sub">Enter your account email and we’ll send you a fresh link to set your password.</p>' +
        '<label for="em">Email</label>' +
        '<input id="em" type="email" autocomplete="username" placeholder="you@company.com">' +
        '<button id="req">Request new link</button>' +
        '<div id="rerr"></div>' +
        '<div class="note">Secure activation · LotView</div>';
      const em = document.getElementById('em'), btn = document.getElementById('req'), rerr = document.getElementById('rerr');
      const go = async () => {
        const email = em.value.trim();
        if (!email || email.indexOf('@') < 1) { rerr.innerHTML = '<div class="msg error">Enter your account email.</div>'; return; }
        btn.disabled = true; btn.textContent = 'Sending…'; rerr.innerHTML = '';
        try {
          // Always returns ok (no account enumeration). Creates a fresh token; your
          // LotView contact receives it and forwards the new link.
          await fetch(API + '/auth/request-password', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email }),
          });
          body.innerHTML =
            '<h1 class="ok">Request received</h1>' +
            '<p class="sub">If that email is on file, a fresh link to set your password is on its way. Check with your LotView contact if you don’t receive it.</p>';
        } catch (e) {
          rerr.innerHTML = '<div class="msg error">Can’t reach the server — try again.</div>';
          btn.disabled = false; btn.textContent = 'Request new link';
        }
      };
      btn.addEventListener('click', go);
      em.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    }

    function renderSuccess(){
      body.innerHTML =
        '<h1 class="ok">You’re all set</h1>' +
        '<p class="sub">Your password is saved. Sign in to your portal.</p>' +
        '<button class="signin-btn" onclick="window.location.href=\'' + APP_URL + '\'">Sign in</button>';
    }

    function renderForm(){
      body.innerHTML =
        '<h1>Set your password</h1>' +
        '<p class="sub">Create a password to activate your LotView account.</p>' +
        '<label for="pw">New password</label>' +
        '<input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters">' +
        '<label for="pw2">Confirm password</label>' +
        '<input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter it">' +
        '<div class="hint">Use something only you know — at least 8 characters.</div>' +
        '<button id="go">Set password</button>' +
        '<div id="err"></div>' +
        '<div class="note" style="text-transform:none;letter-spacing:0;">Link not working? <button class="linkbtn" id="reqlink">Request a new one</button></div>';
      document.getElementById('reqlink').addEventListener('click', function(){ renderRequest(); });
      const pw = document.getElementById('pw'), pw2 = document.getElementById('pw2');
      const btn = document.getElementById('go'), err = document.getElementById('err');
      const submit = async () => {
        err.innerHTML = '';
        const a = pw.value, b = pw2.value;
        if (a.length < 8) { err.innerHTML = '<div class="msg error">Password must be at least 8 characters.</div>'; return; }
        if (a !== b) { err.innerHTML = '<div class="msg error">The two passwords don’t match.</div>'; return; }
        btn.disabled = true; btn.textContent = 'Saving…';
        try {
          const r = await fetch(API + '/auth/set-password', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, new_password: a }),
          });
          if (r.ok) { renderSuccess(); return; }
          let detail = 'Could not set your password.';
          try { const j = await r.json(); if (j && j.detail) detail = (typeof j.detail === 'string') ? j.detail : detail; } catch {}
          if (r.status === 400) { renderInvalid(detail); return; }
          err.innerHTML = '<div class="msg error">' + esc(detail) + '</div>';
          btn.disabled = false; btn.textContent = 'Set password';
        } catch (e) {
          err.innerHTML = '<div class="msg error">Can’t reach the server — try again.</div>';
          btn.disabled = false; btn.textContent = 'Set password';
        }
      };
      btn.addEventListener('click', submit);
      pw2.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    }

    if (!token) { renderInvalid('This link is missing its activation code.'); }
    else { renderForm(); }
  </script>
</body>
</html>
